<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio da Copa — Futebol de Campo</title>
<style>
  * { -webkit-box-sizing:border-box; box-sizing:border-box; }
  html,body{margin:0;padding:0;}
  body{
    background:#08301f;
    background:-webkit-radial-gradient(circle at 50% -10%, #14614a 0%, #0b3d29 45%, #052918 100%);
    background:radial-gradient(circle at 50% -10%, #14614a 0%, #0b3d29 45%, #052918 100%);
    font-family:Arial,Helvetica,sans-serif;color:#f2fff8;min-height:100vh;
    overflow-x:hidden;
  }
  .deco{position:fixed;pointer-events:none;z-index:1;opacity:.16;}
  .gramado{position:fixed;top:0;left:0;right:0;height:300px;pointer-events:none;z-index:0;opacity:.05;}
  .gramado svg{display:block;width:100%;height:100%;}
  .deco svg{display:block;width:100%;height:100%;}
  .deco.gira svg{-webkit-animation:giro 24s linear infinite;animation:giro 24s linear infinite;}
  .d1{width:90px;height:90px;left:-14px;top:70px;
    -webkit-animation:flut 8s ease-in-out infinite;animation:flut 8s ease-in-out infinite;}
  .d2{width:56px;height:56px;right:8px;top:150px;opacity:.22;
    -webkit-animation:flut 6s ease-in-out 1s infinite;animation:flut 6s ease-in-out 1s infinite;}
  .d3{width:70px;height:70px;left:20px;bottom:90px;
    -webkit-animation:flut 7s ease-in-out .5s infinite;animation:flut 7s ease-in-out .5s infinite;}
  .d4{width:48px;height:48px;right:24px;bottom:150px;opacity:.24;
    -webkit-animation:flut 6.5s ease-in-out .3s infinite;animation:flut 6.5s ease-in-out .3s infinite;}
  .d5{width:40px;height:40px;left:40%;top:24px;opacity:.20;
    -webkit-animation:flut 7.5s ease-in-out .8s infinite;animation:flut 7.5s ease-in-out .8s infinite;}
  @-webkit-keyframes flut{0%,100%{-webkit-transform:translateY(0);}50%{-webkit-transform:translateY(-18px);}}
  @keyframes flut{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
  @-webkit-keyframes giro{0%{-webkit-transform:rotate(0);}100%{-webkit-transform:rotate(360deg);}}
  @keyframes giro{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}

  .wrap{max-width:720px;margin:0 auto;padding:14px 14px 40px;position:relative;z-index:2;}

  .card{
    background:#fffdf7;color:#1c3a2a;border-radius:30px;padding:24px 22px;
    border:1px solid #f0e2b8;
    box-shadow:0 18px 50px rgba(0,0,0,.30), 0 5px 14px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.7);
    -webkit-box-shadow:0 18px 50px rgba(0,0,0,.30), 0 5px 14px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.7);
    margin-top:16px;
    -webkit-animation:surge .45s ease both;animation:surge .45s ease both;
  }
  @-webkit-keyframes surge{0%{opacity:0;-webkit-transform:translateY(16px) scale(.98);}100%{opacity:1;-webkit-transform:translateY(0) scale(1);}}
  @keyframes surge{0%{opacity:0;transform:translateY(16px) scale(.98);}100%{opacity:1;transform:translateY(0) scale(1);}}

  h1{color:#0b5437;font-size:27px;margin:6px 0 2px;text-align:center;line-height:1.2;font-weight:800;letter-spacing:-.3px;}
  .lema{text-align:center;color:#a07d2c;font-size:14px;margin:0 0 6px;font-weight:bold;letter-spacing:.3px;}
  .cabeca{text-align:center;margin:0 0 4px;}
  .emblema{display:inline-block;position:relative;padding:4px 0;}
  .emblema .estrela-top{display:block;margin:0 auto -2px;width:34px;height:34px;
    -webkit-animation:brilha 2.6s ease-in-out infinite;animation:brilha 2.6s ease-in-out infinite;}
  @-webkit-keyframes brilha{0%,100%{-webkit-transform:scale(1);opacity:1;}50%{-webkit-transform:scale(1.12);opacity:.85;}}
  @keyframes brilha{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.12);opacity:.85;}}
  .fita{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;margin:2px 0;}
  .fita .risco{height:3px;width:34px;border-radius:2px;background:#e8c66a;background:-webkit-linear-gradient(left,rgba(232,198,106,0),#e8c66a);background:linear-gradient(to right,rgba(232,198,106,0),#e8c66a);}
  .fita .risco.dir{background:-webkit-linear-gradient(left,#e8c66a,rgba(232,198,106,0));background:linear-gradient(to right,#e8c66a,rgba(232,198,106,0));}
  .fita .ponto{width:6px;height:6px;border-radius:50%;background:#d4a83a;margin:0 8px;}

  /* ===== TELA INICIAL FANTASTICA (palco/poster) ===== */
  .palco{position:relative;text-align:center;margin:-4px -22px 6px;padding:22px 22px 14px;overflow:hidden;
    border-radius:30px 30px 26px 26px;
    background:-webkit-linear-gradient(top,#0b5437,#08301f);background:linear-gradient(to bottom,#0b5437,#08301f);}
  .palco .raios{position:absolute;top:50%;left:50%;width:340px;height:340px;margin:-170px 0 0 -170px;pointer-events:none;
    -webkit-animation:girarraios 26s linear infinite;animation:girarraios 26s linear infinite;opacity:.5;}
  @-webkit-keyframes girarraios{0%{-webkit-transform:rotate(0);}100%{-webkit-transform:rotate(360deg);}}
  @keyframes girarraios{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
  .palco .halo{position:absolute;top:50%;left:50%;width:200px;height:200px;margin:-100px 0 0 -100px;border-radius:50%;pointer-events:none;
    background:-webkit-radial-gradient(circle,rgba(244,221,148,.5) 0%,rgba(244,221,148,0) 68%);
    background:radial-gradient(circle,rgba(244,221,148,.5) 0%,rgba(244,221,148,0) 68%);
    -webkit-animation:pulsahalo 3s ease-in-out infinite;animation:pulsahalo 3s ease-in-out infinite;}
  @-webkit-keyframes pulsahalo{0%,100%{opacity:.7;-webkit-transform:scale(1);}50%{opacity:1;-webkit-transform:scale(1.08);}}
  @keyframes pulsahalo{0%,100%{opacity:.7;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
  .palco .zico{position:relative;z-index:2;display:block;margin:0 auto;width:150px;height:auto;
    -webkit-filter:drop-shadow(0 8px 14px rgba(0,0,0,.4));filter:drop-shadow(0 8px 14px rgba(0,0,0,.4));
    -webkit-animation:entrazico .6s ease both, bob 3s ease-in-out .6s infinite;animation:entrazico .6s ease both, bob 3s ease-in-out .6s infinite;}
  @-webkit-keyframes entrazico{0%{opacity:0;-webkit-transform:translateY(24px) scale(.8);}100%{opacity:1;-webkit-transform:translateY(0) scale(1);}}
  @keyframes entrazico{0%{opacity:0;transform:translateY(24px) scale(.8);}100%{opacity:1;transform:translateY(0) scale(1);}}

  .placar{position:relative;z-index:2;display:inline-block;margin:6px auto 0;padding:9px 24px;border-radius:16px;
    background:-webkit-linear-gradient(top,#f4dd94,#d4a83a);background:linear-gradient(to bottom,#f4dd94,#d4a83a);
    border:2px solid #b8912f;
    box-shadow:0 5px 14px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.6);-webkit-box-shadow:0 5px 14px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.6);}
  .placar h1{color:#5a4210;font-size:25px;margin:0;text-shadow:0 1px 0 rgba(255,255,255,.4);letter-spacing:0;}
  .palco .subt{position:relative;z-index:2;color:#f4e4b0;font-size:13px;margin:8px 0 2px;font-weight:bold;letter-spacing:.5px;}
  .estrelinhas{position:relative;z-index:2;color:#f4dd94;font-size:15px;letter-spacing:6px;margin-top:2px;}

  .balao-zico{position:relative;background:#f6fbf3;border:2px solid #dcecc9;border-radius:20px;padding:13px 16px;margin:14px 0 6px;color:#26402e;font-size:15px;line-height:1.5;
    box-shadow:0 4px 12px rgba(0,0,0,.08);-webkit-box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .balao-zico:before{content:"";position:absolute;top:-11px;left:50%;margin-left:-10px;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:11px solid #dcecc9;}
  .balao-zico:after{content:"";position:absolute;top:-8px;left:50%;margin-left:-9px;width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:9px solid #f6fbf3;}

  .ficha{background:-webkit-linear-gradient(top,#fdfef9,#f4f8ee);background:linear-gradient(to bottom,#fdfef9,#f4f8ee);
    border:2px solid #e4ecd8;border-radius:22px;padding:16px 16px 18px;margin:12px 0 0;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8);-webkit-box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
  .ficha-titulo{text-align:center;color:#0b5437;font-weight:800;font-size:15px;letter-spacing:1px;text-transform:uppercase;margin:0 0 10px;
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;}
  .ficha-titulo:before,.ficha-titulo:after{content:"";height:2px;width:24px;background:#d4a83a;margin:0 10px;border-radius:2px;}
  .ficha-instr{text-align:center;color:#5a7565;font-size:13.5px;margin:0 0 12px;line-height:1.4;}

  .mascote{display:block;margin:0 auto 4px;text-align:center;
    -webkit-animation:bob 3s ease-in-out infinite;animation:bob 3s ease-in-out infinite;}
  .mascote img{display:block;margin:0 auto;width:120px;height:auto;}
  @-webkit-keyframes bob{0%,100%{-webkit-transform:translateY(0);}50%{-webkit-transform:translateY(-9px);}}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}

  .balao{background:#f6fbf3;border:2px solid #dcecc9;border-radius:22px;padding:15px 18px;margin:10px 0;color:#26402e;font-size:15px;line-height:1.5;
    box-shadow:0 3px 10px rgba(0,0,0,.05);-webkit-box-shadow:0 3px 10px rgba(0,0,0,.05);}

  label.campo{display:block;font-size:15px;color:#0b5437;font-weight:bold;margin:10px 0 4px;letter-spacing:.2px;}
  label.campo-turma{margin-top:16px;padding-top:12px;border-top:1px dashed #dcecc9;}
  input.nome{width:100%;padding:14px 16px;border:2px solid #dcecc9;border-radius:18px;font-size:17px;color:#1c3a2a;outline:none;background:#fdfef9;}
  input.nome:focus{border-color:#0b5437;}

  .turmas{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;margin:4px -4px 0;}
  .turma{position:relative;background:#ffffff;border:2px solid #e2ecd6;border-radius:16px;padding:8px 0 6px;margin:4px;cursor:pointer;width:62px;text-align:center;-webkit-flex:none;flex:none;
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-align:center;-webkit-align-items:center;align-items:center;
    box-shadow:0 3px 8px rgba(11,84,55,.08), inset 0 1px 0 rgba(255,255,255,.9);-webkit-box-shadow:0 3px 8px rgba(11,84,55,.08), inset 0 1px 0 rgba(255,255,255,.9);
    -webkit-transition:-webkit-transform .14s ease, box-shadow .14s ease, border-color .14s ease;transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;}
  .turma:active{-webkit-transform:translateY(1px);transform:translateY(1px);}
  .t-ano{font-size:12px;font-weight:bold;color:#7f9585;line-height:1;letter-spacing:.3px;}
  .t-letra{font-size:22px;font-weight:800;color:#0b5437;line-height:1.05;margin-top:1px;}
  .turma.sel{border-color:#e0b855;
    background:-webkit-linear-gradient(top,#fffdf3,#fbeecb);background:linear-gradient(to bottom,#fffdf3,#fbeecb);
    box-shadow:0 6px 16px rgba(200,155,46,.3), inset 0 1px 0 rgba(255,255,255,.9);-webkit-box-shadow:0 6px 16px rgba(200,155,46,.3), inset 0 1px 0 rgba(255,255,255,.9);
    -webkit-transform:translateY(-2px);transform:translateY(-2px);}
  .turma.sel .t-ano{color:#b8912f;}
  .turma.sel .t-letra{color:#5a4210;}
  .turma.sel:after{content:"";position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:#e0b855;background:-webkit-linear-gradient(top,#f4dd94,#d4a83a);background:linear-gradient(to bottom,#f4dd94,#d4a83a);
    box-shadow:0 2px 4px rgba(180,145,47,.5);-webkit-box-shadow:0 2px 4px rgba(180,145,47,.5);}
  .turma.sel:before{content:"";position:absolute;top:-1px;right:2px;z-index:2;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;-webkit-transform:rotate(45deg);transform:rotate(45deg);}
  .aviso{color:#c0392b;font-size:14px;margin:8px 0 0;font-weight:bold;min-height:18px;}

  .perg-linha{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:start;-webkit-align-items:flex-start;align-items:flex-start;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;margin:0 0 4px;}
  .sombtn-mini{-webkit-flex:none;flex:none;width:44px;height:44px;border-radius:50%;border:none;background:#eafff2;cursor:pointer;margin-left:10px;padding:0;
    -webkit-box-shadow:0 3px 0 #bfe8cf;box-shadow:0 3px 0 #bfe8cf;
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;}
  .sombtn-mini svg{width:24px;height:24px;}
  .sombtn-mini:active{-webkit-transform:translateY(2px);transform:translateY(2px);-webkit-box-shadow:0 1px 0 #bfe8cf;box-shadow:0 1px 0 #bfe8cf;}
  .sombtn-mini.tocando{background:#c9f0d6;-webkit-animation:somp .6s ease-in-out infinite;animation:somp .6s ease-in-out infinite;}
  @-webkit-keyframes somp{0%,100%{-webkit-transform:scale(1);}50%{-webkit-transform:scale(1.12);}}
  @keyframes somp{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

  .btn{
    display:block;width:auto;max-width:340px;margin:16px auto 0;border:none;border-radius:26px;padding:15px 40px;
    font-size:18px;font-weight:bold;color:#5a4210;background:#e8c66a;cursor:pointer;
    box-shadow:0 6px 0 #b8912f, 0 8px 16px rgba(0,0,0,.18);-webkit-box-shadow:0 6px 0 #b8912f, 0 8px 16px rgba(0,0,0,.18);
    background:-webkit-linear-gradient(top,#f4dd94,#e0b855);background:linear-gradient(to bottom,#f4dd94,#e0b855);
  }
  .btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);box-shadow:0 3px 0 #b8912f;-webkit-box-shadow:0 3px 0 #b8912f;}
  .btn.pulsa{-webkit-animation:pulsa 1.4s ease-in-out infinite;animation:pulsa 1.4s ease-in-out infinite;}
  @-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1);}50%{-webkit-transform:scale(1.05);}}
  @keyframes pulsa{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  .btn[disabled]{opacity:.5;cursor:default;-webkit-animation:none;animation:none;}

  .btn2{max-width:300px;background:#eafff2;color:#0e6b3f;box-shadow:0 5px 0 #bfe8cf;-webkit-box-shadow:0 5px 0 #bfe8cf;border:2px solid #bfe8cf;
    background:-webkit-linear-gradient(top,#f4fff8,#eafff2);background:linear-gradient(to bottom,#f4fff8,#eafff2);}
  .btn2:active{box-shadow:0 2px 0 #bfe8cf;-webkit-box-shadow:0 2px 0 #bfe8cf;}

  .prog{height:12px;background:#052918;border-radius:10px;overflow:hidden;margin:2px 0 4px;box-shadow:inset 0 1px 3px rgba(0,0,0,.4);-webkit-box-shadow:inset 0 1px 3px rgba(0,0,0,.4);}
  .prog i{display:block;height:100%;width:0%;background:#e0b855;
    background:-webkit-linear-gradient(left,#c99b2e,#f4dd94);
    background:linear-gradient(to right,#c99b2e,#f4dd94);
    -webkit-transition:width .3s ease;transition:width .3s ease;}
  .passo{text-align:center;color:#cfeadd;font-size:13px;margin:2px 0 0;letter-spacing:.3px;}

  .pergunta{font-size:19px;color:#173226;font-weight:bold;line-height:1.35;margin:0;-webkit-box-flex:1;-webkit-flex:1;flex:1;}

  .fig{display:block;margin:6px auto 10px;width:100%;max-width:150px;height:130px;
    -webkit-animation:figentra .5s ease both, figflut 3.2s ease-in-out .5s infinite;
    animation:figentra .5s ease both, figflut 3.2s ease-in-out .5s infinite;}
  img.fig{width:100%;max-width:150px;height:130px;object-fit:contain;-o-object-fit:contain;}
  @-webkit-keyframes figentra{0%{opacity:0;-webkit-transform:scale(.7);}70%{-webkit-transform:scale(1.06);}100%{opacity:1;-webkit-transform:scale(1);}}
  @keyframes figentra{0%{opacity:0;transform:scale(.7);}70%{transform:scale(1.06);}100%{opacity:1;transform:scale(1);}}
  @-webkit-keyframes figflut{0%,100%{-webkit-transform:translateY(0);}50%{-webkit-transform:translateY(-7px);}}
  @keyframes figflut{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

  .opt-linha{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-top:11px;
    -webkit-animation:optentra .4s ease both;animation:optentra .4s ease both;}
  @-webkit-keyframes optentra{0%{opacity:0;-webkit-transform:translateX(-14px);}100%{opacity:1;-webkit-transform:translateX(0);}}
  @keyframes optentra{0%{opacity:0;transform:translateX(-14px);}100%{opacity:1;transform:translateX(0);}}
  .opt{
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;
    -webkit-box-flex:1;-webkit-flex:1;flex:1;text-align:left;border:2px solid #d8e8cf;
    background:#f4fbf6;background:-webkit-linear-gradient(top,#ffffff,#eef6ea);background:linear-gradient(to bottom,#ffffff,#eef6ea);
    border-radius:22px;padding:10px 14px 10px 10px;font-size:16px;color:#22392b;cursor:pointer;
    position:relative;line-height:1.3;min-height:56px;
    box-shadow:0 4px 12px rgba(11,84,55,.09), inset 0 1px 0 rgba(255,255,255,.8);-webkit-box-shadow:0 4px 12px rgba(11,84,55,.09), inset 0 1px 0 rgba(255,255,255,.8);
    -webkit-transition:-webkit-transform .12s ease, box-shadow .12s ease, border-color .12s ease;transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .opt:active{-webkit-transform:scale(.98);transform:scale(.98);}
  .opt .badge{-webkit-flex:none;flex:none;width:36px;height:36px;border-radius:50%;margin-right:12px;
    background:-webkit-linear-gradient(top,#1a7d4f,#0b5437);background:linear-gradient(to bottom,#1a7d4f,#0b5437);
    color:#fff;font-weight:800;font-size:17px;text-transform:uppercase;
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;
    box-shadow:0 2px 5px rgba(11,84,55,.35), inset 0 1px 0 rgba(255,255,255,.3);-webkit-box-shadow:0 2px 5px rgba(11,84,55,.35), inset 0 1px 0 rgba(255,255,255,.3);
    -webkit-transition:-webkit-transform .15s ease;transition:transform .15s ease;}
  .opt .txt{-webkit-box-flex:1;-webkit-flex:1;flex:1;}
  .opt.sel{border-color:#e0b855;
    background:-webkit-linear-gradient(top,#fffdf3,#fdf2cf);background:linear-gradient(to bottom,#fffdf3,#fdf2cf);
    box-shadow:0 6px 18px rgba(200,155,46,.28), inset 0 1px 0 rgba(255,255,255,.9);-webkit-box-shadow:0 6px 18px rgba(200,155,46,.28), inset 0 1px 0 rgba(255,255,255,.9);}
  .opt.sel .badge{background:-webkit-linear-gradient(top,#f4dd94,#d4a83a);background:linear-gradient(to bottom,#f4dd94,#d4a83a);color:#5a4210;
    -webkit-transform:scale(1.08);transform:scale(1.08);
    box-shadow:0 3px 8px rgba(180,145,47,.5), inset 0 1px 0 rgba(255,255,255,.5);-webkit-box-shadow:0 3px 8px rgba(180,145,47,.5), inset 0 1px 0 rgba(255,255,255,.5);}
  .opt.sel .txt{color:#5a4210;font-weight:bold;}
  .opt-som{-webkit-flex:none;flex:none;width:40px;height:40px;border-radius:50%;border:none;background:#eafff2;cursor:pointer;margin-left:8px;padding:0;
    -webkit-box-shadow:0 2px 0 #cfe9d9;box-shadow:0 2px 0 #cfe9d9;
    display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;}
  .opt-som svg{width:22px;height:22px;}
  .opt-som:active{-webkit-transform:translateY(2px);transform:translateY(2px);-webkit-box-shadow:none;box-shadow:none;}
  .opt-som.tocando{background:#c9f0d6;-webkit-animation:somp .6s ease-in-out infinite;animation:somp .6s ease-in-out infinite;}

  .linha{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-top:8px;}
  .mini{background:transparent;border:none;color:#0e6b3f;font-size:14px;cursor:pointer;text-decoration:underline;padding:6px;}

  /* resultado */
  .notabox{display:inline-block;margin:8px auto;padding:14px 34px;border-radius:24px;
    background:-webkit-linear-gradient(top,#fff9e8,#f4e4b0);background:linear-gradient(to bottom,#fff9e8,#f4e4b0);

/* ================= NARRACAO ================= */
var vozPt=null;
function escolherVoz(){
 if(!(window.speechSynthesis)){return;}
 var vs=window.speechSynthesis.getVoices();var i,best=null,bestS=-1;
 for(i=0;i<vs.length;i++){
   var v=vs[i];if((v.lang||"").toLowerCase().indexOf("pt")<0){continue;}
   var n=(v.name||"").toLowerCase();var s=1;
   if(n.indexOf("natural")>=0||n.indexOf("neural")>=0||n.indexOf("google")>=0||n.indexOf("microsoft")>=0){s+=3;}
   if(n.indexOf("maria")>=0||n.indexOf("francisca")>=0||n.indexOf("luciana")>=0){s+=2;}
   if(s>bestS){bestS=s;best=v;}
 }
 vozPt=best;
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=escolherVoz;escolherVoz();}
function limparFala(t){
 if(!t){return "";}
 t=t.replace(/<[^>]+>/g," ");
 t=t.replace(/\s*([,.!?:])\s*/g,"$1 ");
 t=t.replace(/\s{2,}/g," ");
 t=t.replace(/\bvoce\b/gi,function(m){return m.charAt(0)==="V"?"você":"você";});
 t=t.replace(/\bvoces\b/gi,function(m){return "vocês";});
 t=t.replace(/\bPele\b/g,"Pelé");
 t=t.replace(/\s+$/,"");
 if(!/[.!?]$/.test(t)){t=t+".";}
 return t;
}
function quebrarFrases(t){
 var out=[],buf="",i,ch;
 for(i=0;i<t.length;i++){
   ch=t.charAt(i);buf+=ch;
   if(ch==="."||ch==="!"||ch==="?"||ch===":"){
     var nx=t.charAt(i+1);
     if(nx===""||nx===" "){out.push(buf.replace(/^\s+|\s+$/g,""));buf="";}
   }
 }
 if(buf.replace(/^\s+|\s+$/g,"")!==""){out.push(buf.replace(/^\s+|\s+$/g,""));}
 return out;
}
function falar(txt,aoTerminar){
 if(!(window.speechSynthesis)||!vozPt){if(aoTerminar){aoTerminar();}return;}
 window.speechSynthesis.cancel();
 var frases=quebrarFrases(limparFala(txt));
 var idx=0;
 function proxima(){
   if(idx>=frases.length){if(aoTerminar){aoTerminar();}return;}
   var atualFrase=frases[idx];
   var u=new SpeechSynthesisUtterance(atualFrase);
   u.voice=vozPt;u.lang="pt-BR";u.rate=0.94;u.pitch=1.06;
   var pausa=160;
   if(/^letra\s+[a-h]\.?$/i.test(atualFrase.replace(/\s+$/,""))){ pausa=650; }
   u.onend=function(){idx++;setTimeout(proxima,pausa);};
   window.speechSynthesis.speak(u);
 }
 proxima();
}
function narrar(t){falar(t);}

/* ================= TELAS ================= */
function el(){return document.getElementById("app");}

function telaInicio(){
 var h="";
 h+='<div class="card">';
 h+='<div class="palco">';
 h+='<svg class="raios" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">';
 var rr;
 for(rr=0;rr<12;rr++){
   h+='<polygon points="50,50 46,0 54,0" fill="rgba(244,221,148,0.35)" transform="rotate('+(rr*30)+' 50 50)"/>';
 }
 h+='</svg>';
 h+='<div class="halo"></div>';
 h+='<img src="'+C10.comemora+'" alt="" class="zico">';
 h+='<div class="placar"><h1>Desafio da Copa</h1></div>';
 h+='<p class="subt">FUTEBOL DE CAMPO</p>';
 h+='<div class="estrelinhas">&#9733; &#9733; &#9733;</div>';
 h+='</div>';
 h+='<div class="balao-zico">Olá! Eu sou o <b>Zico</b>, seu craque guia! Vamos jogar uma provinha sobre o Rei Pelé e a Copa do Mundo. São 10 perguntas. Bora começar?</div>';
 h+='<div class="ficha">';
 h+='<p class="ficha-titulo">Ficha do Craque</p>';
 h+='<p class="ficha-instr">Digite seu nome e toque na sua turma para começar! &#9917;</p>';
 h+='<label class="campo" for="nm">Seu nome:</label>';
 h+='<input class="nome" id="nm" placeholder="Digite seu nome" autocomplete="off">';
 h+='<label class="campo campo-turma">Escolha sua turma:</label>';
 h+='<div class="turmas" id="turmas">';
 var t;
 for(t=0;t<TURMAS.length;t++){
   var tano=TURMAS[t].substring(0,2);
   var tletra=TURMAS[t].substring(2);
   h+='<button class="turma" data-tur="'+TURMAS[t]+'"><span class="t-ano">'+tano+'</span><span class="t-letra">'+tletra+'</span></button>';
 }
 h+='</div>';
 h+='</div>';
 h+='<p class="aviso" id="aviso"></p>';
 h+='<button class="btn pulsa" id="ini">Começar a provinha &#10132;</button>';
 h+='</div>';
 h+='<p class="rodape">Uma provinha é para pensar sozinho. Capriche!</p>';
 el().innerHTML=h;

 var tb=el().getElementsByClassName("turma");var k;
 for(k=0;k<tb.length;k++){
   tb[k].onclick=function(){
     var all=el().getElementsByClassName("turma");var z;
     for(z=0;z<all.length;z++){all[z].className="turma";}
     this.className="turma sel";
     turmaAluno=this.getAttribute("data-tur");
     document.getElementById("aviso").innerText="";
   };
 }
 document.getElementById("ini").onclick=function(){
   var v=document.getElementById("nm").value;
   var nm=(v&&v.replace(/\s+/g,"")!=="")?v.replace(/\s+/g," ").replace(/^\s|\s$/g,""):"";
   if(nm===""){document.getElementById("aviso").innerText="Escreva seu nome, craque!";document.getElementById("nm").focus();return;}
   if(turmaAluno===""){document.getElementById("aviso").innerText="Toque na sua turma!";return;}
   nomeAluno=nm;
   atual=0;telaQuestao();
 };
 var textoAbertura="Olá! Eu sou o Zico, o seu craque guia! Vamos jogar uma provinha sobre o Rei Pelé e a Copa do Mundo. Mas primeiro, preste atenção: digite o seu nome aqui na ficha. Depois, toque na sua turma. Quando terminar, é só apertar o botão começar. Bora lá, craque!";
 var aberturaFalada=false;
 function falarAbertura(){
   if(aberturaFalada){return;}
   aberturaFalada=true;
   narrar(textoAbertura);
 }
 setTimeout(falarAbertura,350);
 /* rede de seguranca: se o navegador bloquear o audio automatico,
    fala no primeiro toque/clique/tecla da crianca (uma vez so) */
 function destravar(){
   if(!aberturaFalada){falarAbertura();}
   if(document.removeEventListener){
     document.removeEventListener("touchstart",destravar,true);
     document.removeEventListener("mousedown",destravar,true);
     document.removeEventListener("keydown",destravar,true);
   }
 }
 if(document.addEventListener){
   document.addEventListener("touchstart",destravar,true);
   document.addEventListener("mousedown",destravar,true);
   document.addEventListener("keydown",destravar,true);
 }
}

function embaralharOpts(qi){
 if(ordemOpts[qi]){return ordemOpts[qi];}
 var arr=[],k;for(k=0;k<QUESTOES[qi].op.length;k++){arr.push(k);}
 var m,tmp;for(m=arr.length-1;m>0;m--){var j=Math.floor(Math.random()*(m+1));tmp=arr[m];arr[m]=arr[j];arr[j]=tmp;}
 ordemOpts[qi]=arr;return arr;
}

function telaQuestao(){
 var Q=QUESTOES[atual];
 var ord=embaralharOpts(atual);
 var pct=Math.round((atual)/QUESTOES.length*100);
 var h="";
 h+='<div class="prog"><i style="width:'+pct+'%"></i></div>';
 h+='<p class="passo">Pergunta '+(atual+1)+' de '+QUESTOES.length+'</p>';
 h+='<div class="card">';
 h+=figura(Q.fig);
 h+='<div class="perg-linha"><p class="pergunta">'+(atual+1)+'- '+Q.q+'</p>';
 h+='<button class="sombtn-mini" id="ouvir" title="Ouvir"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="#0e6b3f"/><path d="M16 8a5 5 0 0 1 0 8" stroke="#0e6b3f" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M18.5 5.5a9 9 0 0 1 0 13" stroke="#0e6b3f" stroke-width="2" fill="none" stroke-linecap="round"/></svg></button></div>';
 var k;
 var letras="abcdefgh";
 for(k=0;k<ord.length;k++){
   var oi=ord[k];
   var sel=(respostas[atual]===oi)?" sel":"";
   h+='<div class="opt-linha" style="-webkit-animation-delay:'+(k*0.07)+'s;animation-delay:'+(k*0.07)+'s">';
   h+='<button class="opt'+sel+'" data-oi="'+oi+'"><span class="badge">'+letras.charAt(k)+'</span><span class="txt">'+Q.op[oi]+'</span></button>';
   h+='<button class="opt-som" data-fala="Letra '+letras.charAt(k)+'. '+Q.op[oi].replace(/"/g,"&quot;")+'" title="Ouvir"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="#0e6b3f"/><path d="M16 8a5 5 0 0 1 0 8" stroke="#0e6b3f" stroke-width="2" fill="none" stroke-linecap="round"/></svg></button>';
   h+='</div>';
 }
 h+='<div class="linha">';
 if(atual>0){h+='<button class="mini" id="volta">&#8592; Voltar</button>';}else{h+='<span></span>';}
 h+='<span></span>';
 h+='</div>';
 var ultimo=(atual===QUESTOES.length-1);
 h+='<button class="btn" id="avanca"'+(respostas[atual]<0?' disabled':'')+'>'+(ultimo?'Terminar e ver a nota':'Próxima pergunta')+' &#10132;</button>';
 h+='</div>';
 el().innerHTML=h;

 var opts=el().getElementsByClassName("opt");
 for(k=0;k<opts.length;k++){
   opts[k].onclick=function(){
     var oi=parseInt(this.getAttribute("data-oi"),10);
     respostas[atual]=oi;
     var all=el().getElementsByClassName("opt");var z;
     for(z=0;z<all.length;z++){all[z].className="opt";}
     this.className="opt sel";
     var av=document.getElementById("avanca");av.disabled=false;av.className="btn pulsa";
   };
 }
 var somopts=el().getElementsByClassName("opt-som");
 for(k=0;k<somopts.length;k++){
   somopts[k].onclick=function(ev){
     if(ev&&ev.stopPropagation){ev.stopPropagation();}
     var btn=this;btn.className="opt-som tocando";
     falar(btn.getAttribute("data-fala"),function(){btn.className="opt-som";});
   };
 }
 var ob=document.getElementById("ouvir");
 if(ob){
   ob.onclick=function(){
     var btn=this;btn.className="sombtn-mini tocando";
     var txt="Pergunta "+(atual+1)+". "+Q.q+" ";
     var z;
     for(z=0;z<ord.length;z++){
       var letra=String.fromCharCode(97+z);
       txt+="Letra "+letra+". "+Q.op[ord[z]]+". ";
     }
     falar(txt,function(){btn.className="sombtn-mini";});
   };
 }
 var vb=document.getElementById("volta");
 if(vb){vb.onclick=function(){atual--;telaQuestao();};}
 document.getElementById("avanca").onclick=function(){
   if(respostas[atual]<0){return;}
   if(atual===QUESTOES.length-1){telaResultado();}
   else{atual++;telaQuestao();}
 };
 setTimeout(function(){narrar(Q.q);},300);
 window.scrollTo(0,0);
}

function calcularAcertos(){
 var n=0,i;for(i=0;i<QUESTOES.length;i++){if(respostas[i]===QUESTOES[i].c){n++;}}return n;
}
function letraDe(qi,oi){
 /* letra na ordem EXIBIDA para o gabarito do aluno */
 var ord=ordemOpts[qi]||embaralharOpts(qi);var p;
 for(p=0;p<ord.length;p++){if(ord[p]===oi){return String.fromCharCode(65+p);}}
 return "-";
}
function codigoResultado(ac){
 /* NOME-nota-sequencia de letras escolhidas (ordem exibida) */
 var s="",i;
 for(i=0;i<QUESTOES.length;i++){s+=(respostas[i]<0?"-":letraDe(i,respostas[i]));}
 var nm=nomeAluno.toUpperCase().replace(/[^A-Z]/g,"").substring(0,10);
 var tur=turmaAluno.replace(/[^0-9A-Za-z]/g,"");
 return (nm||"ALUNO")+"-"+(tur||"?")+"-"+ac+"of"+QUESTOES.length+"-"+s;
}

function notaDez(ac){
 var n=Math.round(ac/QUESTOES.length*100)/10;
 return (n===Math.floor(n))?String(n):String(n).replace(".",",");
}
function enviarPlanilha(ac){
 if(!URL_PLANILHA||enviado){return;}
 enviado=true;
 var letras="",i;
 for(i=0;i<QUESTOES.length;i++){letras+=(respostas[i]<0?"-":letraDe(i,respostas[i]));}
 var dados="nome="+encodeURIComponent(nomeAluno)+
   "&turma="+encodeURIComponent(turmaAluno)+
   "&nota="+encodeURIComponent(notaDez(ac))+
   "&acertos="+encodeURIComponent(ac+"/"+QUESTOES.length)+
   "&respostas="+encodeURIComponent(letras)+
   "&data="+encodeURIComponent(new Date().toLocaleString("pt-BR"));
 try{
   fetch(URL_PLANILHA,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:dados})
     .then(function(){marcarEnvio(true);},function(){marcarEnvio(false);});
 }catch(e){marcarEnvio(false);}
}
function marcarEnvio(ok){
 var s=document.getElementById("statusenvio");
 if(!s){return;}
 s.innerText=ok?"Resultado enviado ao professor!":"Não foi possível enviar automaticamente. Use o código abaixo.";
 s.style.color=ok?"#0e8a3f":"#c0392b";
}

function telaResultado(){
 var ac=calcularAcertos();
 var pct=Math.round(ac/QUESTOES.length*100);
 var msg,cor;
 if(pct>=80){msg="Que craque! Você mandou muito bem!";}
 else if(pct>=50){msg="Muito bem! Você está no caminho certo!";}
 else{msg="Vamos treinar mais um pouquinho, você consegue!";}
 var h="";
 h+='<div class="card" style="text-align:center">';
 h+=mascotePose("taca");
 h+='<h1>Fim da provinha!</h1>';
 h+='<p class="lema">'+nomeAluno+' &bull; Turma '+turmaAluno+'</p>';
 h+='<div class="notabox"><div class="nota">'+notaDez(ac)+'<span style="font-size:28px;color:#a07d2c"> / 10</span></div></div>';
 h+='<p class="notasub"><b>'+ac+' de '+QUESTOES.length+' acertos</b><br>'+msg+'</p>';
 h+='<p class="lema" id="statusenvio" style="font-weight:bold;margin-top:6px"></p>';
 h+='</div>';

 /* Espelho de correcao para o professor */
 h+='<div class="card">';
 h+='<h1 style="font-size:19px">Espelho de correção</h1>';
 h+='<p class="lema" style="margin-bottom:10px">Para o professor conferir</p>';
 h+='<table class="gab"><tr><th>#</th><th>Marcou</th><th>Certa</th><th>Resultado</th></tr>';
 var i;
 for(i=0;i<QUESTOES.length;i++){
   var mk=(respostas[i]<0)?"-":letraDe(i,respostas[i]);
   var ce=letraDe(i,QUESTOES[i].c);
   var ok=(respostas[i]===QUESTOES[i].c);
   h+='<tr><td>'+(i+1)+'</td><td>'+mk+'</td><td>'+ce+'</td><td class="'+(ok?"certo":"errado")+'">'+(ok?"acertou":"errou")+'</td></tr>';
 }
 h+='</table>';
 h+='<div class="codigo" id="cod">'+codigoResultado(ac)+'</div>';
 h+='<p class="lema" style="margin-top:8px;font-size:12px">Código do resultado (aluno pode enviar ao professor)</p>';
 h+='<button class="btn2 btn" id="copiar">Copiar código</button>';
 h+='<button class="btn2 btn" id="imprimir">Imprimir / salvar PDF</button>';
 h+='<button class="btn2 btn" id="refazer">Fazer de novo</button>';
 h+='</div>';
 el().innerHTML=h;

 /* confete */
 if(pct>=50){soltarConfete();}

 /* envio automatico para a planilha (se configurado) */
 if(URL_PLANILHA){
   var se=document.getElementById("statusenvio");
   if(se){se.innerText="Enviando resultado...";se.style.color="#3f7d5d";}
   enviarPlanilha(ac);
 }

 document.getElementById("copiar").onclick=function(){
   var t=document.getElementById("cod").innerText;
   if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t);}
   this.innerText="Copiado!";var b=this;setTimeout(function(){b.innerText="Copiar código";},1800);
 };
 document.getElementById("imprimir").onclick=function(){window.print();};
 document.getElementById("refazer").onclick=function(){
   var k;for(k=0;k<QUESTOES.length;k++){respostas[k]=-1;}ordemOpts=[];atual=0;enviado=false;telaInicio();
 };
 var falaR="Fim da provinha, "+nomeAluno+"! Você acertou "+ac+(ac===1?" pergunta":" perguntas")+" de "+QUESTOES.length+". "+msg;
 setTimeout(function(){narrar(falaR);},400);
 window.scrollTo(0,0);
}

function soltarConfete(){
 var cores=["#e0b855","#f4dd94","#c99b2e","#ffffff","#1a7d4f","#0b5437"];var n;
 for(n=0;n<64;n++){
   (function(n){
     setTimeout(function(){
       var c=document.createElement("div");c.className="confe";
       if(n%3===0){c.className="confe redondo";}
       c.style.left=(Math.random()*100)+"%";
       c.style.background=cores[n%cores.length];
       c.style.webkitAnimationDelay=(Math.random()*0.4)+"s";
       c.style.animationDelay=(Math.random()*0.4)+"s";
       document.body.appendChild(c);
       setTimeout(function(){if(c.parentNode){c.parentNode.removeChild(c);}},3200);
     },n*16);
   })(n);
 }
}

telaInicio();
</script>
