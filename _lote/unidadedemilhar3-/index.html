/* ===== NÚMERO POR EXTENSO (gerador correto pt-BR) ===== */
function extenso(n){
  if(n===0) return "zero";
  var unidades=["","um","dois","três","quatro","cinco","seis","sete","oito","nove"];
  var dez=["dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
  var dezenas=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
  var centenas=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
  function ate999(x){
    if(x===0) return "";
    if(x===100) return "cem";
    var c=Math.floor(x/100), resto=x%100, s="";
    if(c>0) s+=centenas[c];
    if(resto>0){
      if(s) s+=" e ";
      if(resto<10) s+=unidades[resto];
      else if(resto<20) s+=dez[resto-10];
      else {
        var d=Math.floor(resto/10), u=resto%10;
        s+=dezenas[d];
        if(u>0) s+=" e "+unidades[u];
      }
    }
    return s;
  }
  var milhar=Math.floor(n/1000), resto=n%1000, txt="";
  if(milhar>0){
    if(milhar===1) txt="mil";
    else txt=ate999(milhar)+" mil";
  }
  if(resto>0){
    if(txt){
      /* usa "e" quando o resto é menor que 100 OU é centena redonda; senão só espaço */
      if(resto<100 || resto%100===0) txt+=" e ";
      else txt+=" ";
    }
    txt+=ate999(resto);
  }
  return txt;
}
/* formata com ponto de milhar */
function fmt(n){
  var s=""+n;
  if(n>=1000) s=s.slice(0,-3)+"."+s.slice(-3);
  return s;
}
/* embaralha array */
function embaralhar(a){
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
/* gera opções erradas próximas para um número */
function opcoesNum(certo, qtd, max){
  var ops=[certo], tent=0;
  while(ops.length<qtd && tent<50){
    tent++;
    var delta=[1,-1,10,-10,100,-100,2,-2][Math.floor(Math.random()*8)];
    var cand=certo+delta;
    if(cand>=0 && cand<=max && ops.indexOf(cand)===-1) ops.push(cand);
  }
  return embaralhar(ops);
}

/* ===== MATERIAL DOURADO (SVG) — representa centenas, dezenas, unidades ===== */
function materialDourado(n){
  var c=Math.floor((n%1000)/100), d=Math.floor((n%100)/10), u=n%10;
  var OURO="#e8a317", BORDA="#9a6608";
  function cubinho(px,py){ return '<rect x="'+px+'" y="'+py+'" width="8" height="8" fill="'+OURO+'" stroke="'+BORDA+'" stroke-width="0.8"/>'; }
  var svg='', x=0;
  for(var p=0;p<c;p++){ var px=x; for(var r=0;r<10;r++) for(var cc=0;cc<10;cc++) svg+=cubinho(px+cc*8.5,r*8.5); x+=95; }
  if(c>0&&(d>0||u>0)) x+=8;
  for(var b=0;b<d;b++){ var dx=x; for(var r=0;r<10;r++) svg+=cubinho(dx,r*8.5); x+=18; }
  if(d>0&&u>0) x+=8;
  for(var un=0;un<u;un++){ svg+=cubinho(x,un*8.5); }
  if(u>0) x+=12;
  var largura=Math.max(x,40);
  return '<svg viewBox="0 0 '+largura+' 92" width="100%" style="max-height:150px;background:#fffdf5;border-radius:10px;padding:8px" xmlns="http://www.w3.org/2000/svg">'+svg+'</svg>';
}

function tocar(notas){ if(!SOM_LIGADO)return; var ctx=getCtx(); if(!ctx)return; var t=ctx.currentTime;

/* ===== COMEMORAÇÃO ao acertar: CARIMBO central ===== */
var FRASES_FESTA=["ACERTOU!","MUITO BEM!","BOA!","ISSO!","PERFEITO!","MANDOU BEM!"];
function comemorar(){
  var velho=document.getElementById('carimbo'); if(velho&&velho.parentNode) velho.parentNode.removeChild(velho);
  var div=document.createElement('div'); div.id='carimbo';
  var frase=FRASES_FESTA[Math.floor(Math.random()*FRASES_FESTA.length)];
  var simbolos=["\u2b50","\u2728","\ud83c\udf1f","\ud83d\udcab"];
  var inner='<div class="carimbo-wrap">';
  for(var i=0;i<8;i++){ inner+='<span class="est-faisca ef'+(i+1)+'">'+simbolos[i%simbolos.length]+'</span>'; }
  inner+='<span class="carimbo-anel"></span><span class="carimbo-anel a2"></span>';
  inner+='<div class="carimbo-circulo"><span class="carimbo-check">\u2713</span></div>';
  inner+='<div class="carimbo-palavra">'+frase+'</div></div>';
  div.innerHTML=inner;
  document.body.appendChild(div);
  setTimeout(function(){ if(div&&div.parentNode) div.parentNode.removeChild(div); }, 1500);
}

(function(){
  var nums=[123,234,140,206,315,420,7,60,352,508];

/* ===== ENGINE DE QUIZ (escolha e digite) ===== */
function iniciarFase(chave){ somClique(); faseAtual=chave; indiceAtual=0; mostrarDesafio(); }
function mostrarDesafio(){
  respondeu=false;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  var html="";
  html+='<div class="progress">Desafio '+(indiceAtual+1)+' de '+total+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<h2>'+fase.icone+' '+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="lead" style="font-weight:bold;color:#333">'+dd.enunciado+'</div>';
  if(dd.svg){
    html+='<div style="margin:14px auto;max-width:340px">'+dd.svg+'</div>';
    if(dd.legenda) html+='<div style="font-size:13px;color:#888;margin-bottom:6px">'+dd.legenda+'</div>';
  }
  if(dd.destaque){
    var cls=(dd.destaque.indexOf("+")>=0||dd.destaque.indexOf("-")>=0||dd.destaque.indexOf("=")>=0)?"conta":"numero-grande";
    html+='<div class="'+cls+'">'+dd.destaque+'</div>';
  }
  if(dd.falar) html+='<div><button class="btn-falar" onclick="falar(\''+(dd.falar.replace(/'/g,""))+'\')">🔊 Ouvir</button></div>';
  if(dd.tipo==="escolha"){
    html+='<div class="options" id="opts">';
    for(var i=0;i<dd.opcoes.length;i++) html+='<button class="opt" id="opt'+i+'" onclick="respEscolha(\''+dd.opcoes[i]+'\','+i+')">'+dd.opcoes[i]+'</button>';
    html+='</div>';
  } else {
    html+='<div><input class="resp-input" id="respInput" type="text" inputmode="numeric" placeholder="?" /></div>';
    html+='<div><button class="nav-btn" onclick="respDigite()">Conferir ✓</button></div>';
  }
  html+='<div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
  var ri=document.getElementById("respInput");
  if(ri){ ri.onkeydown=function(e){ if(e.keyCode===13) respDigite(); }; ri.focus(); }
  /* DOSE DE VOZ: narra a pergunta sozinha (3o ano = med). A explicacao fica escrita. */
  if(VOZ_QUESTAO && dd.falar){ falar(dd.falar); }
}
function finalizarDesafio(ok, dd){
  var nav=document.getElementById("navarea"), ultimo=(indiceAtual===FASES[faseAtual].desafios.length-1);
  if(ultimo && treinoAtivo) nav.innerHTML='<button class="nav-btn" onclick="fimTreino()">Terminar treino 🌟</button>';
  else if(ultimo) nav.innerHTML='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  else nav.innerHTML='<button class="nav-btn" onclick="proximo()">Próximo ➜</button>';
}
function respEscolha(val, idx){
  if(respondeu)return; respondeu=true;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], fb=document.getElementById("fb"), btn=document.getElementById("opt"+idx), pts=fase.bonus?15:10;
  if(val===dd.certa){ registrar(faseAtual,true); addPontos(pts); btn.className="opt correct"; fb.className="feedback ok"; fb.innerHTML="🎉 Muito bem! "+dd.explica; somAcerto(); confete(70); comemorar(); if(VOZ_QUESTAO)falar("Muito bem!"); }
  else { registrar(faseAtual,false); btn.className="opt wrong"; fb.className="feedback no"; fb.innerHTML="🤔 Quase! O certo é "+dd.certa+". "+dd.explica; somErro(); if(VOZ_QUESTAO)falar("Quase!");
    var jaTem=false; for(var z=0;z<ERROS.length;z++){if(ERROS[z].destaque===dd.destaque&&ERROS[z].certa===dd.certa)jaTem=true;}
    if(!jaTem&&!treinoAtivo) ERROS.push(dd);
    for(var i=0;i<dd.opcoes.length;i++){ if(dd.opcoes[i]===dd.certa) document.getElementById("opt"+i).className="opt correct"; } }
  finalizarDesafio(val===dd.certa, dd);
}
function respDigite(){
  if(respondeu)return;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], ri=document.getElementById("respInput");
  var bruto=ri.value.replace(/[.\s]/g,"").replace(/[^0-9]/g,"");
  if(bruto==="") { ri.focus(); return; }
  respondeu=true;
  var val=parseInt(bruto,10), fb=document.getElementById("fb"), pts=fase.bonus?15:10;
  if(val===dd.resposta){ registrar(faseAtual,true); addPontos(pts); fb.className="feedback ok"; fb.innerHTML="🎉 Isso! "+dd.explica; somAcerto(); confete(70); comemorar(); ri.style.borderColor="#27ae60"; if(VOZ_QUESTAO)falar("Isso!"); }
  else { registrar(faseAtual,false); fb.className="feedback no"; fb.innerHTML="🤔 Quase! A resposta é "+fmt(dd.resposta)+". "+dd.explica; somErro(); ri.style.borderColor="#e74c3c"; if(VOZ_QUESTAO)falar("Quase!");
    var jaTem=false; for(var z=0;z<ERROS.length;z++){if(ERROS[z].destaque===dd.destaque&&ERROS[z].resposta===dd.resposta)jaTem=true;}
    if(!jaTem&&!treinoAtivo) ERROS.push(dd); }
  finalizarDesafio(val===dd.resposta, dd);
}
function proximo(){ pararFala(); indiceAtual++; mostrarDesafio(); }

/* ===== TREINO DOS ERROS ===== */
function iniciarTreino(){ if(ERROS.length===0)return; treinoAtivo=true; somClique();
  FASES._treino={ titulo:"💪 Treino dos Erros", cor:"lv3", icone:"💪", bonus:false, dica:"Vamos revisar o que você errou. Você consegue!", desafios:ERROS.slice() };
  faseAtual="_treino"; indiceAtual=0; mostrarDesafio(); }
function fimTreino(){ treinoAtivo=false;
  var html='<div class="trophy">🌟</div><h1>Treino concluído!</h1>';
  html+='<p class="lead">Muito bem, '+(ALUNO||'explorador')+'! Revisar é o segredo de quem aprende.</p>';
  html+='<div class="big-score">★ '+score+' pontos</div><button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  card.innerHTML=html; somFanfarra(); confete(60); ERROS=[]; salvar();
}

/* ===== TELA FINAL DA FASE ===== */
function telaFinal(){
  pararFala();
  var fase=FASES[faseAtual]; concluidas[faseAtual]=true; statFase(faseAtual).feita=true; salvar();
  var s=STATS[faseAtual], total=s.acertos+s.erros, pct=total?Math.round(s.acertos/total*100):0;
  var html='<div class="trophy">'+(pct>=70?'🎉':'💪')+'</div>';
  html+='<h1>Parada concluída!</h1><h2>'+fase.icone+' '+fase.titulo+'</h2>';
  html+='<div class="big-score">★ '+score+' pontos</div>';
  html+='<p class="lead">Você acertou <b>'+s.acertos+'</b> de <b>'+total+'</b>! ('+pct+'%)</p>';
  var idxFase=-1; for(var z=0;z<ORDEM.length;z++){ if(ORDEM[z]===faseAtual) idxFase=z; }
  var medal=MEDALHAS["MED_"+(idxFase+1)];
  if(medal){
    html+='<div class="premio-ganho"><div style="font-size:17px;color:#e67e22;font-weight:bold;margin-bottom:6px">🎁 Você ganhou uma medalha!</div>';
    html+='<img src="'+medal+'" alt="Medalha" class="medalha-revela" style="width:150px;height:150px" /></div>';
  }
  var prox=null; for(var i=0;i<ORDEM.length-1;i++){ if(ORDEM[i]===faseAtual){prox=ORDEM[i+1];break;} }
  if(prox) html+='<button class="nav-btn" onclick="iniciarFase(\''+prox+'\')">Próxima parada ➜</button>';
  else html+='<button class="nav-btn" onclick="telaRelatorio()">Ver tudo! '+svgTrofeu(22)+'</button>';
  html+='<br><button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa de paradas</button>';
  card.innerHTML=html; somFanfarra(); confete(80);
}

/* ===== RELATÓRIO FINAL ===== */
function telaRelatorio(){
  var totalAc=0, totalErr=0, fasesFeitas=0;
  for(var k in STATS){ if(STATS[k].feita){ totalAc+=STATS[k].acertos; totalErr+=STATS[k].erros; fasesFeitas++; } }
  var totalTent=totalAc+totalErr, aproveit=totalTent?Math.round(totalAc/totalTent*100):0;
  var medalha = aproveit>=90?'🥇' : aproveit>=70?'🥈':'🥉';
  var faixa = aproveit>=90?'Mestre dos Números!' : aproveit>=70?'Muito bom!':'Continue praticando!';
  var estrelas=Math.round(score/50);
  var html='<div class="rel-festa"><div class="anim-pula">'+mascote(120,"feliz")+'</div><div class="rel-medalha">'+medalha+'</div>';
  html+='<h1>Aventura concluída!</h1>';
  if(ALUNO) html+='<div style="font-size:20px;font-weight:bold;color:#1b4f8a;margin-bottom:6px">Aluno(a): '+ALUNO+'</div>';
  html+='<div class="rel-faixa">'+faixa+'</div>';
  html+='<div class="rel-estrelas">'; var ch=Math.min(estrelas,15); for(var e=0;e<ch;e++)html+='★'; html+='</div>';
  html+='<div class="big-score">'+score+' pontos &middot; '+totalAc+' acertos</div>';
  html+='<p class="lead">Você dominou números até a unidade de milhar, leitura, antecessor e sucessor, cálculo mental, adição, subtração e problemas. Parabéns!</p></div>';
  html+='<div class="rel-prof"><div class="rel-prof-tit">📋 Relatório para o professor</div>';
  html+='<div class="rel-resumo">Atividades concluídas: <b>'+fasesFeitas+' de '+ORDEM.length+'</b> &middot; Aproveitamento: <b>'+aproveit+'%</b> &middot; Tentativas: <b>'+totalTent+'</b></div>';
  html+='<table class="rel-tab"><tr><th>Atividade</th><th>Acertos</th><th>Erros</th><th>%</th></tr>';
  var revisar=[];
  for(var i=0;i<ORDEM.length;i++){ var key=ORDEM[i], st=STATS[key]; if(!st||!st.feita)continue;
    var t=st.acertos+st.erros, p=t?Math.round(st.acertos/t*100):0, cor=p>=70?'#27ae60':'#e67e22';
    html+='<tr><td>'+FASES[key].titulo+'</td><td>'+st.acertos+'</td><td>'+st.erros+'</td><td style="color:'+cor+';font-weight:bold">'+p+'%</td></tr>';
    if(p<70) revisar.push(FASES[key].titulo); }
  html+='</table>';
  if(revisar.length) html+='<p style="margin-top:10px;font-size:14px;color:#e67e22"><b>Sugestão de revisão:</b> '+revisar.join(", ")+'.</p>';
  else html+='<p style="margin-top:10px;font-size:14px;color:#27ae60"><b>Ótimo desempenho em todas as atividades!</b></p>';
  html+='<p style="font-size:13px;color:#888;margin-top:8px">Dica: use Ctrl+P para imprimir ou salvar em PDF.</p></div>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  html+='<button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Recomeçar</button>';
  card.innerHTML=html;
}

/* ===== TELA INÍCIO ===== */
function telaInicio(){
  var tem=carregar();
  var html='<h1>🔢 Reino dos Números</h1><h2>A Aventura Matemática!</h2>';
  if(tem && ALUNO){
    var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
    html+='<div class="anim-pula">'+mascote(110,"feliz")+'</div>';
    html+='<p class="lead">Bem-vindo de volta, <b>'+ALUNO+'</b>!<br>Você tem <b>'+score+' pontos</b> e completou <b>'+feitas+'</b> paradas.</p>';
    html+='<button class="nav-btn" onclick="telaMenu()">Continuar a aventura ➜</button>';
    html+='<br><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Começar do zero</button>';
  } else {
    html+='<div class="anim-pula">'+mascote(120,"feliz")+'</div><p class="lead">Oi! Eu sou o <b>Dudu</b>, o elefante! Qual é o seu nome?</p>';
    html+='<input class="resp-input" id="inpNome" type="text" maxlength="20" placeholder="Digite seu nome" />';
    html+='<br><button class="nav-btn" onclick="comecarComNome()">Começar! 🚀</button>';
  }
  card.innerHTML=html;
  var inp=document.getElementById("inpNome"); if(inp){ inp.onkeydown=function(e){if(e.keyCode===13)comecarComNome();}; inp.focus(); }
}
function comecarComNome(){ var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim():"")||"Explorador(a)"; somClique(); salvar(); telaMenu(); }
function reiniciarTudo(){
  somClique();
  var html='<div style="font-size:60px">🔄</div>';
  html+='<h1>Começar do zero?</h1>';
  html+='<p class="lead">Isso vai apagar o nome, os pontos e todos os troféus para recomeçar a aventura.</p>';
  html+='<button class="nav-btn" onclick="confirmarReset()">Sim, apagar tudo</button>';
  html+='<br><button class="nav-btn ghost" onclick="telaMenu()">Não, voltar</button>';
  card.innerHTML=html;
}
function confirmarReset(){ apagarProgresso(); somClique(); telaInicio(); }

/* ===== FUNDO MÁGICO: números e estrelas flutuando ===== */
function montarCeu(){
  var ceu=document.getElementById("ceu"); if(!ceu)return;
  var itens=["7","3","5","8","2","9","1","4","6","★","✦","✧","+","−"];
  for(var i=0;i<26;i++){
    var s=document.createElement("div");
    var ehEstrela=Math.random()<0.45;
    s.className="floatie "+(ehEstrela?"estrela":"num");
    s.innerHTML=itens[Math.floor(Math.random()*itens.length)];
    s.style.left=(Math.random()*100)+"%";
    var tam=ehEstrela?(12+Math.random()*22):(16+Math.random()*26);
    s.style.fontSize=tam+"px";
    var dur=(9+Math.random()*12);
    s.style.webkitAnimationDuration=dur+"s"; s.style.animationDuration=dur+"s";
    s.style.webkitAnimationDelay=(-Math.random()*dur)+"s"; s.style.animationDelay=(-Math.random()*dur)+"s";
    ceu.appendChild(s);
  }
}

/* ===== MASCOTE — coruja-estrela "Estelinha" (SVG, sem imagem externa) ===== */
function mascote(tam, humor){
  tam=tam||90;
  if(typeof IMG_MASCOTE!=="undefined" && IMG_MASCOTE) return '<img src="'+IMG_MASCOTE+'" alt="Dudu o elefante" style="width:'+tam+'px;height:'+tam+'px;object-fit:contain" />';
  var olhos = humor==="pensando" ? '<circle cx="35" cy="44" r="7" fill="#fff"/><circle cx="65" cy="44" r="7" fill="#fff"/><circle cx="37" cy="45" r="3.5" fill="#3a2566"/><circle cx="67" cy="45" r="3.5" fill="#3a2566"/>'
    : '<circle cx="35" cy="44" r="9" fill="#fff"/><circle cx="65" cy="44" r="9" fill="#fff"/><circle cx="36" cy="45" r="4.5" fill="#3a2566"/><circle cx="66" cy="45" r="4.5" fill="#3a2566"/><circle cx="38" cy="43" r="1.6" fill="#fff"/><circle cx="68" cy="43" r="1.6" fill="#fff"/>';
  return '<svg viewBox="0 0 100 110" width="'+tam+'" height="'+Math.round(tam*1.1)+'" xmlns="http://www.w3.org/2000/svg">'
    +'<ellipse cx="50" cy="100" rx="26" ry="6" fill="rgba(46,26,102,0.18)"/>'
    +'<path d="M50 8 L58 30 L80 30 L62 44 L70 66 L50 52 L30 66 L38 44 L20 30 L42 30 Z" fill="#ffd23f" opacity="0.55"/>'
    +'<ellipse cx="50" cy="58" rx="32" ry="36" fill="#7b4ddb"/>'
    +'<ellipse cx="50" cy="64" rx="22" ry="26" fill="#b388ff"/>'
    +'<path d="M22 34 Q30 18 40 30 Z" fill="#5a32b0"/><path d="M78 34 Q70 18 60 30 Z" fill="#5a32b0"/>'
    +olhos
    +'<path d="M44 54 L56 54 L50 62 Z" fill="#ff9800"/>'
    +'<path d="M18 58 Q10 64 20 72 Q24 66 26 64 Z" fill="#5a32b0"/><path d="M82 58 Q90 64 80 72 Q76 66 74 64 Z" fill="#5a32b0"/>'
    +'<circle cx="50" cy="14" r="3.5" fill="#fff"/>'
    +'</svg>';
}

montarCeu();
telaInicio();

</script>
