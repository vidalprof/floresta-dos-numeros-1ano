<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>A Floresta dos Números - 1º ano</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {

  }
  #ceu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; }
  /* nebulosas/orbes de luz no fundo (profundidade premium) */
  .orbe { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }

  .orbe2 { bottom: -12%; left: -10%; width: 420px; height: 420px; background: -webkit-radial-gradient(center, rgba(130,230,150,0.3), rgba(130,230,150,0) 70%); background: radial-gradient(circle, rgba(130,230,150,0.3), rgba(130,230,150,0) 70%); -webkit-animation: orbeFlutua 20s ease-in-out infinite reverse; animation: orbeFlutua 20s ease-in-out infinite reverse; }
  .orbe3 { top: 40%; left: 50%; width: 280px; height: 280px; margin-left: -140px; background: -webkit-radial-gradient(center, rgba(200,150,255,0.2), rgba(200,150,255,0) 70%); background: radial-gradient(circle, rgba(200,150,255,0.2), rgba(200,150,255,0) 70%); -webkit-animation: orbeFlutua 24s ease-in-out infinite; animation: orbeFlutua 24s ease-in-out infinite; }
  @-webkit-keyframes orbeFlutua { 0%,100%{-webkit-transform:translate(0,0) scale(1);} 50%{-webkit-transform:translate(36px,-30px) scale(1.15);} }
  @keyframes orbeFlutua { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(36px,-30px) scale(1.15);} }
  .estrela-bg { position: absolute; background: #fff; border-radius: 50%; -webkit-animation: pisca 3s ease-in-out infinite; animation: pisca 3s ease-in-out infinite; }
  @-webkit-keyframes pisca { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
  @keyframes pisca { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
  .floatie { position: absolute; bottom: -50px; opacity: 0; -webkit-animation: subir linear infinite; animation: subir linear infinite; }
  @-webkit-keyframes subir { 0%{-webkit-transform:translateY(0) rotate(0);opacity:0;}10%{opacity:0.8;}90%{opacity:0.8;}100%{-webkit-transform:translateY(-110vh) rotate(40deg);opacity:0;} }
  @keyframes subir { 0%{transform:translateY(0) rotate(0);opacity:0;}10%{opacity:0.8;}90%{opacity:0.8;}100%{transform:translateY(-110vh) rotate(40deg);opacity:0;} }
  .topbar, .wrap { position: relative; z-index: 1; }
  .topbar {
    background: -webkit-gradient(linear, left top, right top, from(#2d6a43), to(#1a4a2e)); background: linear-gradient(110deg, #2d6a43, #1a4a2e);
    color: #fff; padding: 14px 18px;
    display: -webkit-box; display: flex; -webkit-box-pack: justify; justify-content: space-between; -webkit-box-align: center; align-items: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15); position: relative; overflow: hidden;
  }
  .topbar:before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: -webkit-gradient(linear, left top, left bottom, from(rgba(255,255,255,0.14)), to(rgba(255,255,255,0))); background: linear-gradient(to bottom, rgba(255,255,255,0.14), rgba(255,255,255,0)); pointer-events: none; }
  .topbar h1 { font-size: 19px; margin: 0; text-shadow: 0 2px 6px rgba(0,0,0,0.5); letter-spacing: 0.3px; position: relative; }
  .nivel-barra { position: relative; z-index: 1; background: rgba(11,16,51,0.92); padding: 6px 16px; display: -webkit-box; display: flex; -webkit-box-align: center; align-items: center; }
  .nivel-info { color: #ffd23f; font-weight: bold; font-size: 14px; white-space: nowrap; margin-right: 10px; }
  .xp-bar-wrap { -webkit-box-flex: 1; flex: 1; height: 12px; background: rgba(255,255,255,0.2); border-radius: 8px; overflow: hidden; }
  .xp-bar-fill { display: block; height: 100%; width: 0%; background: -webkit-gradient(linear,left top,right top,from(#5cc97a),to(#ffd23f)); background: linear-gradient(to right,#5cc97a,#ffd23f); -webkit-transition: width .5s ease; transition: width .5s ease; }
  .streak-info { color: #ff9f1c; font-weight: bold; font-size: 15px; }
  .stats { font-size: 16px; font-weight: bold; }
  /* PROTECAO GLOBAL: nenhuma imagem de planeta/objeto pode cortar */
  .card img { object-fit: contain; max-width: 100%; }
  .planeta-halo, .planeta-halo-grande { overflow: visible; }
  .star { color: #ffd23f; text-shadow: 0 0 6px rgba(255,210,63,0.9); }
  .btn-som { background: #ffd23f; border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 19px; cursor: pointer; vertical-align: middle; margin-right: 6px; box-shadow: 0 3px 0 #d4ad00; }
  .btn-som:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 1px 0 #d4ad00; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 16px; }
  .card { background: -webkit-gradient(linear,left top,left bottom,from(#28543a),to(#1c3e2a)); background: linear-gradient(160deg,#28543a,#1c3e2a); border-radius: 30px; padding: 26px; box-shadow: 0 22px 55px rgba(0,0,0,0.5), 0 6px 16px rgba(40,120,70,0.3), 0 0 0 1px rgba(150,220,150,0.25), inset 0 1px 0 rgba(255,255,255,0.12); text-align: center; border: 1px solid rgba(150,220,150,0.22); position: relative; -webkit-animation: cardSurge .5s cubic-bezier(.2,1,.3,1) both; animation: cardSurge .5s cubic-bezier(.2,1,.3,1) both; }
  @-webkit-keyframes cardSurge { 0%{-webkit-transform:translateY(16px) scale(0.98);opacity:0;} 100%{-webkit-transform:translateY(0) scale(1);opacity:1;} }
  @keyframes cardSurge { 0%{transform:translateY(16px) scale(0.98);opacity:0;} 100%{transform:translateY(0) scale(1);opacity:1;} }
  h1 { color: #fff; font-size: 26px; margin: 8px 0; text-shadow: 0 2px 8px rgba(120,150,255,0.5); }
  h2 { color: #aac4ff; font-size: 21px; margin: 8px 0; }

  .hint { background: rgba(84,160,255,0.18); border: 2px solid rgba(84,160,255,0.4); border-radius: 14px; padding: 10px 14px; color: #d5e0ff; font-size: 17px; margin: 10px 0; }
  .enunciado-q { font-weight: bold; color: #fff; font-size: 21px; margin: 12px 0; line-height: 1.5; }
  /* planeta imagem */
  .planeta-fig { width: 110px; height: 110px; vertical-align: middle; object-fit: contain; -webkit-filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); -webkit-animation: flutuaplaneta 4s ease-in-out infinite; animation: flutuaplaneta 4s ease-in-out infinite; }
  @-webkit-keyframes flutuaplaneta { 0%,100%{-webkit-transform:translateY(0);} 50%{-webkit-transform:translateY(-7px);} }
  @keyframes flutuaplaneta { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
  /* halo brilhante atrás do planeta - generoso para não cortar raios do Sol */
  .planeta-halo { display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; border-radius: 50%; background: -webkit-radial-gradient(center, rgba(150,230,160,0.4), rgba(150,230,160,0) 72%); background: radial-gradient(circle at center, rgba(150,230,160,0.4), rgba(150,230,160,0) 72%); padding: 4px; overflow: visible; }
  /* planeta grande (regras): pulsa suave em vez de girar, e tem folga para não cortar */
  .planeta-grande { width: 150px; height: 150px; object-fit: contain; -webkit-filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4)); filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4)); -webkit-animation: planetapulsa 3.5s ease-in-out infinite; animation: planetapulsa 3.5s ease-in-out infinite; }
  @-webkit-keyframes planetapulsa { 0%,100%{-webkit-transform:scale(1);} 50%{-webkit-transform:scale(1.06);} }
  @keyframes planetapulsa { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  .planeta-halo-grande { display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; border-radius: 50%; background: -webkit-radial-gradient(center, rgba(255,210,100,0.35), rgba(120,180,255,0) 72%); background: radial-gradient(circle at center, rgba(255,210,100,0.35), rgba(120,180,255,0) 72%); padding: 18px; }
  @-webkit-keyframes girando { 0%{-webkit-transform:rotate(0);} 100%{-webkit-transform:rotate(360deg);} }
  @keyframes girando { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }
  .planeta-nome { font-size: 20px; font-weight: bold; color: #ffd23f; margin-top: 6px; }
  .planeta-box { display: -webkit-inline-box; display: inline-flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; flex-direction: column; -webkit-box-align: center; align-items: center; margin: 8px; }
  /* opções */
  .options { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; margin: 12px 0; }
  .opt {
    background: -webkit-gradient(linear,left top,left bottom,from(#52b86e),to(#2e8a47)); background: linear-gradient(to bottom,#52b86e,#2e8a47);
    color: #fff; border: none; border-radius: 16px; padding: 16px 26px; margin: 8px; font-family: inherit; font-size: 20px; font-weight: bold;
    cursor: pointer; box-shadow: 0 5px 0 #1d6336, 0 7px 14px rgba(0,0,0,0.4); min-width: 130px;
  }
  .opt:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #1f4ea0; }
  .opt.correct { background: -webkit-gradient(linear,left top,left bottom,from(#7bed9f),to(#27ae60)); background: linear-gradient(to bottom,#7bed9f,#27ae60); box-shadow: 0 5px 0 #1e7e46, 0 0 20px rgba(46,204,113,0.7); }
  .opt.wrong { background: #95a5a6; box-shadow: 0 5px 0 #6c7a7b; }
  .opt-img { display: -webkit-inline-box; display: inline-flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; flex-direction: column; -webkit-box-align: center; align-items: center; -webkit-box-pack: center; justify-content: center; background: rgba(84,160,255,0.15); border: 3px solid transparent; border-radius: 18px; padding: 18px; margin: 8px; cursor: pointer; min-width: 130px; min-height: 130px; }
  .opt-img:active { -webkit-transform: scale(0.96); transform: scale(0.96); }
  .opt-img.correct { border-color: #27ae60; background: rgba(39,174,96,0.25); }
  .opt-img.wrong { border-color: #c0392b; }
  .opt-img-nome { font-size: 16px; font-weight: bold; color: #d5e0ff; margin-top: 4px; }
  .btn-falar { background: -webkit-gradient(linear,left top,left bottom,from(#a06bea),to(#7b4fc4)); background: linear-gradient(to bottom,#a06bea,#7b4fc4); color: #fff; border: none; border-radius: 14px; padding: 12px 22px; font-family: inherit; font-size: 17px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #5a3a9e; margin: 6px; }
  .btn-falar:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 2px 0 #5a3a9e; }
  .feedback { font-size: 19px; margin: 12px 0; min-height: 26px; font-weight: bold; line-height: 1.45; }
  .feedback.ok { color: #7bed9f; } .feedback.no { color: #ff9b9b; }
  .feedback .explica { display: block; font-size: 16px; color: #d5e0ff; font-weight: normal; margin-top: 6px; }
  .nav-btn { background: -webkit-gradient(linear,left top,left bottom,from(#ffe27a),to(#ffc107)); background: linear-gradient(to bottom,#ffe27a,#ffc107); color: #6b4d00; border: none; border-radius: 16px; padding: 16px 32px; font-family: inherit; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #d4ad00, 0 7px 14px rgba(255,193,7,0.4); margin: 10px 5px; }
  .nav-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #d4ad00; }
  .nav-btn.ghost { background: rgba(120,150,255,0.2); color: #d5e0ff; box-shadow: 0 5px 0 rgba(120,150,255,0.3); }
  /* caixas para classificar */
  .caixas { display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .caixa { min-width: 150px; min-height: 120px; margin: 8px; border-radius: 18px; padding: 8px; border: 3px solid; display: -webkit-inline-box; display: inline-flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; -webkit-box-align: start; align-items: flex-start; vertical-align: top; background: rgba(255,255,255,0.06); }
  .caixa-titulo { width: 100%; font-size: 17px; font-weight: bold; margin-bottom: 6px; }
  .ficha-pl { display: -webkit-inline-box; display: inline-flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; flex-direction: column; -webkit-box-align: center; align-items: center; -webkit-box-pack: center; justify-content: center; margin: 4px; cursor: pointer; border-radius: 12px; padding: 10px; border: 2px solid transparent; background: rgba(255,255,255,0.1); min-width: 78px; min-height: 78px; }
  .ficha-pl.sel { border-color: #ffd23f; box-shadow: 0 0 14px rgba(255,210,63,0.9); -webkit-transform: scale(1.08); transform: scale(1.08); }
  .ficha-pl img { width: 56px; height: 56px; display: block; object-fit: contain; }
  .ficha-pl-nome { font-size: 12px; color: #d5e0ff; font-weight: bold; }
  .ficha-pool { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 10px; margin: 10px 0; min-height: 60px; }

  /* animações */
  @-webkit-keyframes pula { 0%{-webkit-transform:scale(1);}30%{-webkit-transform:scale(1.16) rotate(-3deg);}60%{-webkit-transform:scale(0.95);}100%{-webkit-transform:scale(1);} }
  @keyframes pula { 0%{transform:scale(1);}30%{transform:scale(1.16) rotate(-3deg);}60%{transform:scale(0.95);}100%{transform:scale(1);} }
  .anim-pula { -webkit-animation: pula .5s ease; animation: pula .5s ease; }
  .bounce { -webkit-animation: pula 1.5s ease infinite; animation: pula 1.5s ease infinite; }
  /* astronauta flutuando no espaço (sobe/desce + leve inclinação) */
  .flutua-espaco { display: inline-block; -webkit-animation: flutuaEspaco 5s ease-in-out infinite; animation: flutuaEspaco 5s ease-in-out infinite; }
  @-webkit-keyframes flutuaEspaco { 0%{-webkit-transform:translateY(0) rotate(-4deg);} 25%{-webkit-transform:translateY(-14px) rotate(2deg);} 50%{-webkit-transform:translateY(-6px) rotate(4deg);} 75%{-webkit-transform:translateY(-16px) rotate(-2deg);} 100%{-webkit-transform:translateY(0) rotate(-4deg);} }
  @keyframes flutuaEspaco { 0%{transform:translateY(0) rotate(-4deg);} 25%{transform:translateY(-14px) rotate(2deg);} 50%{transform:translateY(-6px) rotate(4deg);} 75%{transform:translateY(-16px) rotate(-2deg);} 100%{transform:translateY(0) rotate(-4deg);} }
  #confete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confete-peca { position: absolute; width: 11px; height: 15px; border-radius: 2px; }
  @-webkit-keyframes cair { 0%{-webkit-transform:translateY(-20px) rotate(0);opacity:1;}100%{-webkit-transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  @keyframes cair { 0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  /* CARIMBO comemoração */
  #carimbo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .carimbo-wrap { position: relative; text-align: center; }
  .carimbo-circulo { width: 170px; height: 170px; border-radius: 50%; background: -webkit-gradient(linear,left top,left bottom,from(#54a0ff),to(#a06bea)); background: linear-gradient(to bottom,#54a0ff,#a06bea); box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 -6px 0 rgba(0,0,0,0.12); display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; -webkit-animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; }
  .carimbo-check { font-size: 95px; color: #fff; font-weight: bold; line-height: 1; text-shadow: 0 3px 6px rgba(0,0,0,0.3); }
  @-webkit-keyframes carimbobate { 0%{-webkit-transform:scale(0) rotate(-40deg);opacity:0;}45%{-webkit-transform:scale(1.25) rotate(8deg);opacity:1;}65%{-webkit-transform:scale(0.92) rotate(-3deg);}80%{-webkit-transform:scale(1.05) rotate(0);}88%{opacity:1;}100%{-webkit-transform:scale(1) rotate(0);opacity:0;} }
  @keyframes carimbobate { 0%{transform:scale(0) rotate(-40deg);opacity:0;}45%{transform:scale(1.25) rotate(8deg);opacity:1;}65%{transform:scale(0.92) rotate(-3deg);}80%{transform:scale(1.05) rotate(0);}88%{opacity:1;}100%{transform:scale(1) rotate(0);opacity:0;} }
  .carimbo-palavra { margin-top: 14px; font-size: 32px; font-weight: bold; color: #fff; text-shadow: 0 3px 8px rgba(0,0,0,0.5), 0 0 16px rgba(255,210,63,0.8); -webkit-animation: palavrapop .5s ease .15s both; animation: palavrapop .5s ease .15s both; }
  @-webkit-keyframes palavrapop { 0%{-webkit-transform:scale(0) translateY(20px);opacity:0;}70%{-webkit-transform:scale(1.2);}100%{-webkit-transform:scale(1) translateY(0);opacity:1;} }
  @keyframes palavrapop { 0%{transform:scale(0) translateY(20px);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1) translateY(0);opacity:1;} }
  .est-faisca { position: absolute; top: 50%; left: 50%; font-size: 30px; opacity: 0; }
  .ef1{-webkit-animation:ef1 .8s ease-out forwards;animation:ef1 .8s ease-out forwards;} .ef2{-webkit-animation:ef2 .8s ease-out forwards;animation:ef2 .8s ease-out forwards;}
  .ef3{-webkit-animation:ef3 .9s ease-out forwards;animation:ef3 .9s ease-out forwards;} .ef4{-webkit-animation:ef4 .9s ease-out forwards;animation:ef4 .9s ease-out forwards;}

  @-webkit-keyframes ef1{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-140px,-110px) scale(1.2);opacity:0;}} @keyframes ef1{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-140px,-110px) scale(1.2);opacity:0;}}

  @-webkit-keyframes ef3{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-170px,20px) scale(1.2);opacity:0;}} @keyframes ef3{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-170px,20px) scale(1.2);opacity:0;}}

  /* MAPA */
  .mapa { position: relative; padding: 10px 0; }
  .mapa-linha { display: block; }

function figuraAstro(chave, tam){ tam=tam||110;
  return figuraNumero(chave, tam); }

/* ===== MAPA ===== */
function liberada(chave){ var pos=-1; for(var i=0;i<ORDEM.length;i++){if(ORDEM[i]===chave)pos=i;} if(pos===0)return true; return concluidas[ORDEM[pos-1]]===true; }
function avisarBloqueio(){ falar("Termine a etapa anterior primeiro!"); }
function iconeFase(chave, tam){ return svgIcone(FASES[chave]?FASES[chave].iconeTipo:"quiz", tam); }
var PREMIOS={ sol:1, contar:2, terra:3, rochosos:4, gasosos:5, ordem:6, memoria:7, quiz:8 };
function telaMenu(){
  faseAtual=null; atualizarTopo();
  var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
  var pctJornada=Math.round((feitas/ORDEM.length)*100);
  var nv=nivelAtual();
  var html='<h1>🌳 A Floresta dos Números</h1><h2>Uma aventura mágica!</h2>';
  var narrativa;
  if(feitas===0) narrativa="Ajude o Bit a recuperar as <b>estrelas mágicas</b> da floresta! Cada missão traz uma estrela de volta! 🌟";
  else if(feitas<ORDEM.length/2) narrativa="As estrelas estão voltando! Continue pela floresta! 🌟";
  else if(feitas<ORDEM.length) narrativa="Você está quase lá! Falta pouco para salvar a floresta! 🌳";
  else narrativa="🏆 Você salvou a floresta! Todas as estrelas voltaram a brilhar! Você é o <b>Herói dos Números</b>!";
  html+='<div class="masc-fala"><span class="masc-pic">'+mascote(64,feitas===ORDEM.length?"comemorando":"feliz")+'</span><div class="masc-balao">'+narrativa+'</div></div>';
  var prox=proximoNivel();
  html+='<div class="nivel-painel"><div class="nivel-painel-topo"><span class="nivel-badge">'+nv.icone+' '+nv.nome+'</span>';
  if(streakMax>=3) html+='<span class="streak-badge">🔥 melhor: '+streakMax+'</span>';
  html+='</div>';
  if(prox){ var pctxp=Math.round(((score-nv.min)/(prox.min-nv.min))*100); html+='<div class="xp-painel-bar"><i style="width:'+pctxp+'%"></i></div><div class="xp-painel-txt">'+score+' / '+prox.min+' XP — próximo: '+prox.icone+' '+prox.nome+'</div>'; }
  else html+='<div class="xp-painel-bar"><i style="width:100%"></i></div><div class="xp-painel-txt">Nível máximo! 👑</div>';
  html+='</div>';
  /* ARVORE QUE CRESCE: mostra estrelas recuperadas */
  html+='<div class="arvore-floresta">'+svgArvore(feitas, ORDEM.length)+'<div class="arvore-txt">🌟 '+feitas+' de '+ORDEM.length+' estrelas recuperadas!</div></div>';
  html+='<div class="progress">Caminho da Floresta</div>';
  html+='<div class="trilha">';
  for(var i=0;i<ORDEM.length;i++){ var ch=ORDEM[i], f=FASES[ch], aberta=liberada(ch), feito=concluidas[ch]===true;
    var estado=feito?'done':(aberta?'atual':'lock'), lado=(i%2===0)?'esq':'dir';
    var an=ANIMAIS[ch];
    var click=aberta?' onclick="iniciarFase(\''+ch+'\')"':' onclick="avisarBloqueio()"';
    var ehAtual=(aberta && !feito);
    html+='<div class="trilha-linha '+lado+'">';
    /* o lugar da floresta */
    html+='<div class="lugar '+estado+'"'+click+'>';
    /* animal companheiro do lugar */
    html+='<span class="lugar-animal">'+(an?svgAnimal(an.tipo,40):'')+'</span>';
    /* marca: estrela recuperada, número, ou cadeado */

var cacaGrade=[], cacaPalavras=[], cacaAchadas=[], cacaSel=null, cacaN=10, cacaPos={};
function iniciarCaca(){ faseAtual="caca";
  var fase=FASES.caca; cacaPalavras=fase.palavras.slice(); cacaAchadas=[]; cacaSel=null; cacaN=10;

function gerarCaca(){
  var N=cacaN; cacaGrade=[]; var posicoes={};
  for(var r=0;r<N;r++){ cacaGrade.push([]); for(var c=0;c<N;c++) cacaGrade[r].push(""); }
  var dirs=[[0,1],[1,0]];

    while(!colocada && tent<300){ tent++;
      var dir=dirs[Math.floor(Math.random()*dirs.length)];
      var maxR=(dir[0]===0)?N:N-pal.length, maxC=(dir[1]===0)?N:N-pal.length;
      if(maxR<=0||maxC<=0)continue;
      var r0=Math.floor(Math.random()*maxR), c0=Math.floor(Math.random()*maxC);
      var ok=true;
      for(var k=0;k<pal.length;k++){ var rr=r0+dir[0]*k, cc=c0+dir[1]*k; var atual=cacaGrade[rr][cc];
        if(atual!=="" && atual!==pal.charAt(k)){ ok=false; break; } }
      if(ok){ var cells=[]; for(var k2=0;k2<pal.length;k2++){ var rr2=r0+dir[0]*k2, cc2=c0+dir[1]*k2; cacaGrade[rr2][cc2]=pal.charAt(k2); cells.push(rr2+"_"+cc2); }
        posicoes[pal]=cells; colocada=true; }
    }
    if(!colocada){ return false; }
  }
  cacaPos=posicoes;
  var letras="ABCDEFGHIJLMNOPQRSTUVZ";
  for(var r2=0;r2<N;r2++) for(var c2=0;c2<N;c2++){ if(cacaGrade[r2][c2]==="") cacaGrade[r2][c2]=letras.charAt(Math.floor(Math.random()*letras.length)); }
  return true;
}

function cacaCelAchada(id){ for(var p in cacaPos){ if(cacaAchadas.indexOf(p)>=0 && cacaPos[p].indexOf(id)>=0) return true; } return false; }
function cacaClique(id){ somClique();
  if(cacaSel===null){ cacaSel=id; desenharCaca(); return; }
  if(cacaSel===id){ cacaSel=null; desenharCaca(); return; }
  var ini=cacaSel.split("_"), fim=id.split("_");

    if((fr===r1&&fc===c1&&lr===r2&&lc===c2)||(fr===r2&&fc===c2&&lr===r1&&lc===c1)){ achou=p; break; }
  }
  if(achou){ cacaAchadas.push(achou); addPontos(15); somAcerto(); confete(50); registrar("caca",true); cacaSel=null; desenharCaca();

  } else { cacaSel=null; somErro(); registrar("caca",false); desenharCaca();
    var fb2=document.getElementById("fb"); if(fb2){fb2.className="feedback no"; fb2.innerHTML="🤔 Aí não tem palavra. Toque na primeira e na última letra!";} }
}

/* ===== ENGINE: MONTE A FRASE (produção) ===== */
var fraseRodada=0, fraseMontada=[], fraseBanco=[];
function iniciarFrase(){ fraseRodada=0; novaFrase(); falar(MASC_FALA[faseAtual]); }
function novaFrase(){
  var rd=FASES[faseAtual].rodadas[fraseRodada]; fraseMontada=[]; fraseBanco=rd.embaralhar.slice();
  desenharFrase();
}
function desenharFrase(){
  var rd=FASES[faseAtual].rodadas[fraseRodada];
  var html='<h2>'+iconeFase(faseAtual,26)+' '+FASES[faseAtual].titulo+'</h2>';
  html+='<div class="masc-fala"><span class="masc-pic">'+mascote(56,"explicando")+'</span><div class="masc-balao">Toque nas partes na ordem certa!</div></div>';
  html+='<div class="progress">Rodada '+(fraseRodada+1)+' de '+FASES[faseAtual].rodadas.length+'</div>';
  /* linha da frase sendo montada */
  html+='<div class="frase-linha">';
  if(fraseMontada.length===0){ html+='<span class="frase-vazio">Toque nas partes abaixo...</span>'; }
  for(var i=0;i<fraseMontada.length;i++){ html+='<span class="frase-peca posta" onclick="frasePecaTira('+i+')">'+fraseMontada[i]+'</span>'; }
  html+='</div>';
  /* banco de palavras */
  html+='<div class="frase-banco">';

    html+='<button class="frase-peca" onclick="frasePecaPoe('+b+')">'+fraseBanco[b]+'</button>'; }
  html+='</div>';
  html+='<div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
}
function frasePecaPoe(b){ somClique(); fraseMontada.push(fraseBanco[b]); fraseBanco[b]=null; desenharFrase(); verificarFrase(); }
function frasePecaTira(i){ somClique(); var p=fraseMontada[i]; fraseMontada.splice(i,1);
  for(var k=0;k<fraseBanco.length;k++){ if(fraseBanco[k]===null){ fraseBanco[k]=p; break; } } desenharFrase(); }
function verificarFrase(){
  var rd=FASES[faseAtual].rodadas[fraseRodada];
  var faltam=0; for(var k=0;k<fraseBanco.length;k++){ if(fraseBanco[k]!==null)faltam++; }
  if(faltam>0)return; /* ainda montando */
  var ok=true; for(var i=0;i<rd.partes.length;i++){ if(fraseMontada[i]!==rd.partes[i]){ok=false;break;} }
  var fb=document.getElementById("fb"), nav=document.getElementById("navarea");

function proxFrase(){ somClique(); fraseRodada++; novaFrase(); }

/* ===== ENGINE: EXPLIQUE PARA A ESTRELINHA (produção) ===== */
var expRodada=0, expPreenchidas=[], expBanco=[];
function iniciarExplicar(){ faseAtual="explicar"; expRodada=0; novaExplicar(); falar(MASC_FALA.explicar); }
function novaExplicar(){
  var rd=FASES.explicar.rodadas[expRodada]; expPreenchidas=[];
  for(var i=0;i<rd.lacunas.length;i++)expPreenchidas.push(null);
  /* banco = lacunas certas + extras, embaralhado */
  var banco=rd.lacunas.concat(rd.bancoExtra);
  for(var j=banco.length-1;j>0;j--){ var r=Math.floor(Math.random()*(j+1)); var t=banco[j]; banco[j]=banco[r]; banco[r]=t; }
  expBanco=banco; desenharExplicar();
}
function desenharExplicar(){
  var rd=FASES.explicar.rodadas[expRodada];
  var html='<h2>'+iconeFase("explicar",26)+' Explique para a Bit</h2>';

  html+='<div class="progress">Explicação '+(expRodada+1)+' de '+FASES.explicar.rodadas.length+'</div>';

  var partes=rd.frase.split("___"); var fraseHtml='';
  for(var p=0;p<partes.length;p++){ fraseHtml+=partes[p];

  html+='<div class="exp-frase">'+fraseHtml+'</div>';

  html+='<div class="frase-banco">';

  html+='<div class="feedback" id="fb"></div><div id="navarea"></div>';

function expPoe(b){ somClique(); var palavra=expBanco[b];
  /* coloca na primeira lacuna vazia */
  for(var i=0;i<expPreenchidas.length;i++){ if(expPreenchidas[i]===null){ expPreenchidas[i]=palavra; expBanco[b]=null; break; } }
  desenharExplicar(); verificarExplicar();
}
function expTiraLacuna(p){ somClique(); if(!expPreenchidas[p])return; var palavra=expPreenchidas[p]; expPreenchidas[p]=null;
  for(var k=0;k<expBanco.length;k++){ if(expBanco[k]===null){ expBanco[k]=palavra; break; } } desenharExplicar(); }
function verificarExplicar(){
  var rd=FASES.explicar.rodadas[expRodada];

  } else { registrar("explicar",false); somErro();

    falar("Hmm, não encaixou. Tente trocar as palavras."); }
}
function proxExplicar(){ somClique(); expRodada++; novaExplicar(); }

/* ===== ENGINE: JUNTE E CONTE (manipulação concreta) ===== */
function desenharIlustra(spec){
  /* spec ex: {tipo:"estrela", n:3} ou {grupos:[...], comparar:true/false} ou {maos:true} */
  var html='<div class="ilustra-area">';
  if(spec.maos){
    html+='<div class="ilustra-maos">'+svgMaos()+'</div>';
  } else if(spec.grupos){
    var ehComparar=spec.comparar;
    /* tamanho menor quando há muitos objetos */
    var maxN=0; for(var z=0;z<spec.grupos.length;z++){ if(spec.grupos[z].n>maxN)maxN=spec.grupos[z].n; }
    var tamObj=maxN>=6?38:44;
    for(var g=0;g<spec.grupos.length;g++){
      html+='<div class="ilustra-grupo'+(ehComparar?' comparar':'')+'">';
      html+='<div class="ilustra-objs">';
      for(var k=0;k<spec.grupos[g].n;k++){ html+='<span class="ilustra-obj">'+svgObjeto(spec.grupos[g].tipo,tamObj)+'</span>'; }
      html+='</div>';
      html+='</div>';
      if(g<spec.grupos.length-1) html+='<span class="ilustra-mais">'+(ehComparar?"ou":"+")+'</span>';

function telaInicio(){
  var tem=carregar();
  var html='<h1>🌳 A Floresta dos Números</h1><h2>Uma aventura mágica!</h2>';
  if(tem && ALUNO){
    var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
    var nv=nivelAtual();
    html+='<div class="flutua-espaco">'+mascote(130,"comemorando")+'</div>';
    html+='<p class="lead">Oi de novo, <b>'+ALUNO+'</b>! 🚀<br>Você é <b>'+nv.icone+' '+nv.nome+'</b> com <b>'+score+'</b> pontos e <b>'+feitas+'</b> medalhas.</p>';
    html+='<button class="nav-btn" onclick="telaMenu()">Continuar ➜</button><br><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Começar de novo</button>';
  } else {
    html+='<div class="flutua-espaco">'+mascote(150,"feliz")+'</div>';
    html+='<p class="lead">Oi! Eu sou o <b>Bit</b>! 🤖 Caí numa <b>floresta mágica</b>!<br>As <b>estrelas mágicas</b> se perderam pelos caminhos dos números. Me ajuda a recuperar todas?<br><b>Qual é o seu nome, amiguinho?</b></p>';
    html+='<input class="inp-nome" id="inpNome" type="text" maxlength="20" placeholder="Seu nome" />';
    html+='<br><button class="nav-btn" onclick="comecarComNome()">Decolar! 🚀</button>';
  }
  card.innerHTML=html;
  var inp=document.getElementById("inpNome"); if(inp){ inp.onkeydown=function(e){if(e.keyCode===13)comecarComNome();}; inp.focus(); }
  if(!(tem && ALUNO)) setTimeout(function(){ falar("Oi! Eu sou o Bit! Caí numa floresta mágica! As estrelas mágicas se perderam pelos caminhos dos números. Me ajuda a recuperar todas? Qual é o seu nome, amiguinho?"); }, 400);
}
function comecarComNome(){ var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim():"")||"Astronauta"; somClique(); salvar(); telaMenu(); }
function reiniciarTudo(){ somClique();
  var html='<div style="font-size:54px">🔄</div><h1>Começar de novo?</h1>';
  html+='<p class="lead">Isso apaga o nome, os pontos e as medalhas.</p>';
  html+='<button class="nav-btn" onclick="confirmarReset()">Sim, apagar</button> <button class="nav-btn ghost" onclick="telaMenu()">Não</button>';
  card.innerHTML=html; }
function confirmarReset(){ apagarProgresso(); somClique(); telaInicio(); }

montarCeu();
telaInicio();

</script>
</body>
</html>
