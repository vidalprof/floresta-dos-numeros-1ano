name: Gerar imagem com Gemini

# Gera uma imagem a partir de um prompt e salva em _imagens/.
# - Gemini/Imagen: requer o secret GEMINI_API_KEY (paga por imagem).
# - Pollinations (modelo=free): GRATIS, sem chave (modelo Flux).
# - Diagnostico: modelo=listar lista os modelos que a chave Gemini acessa.

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Descricao da imagem (dica: fundo PRETO, itens BEM separados, sem sombra)"
        required: false
        default: "listar modelos"
        type: string
      nome:
        description: "Nome do arquivo (sem extensao), salvo em _imagens/<nome>.png"
        required: false
        default: "teste"
        type: string
      modelo:
        description: "free (Pollinations, GRATIS) | gemini-2.5-flash-image | imagen-4.0-fast-generate-001 | listar"
        required: false
        default: "free"
        type: string

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar imagem
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          NOME: ${{ inputs.nome }}
          MODELO: ${{ inputs.modelo }}
        run: |
          python3 - <<'PY'
          import os, json, base64, urllib.request, urllib.error, urllib.parse, re
          key=os.environ.get("GEMINI_API_KEY","").strip()
          prompt=os.environ["PROMPT"]; nome=os.environ["NOME"].strip(); modelo=os.environ["MODELO"].strip()
          nome=re.sub(r'[^A-Za-z0-9_-]','_', nome) or "imagem"
          os.makedirs("_imagens", exist_ok=True)
          out="_imagens/%s.png"%nome

          # --- GRATIS: Pollinations (Flux), sem chave ---
          if modelo in ("free","pollinations","gratis") or modelo.startswith("pollinations"):
              p=urllib.parse.quote(prompt, safe="")
              url="https://image.pollinations.ai/prompt/%s?width=1024&height=1024&nologo=true&model=flux"%p
              req=urllib.request.Request(url, headers={"User-Agent":"gera-img/1.0"})
              try:
                  raw=urllib.request.urlopen(req, timeout=240).read()
              except urllib.error.HTTPError as e:
                  print("::error::HTTP %s do Pollinations"%e.code); print(e.read().decode("utf-8","ignore")[:1500]); raise SystemExit(1)
              if len(raw)<2000:
                  print("::error::Pollinations devolveu algo pequeno demais:"); print(raw[:400]); raise SystemExit(1)
              open(out,"wb").write(raw)
              print("OK (Pollinations gratis) -> "+out+" ("+str(len(raw))+" bytes)"); raise SystemExit(0)

          if not key:
              raise SystemExit("::error::GEMINI_API_KEY vazio (necessario p/ modelos Gemini/Imagen). Use modelo=free p/ o gratis.")
          # --- diagnostico: listar modelos ---
          if modelo=="listar" or prompt.strip().lower().startswith("listar"):
              url="https://generativelanguage.googleapis.com/v1beta/models?key=%s&pageSize=200"%key
              raw=urllib.request.urlopen(url, timeout=60).read(); d=json.loads(raw)
              print("== MODELOS DE IMAGEM ==")
              for m in d.get("models",[]):
                  nm=m.get("name",""); meth=m.get("supportedGenerationMethods",[])
                  if "image" in nm.lower() or "imagen" in nm.lower() or "predict" in meth:
                      print(" -", nm, "|", ",".join(meth))
              raise SystemExit(0)
          # --- pago: Gemini/Imagen ---
          if modelo.startswith("imagen"):
              url="https://generativelanguage.googleapis.com/v1beta/models/%s:predict?key=%s"%(modelo,key)
              body={"instances":[{"prompt":prompt}],"parameters":{"sampleCount":1,"aspectRatio":"1:1"}}
          else:
              url="https://generativelanguage.googleapis.com/v1beta/models/%s:generateContent?key=%s"%(modelo,key)
              body={"contents":[{"parts":[{"text":prompt}]}],"generationConfig":{"responseModalities":["TEXT","IMAGE"]}}
          req=urllib.request.Request(url, data=json.dumps(body).encode("utf-8"), headers={"Content-Type":"application/json"})
          try:
              raw=urllib.request.urlopen(req, timeout=180).read()
          except urllib.error.HTTPError as e:
              print("::error::HTTP %s do Gemini"%e.code); print(e.read().decode("utf-8","ignore")[:2000]); raise SystemExit(1)
          d=json.loads(raw); img=None
          if "predictions" in d:
              img=(d["predictions"][0] or {}).get("bytesBase64Encoded")
          else:
              cands=d.get("candidates") or []
              for p in (cands[0].get("content",{}) if cands else {}).get("parts",[]) or []:
                  inl=p.get("inlineData") or p.get("inline_data")
                  if inl and inl.get("data"): img=inl["data"]; break
          if not img:
              print("::error::sem imagem (modelo/cota?)."); print(json.dumps(d)[:1500]); raise SystemExit(1)
          open(out,"wb").write(base64.b64decode(img))
          print("OK -> "+out+" ("+str(os.path.getsize(out))+" bytes)")
          PY

      - name: Commit da imagem
        run: |
          git config user.name "GeraImagem"
          git config user.email "gera@users.noreply.github.com"
          git add _imagens/*.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhuma imagem nova (ou modo diagnostico)."
          else
            git commit -m "Gera imagem: ${{ inputs.nome }}"
            git push
          fi
