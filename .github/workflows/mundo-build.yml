name: Mundo - baixar tileset SPRITE (chao/arvores/agua, estilo LPC/CC0)

on:
  push:
    branches: [ "claude/github-pages-deploy-wbb7dy" ]

permissions:
  contents: write

jobs:
  fetch:
    if: contains(github.event.head_commit.message, '[world]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Baixar tileset do mundo
        run: |
          python3 _anim/fetch_world.py 2>&1 | tail -60
          echo "=== arquivos ==="; ls -la _anim/assets/mundo || true
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _anim/assets/mundo _anim/assets/manifest-mundo.txt
          if git diff --cached --quiet; then echo "::error::nada baixado"; exit 1; fi
          git commit -m "mundo: tileset sprite (chao/arvores) baixado [skip]"
          for k in 1 2 3 4; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" && break || sleep $((k*3))
          done
