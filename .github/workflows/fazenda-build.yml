name: Fazenda - baixar kit RPG pixel (Kenney)

on:
  push:
    branches: [ "claude/github-pages-deploy-wbb7dy" ]

permissions:
  contents: write

jobs:
  assets:
    if: contains(github.event.head_commit.message, '[fazenda]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Baixar o kit RPG/fazenda pixel (Kenney CC0)
        run: |
          python3 _fazenda/build_assets.py 2>&1 | tail -80
          echo "=== total PNG ==="; ls _fazenda/assets/images | wc -l
          echo "=== tilesheets (grandes) ==="; ls -S _fazenda/assets/images | head -8
      - name: Commit dos assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _fazenda/assets
          if git diff --cached --quiet; then echo "::error::nada baixado"; exit 1; fi
          git commit -m "fazenda: kit RPG pixel Kenney CC0 baixado"
          for k in 1 2 3 4; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" && break || sleep $((k*3))
          done
