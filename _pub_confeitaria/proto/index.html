<title>A Lojinha (protótipo)</title>
<style>
*{margin:0;padding:0;-webkit-box-sizing:border-box;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#2a2018;font-family:'Segoe UI',Arial,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
#pal{position:fixed;left:0;top:0;right:0;bottom:0;overflow:hidden;background:#efe4d2;}
#sala{position:absolute;left:50%;top:50%;width:900px;height:900px;margin-left:-450px;margin-top:-450px;background-size:100% 100%;background-repeat:no-repeat;}
.ent{position:absolute;width:64px;height:150px;margin-left:-32px;margin-top:-132px;background-size:contain;background-repeat:no-repeat;background-position:bottom center;-webkit-transform-origin:50% 100%;transform-origin:50% 100%;}
.sombra{position:absolute;width:44px;height:16px;margin-left:-22px;margin-top:-14px;border-radius:50%;background:rgba(40,25,10,.26);}
#chef{z-index:50;}
.cli{z-index:40;width:56px;height:120px;margin-left:-28px;margin-top:-108px;}
.balaocli{position:absolute;width:120px;margin-left:-60px;margin-top:-232px;background:#fff;border-radius:12px;padding:6px 8px;font-size:13px;font-weight:bold;color:#5a2e1c;text-align:center;-webkit-box-shadow:0 3px 8px rgba(0,0,0,.25);box-shadow:0 3px 8px rgba(0,0,0,.25);z-index:60;display:none;}
.balaocli:after{content:"";position:absolute;left:50%;bottom:-8px;margin-left:-6px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #fff;}
#dica{position:fixed;left:0;right:0;top:8px;text-align:center;z-index:200;pointer-events:none;}
#dica span{display:inline-block;background:rgba(0,0,0,.55);color:#fff;font-size:14px;font-weight:bold;padding:6px 14px;border-radius:14px;}
#ctrl{position:fixed;left:14px;bottom:14px;width:150px;height:150px;z-index:300;}
.dbtn{position:absolute;width:52px;height:52px;background:rgba(255,255,255,.82);border-radius:12px;text-align:center;line-height:52px;font-size:22px;color:#7a4a17;-webkit-box-shadow:0 3px 0 rgba(0,0,0,.2);box-shadow:0 3px 0 rgba(0,0,0,.2);cursor:pointer;}
.dbtn:active{-webkit-transform:translateY(2px);transform:translateY(2px);}
#bC{left:49px;top:0;}#bB{left:49px;bottom:0;}#bE{left:0;top:49px;}#bD{right:0;top:49px;}
#painel{position:fixed;left:50%;top:50%;width:300px;margin-left:-150px;margin-top:-170px;background:rgba(255,250,242,.96);border-radius:18px;padding:16px 14px 20px;z-index:400;text-align:center;-webkit-box-shadow:0 10px 40px rgba(60,35,10,.4);box-shadow:0 10px 40px rgba(60,35,10,.4);display:none;}
#painel h2{font-size:18px;color:#7a4a17;margin-bottom:6px;}
#painel .ped{font-size:15px;color:#5a2e1c;margin-bottom:10px;}
.zona{display:inline-block;vertical-align:top;width:80px;min-height:78px;margin:4px;background:#fff3df;border:2px dashed #d9ad72;border-radius:12px;padding:3px;cursor:pointer;}
.zona .zn{font-size:13px;font-weight:bold;color:#7a4a17;}
.doceb{display:inline-block;width:22px;height:22px;margin:1px;background-size:contain;background-repeat:no-repeat;vertical-align:middle;}
#bandeja{margin:6px auto;min-height:36px;}
.zdoces{font-size:15px;line-height:1.1;min-height:34px;}
.bandInfo{font-size:12px;color:#7a4a17;font-weight:bold;}
.bandDoces{font-size:19px;line-height:1.3;}
#msg{font-size:14px;font-weight:bold;min-height:20px;margin-top:6px;color:#0f7a4e;}
.desktop #ctrl{display:none;}
@-webkit-keyframes fl{0%,100%{-webkit-transform:translateY(0)}50%{-webkit-transform:translateY(-6px)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.flut{-webkit-animation:fl 2.4s ease-in-out infinite;animation:fl 2.4s ease-in-out infinite;}
</style></head><body>

 var ag=(new Date()).getTime();
 if(and){
  if(Math.abs(chef.vx)>Math.abs(chef.vy))chef.dir=(chef.vx<0?"le":"ld");
  else chef.dir=(chef.vy<0?"cima":"baixo");
  if(ag-chef.tf>150){chef.frame=1-chef.frame;chef.tf=ag;}
  var base=(chef.dir==="cima"?"chef_cima":(chef.dir==="baixo"?"chef_baixo":"chef_lado"));
  sprite($("chef"),IMG[base+chef.frame]);
  $("chef").style.webkitTransform=(chef.dir==="le"?"scaleX(-1)":"scaleX(1)")+" scale("+esc(chef.y).toFixed(3)+")";
  $("chef").style.transform=$("chef").style.webkitTransform;
 } else {
  sprite($("chef"),IMG.chef_parado);
  $("chef").style.webkitTransform="scale("+esc(chef.y).toFixed(3)+")";
  $("chef").style.transform=$("chef").style.webkitTransform;
 }
 poe($("chef"),chef.x,chef.y);poe($("shChef"),chef.x,chef.y);
 $("shChef").style.webkitTransform="scale("+esc(chef.y).toFixed(3)+")";$("shChef").style.transform=$("shChef").style.webkitTransform;
 // ---- clientes ----
 var i,perto=null,pd=999;
 for(i=0;i<clientes.length;i++){var c=clientes[i];
  if(!c.chegou){var dx=c.alvo.x-c.x,dy=c.alvo.y-c.y,d=Math.sqrt(dx*dx+dy*dy);
   if(d<3){c.chegou=true;c.bal.style.display="block";c.bal.innerHTML=c.ped.txt;}
   else{c.x+=dx/d*2.2;c.y+=dy/d*2.2;}}
  poe(c.el,c.x,c.y);poe(c.sh,c.x,c.y);poe(c.bal,c.x,c.y);
  var s=esc(c.y).toFixed(3);
  c.el.style.webkitTransform="scale("+s+")";c.el.style.transform=c.el.style.transform;
  c.sh.style.webkitTransform="scale("+s+")";c.sh.style.transform="scale("+s+")";
  if(c.chegou&&!atendendo){var ddx=c.x-chef.x,ddy=c.y-chef.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
   if(dd<pd){pd=dd;perto=c;}}
 }
 // proximo do balcao e de um cliente -> atende
 if(perto&&pd<120&&!atendendo){abrirPedido(perto);}
 // spawn periodico
 spawnT++;if(spawnT>150&&clientes.length<3){spawnT=0;novoCliente();}
 requestAnimationFrame?requestAnimationFrame(tick):setTimeout(tick,33);
}
// ---- atendimento (a matematica) ----
var repEstado=null;
function abrirPedido(c){atendendo=c;
 var ped=c.ped,q=ped.tot/ped.gr;
 repEstado={ped:ped,q:q,banco:ped.tot,pratos:[]};
 var h='';var i;
 for(i=0;i<ped.gr;i++){repEstado.pratos.push(0);
  h+='<div class="zona" onclick="poeDoce('+i+')"><div class="zdoces" id="zd'+i+'"></div><div class="zn"><span id="zn'+i+'">0</span></div></div>';}
 $("pTit").innerHTML="Atender o cliente";
 $("pPed").innerHTML=ped.txt+"<br><b>Toque nos pratos pra repartir igual!</b>";
 $("pZonas").innerHTML=h;
 renderBandeja();
 $("msg").innerHTML="";
 $("painel").style.display="block";
 $("dicaTxt").innerHTML="Reparta "+ped.tot+" em "+ped.gr+" pratos iguais";
}
var BIS="\ud83c\udf6a";
function renderBandeja(){var h='',i;for(i=0;i<repEstado.banco;i++)h+=BIS;
 $("bandeja").innerHTML='<div class="bandInfo">Bandeja</div><div class="bandDoces">'+(h||"&#8212;")+'</div>';
}
function poeDoce(i){if(!repEstado)return;
 if(repEstado.banco<=0){conferir();return;}
 repEstado.banco--;repEstado.pratos[i]++;
 $("zn"+i).innerHTML=repEstado.pratos[i];
 var z=$("zd"+i);if(z){var s='',j;for(j=0;j<repEstado.pratos[i];j++)s+=BIS;z.innerHTML=s;}
 renderBandeja();
 try{plimP();}catch(e){}
 if(repEstado.banco===0)setTimeout(conferir,300);
}
var _acP=null;function plimP(){try{_acP=_acP||new (window.AudioContext||window.webkitAudioContext)();if(_acP.state==="suspended")_acP.resume();var o=_acP.createOscillator(),g=_acP.createGain();o.type="sine";o.frequency.value=740;g.gain.setValueAtTime(.12,_acP.currentTime);g.gain.exponentialRampToValueAtTime(.001,_acP.currentTime+.18);o.connect(g);g.connect(_acP.destination);o.start();o.stop(_acP.currentTime+.2);}catch(e){}}
function conferir(){var ok=true,i;for(i=0;i<repEstado.pratos.length;i++)if(repEstado.pratos[i]!==repEstado.q)ok=false;
 if(ok){$("msg").style.color="#0f7a4e";$("msg").innerHTML="&#9989; Isso! "+repEstado.ped.tot+" \u00f7 "+repEstado.ped.gr+" = "+repEstado.q;
  setTimeout(clienteSai,900);}
 else{$("msg").style.color="#b5461e";$("msg").innerHTML="Quase! Deixe a MESMA quantidade em cada prato.";
  // devolve tudo
  repEstado.banco=repEstado.ped.tot;for(i=0;i<repEstado.pratos.length;i++){repEstado.pratos[i]=0;if($("zn"+i))$("zn"+i).innerHTML=0;if($("zd"+i))$("zd"+i).innerHTML="";}
  renderBandeja();}
}
function clienteSai(){$("painel").style.display="none";$("dicaTxt").innerHTML="Cliente feliz! Chega o próximo...";
 var c=atendendo;atendendo=null;
 c.bal.innerHTML="&#128522; Obrigado!";
 var t0=(new Date()).getTime();
 var iv=setInterval(function(){var t=((new Date()).getTime()-t0)/700;
  c.y=c.alvo.y+t*400;c.el.style.opacity=Math.max(0,1-t);c.sh.style.opacity=c.el.style.opacity;c.bal.style.opacity=c.el.style.opacity;
  poe(c.el,c.x,c.y);poe(c.sh,c.x,c.y);poe(c.bal,c.x,c.y);
  if(t>=1){clearInterval(iv);
   if(c.el.parentNode){c.el.parentNode.removeChild(c.el);c.sh.parentNode.removeChild(c.sh);c.bal.parentNode.removeChild(c.bal);}
   var idx=clientes.indexOf(c);if(idx>=0)clientes.splice(idx,1);
   // reposiciona a fila
   for(var k=0;k<clientes.length;k++){clientes[k].alvo=VAGAS[k];clientes[k].chegou=false;}
  }
 },33);
}
// ---- controles ----
function liga(id,tecla){var b=$(id);
 var dn=function(e){if(e.preventDefault)e.preventDefault();chef.mov[tecla]=true;};
 var up=function(e){if(e.preventDefault)e.preventDefault();chef.mov[tecla]=false;};
 b.onmousedown=dn;b.onmouseup=up;b.onmouseleave=up;
 b.ontouchstart=dn;b.ontouchend=up;b.ontouchcancel=up;
}
liga("bC","cima");liga("bB","baixo");liga("bE","esq");liga("bD","dir");
document.addEventListener("keydown",function(e){var k=e.keyCode;
 if(k===37)chef.mov.esq=true;else if(k===39)chef.mov.dir=true;
 else if(k===38)chef.mov.cima=true;else if(k===40)chef.mov.baixo=true;},false);
document.addEventListener("keyup",function(e){var k=e.keyCode;
 if(k===37)chef.mov.esq=false;else if(k===39)chef.mov.dir=false;
 else if(k===38)chef.mov.cima=false;else if(k===40)chef.mov.baixo=false;},false);
montar();tick();
