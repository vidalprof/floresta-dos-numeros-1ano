*{margin:0;padding:0;-webkit-box-sizing:border-box;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#2a2018;font-family:'Segoe UI',Arial,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
#pal{position:fixed;left:0;top:0;right:0;bottom:0;overflow:hidden;background:#efe4d2;}
#sala{position:absolute;left:50%;top:50%;width:900px;height:900px;margin-left:-450px;margin-top:-450px;background-size:100% 100%;background-repeat:no-repeat;}
.ent{position:absolute;background-size:contain;background-repeat:no-repeat;background-position:bottom center;-webkit-transform-origin:50% 100%;transform-origin:50% 100%;}
.pers{width:80px;height:118px;margin-left:-40px;margin-top:-112px;}
.cli{width:80px;height:100px;margin-left:-40px;margin-top:-95px;}
.sombra{position:absolute;width:40px;height:13px;margin-left:-20px;margin-top:-10px;border-radius:50%;background:rgba(40,25,10,.30);-webkit-transform-origin:50% 50%;transform-origin:50% 50%;}
.balaocli{position:absolute;width:128px;margin-left:-64px;margin-top:-196px;background:#fff;border-radius:12px;padding:6px 8px;font-size:13px;font-weight:bold;color:#5a2e1c;text-align:center;-webkit-box-shadow:0 3px 8px rgba(0,0,0,.25);box-shadow:0 3px 8px rgba(0,0,0,.25);z-index:120;display:none;}

.ent{-webkit-transition:opacity .4s;transition:opacity .4s;}
.balaocli:after{content:"";position:absolute;left:50%;bottom:-8px;margin-left:-6px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #fff;}
#dica{position:fixed;left:0;right:0;top:8px;text-align:center;z-index:200;pointer-events:none;}
#dica span{display:inline-block;background:rgba(0,0,0,.55);color:#fff;font-size:14px;font-weight:bold;padding:6px 14px;border-radius:14px;}
#placar{position:fixed;right:10px;top:8px;z-index:200;background:rgba(255,255,255,.9);border-radius:14px;padding:6px 12px;font-size:15px;font-weight:bold;color:#7a4a17;-webkit-box-shadow:0 2px 8px rgba(0,0,0,.2);box-shadow:0 2px 8px rgba(0,0,0,.2);}
#ctrl{position:fixed;left:14px;bottom:14px;width:150px;height:150px;z-index:300;}
.dbtn{position:absolute;width:52px;height:52px;background:rgba(255,255,255,.82);border-radius:12px;text-align:center;line-height:52px;font-size:22px;color:#7a4a17;-webkit-box-shadow:0 3px 0 rgba(0,0,0,.2);box-shadow:0 3px 0 rgba(0,0,0,.2);cursor:pointer;}
.dbtn:active{-webkit-transform:translateY(2px);transform:translateY(2px);}
#bC{left:49px;top:0;}#bB{left:49px;bottom:0;}#bE{left:0;top:49px;}#bD{right:0;top:49px;}
.desktop #ctrl{display:none;}

#painel .ped{font-size:14px;font-weight:bold;color:#5a2e1c;margin-bottom:6px;}
.pratoz{display:inline-block;position:relative;width:96px;height:96px;margin:2px 6px;background-size:contain;background-repeat:no-repeat;background-position:center;cursor:pointer;}
.pratoz .num{position:absolute;right:2px;bottom:2px;background:rgba(255,255,255,.9);border-radius:8px;font-size:13px;font-weight:bold;color:#7a4a17;padding:0 6px;}
.doceimg{position:absolute;width:26px;height:26px;background-size:contain;background-repeat:no-repeat;margin-left:-13px;margin-top:-13px;}
#bandz{position:relative;width:210px;height:96px;margin:2px auto 0;background-size:contain;background-repeat:no-repeat;background-position:center;}
#bandz .num{position:absolute;right:0;bottom:0;background:rgba(255,255,255,.9);border-radius:8px;font-size:13px;font-weight:bold;color:#7a4a17;padding:0 6px;}
#msg{font-size:14px;font-weight:bold;min-height:18px;margin-top:4px;color:#0f7a4e;}
@-webkit-keyframes pop{0%{-webkit-transform:scale(.5)}70%{-webkit-transform:scale(1.15)}100%{-webkit-transform:scale(1)}}

.pop{-webkit-animation:pop .4s ease-out;animation:pop .4s ease-out;}

function andaCli(c,vel){
 if(!c.rota.length)return true;
 var a=c.rota[0],dx=a.x-c.x,dy=a.y-c.y,d=Math.sqrt(dx*dx+dy*dy);

 var px=c.x+dx/d*vel,py=c.y+dy/d*vel;
 var dAt1=c.x-chef.x,dAt2=c.y-chef.y,dAt=Math.sqrt(dAt1*dAt1+dAt2*dAt2);
 function ok(x,y){var a1=x-chef.x,a2=y-chef.y;return Math.sqrt(a1*a1+a2*a2)>=Math.min(44,dAt-0.1);}
 if(!ok(px,py)){

  var qx=c.x+(-dy/d)*vel*c.lado,qy=c.y+(dx/d)*vel*c.lado;
  var rx=c.x-(-dy/d)*vel*c.lado,ry=c.y-(dx/d)*vel*c.lado;

 c.trav=0;

 c.fase=(c.fase||0)+vel*0.2;c.bob=Math.abs(Math.sin(c.fase))*2.6;
 // frames por distancia
 c.dAc+=Math.sqrt((c.x-c.lx)*(c.x-c.lx)+(c.y-c.ly)*(c.y-c.ly));c.lx=c.x;c.ly=c.y;
