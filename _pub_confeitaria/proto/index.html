// ---------- colisao ----------
var OBST=[
 {x:100,y:300,w:700,h:118},        // balcao
 {x:112,y:522,w:180,h:126},        // mesa esquerda
 {x:498,y:672,w:186,h:130}         // mesa direita
];
var LIM={x0:112,x1:828,y0:436,y1:862};
function bate(x,y){var i;
 if(x<LIM.x0||x>LIM.x1||y<LIM.y0||y>LIM.y1)return true;
 for(i=0;i<OBST.length;i++){var o=OBST[i];
  if(x>o.x&&x<o.x+o.w&&y>o.y&&y<o.y+o.h)return true;}
 return false;
}

var chef={x:450,y:800,dir:"baixo",frame:0,dAc:0,lx:450,ly:800,mov:{},feliz:0};

var TIPOS=["coelho","urso","menina"];
var MESAS=[{seat:{x:205,y:540},serve:{x:330,y:600}},{seat:{x:592,y:688},serve:{x:592,y:840}}];

 {tot:6,gr:2,doce:"biscoito",txt:"6 biscoitos em 2 pratos iguais, por favor!"},

];
var clientes=[],pedIdx=0,seq=0,spawnT=100,pts=0,atendendo=null,repEstado=null;
function novoCliente(){
 var mesaLivre=-1,i;
 for(i=0;i<MESAS.length;i++){var ocupada=false,k;
  for(k=0;k<clientes.length;k++)if(clientes[k].mesa===i)ocupada=true;
  if(!ocupada){mesaLivre=i;break;}}
 var filaN=0;
 for(i=0;i<clientes.length;i++)if(clientes[i].mesa<0)filaN++;
 if(mesaLivre<0&&filaN>=FILA.length)return;
 var tipo=TIPOS[seq%TIPOS.length];seq++;
 var el=document.createElement("div");el.className="ent cli";spr(el,tipo+"_costas0");
 var sh=document.createElement("div");sh.className="sombra";
 var bal=document.createElement("div");bal.className="balaocli";
 $("sala").appendChild(sh);$("sala").appendChild(el);$("sala").appendChild(bal);
 var ped=PEDIDOS[pedIdx%PEDIDOS.length];pedIdx++;
 var c={tipo:tipo,el:el,sh:sh,bal:bal,x:450,y:900,ped:ped,estado:"entrando",
        mesa:mesaLivre,frame:0,dAc:0,lx:450,ly:900,esperaT:0};
 if(mesaLivre>=0){var st=MESAS[mesaLivre].seat;
  c.rota=[{x:450,y:520},{x:st.x,y:520},{x:st.x,y:st.y}];}
 else{var fslot=FILA[filaN];
  c.rota=[{x:fslot.x,y:820},{x:fslot.x,y:fslot.y}];c.slotFila=filaN;}
 clientes.push(c);
}
function andaCli(c,vel){
 if(!c.rota.length)return true;
 var a=c.rota[0],dx=a.x-c.x,dy=a.y-c.y,d=Math.sqrt(dx*dx+dy*dy);
 if(d<3){c.rota.shift();return c.rota.length===0;}
 c.x+=dx/d*vel;c.y+=dy/d*vel;
 // frames por distancia
 c.dAc+=Math.sqrt((c.x-c.lx)*(c.x-c.lx)+(c.y-c.ly)*(c.y-c.ly));c.lx=c.x;c.ly=c.y;
 if(c.dAc>22){c.dAc=0;c.frame=1-c.frame;}
 var subindo=dy<0;
 spr(c.el,c.tipo+(subindo?"_costas":"_frente")+c.frame);
 return false;
}
function renderCli(c){
 poe(c.el,c.x,c.y);poe(c.sh,c.x,c.y);poe(c.bal,c.x,c.y);
 var s=esc(c.y).toFixed(3);
 c.el.style.webkitTransform="scale("+s+")";c.el.style.transform="scale("+s+")";
 c.sh.style.webkitTransform="scale("+s+")";c.sh.style.transform="scale("+s+")";
}
// ---------- loop ----------
function tick(){
 var ag=(new Date()).getTime();
 // chef
 var sp=3.1,ax=0,ay=0;
 if(chef.mov.esq)ax=-1;if(chef.mov.dir)ax=1;if(chef.mov.cima)ay=-1;if(chef.mov.baixo)ay=1;
 if(ax&&ay){ax*=0.707;ay*=0.707;}
 var nx=chef.x+ax*sp,ny=chef.y+ay*sp;
 if(!bate(nx,chef.y))chef.x=nx;
 if(!bate(chef.x,ny))chef.y=ny;
 // nao transpassa clientes
 var i;
 for(i=0;i<clientes.length;i++){var c=clientes[i];
  var ddx=chef.x-c.x,ddy=chef.y-c.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
  if(dd>0&&dd<46){chef.x=c.x+ddx/dd*46;chef.y=c.y+ddy/dd*46;}}
 var and=(ax!==0||ay!==0);
 chef.dAc+=Math.sqrt((chef.x-chef.lx)*(chef.x-chef.lx)+(chef.y-chef.ly)*(chef.y-chef.ly));
 chef.lx=chef.x;chef.ly=chef.y;
 if(chef.dAc>26){chef.dAc=0;chef.frame=1-chef.frame;}
 var esp="";
 if(and){
  if(Math.abs(ax)>Math.abs(ay)){chef.dir=(ax<0?"le":"ld");}
  else if(ay!==0){chef.dir=(ay<0?"cima":"baixo");}
 }
 var base;
 if(chef.feliz>ag)base="chef_feliz";
 else if(!and)base="chef_parado";
 else base=(chef.dir==="cima"?"chef_cima":(chef.dir==="baixo"?"chef_baixo":"chef_lado"))+chef.frame;
 spr($("chef"),base);
 if(chef.dir==="le")esp="scaleX(-1) ";
 var s=esc(chef.y).toFixed(3);
 $("chef").style.webkitTransform=esp+"scale("+s+")";$("chef").style.transform=esp+"scale("+s+")";
 poe($("chef"),chef.x,chef.y);poe($("shChef"),chef.x,chef.y);
 $("shChef").style.webkitTransform="scale("+s+")";$("shChef").style.transform="scale("+s+")";
 // clientes
 var pertoC=null,pd=9999;
 for(i=0;i<clientes.length;i++){var c=clientes[i];
  if(c.estado==="entrando"){if(andaCli(c,2.1)){c.estado="esperando";
   spr(c.el,c.tipo+(c.mesa>=0?"_frenteP":"_costasP"));
   c.bal.style.display="block";c.bal.innerHTML=c.ped.txt;}}
  else if(c.estado==="esperando"){
   var dx2=c.x-chef.x,dy2=c.y-chef.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);
   if(d2<150){spr(c.el,c.tipo+"_frenteP");}
   else if(c.mesa<0){spr(c.el,c.tipo+"_costasP");}
   if(d2<pd){pd=d2;pertoC=c;}}
  else if(c.estado==="saindo"){
   if(andaCli(c,2.4)){
    if(c.el.parentNode){c.el.parentNode.removeChild(c.el);c.sh.parentNode.removeChild(c.sh);c.bal.parentNode.removeChild(c.bal);}
    clientes.splice(clientes.indexOf(c),1);i--;continue;
   }
   if(c.y>840){c.el.style.opacity=Math.max(0,(900-c.y)/60);c.sh.style.opacity=c.el.style.opacity;}
  }
  renderCli(c);
 }
 // fila anda quando mesa vaga (promove 1o da fila)
 promoveFila();
 if(pertoC&&pd<150&&!atendendo&&pertoC.estado==="esperando")abrirPedido(pertoC);
 // spawn
 spawnT++;if(spawnT>210){spawnT=0;novoCliente();}
 if(window.requestAnimationFrame)requestAnimationFrame(tick);else setTimeout(tick,33);
}
function promoveFila(){
 var i,mesaLivre=-1;
 for(i=0;i<MESAS.length;i++){var ocupada=false,k;
  for(k=0;k<clientes.length;k++)if(clientes[k].mesa===i&&clientes[k].estado!=="saindo")ocupada=true;
  if(!ocupada){mesaLivre=i;break;}}
 if(mesaLivre<0)return;
 for(i=0;i<clientes.length;i++){var c=clientes[i];
  if(c.mesa<0&&c.estado==="esperando"&&c!==atendendo){
   c.mesa=mesaLivre;var st=MESAS[mesaLivre].seat;
   c.estado="entrando";c.bal.style.display="none";
   c.rota=[{x:c.x,y:820},{x:450,y:820},{x:450,y:520},{x:st.x,y:520},{x:st.x,y:st.y}];
   // sobe os outros da fila
   var f=0,k;
   for(k=0;k<clientes.length;k++){var o=clientes[k];
    if(o.mesa<0&&o!==c&&o.estado==="esperando"){o.estado="entrando";o.rota=[{x:FILA[f].x,y:FILA[f].y}];o.slotFila=f;f++;}}
   break;
  }}
}

 $("dicaTxt").innerHTML="Toque nos pratos para repartir igual!";
