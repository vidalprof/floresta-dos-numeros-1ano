name: Gerar imagem (Pollinations gratis / Gemini) e salvar

# Gera/edita imagem e salva em _novo/<nome>.png (commit na branch que rodou).
# - modelo=pollinations (GRATIS): texto -> imagem (URL image.pollinations.ai).
# - modelo=gemini: usa GEMINI_API_KEY (secret). Pode EDITAR uma imagem base
#   (input `base` = caminho no repo, ex.: _novo/nino_base.png) -> mantem o
#   personagem e muda so o que o prompt pedir (ex.: boca aberta / pernas juntas).
#
# Roda no GitHub Actions (internet liberada).

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Descricao da imagem (ou da EDICAO, se houver base)"
        required: true
        type: string
      nome:
        description: "Nome do arquivo de saida (sem extensao) -> _novo/<nome>.png"
        required: false
        default: "imagem"
        type: string
      base:
        description: "Imagem base p/ EDITAR (caminho no repo, ex: _novo/nino_base.png). Vazio = gera do zero."
        required: false
        default: ""
        type: string
      modelo:
        description: "pollinations (GRATIS - PADRAO) | gemini (pago, so recorte limpo)"
        required: false
        default: "pollinations"
        type: string
      w:
        description: "largura (pollinations)"
        required: false
        default: "768"
        type: string
      h:
        description: "altura (pollinations)"
        required: false
        default: "1024"
        type: string

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar imagem
        env:
          PROMPT: ${{ inputs.prompt }}
          NOME: ${{ inputs.nome }}
          BASE: ${{ inputs.base }}
          MODELO: ${{ inputs.modelo }}
          W: ${{ inputs.w }}
          H: ${{ inputs.h }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, re, json, base64, urllib.request, urllib.parse, urllib.error
          modelo=(os.environ.get("MODELO","pollinations").strip() or "pollinations").lower()
          if modelo in ("free","gratis","grátis","poli"): modelo="pollinations"
          prompt=os.environ["PROMPT"]
          nome=re.sub(r'[^A-Za-z0-9_-]','_', os.environ.get("NOME","imagem").strip() or "imagem")
          base=os.environ.get("BASE","").strip()
          os.makedirs("_novo", exist_ok=True)
          out="_novo/%s.png"%nome

          def salvar(b):
              open(out,"wb").write(b)
              print("OK -> %s (%d bytes, %s)"%(out, len(b), modelo))

          def pollinations():
              url="https://image.pollinations.ai/prompt/%s?width=%s&height=%s&nologo=true&model=flux"%(
                  urllib.parse.quote(prompt), os.environ.get("W","768"), os.environ.get("H","1024"))
              req=urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              return urllib.request.urlopen(req, timeout=180).read()

          def gemini():
              key=os.environ.get("GEMINI_API_KEY","").strip()
              if not key: raise SystemExit("::error::GEMINI_API_KEY vazio")
              parts=[{"text": prompt}]
              if base and os.path.exists(base):
                  data=base64.b64encode(open(base,"rb").read()).decode()
                  parts.append({"inline_data":{"mime_type":"image/png","data":data}})
                  print("editando imagem base:", base)
              body={"contents":[{"parts":parts}]}
              for modelo_img in ["gemini-2.5-flash-image","gemini-2.5-flash-image-preview","gemini-2.0-flash-preview-image-generation"]:
                  url="https://generativelanguage.googleapis.com/v1beta/models/%s:generateContent?key=%s"%(modelo_img,key)
                  req=urllib.request.Request(url, data=json.dumps(body).encode("utf-8"),
                                             headers={"Content-Type":"application/json"})
                  try:
                      raw=urllib.request.urlopen(req, timeout=180).read()
                  except urllib.error.HTTPError as e:
                      print("modelo %s -> HTTP %s: %s"%(modelo_img, e.code, e.read().decode("utf-8","ignore")[:300]))
                      continue
                  d=json.loads(raw)
                  for c in d.get("candidates",[]) or []:
                      for p in (c.get("content",{}) or {}).get("parts",[]) or []:
                          inl=p.get("inlineData") or p.get("inline_data")
                          if inl and inl.get("data"):
                              print("imagem gerada com", modelo_img)
                              return base64.b64decode(inl["data"])
                  print("modelo %s: sem imagem na resposta: %s"%(modelo_img, json.dumps(d)[:300]))
              raise SystemExit("::error::Gemini nao retornou imagem (ver logs acima)")

          if modelo=="gemini":
              salvar(gemini())
          else:
              salvar(pollinations())
          PY

      - name: Commit da imagem
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _novo/ || true
          if git diff --cached --quiet; then echo "sem mudancas"; exit 0; fi
          git commit -m "imagem: gera ${{ inputs.nome }} (${{ inputs.modelo }})"
          for k in 1 2 3 4 5 6; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" && break || sleep $((k*3))
          done
