<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Agenda de Aulas — em construção</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0d0f14; color:#e8ebf0;
    display:-webkit-box; display:-webkit-flex; display:flex;
    -webkit-box-align:center; -webkit-align-items:center; align-items:center;
    -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
    text-align:center; padding:24px; min-height:100%;
  }
  .card {
    max-width:460px; width:100%;
    background:#161a22;
    border:1px solid #232936;
    border-radius:22px;
    padding:40px 28px;
    -webkit-box-shadow:0 18px 50px rgba(0,0,0,0.45);
    box-shadow:0 18px 50px rgba(0,0,0,0.45);
  }
  .ico { font-size:56px; line-height:1; margin-bottom:14px; }
  h1 { font-size:26px; font-weight:800; letter-spacing:.2px; margin-bottom:8px; }
  .tag {
    display:inline-block; margin:0 auto 18px;
    background:#d98a3d; color:#241202;
    font-weight:700; font-size:13px; letter-spacing:.4px;
    padding:6px 14px; border-radius:999px;
  }
  p { color:#a7b0c0; font-size:15px; line-height:1.6; }
  .esc { margin-top:22px; font-size:13px; color:#6f7787; }
</style>
</head>
<body>
  <div class="card">
    <div class="ico">&#128197;</div>
    <div class="tag">EM CONSTRUÇÃO</div>
    <h1>Agenda de Aulas</h1>
    <p>Sistema de agendamento da sala de aulas de tecnologia.<br>Em breve, no ar. &#128221;</p>
    <div class="esc">E.B.M. Vidal Ramos</div>
  </div>
</body>
</html>
