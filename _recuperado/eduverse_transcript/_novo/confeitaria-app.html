<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex">
<title>Confeitaria Mágica — Divisão</title>
<style>
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
 background:#4a2418;background:-webkit-linear-gradient(top,#5a2e1c,#3a1c12);background:linear-gradient(180deg,#5a2e1c,#3a1c12);
 color:#fff4ec;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
.wrap{max-width:560px;margin:0 auto;min-height:100%;padding:14px 12px 90px;position:relative;}
img{max-width:100%;}
.hide{display:none!important;}
h1{font-size:26px;color:#ffd9a8;text-align:center;text-shadow:0 2px 0 #7a3a1e;margin:8px 0 2px;}
.sub{text-align:center;color:#ffc48a;font-weight:bold;font-size:14px;margin-bottom:10px;}
.lead{font-size:16px;line-height:1.45;text-align:center;color:#ffeeda;margin:12px 6px;}
.capaimg{display:block;width:230px;height:230px;-o-object-fit:cover;object-fit:cover;object-position:center;border-radius:50%;
 margin:6px auto;border:6px solid #ffbf7a;-webkit-box-shadow:0 8px 24px rgba(0,0,0,.4);box-shadow:0 8px 24px rgba(0,0,0,.4);
 -webkit-animation:boia 3.5s ease-in-out infinite;animation:boia 3.5s ease-in-out infinite;}
@-webkit-keyframes boia{0%,100%{-webkit-transform:translateY(0)}50%{-webkit-transform:translateY(-8px)}}
@keyframes boia{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.campo{display:block;width:86%;max-width:320px;margin:10px auto;padding:13px;font-size:18px;text-align:center;border:3px solid #ffbf7a;border-radius:14px;background:#fff8f0;color:#5a2e1c;}
.btn{display:block;width:86%;max-width:340px;margin:10px auto;padding:15px;border:0;border-radius:16px;font-size:19px;font-weight:bold;color:#fff;
 background:#e07b2a;-webkit-box-shadow:0 5px 0 #a8531a;box-shadow:0 5px 0 #a8531a;cursor:pointer;}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);-webkit-box-shadow:0 2px 0 #a8531a;box-shadow:0 2px 0 #a8531a;}
.btn.sec{background:#7a5a48;-webkit-box-shadow:0 5px 0 #4a352a;box-shadow:0 5px 0 #4a352a;font-size:16px;width:auto;display:inline-block;padding:11px 18px;}
.btn.verde{background:#3a9d5a;-webkit-box-shadow:0 5px 0 #257040;box-shadow:0 5px 0 #257040;}
.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite;}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.05)}}
@keyframes pulsa{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.topbar{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:justify;justify-content:space-between;
 background:rgba(0,0,0,.22);border-radius:14px;padding:6px 10px;margin-bottom:8px;}
.topbar img{width:40px;height:40px;-o-object-fit:contain;object-fit:contain;}
.topbar .niv{font-size:13px;font-weight:bold;color:#ffd9a8;}
.xpbar{height:9px;background:rgba(255,255,255,.18);border-radius:6px;overflow:hidden;margin-top:3px;width:120px;}
.xpbar i{display:block;height:100%;background:#ffbf3f;width:0;}
.card{background:rgba(255,248,240,.06);border:2px solid rgba(255,191,122,.35);border-radius:18px;padding:14px;margin:10px 0;}
.recomp{text-align:center;}
.recomp img{height:120px;width:auto;display:block;margin:0 auto;-webkit-filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));-webkit-animation:boia 3.8s ease-in-out infinite;animation:boia 3.8s ease-in-out infinite;}
.prog{height:14px;background:rgba(0,0,0,.28);border-radius:8px;overflow:hidden;margin:8px auto;max-width:320px;}
.prog i{display:block;height:100%;background:-webkit-linear-gradient(left,#ffbf3f,#ff9d3f);background:linear-gradient(90deg,#ffbf3f,#ff9d3f);width:0;}
.contparada{text-align:center;color:#ffd9a8;font-weight:bold;font-size:14px;}
.balao{background:#fff8f0;color:#5a2e1c;border-radius:16px;padding:12px 14px;margin:10px 0;font-size:15px;line-height:1.4;position:relative;}
.balao b{color:#c0561a;}
.somap{display:block;width:40px;height:40px;border-radius:50%;border:0;background:#e07b2a;color:#fff;font-size:18px;margin:6px auto;cursor:pointer;-webkit-box-shadow:0 3px 0 #a8531a;box-shadow:0 3px 0 #a8531a;}
.somap:active{-webkit-transform:translateY(2px);transform:translateY(2px);}
.trilha{list-style:none;margin:6px 0;padding:0;position:relative;}
.no{position:relative;width:66%;padding:6px;text-align:center;-webkit-animation:surge .5s ease both;animation:surge .5s ease both;}
.no.lz{margin:2px 2%;margin-right:auto;}
.no.rz{margin:2px 2%;margin-left:auto;}
@-webkit-keyframes surge{from{opacity:0;-webkit-transform:scale(.7)}to{opacity:1;-webkit-transform:scale(1)}}
@keyframes surge{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.no .ilhawrap{position:relative;display:inline-block;padding:14px 30px;border-radius:20px;}
.no.atual .ilhawrap{background:-webkit-radial-gradient(center,circle,rgba(255,200,120,.4),transparent 70%);background:radial-gradient(circle,rgba(255,200,120,.4),transparent 70%);}
.no img.ilha{height:96px;width:auto;-webkit-filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));cursor:pointer;-webkit-animation:boia 4.2s ease-in-out infinite;animation:boia 4.2s ease-in-out infinite;}
.no.trancada img.ilha{-webkit-filter:grayscale(1) brightness(.7);filter:grayscale(1) brightness(.7);cursor:default;}
.no.atual img.ilha{-webkit-animation:pulsa 1.4s ease-in-out infinite;animation:pulsa 1.4s ease-in-out infinite;}
.no .masccaminha{position:absolute;bottom:0;left:6px;height:56px;width:auto;pointer-events:none;-webkit-animation:anda 1.1s ease-in-out infinite;animation:anda 1.1s ease-in-out infinite;}
@-webkit-keyframes anda{0%,100%{-webkit-transform:translateY(0) rotate(-3deg)}50%{-webkit-transform:translateY(-4px) rotate(3deg)}}
@keyframes anda{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-4px) rotate(3deg)}}
.no .cad{position:absolute;top:8px;right:22px;font-size:26px;}
.no .aqui{display:inline-block;background:#ffbf3f;color:#5a2e1c;font-size:11px;font-weight:bold;border-radius:10px;padding:2px 8px;margin-top:2px;}
.no .check{color:#7dffa8;font-weight:bold;font-size:13px;}
.no .nomeparada{display:block;color:#ffeeda;font-size:13px;font-weight:bold;margin-top:2px;}
.conector{width:60%;height:26px;margin:-4px auto;border-bottom:4px dotted #8a6a52;border-radius:0 0 40px 40px;}
.conector.rl{border-radius:0 0 40px 0;border-right:4px dotted #8a6a52;margin-left:14%;}
.conector.lr{border-radius:0 0 0 40px;border-left:4px dotted #8a6a52;margin-right:14%;}
.conector.feito{border-color:#ffbf3f;}
.enun{font-size:19px;font-weight:bold;text-align:center;line-height:1.35;margin:6px 8px;color:#fff6ec;}
.cena{text-align:center;margin:8px 0;min-height:60px;}
.cena .doce{height:52px;width:auto;margin:3px;vertical-align:middle;-webkit-filter:drop-shadow(0 3px 3px rgba(0,0,0,.35));filter:drop-shadow(0 3px 3px rgba(0,0,0,.35));}
.grupo{display:inline-block;border:2px dashed rgba(255,200,140,.5);border-radius:14px;padding:6px 4px;margin:4px;vertical-align:top;min-width:56px;}
.grupo .doce{height:34px;}
.opcoes{display:-webkit-box;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-box-pack:center;justify-content:center;margin:8px 0;}
.op{min-width:66px;margin:6px;padding:14px 18px;font-size:24px;font-weight:bold;border:0;border-radius:16px;background:#fff8f0;color:#5a2e1c;cursor:pointer;-webkit-box-shadow:0 4px 0 #d8b88f;box-shadow:0 4px 0 #d8b88f;}
.op:active{-webkit-transform:translateY(2px);transform:translateY(2px);}
.op.erro{background:#ffd2c2;-webkit-animation:tremer .3s;animation:tremer .3s;}
@-webkit-keyframes tremer{25%{-webkit-transform:translateX(-6px)}75%{-webkit-transform:translateX(6px)}}
@keyframes tremer{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.dica{text-align:center;font-style:italic;color:#ffd9a8;font-size:14px;margin:6px;text-shadow:0 0 8px rgba(255,190,90,.5);}
.fb{border-radius:14px;padding:12px;margin:10px 0;font-size:15px;line-height:1.4;}
.fb.ok{background:rgba(60,157,90,.25);border:2px solid #3a9d5a;}
.tabuada{text-align:center;margin:8px 0;font-size:15px;color:#ffe;line-height:1.7;}
.tabuada span{display:inline-block;background:rgba(255,255,255,.1);border-radius:8px;padding:3px 8px;margin:2px;}
.tabuada span.on{background:#ffbf3f;color:#5a2e1c;font-weight:bold;}
.carimbo{position:fixed;top:0;left:0;right:0;bottom:0;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;z-index:60;pointer-events:none;}
.carimbo .ci{width:150px;height:150px;border-radius:50%;background:#3a9d5a;color:#fff;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-size:72px;-webkit-animation:pop .5s;animation:pop .5s;}
@-webkit-keyframes pop{0%{-webkit-transform:scale(0)}60%{-webkit-transform:scale(1.15)}100%{-webkit-transform:scale(1)}}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.festa{position:fixed;top:30%;left:0;right:0;text-align:center;font-size:34px;font-weight:bold;color:#ffd9a8;text-shadow:0 3px 0 #7a3a1e;z-index:61;pointer-events:none;-webkit-animation:pop .5s;animation:pop .5s;}
.medgrid{display:-webkit-box;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-box-pack:center;justify-content:center;}
.medgrid .mi{width:70px;text-align:center;margin:6px;position:relative;}
.medgrid .mi img{width:60px;height:60px;-o-object-fit:contain;object-fit:contain;}
.medgrid .mi.no0 img{-webkit-filter:grayscale(1) opacity(.4);filter:grayscale(1) opacity(.4);}
.medgrid .mi .mnum{position:absolute;top:0;right:8px;background:#c0392b;color:#fff;border-radius:10px;font-size:11px;font-weight:bold;padding:1px 6px;}
.reln{width:100%;border-collapse:collapse;font-size:14px;background:#fff8f0;color:#5a2e1c;border-radius:10px;overflow:hidden;}
.reln th,.reln td{padding:7px 8px;border-bottom:1px solid #eaddce;text-align:left;}
.reln th{background:#f3e2cf;}
.confete{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55;}
.voz{position:fixed;right:10px;bottom:12px;z-index:40;}
.voz button{width:44px;height:44px;border-radius:50%;border:0;background:rgba(0,0,0,.4);color:#fff;font-size:19px;cursor:pointer;margin-left:5px;}
.memgrid{display:-webkit-box;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-box-pack:center;justify-content:center;}
.memc{width:74px;height:60px;margin:5px;border-radius:12px;background:#e07b2a;color:#fff;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-size:18px;font-weight:bold;cursor:pointer;-webkit-box-shadow:0 3px 0 #a8531a;box-shadow:0 3px 0 #a8531a;}
.memc.aberta{background:#fff8f0;color:#5a2e1c;}
.memc.par{background:#3a9d5a;-webkit-box-shadow:0 3px 0 #257040;box-shadow:0 3px 0 #257040;}
</style>
</head>
<body>
<div class="confete" id="confete"></div>
<div class="voz"><button id="btMudo" onclick="alternarMudo()">&#128266;</button><button onclick="repetirFala()">&#8635;</button></div>
<div class="wrap" id="app"></div>
<script>

var IMG={
 capa:"@@capa@@",
 mFeliz:"@@chef0@@",mExplica:"@@chef1@@",mComemora:"@@chef2@@",mFala:"@@chef3@@",mPensa:"@@chef4@@",mBandeja:"@@chef5@@",
 dBiscoito:"@@obj0@@",dCupcake:"@@obj1@@",dDonut:"@@obj2@@",dBrigadeiro:"@@obj3@@",dPrato:"@@obj4@@",dBombom:"@@obj5@@",dPirulito:"@@obj6@@",dPao:"@@obj7@@",
 iPrato:"@@ilha0@@",iCaixas:"@@ilha1@@",iBolo:"@@ilhabolo@@",iLivro:"@@ilha4@@",iVitrine:"@@ilha5@@",iBalanca:"@@ilha6@@",iCupcake:"@@ilha7@@",iCoroa:"@@ilha8@@",
 med:["@@med0@@","@@med1@@","@@med2@@","@@med3@@","@@med4@@","@@med5@@","@@med6@@","@@med7@@"],
 emb:["@@emb4@@","@@emb2@@","@@emb3@@","@@emb0@@","@@emb1@@"],
 selo:["@@selo0@@","@@selo1@@","@@selo2@@","@@selo3@@","@@selo4@@","@@selo5@@"],
 trofeu:"@@extra0@@",diploma:"@@extra1@@",cadFecha:"@@extra2@@",cadAbre:"@@extra3@@",
 rec:["@@bolo1@@","@@bolo2@@","@@bolo3@@"]
};

<script src="app.js"></script>
</body>
</html>
