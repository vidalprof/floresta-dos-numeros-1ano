var SOM_LIGADO=true, audioCtx=null;
function getCtx(){ if(audioCtx)return audioCtx; try{var AC=window.AudioContext||window.webkitAudioContext; audioCtx=new AC();}catch(e){audioCtx=null;} return audioCtx; }
function tocar(notas){ if(!SOM_LIGADO)return; var ctx=getCtx(); if(!ctx)return; var t=ctx.currentTime;
  for(var i=0;i<notas.length;i++){ var o=ctx.createOscillator(),g=ctx.createGain(); o.type=notas[i].tipo||'sine'; o.frequency.value=notas[i].f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+notas[i].d);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+notas[i].d); t+=notas[i].d; } }

function falar(texto){ if(!SOM_LIGADO)return; if(!('speechSynthesis' in window))return;
  try{ window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(texto); u.lang='pt-BR'; u.rate=0.9; u.pitch=1.05;
    var vs=window.speechSynthesis.getVoices(); for(var i=0;i<vs.length;i++){ if(/pt/i.test(vs[i].lang)){u.voice=vs[i];break;} }
    window.speechSynthesis.speak(u); }catch(e){} }

/* ===== ENGINE ===== */
function iniciarFase(chave){ somClique(); faseAtual=chave; indiceAtual=0;
  if(FASES[chave] && typeof FASES[chave].gerar==="function"){ FASES[chave].desafios=FASES[chave].gerar(); }
  mostrarDesafio(); }
function mostrarDesafio(){
  respondeu=false;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  var html='<div class="progress">'+(indiceAtual+1)+' / '+total+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<h2>'+iconeFase(faseAtual,28)+' '+fase.titulo+'</h2>';
  if(indiceAtual===0 && !treinoAtivo) html+=titoBalao(faseAtual);
  if(dd.tipo==="regra"){
    html+='<h2 style="color:#0d4f86">'+dd.titulo+'</h2>';
    html+='<div class="hint" style="text-align:left;font-size:16px">'+dd.texto+'</div>';
    html+='<div><button class="btn-falar" onclick="falar(\''+(dd.fala||"").replace(/'/g,"")+'\')">🔊 Ouvir de novo</button></div>';
    html+='<div id="navarea"></div>';
    card.innerHTML=html;
    var nav=document.getElementById("navarea"), ultimo=(indiceAtual===total-1);
    if(ultimo) nav.innerHTML='<button class="nav-btn" onclick="telaFinal()">Entendi! ✓</button>';
    else nav.innerHTML='<button class="nav-btn" onclick="proximo()">Vamos lá! ➜</button>';
    if(dd.fala) falar(dd.fala); /* lê a regra automaticamente */
    return;
  }
  html+='<div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="enunciado-q">'+dd.enunciado+'</div>';
  html+='<div><button class="btn-falar" onclick="falar(\''+(dd.falar||dd.enunciado).replace(/'/g,"").replace(/<[^>]+>/g,"")+'\')">🔊 Ouvir de novo</button></div>';
  /* CENA VISUAL com os objetos */
  html+=montarCenaVisual(dd);
  /* opções de resposta numérica */
  var ops=opcoesNum(dd.resposta,3);
  html+='<div class="options">';
  for(var i=0;i<ops.length;i++) html+='<button class="opt" id="opt'+i+'" onclick="respNum('+ops[i]+','+i+')">'+ops[i]+'</button>';
  html+='</div>';
  html+='<div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
  if(dd.falar) falar(dd.falar); /* lê o enunciado automaticamente */
}
function montarCenaVisual(dd){
  var html='<div class="obj-cena">';
  if(dd.modo==="contar"){
    html+=grupoObjetos(dd.obj, dd.qtd1);
  } else if(dd.modo==="juntar" || dd.modo==="acrescentar"){
    html+='<span class="obj-grupo">'+grupoObjetos(dd.obj,dd.qtd1)+'<span class="sinal">+</span>'+grupoObjetos(dd.obj,dd.qtd2)+'</span>';
  } else if(dd.modo==="separar"){
    html+='<span class="obj-grupo">';
    for(var i=0;i<dd.qtd1;i++){ var saiu=(i<dd.qtdSep); html+='<span class="obj-item'+(saiu?' sai':'')+'">'+objeto(dd.obj)+'</span>'; }
    html+='</span>';
    html+='<div style="font-size:13px;color:#888;margin-top:6px">(os apagados foram separados)</div>';
  } else if(dd.modo==="retirar"){
    html+='<span class="obj-grupo">';
    for(var j=0;j<dd.qtd1;j++){ var tira=(j<dd.qtdTira); html+='<span class="obj-item'+(tira?' sai':'')+'">'+objeto(dd.obj)+'</span>'; }
    html+='</span>';
    html+='<div style="font-size:13px;color:#888;margin-top:6px">(os apagados foram tirados)</div>';
  }
  html+='</div>';
  return html;
}

/* responde número (botões) */
function respNum(val, idx){
  if(respondeu)return; respondeu=true;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], fb=document.getElementById("fb"), btn=document.getElementById("opt"+idx), pts=fase.bonus?20:10;
  if(val===dd.resposta){ registrar(faseAtual,true); addPontos(pts); btn.className="opt correct"; fb.className="feedback ok"; fb.innerHTML="🎉 "+dd.explica; somAcerto(); confete(70); comemorar(); falar("Muito bem! "+limparFala(dd.explica)); }
  else { registrar(faseAtual,false); btn.className="opt wrong"; fb.className="feedback no"; fb.innerHTML="🤔 Quase! A resposta é <b>"+dd.resposta+"</b>. "+dd.explica; somErro(); guardarErro(dd);
    var botoes=document.getElementsByClassName("opt");
    for(var i=0;i<botoes.length;i++){ if(botoes[i].innerHTML==(""+dd.resposta)) botoes[i].className="opt correct"; }
    falar("Quase! A resposta certa é "+dd.resposta+". "+limparFala(dd.explica)); }
  botaoProximo();
}
/* remove tags e símbolos para a fala ficar natural */
function limparFala(txt){ return (""+txt).replace(/<[^>]+>/g,"").replace(/−/g," menos ").replace(/\+/g," mais ").replace(/=/g," é igual a "); }
function botaoProximo(){
  var nav=document.getElementById("navarea"), ultimo=(indiceAtual===FASES[faseAtual].desafios.length-1);
  if(ultimo && treinoAtivo) nav.innerHTML='<button class="nav-btn" onclick="fimTreino()">Terminar treino 🌟</button>';
  else if(ultimo) nav.innerHTML='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  else nav.innerHTML='<button class="nav-btn" onclick="proximo()">Próximo ➜</button>';
}
function guardarErro(dd){ var jaTem=false; for(var z=0;z<ERROS.length;z++){ if(ERROS[z]===dd) jaTem=true; } if(!jaTem&&!treinoAtivo) ERROS.push(dd); }
function proximo(){ indiceAtual++; mostrarDesafio(); }

  faseAtual="_treino"; indiceAtual=0; mostrarDesafio(); }

  var html='<div class="anim-pula">'+mascote(110)+'</div><h1>Treino completo!</h1>';
  html+='<p class="lead">Muito bem, '+(ALUNO||'explorador')+'! Revisar deixa a gente mais esperto.</p>';
  html+='<div class="big-score">★ '+score+'</div><button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  card.innerHTML=html; somFanfarra(); confete(60); ERROS=[]; salvar();
}

/* ===== TELA FINAL ===== */
function telaFinal(){
  var fase=FASES[faseAtual]; concluidas[faseAtual]=true; statFase(faseAtual).feita=true; salvar();
  var s=STATS[faseAtual], total=s.acertos+s.erros, pct=total?Math.round(s.acertos/total*100):0;
  var html='<div class="anim-pula">'+mascote(110)+'</div>';
  html+='<h1>Parada completa!</h1><h2>'+iconeFase(faseAtual,28)+' '+fase.titulo+'</h2>';
  html+='<div class="big-score">★ '+score+'</div>';
  if(total>0) html+='<p class="lead">Você acertou <b>'+s.acertos+'</b> de <b>'+total+'</b>! ('+pct+'%)</p>';
  else html+='<p class="lead">Muito bem! 📖</p>';
  var idxFase=-1; for(var z=0;z<ORDEM.length;z++){ if(ORDEM[z]===faseAtual) idxFase=z; }
  var medal=(typeof MEDALHAS!=="undefined")?MEDALHAS["MED_"+(idxFase+1)]:null;
  if(medal){
    html+='<div class="premio-ganho"><div style="font-size:17px;color:#1c6fb3;font-weight:bold;margin-bottom:6px">🎁 Você ganhou uma medalha!</div>';
    html+='<img src="'+medal+'" alt="Medalha" class="medalha-revela" style="width:150px;height:150px" /></div>';
  }
  var prox=null; for(var i=0;i<ORDEM.length-1;i++){ if(ORDEM[i]===faseAtual){prox=ORDEM[i+1];break;} }
  if(prox) html+='<button class="nav-btn" onclick="iniciarFase(\''+prox+'\')">Próxima parada ➜</button>';
  else html+='<button class="nav-btn" onclick="telaRelatorio()">Ver tudo! '+svgTrofeu(22)+'</button>';
  html+='<br><button class="nav-btn ghost" onclick="telaAdesivos()">🏅 Medalhas</button>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  card.innerHTML=html; somFanfarra(); confete(90); falar("Muito bem! Você ganhou uma medalha!");
}

/* ===== RELATORIO ===== */
function telaRelatorio(){
  var totalAc=0, totalErr=0, fasesFeitas=0;
  for(var k in STATS){ if(STATS[k].feita){ totalAc+=STATS[k].acertos; totalErr+=STATS[k].erros; fasesFeitas++; } }
  var totalTent=totalAc+totalErr, aproveit=totalTent?Math.round(totalAc/totalTent*100):0;
  var medalha=aproveit>=90?'🥇':aproveit>=70?'🥈':'🥉', faixa=aproveit>=90?'Mestre dos Números!':aproveit>=70?'Muito bom!':'Continue praticando!';
  var estrelas=Math.round(score/40);
  var html='<div class="rel-festa"><div class="anim-pula">'+mascote(110)+'</div><div style="font-size:60px">'+medalha+'</div>';
  html+='<h1>Aventura completa!</h1>';
  if(ALUNO) html+='<div style="font-size:20px;font-weight:bold;color:#0d4f86;margin-bottom:6px">Aluno(a): '+ALUNO+'</div>';
  html+='<div class="rel-faixa">'+faixa+'</div><div class="rel-estrelas">';
  var ch=Math.min(estrelas,15); for(var e=0;e<ch;e++)html+='★'; html+='</div>';
  html+='<div class="big-score">'+score+' pontos &middot; '+totalAc+' acertos</div>';
  html+='<p class="lead">Você aprendeu a <b>contar, juntar, acrescentar, separar e retirar</b> com adição e subtração. Parabéns!</p></div>';
  html+='<div class="rel-prof"><div class="rel-prof-tit">📋 Relatório para o professor</div>';
  html+='<div class="rel-resumo">Fases concluídas: <b>'+fasesFeitas+' de '+ORDEM.length+'</b> &middot; Aproveitamento: <b>'+aproveit+'%</b> &middot; Tentativas: <b>'+totalTent+'</b></div>';
  html+='<table class="rel-tab"><tr><th>Atividade</th><th>✔</th><th>✘</th><th>%</th></tr>';
  var revisar=[];
  for(var i=0;i<ORDEM.length;i++){ var key=ORDEM[i], st=STATS[key]; if(!st||!st.feita)continue; var t=st.acertos+st.erros; if(t===0)continue;
    var p=Math.round(st.acertos/t*100), cor=p>=70?'#27ae60':'#e67e22';
    html+='<tr><td>'+FASES[key].titulo+'</td><td>'+st.acertos+'</td><td>'+st.erros+'</td><td style="color:'+cor+';font-weight:bold">'+p+'%</td></tr>';
    if(p<70) revisar.push(FASES[key].titulo); }
  html+='</table>';
  if(revisar.length) html+='<p style="margin-top:10px;font-size:14px;color:#e67e22"><b>Revisar:</b> '+revisar.join(", ")+'.</p>';
  else html+='<p style="margin-top:10px;font-size:14px;color:#27ae60"><b>Ótimo desempenho!</b></p>';
  html+='<p style="font-size:13px;color:#888;margin-top:8px">Dica: use Ctrl+P para imprimir ou salvar em PDF.</p></div>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Recomeçar</button>';
  card.innerHTML=html;
}

/* ===== TELA INICIO ===== */
function telaInicio(){
  var tem=carregar();
  var html='<h1>🔢 Mundo dos Números</h1><h2>Juntar e Tirar!</h2>';
  if(tem && ALUNO){
    var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
    html+='<div class="anim-pula">'+mascote(120)+'</div>';
    html+='<p class="lead">Oi de novo, <b>'+ALUNO+'</b>!<br>Você tem <b>'+score+'</b> estrelas e <b>'+feitas+'</b> medalhas.</p>';
    html+='<button class="nav-btn" onclick="telaMenu()">Continuar ➜</button><br><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Começar do zero</button>';
  } else {
    html+='<div class="anim-pula">'+mascote(130)+'</div><p class="lead">Oi! Eu sou o <b>Tito</b>, o esquilo! 🐿️<br>Vamos aprender a contar, juntar e tirar?<br>Qual é o seu nome?</p>';
    html+='<input class="inp-nome" id="inpNome" type="text" maxlength="20" placeholder="Seu nome" />';
    html+='<br><button class="nav-btn" onclick="comecarComNome()">Começar! 🚀</button>';
  }
  card.innerHTML=html;
  var inp=document.getElementById("inpNome"); if(inp){ inp.onkeydown=function(e){if(e.keyCode===13)comecarComNome();}; inp.focus(); }
  if(!(tem && ALUNO)) setTimeout(function(){ falar("Oi! Eu sou o Tito, o esquilo! Vamos aprender a contar, juntar e tirar? Qual é o seu nome?"); }, 400);
}
function comecarComNome(){ var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim():"")||"Explorador(a)"; somClique(); salvar(); telaMenu(); }
function reiniciarTudo(){ somClique();
  var html='<div style="font-size:60px">🔄</div><h1>Começar do zero?</h1>';
  html+='<p class="lead">Isso apaga o nome, as estrelas e as medalhas.</p>';
  html+='<button class="nav-btn" onclick="confirmarReset()">Sim, apagar tudo</button><br><button class="nav-btn ghost" onclick="telaMenu()">Não, voltar</button>';
  card.innerHTML=html; }
function confirmarReset(){ apagarProgresso(); somClique(); telaInicio(); }

montarCeu();
telaInicio();

</script>
