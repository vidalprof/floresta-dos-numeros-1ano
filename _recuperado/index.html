<!DOCTYPE html>

<head>

<title>Mundo Mágico - Brincar e Aprender!</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", Verdana, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    background: #7b4fc4;

  }
  #ceu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; }

  .topbar, .wrap { position: relative; z-index: 1; }

  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }

  h2 { color: #7b4fc4; font-size: 22px; margin: 8px 0; }

  .comando { font-weight: bold; color: #a020c0; font-size: 22px; margin: 12px 0; line-height: 1.4; }
  .btn-falar-grande { background: -webkit-gradient(linear,left top,left bottom,from(#a06bea),to(#7b4fc4)); background: linear-gradient(to bottom,#a06bea,#7b4fc4); color: #fff; border: none; border-radius: 50%; width: 64px; height: 64px; font-size: 30px; cursor: pointer; box-shadow: 0 5px 0 #5a3a9e; margin: 8px; }
  .btn-falar-grande:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #5a3a9e; }
  /* botões / objetos */
  .area-jogo { margin: 14px 0; min-height: 120px; }
  .grid-itens { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .item-fig { width: 90px; height: 90px; margin: 8px; border-radius: 18px; background: #f7f3ff; border: 3px solid #e6d9fb; padding: 5px; cursor: pointer; vertical-align: middle; display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .item-fig img { max-width: 100%; max-height: 100%; border-radius: 12px; }

  .item-fig.ok { border-color: #38c172; box-shadow: 0 0 16px rgba(56,193,114,0.8); }
  .item-fig.no { border-color: #e3342f; -webkit-animation: treme .4s; animation: treme .4s; }
  @-webkit-keyframes treme { 0%,100%{-webkit-transform:translateX(0);}25%{-webkit-transform:translateX(-7px);}75%{-webkit-transform:translateX(7px);} }
  @keyframes treme { 0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);} }
  /* sombras */
  .sombra-fig img { -webkit-filter: brightness(0) opacity(0.55); filter: brightness(0) opacity(0.55); }
  .drag-ghost { border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.35); background: #fff; padding: 4px; }
  .item-fig[data-drag], .peca-class[data-drag] { cursor: -webkit-grab; cursor: grab; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

  /* feedback */
  .feedback { font-size: 20px; margin: 12px 0; min-height: 28px; font-weight: bold; }
  .feedback.ok { color: #38c172; } .feedback.no { color: #e3342f; }
  .nav-btn { background: -webkit-gradient(linear,left top,left bottom,from(#ffe14d),to(#ffb02e)); background: linear-gradient(to bottom,#ffe14d,#ffb02e); color: #8a5a00; border: none; border-radius: 18px; padding: 16px 34px; font-family: inherit; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #d4882a, 0 8px 16px rgba(255,176,46,0.4); margin: 10px 5px; }
  .nav-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 4px 0 #d4882a; }
  .nav-btn.ghost { background: #f0e6fb; color: #7b4fc4; box-shadow: 0 6px 0 #cdb8ee; }
  .btn-grande { font-size: 26px; padding: 20px 48px; }
  /* animações */
  @-webkit-keyframes pula { 0%{-webkit-transform:scale(1);}30%{-webkit-transform:scale(1.16) rotate(-4deg);}60%{-webkit-transform:scale(0.95);}100%{-webkit-transform:scale(1);} }
  @keyframes pula { 0%{transform:scale(1);}30%{transform:scale(1.16) rotate(-4deg);}60%{transform:scale(0.95);}100%{transform:scale(1);} }
  .anim-pula { -webkit-animation: pula .6s ease; animation: pula .6s ease; }
  .bounce { -webkit-animation: pula 1.5s ease infinite; animation: pula 1.5s ease infinite; }
  #confete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confete-peca { position: absolute; width: 13px; height: 17px; border-radius: 3px; }
  @-webkit-keyframes cair { 0%{-webkit-transform:translateY(-20px) rotate(0);opacity:1;}100%{-webkit-transform:translateY(110vh) rotate(600deg);opacity:0.9;} }
  @keyframes cair { 0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(600deg);opacity:0.9;} }
  /* CARIMBO comemoração */
  #carimbo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .carimbo-wrap { position: relative; text-align: center; }
  .carimbo-anel { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; margin: -60px 0 0 -60px; border-radius: 50%; border: 9px solid #ffe14d; opacity: 0; -webkit-animation: anelexpande .7s ease-out forwards; animation: anelexpande .7s ease-out forwards; }
  .carimbo-anel.a2 { border-color: #ff6ec7; -webkit-animation-delay: .12s; animation-delay: .12s; }
  @-webkit-keyframes anelexpande { 0%{-webkit-transform:scale(0.2);opacity:0.9;}100%{-webkit-transform:scale(2.8);opacity:0;} }
  @keyframes anelexpande { 0%{transform:scale(0.2);opacity:0.9;}100%{transform:scale(2.8);opacity:0;} }
  .carimbo-circulo { width: 170px; height: 170px; border-radius: 50%; background: -webkit-gradient(linear,left top,left bottom,from(#ff9ee0),to(#a06bea)); background: linear-gradient(to bottom,#ff9ee0,#a06bea); box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 -6px 0 rgba(0,0,0,0.12); display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; -webkit-animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; }
  .carimbo-check { font-size: 95px; color: #fff; font-weight: bold; line-height: 1; text-shadow: 0 3px 6px rgba(0,0,0,0.2); }
  @-webkit-keyframes carimbobate { 0%{-webkit-transform:scale(0) rotate(-40deg);opacity:0;}45%{-webkit-transform:scale(1.25) rotate(8deg);opacity:1;}65%{-webkit-transform:scale(0.92);}80%{-webkit-transform:scale(1.05);}88%{opacity:1;}100%{-webkit-transform:scale(1);opacity:0;} }
  @keyframes carimbobate { 0%{transform:scale(0) rotate(-40deg);opacity:0;}45%{transform:scale(1.25) rotate(8deg);opacity:1;}65%{transform:scale(0.92);}80%{transform:scale(1.05);}88%{opacity:1;}100%{transform:scale(1);opacity:0;} }
  .carimbo-palavra { margin-top: 16px; font-size: 32px; font-weight: bold; color: #fff; text-shadow: 0 3px 8px rgba(0,0,0,0.4), 0 0 16px rgba(255,225,77,0.9); -webkit-animation: palavrapop .5s ease .15s both, somesuave .3s ease 1.1s forwards; animation: palavrapop .5s ease .15s both, somesuave .3s ease 1.1s forwards; }
  @-webkit-keyframes palavrapop { 0%{-webkit-transform:scale(0) translateY(20px);opacity:0;}70%{-webkit-transform:scale(1.2);}100%{-webkit-transform:scale(1) translateY(0);opacity:1;} }
  @keyframes palavrapop { 0%{transform:scale(0) translateY(20px);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1) translateY(0);opacity:1;} }
  @-webkit-keyframes somesuave { to{opacity:0;} } @keyframes somesuave { to{opacity:0;} }
  .est-faisca { position: absolute; top: 50%; left: 50%; font-size: 30px; opacity: 0; }
  .ef1{-webkit-animation:ef1 .8s ease-out forwards;animation:ef1 .8s ease-out forwards;} .ef2{-webkit-animation:ef2 .8s ease-out forwards;animation:ef2 .8s ease-out forwards;}
  .ef3{-webkit-animation:ef3 .9s ease-out forwards;animation:ef3 .9s ease-out forwards;} .ef4{-webkit-animation:ef4 .9s ease-out forwards;animation:ef4 .9s ease-out forwards;}
  .ef5{-webkit-animation:ef5 .85s ease-out forwards;animation:ef5 .85s ease-out forwards;} .ef6{-webkit-animation:ef6 .85s ease-out forwards;animation:ef6 .85s ease-out forwards;}
  .ef7{-webkit-animation:ef7 .95s ease-out forwards;animation:ef7 .95s ease-out forwards;} .ef8{-webkit-animation:ef8 .95s ease-out forwards;animation:ef8 .95s ease-out forwards;}
  @-webkit-keyframes ef1{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-150px,-120px) scale(1.3);opacity:0;}} @keyframes ef1{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-150px,-120px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef2{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(150px,-120px) scale(1.3);opacity:0;}} @keyframes ef2{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(150px,-120px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef3{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-180px,30px) scale(1.3);opacity:0;}} @keyframes ef3{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-180px,30px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef4{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(180px,30px) scale(1.3);opacity:0;}} @keyframes ef4{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(180px,30px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef5{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-100px,-160px) scale(1.3);opacity:0;}} @keyframes ef5{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-100px,-160px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef6{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(100px,-160px) scale(1.3);opacity:0;}} @keyframes ef6{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(100px,-160px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef7{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-70px,130px) scale(1.3);opacity:0;}} @keyframes ef7{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-70px,130px) scale(1.3);opacity:0;}}
  @-webkit-keyframes ef8{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(70px,130px) scale(1.3);opacity:0;}} @keyframes ef8{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(70px,130px) scale(1.3);opacity:0;}}
  /* MAPA */
  .mapa { position: relative; padding: 10px 0; }
  .mapa-linha { display: block; }
  .mapa-linha.esq { text-align: left; padding-left: 5%; } .mapa-linha.dir { text-align: right; padding-right: 5%; } .mapa-linha.centro { text-align: center; }
  .mapa-ilha { display: inline-block; width: 168px; border-radius: 22px; padding: 12px 6px; color: #fff; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); position: relative; }
  .mapa-ilha:active { -webkit-transform: translateY(3px); transform: translateY(3px); }
  .mapa-ilha.lock { background: #c5b8dd !important; box-shadow: 0 5px 0 #9d8cc0; cursor: not-allowed; opacity: 0.9; }
  .mapa-ilha.atual { -webkit-animation: pulsa 1.4s ease-in-out infinite; animation: pulsa 1.4s ease-in-out infinite; }
  .mapa-ilha.c0 { background: #ff6ec7; } .mapa-ilha.c1 { background: #ff9f43; } .mapa-ilha.c2 { background: #feca57; }
  .mapa-ilha.c3 { background: #1dd1a1; } .mapa-ilha.c4 { background: #54a0ff; } .mapa-ilha.c5 { background: #a06bea; }
  .mapa-ilha.c6 { background: #ee5253; } .mapa-ilha.c7 { background: #10ac84; }
  @-webkit-keyframes pulsa { 0%,100%{box-shadow:0 5px 0 rgba(0,0,0,0.2);}50%{box-shadow:0 5px 0 rgba(0,0,0,0.2),0 0 0 7px rgba(255,225,77,0.6);} }
  @keyframes pulsa { 0%,100%{box-shadow:0 5px 0 rgba(0,0,0,0.2);}50%{box-shadow:0 5px 0 rgba(0,0,0,0.2),0 0 0 7px rgba(255,225,77,0.6);} }
  .mapa-num { position: absolute; top: -8px; left: -8px; background: #fff; color: #a020c0; width: 30px; height: 30px; line-height: 30px; border-radius: 50%; font-size: 16px; font-weight: bold; box-shadow: 0 2px 0 rgba(0,0,0,0.13); }

  .mascote-mapa { display: inline-block; vertical-align: middle; margin: 0 4px; -webkit-animation: pula 1.2s ease infinite; animation: pula 1.2s ease infinite; }

  .extras { margin-top: 18px; padding-top: 14px; border-top: 3px dashed #e6d9fb; }
  .ext-btn { display: inline-block; margin: 5px; padding: 12px 22px; font-family: inherit; font-size: 16px; font-weight: bold; color: #fff; background: #a06bea; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 4px 0 #7b4fc4; }

  .seq-linha { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; margin: 10px 0; }
  .seq-item { width: 76px; height: 76px; margin: 5px; border-radius: 14px; background: #f7f3ff; border: 3px solid #e6d9fb; padding: 4px; display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .seq-item img { max-width: 100%; max-height: 100%; }
  .seq-item.faltando { background: #fff7e0; border: 3px dashed #ffb02e; font-size: 34px; color: #ffb02e; font-weight: bold; }
  /* caixas de classificar */
  .caixas { display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .caixa { min-width: 130px; min-height: 130px; margin: 8px; border-radius: 20px; padding: 8px; border: 4px solid; display: -webkit-inline-box; display: inline-flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; vertical-align: top; }
  .caixa-titulo { width: 100%; font-size: 17px; font-weight: bold; margin-bottom: 4px; }
  .peca-class { width: 64px; height: 64px; margin: 4px; border-radius: 12px; background: #fff; padding: 4px; cursor: pointer; display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; box-shadow: 0 3px 6px rgba(0,0,0,0.12); }
  .peca-class img { max-width: 100%; max-height: 100%; }
  .peca-class.sel { -webkit-transform: scale(1.12); transform: scale(1.12); box-shadow: 0 0 14px rgba(255,176,46,0.9); }
  .grande-img { width: 96px; height: 96px; } .pequeno-img { width: 50px; height: 50px; }
  /* quebra-cabeça */
  .qc-area { display: -webkit-box; display: flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; flex-direction: column; -webkit-box-align: center; align-items: center; }
  .qc-topo { display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: start; align-items: flex-start; flex-wrap: wrap; }
  .qc-tabuleiro { position: relative; margin: 8px; border: 4px solid #a06bea; border-radius: 14px; background: #f0e6fb; box-shadow: inset 0 2px 10px rgba(123,79,196,0.25); }
  .qc-slot { position: absolute; box-sizing: border-box; border: 2px dashed #cdb8ee; border-radius: 4px; }
  .qc-slot[data-drop] { -webkit-transition: background .15s; transition: background .15s; }
  .qc-peca-fixa { position: absolute; pointer-events: none; }
  .qc-pecas { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; margin: 10px auto; padding: 12px; background: #f3eefb; border-radius: 16px; border: 3px dashed #cdb8ee; max-width: 380px; }
  .qc-peca { margin: 6px; cursor: pointer; border-radius: 8px; -webkit-transition: -webkit-transform .15s; transition: transform .15s; display: -webkit-inline-box; display: inline-flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .qc-peca img { -webkit-filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
  .qc-peca.sel { -webkit-transform: scale(1.12); transform: scale(1.12); }
  .qc-peca.sel img { -webkit-filter: drop-shadow(0 0 10px rgba(255,176,46,1)); filter: drop-shadow(0 0 10px rgba(255,176,46,1)); }
  .qc-guia { width: 130px; margin: 8px; border-radius: 12px; opacity: 0.6; border: 3px solid #cdb8ee; }
  .qc-encaixa { -webkit-animation: encaixa .45s cubic-bezier(.2,1.5,.4,1); animation: encaixa .45s cubic-bezier(.2,1.5,.4,1); }
  @-webkit-keyframes encaixa { 0%{-webkit-transform:scale(1.35);opacity:0.4;}60%{-webkit-transform:scale(0.95);}100%{-webkit-transform:scale(1);opacity:1;} }
  @keyframes encaixa { 0%{transform:scale(1.35);opacity:0.4;}60%{transform:scale(0.95);}100%{transform:scale(1);opacity:1;} }
  .drag-ghost img { -webkit-filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); }
  /* relatório */
  .rel-festa { background: -webkit-gradient(linear,left top,left bottom,from(#fff7e0),to(#ffe9c7)); background: linear-gradient(#fff7e0,#ffe9c7); border-radius: 22px; padding: 18px; margin-bottom: 16px; }
  .rel-estrelas { font-size: 30px; color: #ffe14d; letter-spacing: 3px; }
  .rel-prof { background: #f7f3ff; border-radius: 18px; padding: 16px; text-align: left; }
  .rel-prof-tit { font-size: 20px; font-weight: bold; color: #a020c0; margin-bottom: 8px; }
  .rel-hab { font-size: 16px; color: #4a3168; margin: 6px 0; padding-left: 4px; }
  .rel-hab b { color: #7b4fc4; }
  .inp-nome { font-family: inherit; font-size: 24px; padding: 14px 18px; border: 4px solid #a06bea; border-radius: 18px; text-align: center; width: 80%; max-width: 300px; }
  @media print { body { background: #fff; } .topbar, .extras, .nav-btn, #ceu { display: none; } .card { box-shadow: none; } }
  /* contar - botões de número */
  .num-btn { width: 80px; height: 80px; margin: 8px; border-radius: 18px; font-family: inherit; font-size: 40px; font-weight: bold; color: #fff; border: none; cursor: pointer; background: -webkit-gradient(linear,left top,left bottom,from(#a06bea),to(#7b4fc4)); background: linear-gradient(to bottom,#a06bea,#7b4fc4); box-shadow: 0 5px 0 #5a3a9e; }
  .num-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #5a3a9e; }
  .num-btn.ok { background: -webkit-gradient(linear,left top,left bottom,from(#7bed9f),to(#27ae60)); background: linear-gradient(to bottom,#7bed9f,#27ae60); box-shadow: 0 5px 0 #1e7e46; }
  .num-btn.no { background: #95a5a6; box-shadow: 0 5px 0 #6c7a7b; }
  /* pares lógicos */
  .par-item { width: 84px; height: 84px; margin: 10px; border-radius: 16px; background: #f7f3ff; border: 3px solid #e6d9fb; padding: 5px; cursor: pointer; display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .par-item.sel { border-color: #ffb02e; box-shadow: 0 0 14px rgba(255,176,46,0.8); -webkit-transform: scale(1.08); transform: scale(1.08); }
  .par-item.ok { border-color: #38c172; background: #e0f8ec; }
  .par-item.no { border-color: #e3342f; -webkit-animation: treme .4s; animation: treme .4s; }
  .par-item.par-alvo { border-style: dashed; }
  .par-item img { max-width: 100%; max-height: 100%; }
  /* labirinto em grade */
  .lab-grade { display: inline-block; margin: 8px auto; background: #a06bea; padding: 4px; border-radius: 12px; }
  .lab-linha { display: -webkit-box; display: flex; }
  .lab-cel { width: 52px; height: 52px; margin: 2px; border-radius: 8px; background: #f7f3ff; display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .lab-cel.parede { background: #5a3a9e; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
  .lab-cel img { max-width: 90%; max-height: 90%; }
  .lab-controles { margin: 10px 0; }
  .lab-btn { width: 66px; height: 60px; margin: 4px; border-radius: 14px; font-size: 30px; border: none; cursor: pointer; background: -webkit-gradient(linear,left top,left bottom,from(#ffe14d),to(#ffb02e)); background: linear-gradient(to bottom,#ffe14d,#ffb02e); box-shadow: 0 5px 0 #d4882a; }
  .lab-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #d4882a; }
</style>

/* ===== ARRASTAR (universal: mouse + toque) com TOCAR de reserva ===== */
/* dragInfo guarda o que está sendo arrastado e callbacks da fase atual */
var dragInfo={ativo:false, chave:null, idx:null, ghost:null, onSolta:null};
function tornarArrastavel(el, chave, idx, onSolta){
  if(!el)return;
  el.setAttribute("data-drag","1");
  /* início do arraste (mouse e toque) */
  var inicia=function(ev){
    if(dragInfo.travado)return;
    dragInfo.ativo=true; dragInfo.chave=chave; dragInfo.idx=idx; dragInfo.onSolta=onSolta;
    var ponto=pontoDoEvento(ev);
    criarGhost(el, ponto);
    if(ev.cancelable) ev.preventDefault();
  };
  el.onmousedown=inicia;
  el.ontouchstart=inicia;
}
function pontoDoEvento(ev){
  if(ev.touches && ev.touches.length){ return {x:ev.touches[0].clientX, y:ev.touches[0].clientY}; }
  if(ev.changedTouches && ev.changedTouches.length){ return {x:ev.changedTouches[0].clientX, y:ev.changedTouches[0].clientY}; }
  return {x:ev.clientX, y:ev.clientY};
}
function criarGhost(el, ponto){
  removerGhost();
  var g=el.cloneNode(true); g.className="drag-ghost"; g.style.position="fixed"; g.style.left=(ponto.x-40)+"px"; g.style.top=(ponto.y-40)+"px";
  g.style.width="80px"; g.style.height="80px"; g.style.zIndex="2000"; g.style.pointerEvents="none"; g.style.opacity="0.85";
  document.body.appendChild(g); dragInfo.ghost=g;
}
function moverGhost(ponto){ if(dragInfo.ghost){ dragInfo.ghost.style.left=(ponto.x-40)+"px"; dragInfo.ghost.style.top=(ponto.y-40)+"px"; } }
function removerGhost(){ if(dragInfo.ghost && dragInfo.ghost.parentNode){ dragInfo.ghost.parentNode.removeChild(dragInfo.ghost); } dragInfo.ghost=null; }
/* movimento global */
function aoMover(ev){ if(!dragInfo.ativo)return; var p=pontoDoEvento(ev); moverGhost(p); if(ev.cancelable)ev.preventDefault(); }
/* soltar: descobre em qual alvo soltou */
function aoSoltar(ev){
  if(!dragInfo.ativo)return;
  var p=pontoDoEvento(ev);
  removerGhost();
  var alvo=document.elementFromPoint ? document.elementFromPoint(p.x, p.y) : null;
  /* sobe até achar um elemento com data-drop */
  var drop=null, cur=alvo;
  while(cur){ if(cur.getAttribute && cur.getAttribute("data-drop")){ drop=cur; break; } cur=cur.parentNode; }
  var cb=dragInfo.onSolta, chave=dragInfo.chave, idx=dragInfo.idx;
  dragInfo.ativo=false; dragInfo.chave=null; dragInfo.idx=null; dragInfo.onSolta=null;
  if(drop && cb){ cb(drop.getAttribute("data-drop"), chave, idx); }
}
function instalarDragGlobal(){
  if(window.__dragInstalado)return; window.__dragInstalado=true;
  document.addEventListener("mousemove", aoMover, false);
  document.addEventListener("touchmove", aoMover, {passive:false});
  document.addEventListener("mouseup", aoSoltar, false);
  document.addEventListener("touchend", aoSoltar, false);
}
function marcarSoltavel(el, id){ if(el) el.setAttribute("data-drop", id); }

/* ===== UTIL ===== */
function embaralhar(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function sorteio(lista){ return lista[Math.floor(Math.random()*lista.length)]; }

/* imagem de um objeto (IMG definido no topo) */
function figura(chave, tam, classe){
  tam=tam||80;
  var cls=classe||"";
  if(typeof IMG!=="undefined" && IMG[chave]) return '<img src="'+IMG[chave]+'" alt="'+chave+'" class="'+cls+'" style="max-width:'+tam+'px;max-height:'+tam+'px" />';
  return '<span style="display:inline-block;width:'+tam+'px;height:'+tam+'px;line-height:'+tam+'px;background:#e6d9fb;border-radius:50%;text-align:center;color:#a06bea;font-weight:bold">?</span>';
}
/* silhueta preta REAL (imagem SOMBRA, funciona em qualquer navegador) */
function silhueta(chave, tam){
  tam=tam||80;
  if(typeof SOMBRA!=="undefined" && SOMBRA[chave]) return '<img src="'+SOMBRA[chave]+'" alt="sombra" style="max-width:'+tam+'px;max-height:'+tam+'px" />';

function tocar(notas){ if(!SOM_LIGADO)return; var ctx=getCtx(); if(!ctx)return; var t=ctx.currentTime;
  for(var i=0;i<notas.length;i++){ var o=ctx.createOscillator(),g=ctx.createGain(); o.type=notas[i].tipo||'sine'; o.frequency.value=notas[i].f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+notas[i].d);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+notas[i].d); t+=notas[i].d; } }

/* ===== iniciar fase ===== */
function iniciarFase(chave){ somClique(); faseAtual=chave; respondeu=false;
  if(chave==="sombra") iniciarSombra();
  else if(chave==="contar") iniciarContar();
  else if(chave==="ligar") iniciarLigar();
  else if(chave==="pares") iniciarPares();
  else if(chave==="sequencia") iniciarSequencia();
  else if(chave==="memoria") iniciarMemoria();
  else if(chave==="diferente") iniciarDiferente();
  else if(chave==="tamanho") iniciarTamanho();
  else if(chave==="cor") iniciarCor();
  else if(chave==="forma") iniciarForma();
  else if(chave==="labirinto") iniciarLabirinto();
  else if(chave==="quebra") iniciarQuebra();
}
function cabecalhoFase(){
  var f=FASES[faseAtual];
  var html='<h2>'+iconeFase(faseAtual,28)+' '+f.titulo+'</h2>';

  html+='<div class="comando">'+MASC_COMANDO[faseAtual]+' <button class="btn-som" onclick="falar(\''+MASC_FALA[faseAtual].replace(/'/g,"").replace(/<[^>]+>/g,"").replace(/🐰/g,"")+'\')" style="background:#a06bea;color:#fff">🔊</button></div>';
  return html;
}
function falarComando(){ falar(MASC_FALA[faseAtual].replace(/<[^>]+>/g,"").replace(/🐰/g,"")); }
function fimFase(){
  concluidas[faseAtual]=true; statFase(faseAtual).feita=true; salvar();
  var idxFase=-1; for(var z=0;z<ORDEM.length;z++){ if(ORDEM[z]===faseAtual) idxFase=z; }

  html+='<div class="big-score">★ '+score+'</div>';
  if(medal){ html+='<div class="premio-ganho"><div style="font-size:17px;color:#a020c0;font-weight:bold;margin-bottom:6px">🎁 Você ganhou uma medalha!</div><img src="'+medal+'" alt="Medalha" class="medalha-revela" style="width:140px;height:140px" /></div>'; }
  var prox=null; for(var i=0;i<ORDEM.length-1;i++){ if(ORDEM[i]===faseAtual){prox=ORDEM[i+1];break;} }
  if(prox) html+='<button class="nav-btn btn-grande" onclick="iniciarFase(\''+prox+'\')">Continuar ➜</button>';
  else html+='<button class="nav-btn btn-grande" onclick="telaRelatorio()">Ver tudo! '+svgTrofeu(22)+'</button>';

  card.innerHTML=html; somFanfarra(); confete(100); falar("Muito bem! Você ganhou uma medalha!");

/* ===== FASE 1: SOMBRAS (arrastar objeto -> sombra; toque de reserva) ===== */
var sombraAlvos=[], sombraSel=null, sombraFeitos=0, sombraObjs=[];
function iniciarSombra(){
  instalarDragGlobal();
  sombraObjs=embaralhar(CHAVES.slice()).slice(0,6);
  sombraAlvos=embaralhar(sombraObjs.slice()); sombraSel=null; sombraFeitos=0;
  desenharSombra();
  falarComando();
}
function desenharSombra(){
  var html=cabecalhoFase();
  html+='<div class="area-jogo"><div style="font-weight:bold;color:#7b4fc4;margin-bottom:4px">Arraste cada objeto para a sombra dele:</div>';
  html+='<div class="grid-itens" id="objsLinha">';
  for(var i=0;i<sombraObjs.length;i++){ var ch=sombraObjs[i]; var feito=(document.getElementById && false);
    html+='<div class="item-fig" id="obj_'+ch+'" onclick="sombraPicaObj(\''+ch+'\')">'+figura(ch,70)+'</div>'; }
  html+='</div>';
  html+='<div style="font-weight:bold;color:#7b4fc4;margin:10px 0 4px">Sombras:</div><div class="grid-itens" id="sombrasLinha">';
  for(var j=0;j<sombraAlvos.length;j++){ var sc=sombraAlvos[j];
    html+='<div class="alvo-sombra" id="somb_'+sc+'" onclick="sombraPicaAlvo(\''+sc+'\')">'+silhueta(sc,80)+'</div>'; }
  html+='</div></div>';

/* arrastar soltou o objeto 'chave' na sombra 'destino' */
function sombraSolta(destino, chave){
  if(chave===destino){ sombraAcertou(chave); }
  else { sombraErrou(destino); }
}
/* TOQUE de reserva: toca no objeto, depois na sombra */
function sombraPicaObj(ch){ var el=document.getElementById("obj_"+ch); if(el && el.className.indexOf("ok")>=0)return; somClique();
  sombraSel=ch;
  var todos=document.getElementsByClassName("item-fig");
  for(var i=0;i<todos.length;i++){ if(todos[i].className.indexOf("ok")<0) todos[i].className="item-fig"; }
  if(el) el.className="item-fig sel";
  falar(OBJETOS[ch].nome);
}
function sombraPicaAlvo(ch){
  if(!sombraSel){ falar("Toque ou arraste um objeto primeiro!"); return; }
  if(ch===sombraSel){ sombraAcertou(ch); } else { sombraErrou(ch); }
}
function sombraAcertou(ch){
  var alvo=document.getElementById("somb_"+ch); if(alvo && alvo.className.indexOf("ok")>=0)return;
  registrar("sombra",true); addEstrela(10); somAcerto(); confete(40);
  var objEl=document.getElementById("obj_"+ch); if(objEl) objEl.className="item-fig ok";
  if(alvo){ alvo.className="alvo-sombra ok"; alvo.innerHTML=figura(ch,80); } /* revela o objeto colorido na sombra */
  sombraSel=null; sombraFeitos++;
  var fb=document.getElementById("fb"); if(fb){ fb.className="feedback ok"; fb.innerHTML="🎉 Isso! É a "+OBJETOS[ch].nome+"!"; }
  if(sombraFeitos>=sombraObjs.length){ setTimeout(fimFase, 900); }
}
function sombraErrou(ch){
  registrar("sombra",false); somErro();
  var alvo=document.getElementById("somb_"+ch); if(alvo && alvo.className.indexOf("ok")<0) alvo.className="alvo-sombra no";
  var fb=document.getElementById("fb"); if(fb){ fb.className="feedback no"; fb.innerHTML="🤔 Essa não é. Tente de novo!"; }
  setTimeout(function(){ var a=document.getElementById("somb_"+ch); if(a&&a.className.indexOf("ok")<0)a.className="alvo-sombra"; }, 500);
}

/* ===== FASE 2: LIGAR IGUAIS ===== */
/* mostra pares de objetos iguais embaralhados; criança toca em dois iguais */
var ligarSel=null, ligarFeitos=0, ligarTotal=0;
function iniciarLigar(){
  var base=embaralhar(CHAVES.slice()).slice(0,5);
  var cartas=[]; for(var i=0;i<base.length;i++){ cartas.push(base[i]); cartas.push(base[i]); }

function ligarPica(i){
  var el=document.getElementById("lig_"+i); if(el.className.indexOf("ok")>=0)return; somClique();

  if(ligarSel===null){ ligarSel=i; el.className="item-fig sel"; falar(OBJETOS[ch].nome); return; }

  var elA=document.getElementById("lig_"+ligarSel), chA=elA.getAttribute("data-ch");
  if(chA===ch){ /* par igual */
    registrar("ligar",true); addEstrela(10); somAcerto(); confete(40);

    var fb=document.getElementById("fb"); fb.className="feedback ok"; fb.innerHTML="🎉 Iguais! Duas "+OBJETOS[ch].nome+"!";
    if(ligarFeitos===ligarTotal){ setTimeout(fimFase, 900); }
  } else { registrar("ligar",false); somErro(); el.className="item-fig no";
    var fb2=document.getElementById("fb"); fb2.className="feedback no"; fb2.innerHTML="🤔 Não são iguais. Tente!";

    setTimeout(function(){ var a=document.getElementById("lig_"+idsel), b=document.getElementById("lig_"+i);
      if(a&&a.className.indexOf("ok")<0)a.className="item-fig"; if(b&&b.className.indexOf("ok")<0)b.className="item-fig"; }, 600);
  }
}

/* ===== FASE 3: SEQUÊNCIA ===== */
/* padrão ABAB ou ABCABC, falta o último - criança escolhe */
var seqResposta=null, seqRodada=0, seqTotal=6;
function iniciarSequencia(){ instalarDragGlobal(); seqRodada=0; novaSequencia(); falarComando(); }
function novaSequencia(){
  var base=embaralhar(CHAVES.slice()).slice(0,3);
  var tipo=Math.random()<0.5;
  var seq, faltando;
  if(tipo){ /* ABAB? -> A */
    seq=[base[0],base[1],base[0],base[1],base[0]]; faltando=base[1];
  } else { /* ABCABC? -> C... mostra ABCAB e falta C */
    seq=[base[0],base[1],base[2],base[0],base[1]]; faltando=base[2];
  }
  seqResposta=faltando;
  /* opções: a certa + 2 erradas */
  var ops=[faltando]; var resto=embaralhar(CHAVES.slice());
  for(var i=0;i<resto.length && ops.length<3;i++){ if(ops.indexOf(resto[i])===-1) ops.push(resto[i]); }
  ops=embaralhar(ops);
  desenharSequencia(seq, ops);
}
function desenharSequencia(seq, ops){
  respondeu=false;
  var html=cabecalhoFase();
  html+='<div class="area-jogo"><div class="seq-linha">';
  for(var i=0;i<seq.length;i++){ html+='<div class="seq-item">'+figura(seq[i],62)+'</div>'; }
  html+='<div class="seq-item faltando" id="seqGap">?</div>';
  html+='</div>';
  html+='<div style="font-weight:bold;color:#7b4fc4;margin:8px 0 4px">Arraste (ou toque) o que vem agora:</div><div class="grid-itens" id="seqOps">';
  for(var j=0;j<ops.length;j++){ html+='<div class="item-fig" id="seqop_'+j+'" data-ch="'+ops[j]+'" onclick="seqPica(\''+ops[j]+'\',this)">'+figura(ops[j],70)+'</div>'; }
  html+='</div></div><div class="feedback" id="fb"></div>';
  card.innerHTML=html;
  /* o "?" é o alvo de soltar; as opções são arrastáveis */
  marcarSoltavel(document.getElementById("seqGap"), "gap");
  for(var k=0;k<ops.length;k++){ var el=document.getElementById("seqop_"+k);
    if(el) tornarArrastavel(el, ops[k], k, seqArrastaSolta); }
}
function seqArrastaSolta(destino, chave, idx){
  if(destino!=="gap")return;
  var el=document.getElementById("seqop_"+idx);
  seqResolve(chave, el);
}
function seqPica(ch, el){ seqResolve(ch, el); }
function seqResolve(ch, el){
  if(respondeu)return;
  somClique();
  if(ch===seqResposta){ respondeu=true; registrar("sequencia",true); addEstrela(10); if(el)el.className="item-fig ok";
    /* preenche o "?" com a figura certa */
    var gap=document.getElementById("seqGap"); if(gap){ gap.className="seq-item"; gap.innerHTML=figura(ch,62); }
    somAcerto(); confete(50); comemorar();
    var fb=document.getElementById("fb"); if(fb){fb.className="feedback ok"; fb.innerHTML="🎉 Isso mesmo!";}
    seqRodada++;
    if(seqRodada>=seqTotal){ setTimeout(fimFase, 1000); }
    else setTimeout(function(){ respondeu=false; novaSequencia(); }, 1200);
  } else { registrar("sequencia",false); if(el)el.className="item-fig no"; somErro();
    var fb2=document.getElementById("fb"); if(fb2){fb2.className="feedback no"; fb2.innerHTML="🤔 Olhe o padrão de novo!";}
    setTimeout(function(){ if(el && el.className.indexOf("ok")<0)el.className="item-fig"; }, 500);
  }
}

/* ===== FASE 4: MEMÓRIA ===== */
var memCartas=[], memViradas=[], memAchados=0, memBloqueado=false;
function iniciarMemoria(){
  var base=embaralhar(CHAVES.slice()).slice(0,8);
  memCartas=[]; for(var i=0;i<base.length;i++){ memCartas.push({ch:base[i],v:false,a:false}); memCartas.push({ch:base[i],v:false,a:false}); }
  memCartas=embaralhar(memCartas); memViradas=[]; memAchados=0; memBloqueado=false;
  desenharMemoria(); falarComando();
}
function desenharMemoria(){
  var html=cabecalhoFase();
  html+='<div class="area-jogo"><div class="mem-grid">';
  for(var i=0;i<memCartas.length;i++){ var c=memCartas[i];
    if(c.a){ html+='<div class="mem-carta achada">'+figura(c.ch,70)+'</div>'; }
    else if(c.v){ html+='<div class="mem-carta virada">'+figura(c.ch,70)+'</div>'; }
    else { html+='<button class="mem-carta tampada" onclick="memVira('+i+')">★</button>'; }
  }
  html+='</div></div><div class="feedback" id="fb"></div>';
  card.innerHTML=html;
}
function memVira(i){
  if(memBloqueado)return; var c=memCartas[i]; if(c.v||c.a)return; somClique();
  c.v=true; memViradas.push(i); desenharMemoria();
  if(memViradas.length===2){ memBloqueado=true;
    var a=memCartas[memViradas[0]], b=memCartas[memViradas[1]];
    if(a.ch===b.ch){ setTimeout(function(){ a.a=true;b.a=true;a.v=false;b.v=false; memViradas=[]; memBloqueado=false; memAchados++;
      addEstrela(10); somAcerto(); confete(40); desenharMemoria();
      var fb=document.getElementById("fb"); if(fb){fb.className="feedback ok"; fb.innerHTML="🎉 Achou um par!";}
      if(memAchados===memCartas.length/2){ setTimeout(fimFase, 800); } }, 650); }
    else { setTimeout(function(){ a.v=false;b.v=false; memViradas=[]; memBloqueado=false; somErro(); desenharMemoria(); }, 950); }
  }
}

/* ===== FASE 5: TAMANHO (grande / pequeno) ===== */
var tamPecas=[], tamSel=null, tamFeitos=0, tamTotal=0;

}
function tamPica(i, ev){ if(ev)ev.stopPropagation(); var p=tamPecas[i]; if(p.feito)return; somClique();
  tamSel=i;

function tamSolta(naCaixaGrande){
  if(tamSel===null){ falar("Toque primeiro num objeto!"); return; }
  var p=tamPecas[tamSel];
  if(p.grande===naCaixaGrande){ registrar("tamanho",true); addEstrela(10); somAcerto(); confete(40);
    p.feito=true; tamFeitos++;
    var box=document.getElementById(naCaixaGrande?"boxGrande":"boxPequeno");

    if(tamFeitos===tamTotal){ setTimeout(fimFase, 900); }
  } else { registrar("tamanho",false); somErro();
    var fb2=document.getElementById("fb"); if(fb2){fb2.className="feedback no"; fb2.innerHTML="🤔 Essa não é a caixa certa!"; } }
}
function desenharTamanhoPool(){
  var pool=document.getElementById("tamPool"); if(!pool)return;

  for(var i=0;i<tamPecas.length;i++){ var p=tamPecas[i]; if(p.feito)continue;

  pool.innerHTML=html;

/* ===== FASE 6: COR ===== */
var corPecas=[], corSel=null, corFeitos=0, corTotal=0, corCaixas=[];

  var porCor={};

  for(var i=0;i<coresDisp.length;i++){ var objs=embaralhar(porCor[coresDisp[i]].slice());

  corPecas=embaralhar(corPecas); corSel=null; corFeitos=0; corTotal=corPecas.length;

}
var CORHEX={vermelho:"#ee5253",amarelo:"#feca57",azul:"#54a0ff",verde:"#1dd1a1",roxo:"#a06bea",laranja:"#ff9f43",rosa:"#ff6ec7",marrom:"#b06b3a"};

function corArrastaSolta(destino, chave, idx){ corSel=idx; corSolta(destino); }

    {esq:"fish", dir:"frog", nomeE:"peixe", nomeD:"sapo"},   /* vivem na água */
    {esq:"sun", dir:"flower", nomeE:"sol", nomeD:"flor"},     /* sol faz a flor crescer */

  ];
  /* na prática: combinar objeto com sua "categoria" via mesma cor ou tema.
     Simplificação para pré-escola: combinar objeto colorido com sua silhueta (já existe) é repetido.
     Melhor: combinar objeto com OUTRO objeto da MESMA COR. */
  var porCor={};
  for(var k=0;k<CHAVES.length;k++){ var c=OBJETOS[CHAVES[k]].cor; if(!porCor[c])porCor[c]=[]; porCor[c].push(CHAVES[k]); }

  duplas=embaralhar(duplas).slice(0,3);

    var porForma={};

  }
  paresMap={}; var esquerda=[], direita=[];
  for(var d=0;d<duplas.length;d++){ esquerda.push(duplas[d][0]); direita.push(duplas[d][1]); paresMap[duplas[d][0]]=duplas[d][1]; }

/* ===== FASE: LABIRINTO (grade real, setas do teclado + botões) ===== */
/* labirintos simples pré-definidos. 0=caminho, 1=parede, S=início, E=saída */
var LABIRINTOS=[
  ["S0000", "11110", "00000", "01111", "0000E"],
  ["S0111", "00010", "11010", "00010", "0100E"],
  ["S0001", "01001", "00001", "01101", "0000E"],
  ["S0000", "01110", "00010", "01010", "0001E"]
];
var labGrade=[], labLin=0, labCol=0, labFimL=0, labFimC=0, labConcluido=false, labObj="apple";
function iniciarLabirinto(){
  labConcluido=false;
  var lab=sorteio(LABIRINTOS);
  labGrade=[]; 
  for(var r=0;r<lab.length;r++){ var linha=lab[r].split(""); labGrade.push(linha);
    for(var c=0;c<linha.length;c++){ if(linha[c]==="S"){ labLin=r; labCol=c; } if(linha[c]==="E"){ labFimL=r; labFimC=c; } } }
  labObj=sorteio(CHAVES);
  desenharLabirinto();
  falarComando();
  instalarTecladoLab();
}
function instalarTecladoLab(){
  if(window.__labTeclado)return; window.__labTeclado=true;
  document.addEventListener("keydown", function(ev){
    if(faseAtual!=="labirinto" || labConcluido)return;
    var k=ev.keyCode;
    if(k===37){ moverLab(0,-1); ev.preventDefault(); }       /* esquerda */
    else if(k===38){ moverLab(-1,0); ev.preventDefault(); }  /* cima */
    else if(k===39){ moverLab(0,1); ev.preventDefault(); }   /* direita */
    else if(k===40){ moverLab(1,0); ev.preventDefault(); }   /* baixo */
  }, false);
}
function desenharLabirinto(){
  var html=cabecalhoFase();
  html+='<div class="area-jogo"><div style="font-weight:bold;color:#7b4fc4;margin-bottom:6px">Leve a Lila até a '+OBJETOS[labObj].nome+'! Use as setas.</div>';
  html+='<div class="lab-grade">';
  for(var r=0;r<labGrade.length;r++){ html+='<div class="lab-linha">';
    for(var c=0;c<labGrade[r].length;c++){ var cel=labGrade[r][c];
      var parede=(cel==="1");
      var conteudo="";
      if(r===labLin && c===labCol) conteudo=mascote(40);
      else if(r===labFimL && c===labFimC) conteudo=figura(labObj,40);
      html+='<div class="lab-cel'+(parede?" parede":"")+'">'+conteudo+'</div>';
    }
    html+='</div>';
  }
  html+='</div>';
  /* botões de seta para tablet/toque */
  html+='<div class="lab-controles">';
  html+='<div><button class="lab-btn" onclick="moverLab(-1,0)">⬆️</button></div>';
  html+='<div><button class="lab-btn" onclick="moverLab(0,-1)">⬅️</button>';
  html+='<button class="lab-btn" onclick="moverLab(1,0)">⬇️</button>';
  html+='<button class="lab-btn" onclick="moverLab(0,1)">➡️</button></div>';
  html+='</div>';
  html+='</div><div class="feedback" id="fb"></div>';
  card.innerHTML=html;
}
function moverLab(dl, dc){
  if(labConcluido)return;
  var nl=labLin+dl, nc=labCol+dc;
  /* checa limites e parede */
  if(nl<0||nl>=labGrade.length||nc<0||nc>=labGrade[0].length){ somErro(); return; }
  if(labGrade[nl][nc]==="1"){ somErro();
    var fb=document.getElementById("fb"); if(fb){fb.className="feedback no"; fb.innerHTML="🧱 Tem uma parede! Tente outro caminho.";}
    return;
  }
  somClique(); labLin=nl; labCol=nc;
  /* chegou na saída? */
  if(labLin===labFimL && labCol===labFimC){
    labConcluido=true; registrar("labirinto",true); addEstrela(10);
    desenharLabirinto();
    somAcerto(); confete(80); comemorar();
    var fb2=document.getElementById("fb"); if(fb2){fb2.className="feedback ok"; fb2.innerHTML="🎉 Você chegou! Muito bem!";}
    falar("Você conseguiu! A Lila chegou!");
    setTimeout(fimFase, 1300);
  } else {
    desenharLabirinto();
  }
}

  html+='<div class="qc-tabuleiro" id="qcTab" style="width:'+TAM+'px;height:'+TAM+'px">';
  for(var i=0;i<qcSlots.length;i++){ var s=qcSlots[i];
    html+='<div class="qc-slot" id="slot_'+i+'" data-drop="slot'+i+'" onclick="qcSolta('+i+')" style="left:'+(s.c*piece)+'px;top:'+(s.r*piece)+'px;width:'+piece+'px;height:'+piece+'px"></div>';
  }
  for(var j=0;j<qcSlots.length;j++){ var sj=qcSlots[j];
    if(sj.feito){ html+='<img src="'+QC_PECAS[sj.r+"_"+sj.c]+'" class="qc-peca-fixa qc-encaixa" style="left:'+(sj.c*piece-tab)+'px;top:'+(sj.r*piece-tab)+'px;width:'+canvas+'px;height:'+canvas+'px" alt="peça" />'; }
  }
  html+='</div></div>'; /* fim qc-topo */
  /* peças soltas embaralhadas EMBAIXO */
  html+='<div style="font-weight:bold;color:#7b4fc4;margin:8px 0 4px">Arraste (ou toque) cada peça para o lugar:</div><div class="qc-pecas" id="qcPecas">';
  var pecas=[]; for(var r2=0;r2<qcN;r2++) for(var c2=0;c2<qcN;c2++){ var idx=r2*qcN+c2; if(!qcSlots[idx].feito) pecas.push({r:r2,c:c2,idx:idx}); }
  pecas=embaralhar(pecas);
  for(var p=0;p<pecas.length;p++){ var pc=pecas[p];
    html+='<span class="qc-peca" id="peca_'+pc.idx+'" onclick="qcPica('+pc.idx+')"><img src="'+QC_PECAS[pc.r+"_"+pc.c]+'" style="width:'+Math.round(canvas*0.62)+'px;height:'+Math.round(canvas*0.62)+'px" alt="peça" /></span>'; }
  html+='</div></div><div class="feedback" id="fb"></div>';
  card.innerHTML=html;
  /* instala arraste nas peças e drop nos slots */
  for(var k=0;k<pecas.length;k++){ var el=document.getElementById("peca_"+pecas[k].idx);
    if(el) tornarArrastavel(el, null, pecas[k].idx, qcArrastaSolta); }
  for(var m=0;m<qcSlots.length;m++){ marcarSoltavel(document.getElementById("slot_"+m), "slot"+m); }
}
/* arrastar: soltou a peça 'idx' sobre 'destino' (slotN) */
function qcArrastaSolta(destino, chave, idx){
  if(!destino || destino.indexOf("slot")!==0)return;
  var slotIdx=parseInt(destino.substring(4),10);
  qcSel=idx; qcSolta(slotIdx);
}
/* toque de reserva: toca na peça, depois no slot */
function qcPica(idx){ var el=document.getElementById("peca_"+idx); if(!el)return; somClique();
  qcSel=idx;
  var todas=document.getElementsByClassName("qc-peca");
  for(var i=0;i<todas.length;i++) todas[i].className="qc-peca";
  el.className="qc-peca sel";
}
function qcSolta(slotIdx){
  if(qcSel===null){ falar("Toque ou arraste uma peça primeiro!"); return; }
  var s=qcSlots[slotIdx];
  if(s.feito) return;
  if(qcSel===slotIdx){ /* peça certa no lugar certo */
    registrar("quebra",true); addEstrela(10); somAcerto(); confete(40); s.feito=true; qcFeitos++; qcSel=null;
    desenharQuebra();
    var fb=document.getElementById("fb"); if(fb){fb.className="feedback ok"; fb.innerHTML="🎉 Encaixou!";}
    if(qcFeitos===qcSlots.length){ setTimeout(fimFase, 1000); }
  } else { registrar("quebra",false); somErro();
    var fb2=document.getElementById("fb"); if(fb2){fb2.className="feedback no"; fb2.innerHTML="🤔 Essa peça é de outro lugar! Olhe o modelo."; }
  }
}

/* ===== RELATORIO ===== */
function telaRelatorio(){
  var totalAc=0, totalErr=0, fasesFeitas=0;
  for(var k in STATS){ if(STATS[k].feita){ totalAc+=STATS[k].acertos; totalErr+=STATS[k].erros; fasesFeitas++; } }
  var estrelas=Math.min(Math.round(score/30),15);
  var html='<div class="rel-festa"><div class="anim-pula">'+mascote(120)+'</div><div style="font-size:60px">🌈</div>';
  html+='<h1>Você conseguiu!</h1>';
  if(ALUNO) html+='<div style="font-size:22px;font-weight:bold;color:#a020c0;margin-bottom:6px">'+ALUNO+'</div>';
  html+='<div class="rel-estrelas">';
  for(var e=0;e<estrelas;e++)html+='★'; html+='</div>';
  html+='<div class="big-score">'+score+' estrelas!</div>';
  html+='<p class="lead">Você terminou todas as brincadeiras do Mundo Mágico! 🎉</p></div>';
  /* relatório de habilidades para o professor */
  html+='<div class="rel-prof"><div class="rel-prof-tit">📋 Habilidades observadas</div>';
  var habs=[
    {f:"sombra", h:"Associação objeto–sombra (percepção visual)"},
    {f:"contar", h:"Contagem e reconhecimento de números"},
    {f:"ligar", h:"Reconhecer objetos iguais (associação)"},
    {f:"pares", h:"Pareamento lógico (o que combina)"},
    {f:"sequencia", h:"Sequência lógica e padrões"},
    {f:"memoria", h:"Memória e atenção"},
    {f:"sons", h:"Discriminação auditiva (associar som)"},
    {f:"tamanho", h:"Classificar por tamanho (grande/pequeno)"},
    {f:"cor", h:"Classificar por cor"},
    {f:"forma", h:"Classificar por forma"},
    {f:"labirinto", h:"Orientação espacial e direções"},
    {f:"quebra", h:"Coordenação motora e noção espacial (quebra-cabeça)"}
  ];
  for(var i=0;i<habs.length;i++){ var st=STATS[habs[i].f];
    var feito=(st&&st.feita); var marca=feito?'✅':'⬜';
    var tax=""; if(st&&st.feita){ var t=st.acertos+st.erros; var p=t?Math.round(st.acertos/t*100):0; tax=" ("+p+"%)"; }
    html+='<div class="rel-hab">'+marca+' <b>'+FASES[habs[i].f].titulo+':</b> '+habs[i].h+tax+'</div>';
  }
  html+='<p style="font-size:13px;color:#888;margin-top:10px">Atividades feitas: <b>'+fasesFeitas+' de '+ORDEM.length+'</b>. Dica: Ctrl+P para imprimir.</p></div>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Recomeçar</button>';
  card.innerHTML=html; somFanfarra(); confete(100);
}

/* ===== TELA INICIO ===== */
function telaInicio(){
  var tem=carregar();
  var html='<h1>🌈 Mundo Mágico</h1>';
  if(tem && ALUNO){
    var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
    html+='<div class="bounce">'+mascote(140)+'</div>';
    html+='<p class="lead">Oi de novo, <b>'+ALUNO+'</b>!<br>Você tem <b>'+score+'</b> estrelas! ⭐</p>';
    html+='<button class="nav-btn btn-grande" onclick="telaMenu()">Continuar ➜</button><br><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Começar do zero</button>';
  } else {
    html+='<div class="bounce">'+mascote(150)+'</div>';
    html+='<p class="lead">Oi! Eu sou a <b>Lila</b>, a coelhinha! 🐰<br>Vamos brincar e aprender juntos?</p>';
    html+='<input class="inp-nome" id="inpNome" type="text" maxlength="20" placeholder="Seu nome" />';
    html+='<br><button class="nav-btn btn-grande" onclick="comecarComNome()">▶ Começar!</button>';
  }
  card.innerHTML=html;
  var inp=document.getElementById("inpNome"); if(inp){ inp.onkeydown=function(e){if(e.keyCode===13)comecarComNome();}; inp.focus(); }
  if(!(tem && ALUNO)) setTimeout(function(){ falar("Oi! Eu sou a Lila, a coelhinha! Vamos brincar e aprender juntos? Diga o seu nome!"); }, 400);
}
function comecarComNome(){ var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim():"")||"Amiguinho"; somClique(); salvar(); telaMenu();
  setTimeout(function(){ falar("Escolha uma brincadeira no mapa!"); }, 300); }
function reiniciarTudo(){ somClique();
  var html='<div style="font-size:60px">🔄</div><h1>Começar do zero?</h1>';
  html+='<p class="lead">Isso apaga as estrelas e medalhas.</p>';
  html+='<button class="nav-btn" onclick="confirmarReset()">Sim</button> <button class="nav-btn ghost" onclick="telaMenu()">Não</button>';
  card.innerHTML=html; }
function confirmarReset(){ apagarProgresso(); somClique(); telaInicio(); }

montarCeu();
telaInicio();

</script>
