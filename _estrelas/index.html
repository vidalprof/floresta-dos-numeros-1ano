<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>A Fábrica de Estrelas — 3º ano</title>
<meta name="theme-color" content="#12163a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fábrica de Estrelas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ===== A Fábrica de Estrelas (fatia de teste, motion comic + PWA) =====
   Compat: sem grid/gap/var(--)/clamp; anima só transform/opacity; pares -webkit-. */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;height:100vh;height:100dvh;width:100%;overflow:hidden;position:fixed;top:0;left:0;
  background:#241a52;background:-webkit-linear-gradient(top,#181a44,#3a2b63);background:linear-gradient(to bottom,#181a44,#3a2b63);
  font-family:'Segoe UI',system-ui,Arial,sans-serif;color:#fff}
#app{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
.tela{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;opacity:1}
img{-webkit-user-drag:none;user-drag:none}

/* céu de fundo (parallax) */
.ceu{position:absolute;top:-5%;left:-5%;width:110%;height:110%;
  background:#12163a center/cover no-repeat;background-image:url('img/ceu_noite.jpg');
  -webkit-animation:derivaCeu 70s ease-in-out infinite alternate;animation:derivaCeu 70s ease-in-out infinite alternate}
@-webkit-keyframes derivaCeu{from{-webkit-transform:translate3d(0,0,0) scale(1.03)}to{-webkit-transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}
@keyframes derivaCeu{from{transform:translate3d(0,0,0) scale(1.03)}to{transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}

/* estrelinhas piscando */
.estrelas{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.pt{position:absolute;border-radius:50%;background:#fff;opacity:.25;box-shadow:0 0 6px 1px rgba(255,255,255,.8);
  -webkit-animation:cintila 4s ease-in-out infinite;animation:cintila 4s ease-in-out infinite}
@-webkit-keyframes cintila{0%,100%{opacity:.12;-webkit-transform:scale(.6)}50%{opacity:.95;-webkit-transform:scale(1.15)}}
@keyframes cintila{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:.95;transform:scale(1.15)}}

/* ---- FÁBRICA VIVA (glow + fumaças de estrela) ---- */
.fabviva{position:absolute}
.fabviva .fab{width:100%;height:auto;display:block;position:relative;z-index:1;
  -webkit-filter:drop-shadow(0 6px 16px rgba(0,0,0,.35));filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}
.fabviva .glow{position:absolute;left:-16%;top:-16%;width:132%;height:132%;border-radius:50%;z-index:0;
  background:radial-gradient(circle, rgba(255,205,110,.42), rgba(255,205,110,0) 62%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes pulsaGlow{0%,100%{opacity:.45;-webkit-transform:scale(1)}50%{opacity:.85;-webkit-transform:scale(1.07)}}
@keyframes pulsaGlow{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
.puff{position:absolute;width:15%;height:13%;border-radius:50%;z-index:2;opacity:0;
  background:radial-gradient(circle, rgba(255,244,205,.95), rgba(255,224,150,0) 70%);
  -webkit-animation:sobePuff 3s ease-out infinite;animation:sobePuff 3s ease-out infinite}
@-webkit-keyframes sobePuff{0%{opacity:0;-webkit-transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;-webkit-transform:translateY(-115%) scale(1.5)}}
@keyframes sobePuff{0%{opacity:0;transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;transform:translateY(-115%) scale(1.5)}}

/* ---- FAGULHA VIVA (balança + flutua + respira + reaçõezinhas) ---- */
.fag{position:absolute;width:26vh;max-width:200px}
.fagbob{-webkit-animation:bobSway 4.7s ease-in-out infinite;animation:bobSway 4.7s ease-in-out infinite}
@-webkit-keyframes bobSway{0%,100%{-webkit-transform:translateY(0) rotate(-1.6deg)}50%{-webkit-transform:translateY(-7px) rotate(1.6deg)}}
@keyframes bobSway{0%,100%{transform:translateY(0) rotate(-1.6deg)}50%{transform:translateY(-7px) rotate(1.6deg)}}
.fagwrap{-webkit-transform-origin:50% 100%;transform-origin:50% 100%;
  -webkit-animation:respira 4.2s ease-in-out infinite;animation:respira 4.2s ease-in-out infinite}
@-webkit-keyframes respira{0%,100%{-webkit-transform:translateY(0) scale(1,1)}50%{-webkit-transform:translateY(-1.4%) scale(1.018,.982)}}
@keyframes respira{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-1.4%) scale(1.018,.982)}}
.corpo-fag{position:relative;width:100%}
.corpo-fag .lay{position:absolute;top:0;left:0;width:100%;height:auto;display:block}
.corpo-fag .base{position:relative}
.corpo-fag .fala,.corpo-fag .pisca{opacity:0}
.fag.fidget .corpo-fag{-webkit-animation:fidget .6s ease;animation:fidget .6s ease}
@-webkit-keyframes fidget{0%{-webkit-transform:scale(1) rotate(0)}30%{-webkit-transform:scale(1.06) rotate(4deg)}60%{-webkit-transform:scale(1.01) rotate(-3deg)}100%{-webkit-transform:scale(1) rotate(0)}}
@keyframes fidget{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.06) rotate(4deg)}60%{transform:scale(1.01) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}

/* ---------- CAPA (medalhão) ---------- */
.capa .centro{position:absolute;top:0;left:0;right:0;bottom:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-box-pack:center;-webkit-box-align:center;
  -webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  text-align:center;padding:0 14px}
.capa .centro>*{max-width:100%}
.medalhao{width:62vw;max-width:260px;height:62vw;max-height:260px;margin:0 auto;border-radius:50%;
  overflow:hidden;border:7px solid #ffd75e;position:relative;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 22px rgba(0,0,0,.35);
  -webkit-animation:flutua 4.5s ease-in-out infinite;animation:flutua 4.5s ease-in-out infinite}
.medalhao .mceu{position:absolute;top:-10%;left:-10%;width:120%;height:120%;background:url('img/ceu_noite.jpg') center/cover}
.medalhao .mfab{position:absolute;bottom:2%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);width:66%}
.medalhao .mglow{position:absolute;left:20%;top:22%;width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle, rgba(255,205,110,.5), rgba(255,205,110,0) 60%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes flutua{0%,100%{-webkit-transform:translateY(0)}50%{-webkit-transform:translateY(-9px)}}
@keyframes flutua{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
h1.titulo{font-size:22px;line-height:1.12;margin:14px 8px 2px;color:#ffe08a;text-shadow:0 2px 0 #7a5200,0 0 18px rgba(255,200,80,.5)}
.sub{font-size:14px;color:#cdd3ff;margin-bottom:14px}
.btn{display:inline-block;border:0;cursor:pointer;font-family:inherit;font-weight:800;color:#5a3b00;max-width:94%;
  background:-webkit-linear-gradient(top,#ffe27a,#ffc23c);background:linear-gradient(to bottom,#ffe27a,#ffc23c);
  padding:14px 26px;font-size:18px;border-radius:30px;box-shadow:0 5px 0 #c8871a,0 8px 18px rgba(0,0,0,.4)}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);box-shadow:0 2px 0 #c8871a}
.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.05)}}
@keyframes pulsa{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.capa .fagacena{position:absolute;bottom:1vh;right:0;width:22vh;max-width:132px}
.capa .fagacena img{width:100%;height:auto;display:block}
@media (min-width:480px){ h1.titulo{font-size:30px} .sub{font-size:15px} .btn{font-size:20px;padding:15px 30px} }
@media (min-width:760px){ h1.titulo{font-size:36px} }

/* ---------- ABERTURA ---------- */
.palco{position:absolute;top:0;left:0;right:0;bottom:0;
  -webkit-animation:pushin 15s ease-out both;animation:pushin 15s ease-out both}
@-webkit-keyframes pushin{from{-webkit-transform:scale(1)}to{-webkit-transform:scale(1.1)}}
@keyframes pushin{from{transform:scale(1)}to{transform:scale(1.1)}}
.abertura .fabviva{left:50%;bottom:22%;width:44vh;max-width:340px;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  -webkit-animation:sobeFab 1.2s ease-out both;animation:sobeFab 1.2s ease-out both}
@-webkit-keyframes sobeFab{from{opacity:0;-webkit-transform:translate(-50%,26px) scale(.9)}to{opacity:1;-webkit-transform:translate(-50%,0) scale(1)}}
@keyframes sobeFab{from{opacity:0;transform:translate(-50%,26px) scale(.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
.abertura .fag{left:6%;bottom:7%;-webkit-animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both;animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both}
@-webkit-keyframes entraFag{0%{opacity:0;-webkit-transform:translateX(-46px)}70%{opacity:1;-webkit-transform:translateX(6px)}100%{opacity:1;-webkit-transform:translateX(0)}}
@keyframes entraFag{0%{opacity:0;transform:translateX(-46px)}70%{opacity:1;transform:translateX(6px)}100%{opacity:1;transform:translateX(0)}}
.legenda{position:absolute;left:50%;bottom:5%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  width:92%;max-width:640px;text-align:center;font-size:18px;line-height:1.4;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.95);min-height:3.2em}
.pular{position:absolute;top:12px;right:12px;font-size:13px;color:#dfe3ff;background:rgba(0,0,0,.4);border:0;border-radius:16px;padding:8px 15px;cursor:pointer}

/* ---------- MAPA ---------- */
.mapa .topo{position:absolute;top:0;left:0;right:0;padding:12px 14px;text-align:center;z-index:5;
  background:-webkit-linear-gradient(top,rgba(6,8,30,.82),rgba(6,8,30,0));background:linear-gradient(to bottom,rgba(6,8,30,.82),rgba(6,8,30,0))}
.mapa .topo b{color:#ffe08a;font-size:16px}
.no{position:absolute;width:13vh;max-width:88px}
.no img{width:100%;height:auto;display:block;-webkit-filter:drop-shadow(0 0 10px rgba(255,220,120,.7));filter:drop-shadow(0 0 10px rgba(255,220,120,.7))}
.no.futuro img{-webkit-filter:grayscale(1) brightness(.5);filter:grayscale(1) brightness(.5);opacity:.6}
.no.atual{-webkit-animation:farol 1.2s ease-in-out infinite;animation:farol 1.2s ease-in-out infinite}
@-webkit-keyframes farol{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.13)}}
@keyframes farol{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
.mapa .fag{right:5%;bottom:8%}
.dica{position:absolute;left:50%;bottom:3%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  font-size:15px;font-style:italic;color:#ffe9a8;text-shadow:0 0 10px rgba(255,200,80,.5);text-align:center;width:90%;
  -webkit-animation:respiraDica 2.6s ease-in-out infinite;animation:respiraDica 2.6s ease-in-out infinite}
@-webkit-keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}
.mapa .fabviva.destino{position:absolute;left:50%;top:6%;width:20vh;max-width:140px;z-index:3;
  -webkit-transform:translateX(-50%);transform:translateX(-50%)}
.mapa .trilha{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none}
.mapa .nowrap{position:absolute;z-index:4;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%)}
.mapa .no{position:relative;width:12vh;max-width:74px}
.mapa .no.feito img{-webkit-filter:drop-shadow(0 0 12px rgba(255,220,120,.95));filter:drop-shadow(0 0 12px rgba(255,220,120,.95))}
.mapa .nowrap.alivio .no:not(.futuro) img{-webkit-filter:hue-rotate(175deg) drop-shadow(0 0 10px rgba(120,200,255,.8));filter:hue-rotate(175deg) drop-shadow(0 0 10px rgba(120,200,255,.8))}
.mapa .nowrap.deleite .no:not(.futuro) img{-webkit-filter:hue-rotate(-45deg) drop-shadow(0 0 10px rgba(255,150,210,.8));filter:hue-rotate(-45deg) drop-shadow(0 0 10px rgba(255,150,210,.8))}
.mapa .rotulo{position:absolute;left:50%;top:100%;margin-top:2px;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  white-space:nowrap;font-size:12px;font-weight:800;color:#fff;background:rgba(10,14,40,.72);padding:3px 9px;border-radius:11px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.mapa .walker{position:absolute;z-index:6;-webkit-transform:translate(-50%,-92%);transform:translate(-50%,-92%);
  -webkit-transition:left 1.1s ease,top 1.1s ease;transition:left 1.1s ease,top 1.1s ease}
.mapa .walker .fag{position:relative;width:13vh;max-width:78px}

/* ---------- PARADA (criar/resolver: grupos iguais) ---------- */
.fagfala{position:absolute;bottom:0;right:2px;width:22vh;max-width:120px;z-index:3}
.fagfala .fag{position:relative;width:100%;max-width:none}
.balao{position:absolute;top:10px;left:10px;right:10px;max-width:560px;margin:0 auto;
  background:rgba(20,24,60,.93);border:2px solid #ffd75e;border-radius:16px;padding:11px 13px;
  font-size:15px;line-height:1.35;color:#fff;z-index:4;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.caixas{position:absolute;left:0;right:0;top:32%;text-align:center;z-index:2;padding:0 6px}
.caixa{display:inline-block;vertical-align:top;width:28%;max-width:150px;margin:0 1.5%;min-height:118px;
  border:3px dashed #ffd75e;border-radius:16px;background:rgba(255,255,255,.07);padding:8px 5px 28px;position:relative;cursor:pointer}
.caixa:active{-webkit-transform:scale(.97);transform:scale(.97)}
.caixa .estrs{min-height:74px;line-height:1}
.caixa .estr{width:25px;height:auto;margin:2px;cursor:pointer;
  -webkit-animation:estrPop .32s ease;animation:estrPop .32s ease}
@-webkit-keyframes estrPop{0%{-webkit-transform:scale(.3)}70%{-webkit-transform:scale(1.18)}100%{-webkit-transform:scale(1)}}
@keyframes estrPop{0%{transform:scale(.3)}70%{transform:scale(1.18)}100%{transform:scale(1)}}
.caixa .cnt{position:absolute;bottom:5px;left:0;right:0;font-weight:800;color:#ffe08a;font-size:17px}
.p1barra{position:absolute;left:0;right:0;bottom:3%;text-align:center;z-index:4}
.p1dica{font-size:13px;color:#ffe9a8;font-style:italic;margin-bottom:8px;min-height:1.2em}
.btn2{border:0;cursor:pointer;font-family:inherit;font-weight:700;color:#20264a;background:#e7ebff;
  padding:9px 18px;font-size:15px;border-radius:20px;box-shadow:0 3px 0 #9aa3d6}
.btn2:active{-webkit-transform:translateY(2px);transform:translateY(2px);box-shadow:0 1px 0 #9aa3d6}
.revela{position:absolute;left:0;right:0;top:26%;text-align:center;z-index:6;padding:0 14px}
.revela .r1{font-size:24px;color:#fff;font-weight:800;margin-bottom:6px;
  -webkit-animation:revIn .5s ease both;animation:revIn .5s ease both}
.revela .r2{font-size:36px;color:#ffe08a;font-weight:900;text-shadow:0 0 22px rgba(255,200,80,.8);margin-bottom:12px;
  -webkit-animation:revIn .5s .25s ease both;animation:revIn .5s .25s ease both}
.revela .r3{font-size:16px;color:#e9ecff;-webkit-animation:revIn .5s .5s ease both;animation:revIn .5s .5s ease both}
@-webkit-keyframes revIn{0%{opacity:0;-webkit-transform:scale(.6)}100%{opacity:1;-webkit-transform:scale(1)}}
@keyframes revIn{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
.burst{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;overflow:hidden}
.bstar{position:absolute;width:34px;opacity:1}
@-webkit-keyframes bfly{0%{opacity:1;-webkit-transform:translateY(0) scale(.4) rotate(0)}100%{opacity:0;-webkit-transform:translateY(-46px) scale(1.35) rotate(140deg)}}
@keyframes bfly{0%{opacity:1;transform:translateY(0) scale(.4) rotate(0)}100%{opacity:0;transform:translateY(-46px) scale(1.35) rotate(140deg)}}

/* ---------- PARADA 2 — A Constelação (array com steppers) ---------- */
.p2 .grade{position:absolute;left:0;right:0;top:25%;bottom:33%;z-index:2;text-align:center;
  display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center}
.p2 .fila{white-space:nowrap;line-height:0}
.gestr{width:30px;max-width:8.5vw;height:auto;margin:3px;-webkit-animation:estrPop .3s ease;animation:estrPop .3s ease}
.grade.acesa .gestr{-webkit-filter:drop-shadow(0 0 9px rgba(255,220,120,.95));filter:drop-shadow(0 0 9px rgba(255,220,120,.95))}
.steppers{position:absolute;left:0;right:0;bottom:15%;z-index:4;text-align:center}
.stepper{display:inline-block;vertical-align:middle;margin:0 9px;text-align:center}
.strot{font-size:13px;color:#cdd3ff;margin-bottom:5px;font-weight:700}
.srow{white-space:nowrap}
.sbtn{border:0;cursor:pointer;font-family:inherit;font-weight:900;color:#5a3b00;width:42px;height:42px;font-size:23px;border-radius:12px;vertical-align:middle;
  background:-webkit-linear-gradient(top,#ffe27a,#ffc23c);background:linear-gradient(to bottom,#ffe27a,#ffc23c);box-shadow:0 3px 0 #c8871a}
.sbtn:active{-webkit-transform:translateY(2px);transform:translateY(2px);box-shadow:0 1px 0 #c8871a}
.sval{display:inline-block;width:42px;font-size:26px;font-weight:900;color:#ffe08a;vertical-align:middle}

/* ---------- PARADA 3 — Dois jeitos (comutatividade) ---------- */
.p3 .p3wrap{position:absolute;left:0;right:0;top:24%;bottom:24%;z-index:2;text-align:center;
  -webkit-transition:opacity .45s ease,-webkit-transform .45s ease;transition:opacity .45s ease,transform .45s ease}
.p3 .p3wrap.vira{opacity:.15;-webkit-transform:rotate(90deg) scale(.7);transform:rotate(90deg) scale(.7)}
.p3 .expr{font-size:30px;font-weight:900;color:#ffe08a;margin-bottom:12px;text-shadow:0 0 16px rgba(255,200,80,.6)}
.p3 .expr span{color:#fff}
.gradeM{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center}
.gradeM .fila{white-space:nowrap;line-height:0;opacity:.5;-webkit-transition:opacity .25s ease;transition:opacity .25s ease}
.gradeM .fila.acesa{opacity:1}
.gradeM .fila.acesa .gestr{-webkit-filter:drop-shadow(0 0 9px rgba(255,220,120,.95));filter:drop-shadow(0 0 9px rgba(255,220,120,.95))}

/* ---------- PARADA 4 — O Céu Grande (×10) ---------- */
.p4 .p4sky{position:absolute;left:0;right:0;top:24%;bottom:30%;z-index:2;text-align:center;padding:0 8px;overflow:hidden}
.cluster{display:inline-block;vertical-align:middle;width:74px;margin:5px;padding:4px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,215,110,.35);line-height:0;
  -webkit-animation:estrPop .38s ease;animation:estrPop .38s ease}
.cluster .cestr{width:12px;height:auto;margin:1px;
  -webkit-filter:drop-shadow(0 0 5px rgba(255,220,120,.85));filter:drop-shadow(0 0 5px rgba(255,220,120,.85))}
.p4 .p4expr{position:absolute;left:0;right:0;bottom:16%;z-index:4;text-align:center}

/* ---------- ALÍVIO 1 — Música das Estrelas ---------- */
.musica .sinos{position:absolute;left:0;right:0;top:32%;z-index:3;text-align:center;padding:0 6px;white-space:nowrap}
.sino{display:inline-block;vertical-align:middle;margin:0 1.6%;cursor:pointer;
  -webkit-transition:-webkit-transform .12s ease;transition:transform .12s ease}
.sino.toca{-webkit-transform:translateY(-14px) scale(1.14);transform:translateY(-14px) scale(1.14)}
.sino .grupinho{width:10vw;max-width:40px;line-height:0}
.sino .sestr{display:block;width:100%;height:auto;margin:3px 0;-webkit-filter:drop-shadow(0 0 7px rgba(255,220,120,.85));filter:drop-shadow(0 0 7px rgba(255,220,120,.85))}
.sino.toca .sestr{-webkit-filter:drop-shadow(0 0 14px rgba(255,240,170,1));filter:drop-shadow(0 0 14px rgba(255,240,170,1))}

/* ---------- ALÍVIO 2 — Monte a Constelação (memória) ---------- */
.memoria .memgrid{position:absolute;left:0;right:0;top:24%;bottom:22%;z-index:3;text-align:center;padding:0 8px;
  display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center}

/* "reduzir movimento" desliga só os movimentos GRANDES (parallax/câmera/entradas);
   a vida gentil (respirar, piscar, brilho, estrelas) fica sempre ligada. */

<body>
<div id="app"></div>
<audio id="narr" preload="auto"></audio>
<script>
(function(){
"use strict";
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
var app=document.getElementById("app");
var narr=document.getElementById("narr");
var reduz = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---- FALAR: toca a voz do Antônio (MP3 direto, robusto no celular) ---- */
var falandoCb=null, bocaAlvo=0, bocaSuave=0, falaTimer=0;
function falar(id, cb){
  falandoCb=cb||null;
  try{ narr.pause(); narr.currentTime=0; }catch(e){}
  narr.src="audio/"+id+".mp3";
  var p=narr.play();
  if(p && p["catch"]){ p["catch"](function(){ /* sem áudio: segue mesmo assim */ }); }
  iniciaBoca();
}
function fimFala(){ paraBoca(); var c=falandoCb; falandoCb=null; if(c){ c(); } }
narr.addEventListener("ended", fimFala);
function iniciaBoca(){
  if(falaTimer) clearInterval(falaTimer);
  bocaAlvo=0.6;
  falaTimer=setInterval(function(){
    if(narr.paused||narr.ended){ bocaAlvo=0; }
    else { bocaAlvo = 0.15 + Math.random()*0.8; }
  }, 95);
}
function paraBoca(){ if(falaTimer){clearInterval(falaTimer);falaTimer=0;} bocaAlvo=0; }

/* ---- LOOP único (só boca) ---- */
var fagAtual=null;
function loop(){
  if(fagAtual && fagAtual.fala){
    bocaSuave += (bocaAlvo-bocaSuave)*0.4;
    fagAtual.fala.style.opacity=bocaSuave.toFixed(3);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* piscar + fidget */
function agendaPisca(){
  setTimeout(function(){
    if(fagAtual && fagAtual.pisca){
      fagAtual.pisca.style.opacity="1";
      setTimeout(function(){ if(fagAtual&&fagAtual.pisca) fagAtual.pisca.style.opacity="0"; },130);
      if(Math.random()<0.16){ setTimeout(function(){ if(fagAtual&&fagAtual.pisca){fagAtual.pisca.style.opacity="1";
        setTimeout(function(){ if(fagAtual&&fagAtual.pisca) fagAtual.pisca.style.opacity="0"; },120);} },300); }
    }
    agendaPisca();
  }, 3200+Math.random()*4200);
}
agendaPisca();
function agendaFidget(){
  setTimeout(function(){
    if(fagAtual && fagAtual.el){ fagAtual.el.className="fag fidget"+(fagAtual.extra||"");
      setTimeout(function(){ if(fagAtual&&fagAtual.el) fagAtual.el.className="fag"+(fagAtual.extra||""); },650); }
    agendaFidget();
  }, 6000+Math.random()*6000);
}
agendaFidget();

/* ---- helpers ---- */
function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function fagViva(extraCls){
  var fag=el("div","fag"+(extraCls||""));
  var bob=el("div","fagbob"); var wrap=el("div","fagwrap"); var corpo=el("div","corpo-fag");
  var base=el("img","lay base"); base.src="img/fagulha.png"; base.alt="Fagulha";
  var fala=el("img","lay fala"); fala.src="img/fagulha_fala.png"; fala.alt="";
  var pisca=el("img","lay pisca"); pisca.src="img/fagulha_pisca.png"; pisca.alt="";
  corpo.appendChild(base); corpo.appendChild(fala); corpo.appendChild(pisca);
  wrap.appendChild(corpo); bob.appendChild(wrap); fag.appendChild(bob);
  fagAtual={el:fag,extra:(extraCls||""),base:base,fala:fala,pisca:pisca};
  return fag;
}
function fagPose(nome){ if(fagAtual&&fagAtual.base){ if(fagAtual.fala)fagAtual.fala.style.opacity="0"; if(fagAtual.pisca)fagAtual.pisca.style.opacity="0"; fagAtual.base.src="img/"+nome+".png"; } }
function fagComemora(){ fagPose("fagulha_comemora"); }

/* ---- helpers de celebração (compartilhados pelas paradas) ---- */
function estouraEstrelas(tela,n){
  var burst=el("div","burst"),i;
  for(i=0;i<n;i++){ var b=el("img","bstar"); b.src="img/estrela_grande.png";
    var ang=(i/n)*2*Math.PI, dx=Math.cos(ang)*44, dy=Math.sin(ang)*30;
    b.style.left=(50+dx)+"%"; b.style.top=(40+dy)+"%";
    var dur=(0.8+Math.random()*0.5).toFixed(2);
    b.style.webkitAnimation="bfly "+dur+"s ease-out both"; b.style.animation="bfly "+dur+"s ease-out both";
    burst.appendChild(b);
  }
  tela.appendChild(burst);
  setTimeout(function(){ if(burst.parentNode)burst.parentNode.removeChild(burst); },1700);
}
function revela(tela,r1,r2,r3){
  var rev=el("div","revela");
  rev.innerHTML="<div class='r1'>"+r1+"</div><div class='r2'>"+r2+"</div><div class='r3'>"+r3+"</div>";
  tela.appendChild(rev); return rev;
}
function botaoProxima(tela,idx,rot){
  setTimeout(function(){
    var pb=el("div","p1barra"); pb.style.bottom="6%";
    var nx=el("button","btn pulsa",rot||"Próxima parada"); nx.onclick=function(){ proxima(idx); };
    pb.appendChild(nx); tela.appendChild(pb);
  },1500);
}
function salvaEvid(ev){ try{ var f=JSON.parse(localStorage.getItem("estrelas_evid")||"[]"); f.push(ev); localStorage.setItem("estrelas_evid",JSON.stringify(f)); }catch(e){} }
function fabViva(){
  var f=el("div","fabviva");
  f.appendChild(el("div","glow"));
  var img=el("img","fab"); img.src="img/fabrica_estrelas.png"; img.alt="Fábrica de Estrelas"; f.appendChild(img);
  var posp=[[36,4,0],[47,1,.6],[57,5,1.2],[41,3,1.8],[52,2,2.4]]; var i;
  for(i=0;i<posp.length;i++){
    var pf=el("div","puff"); pf.style.left=posp[i][0]+"%"; pf.style.top=posp[i][1]+"%";
    pf.style.webkitAnimationDelay=posp[i][2]+"s"; pf.style.animationDelay=posp[i][2]+"s";
    f.appendChild(pf);
  }
  return f;
}
function campoEstrelas(qtd){
  var c=el("div","estrelas"); var i;
  for(i=0;i<qtd;i++){
    var p=el("div","pt");
    p.style.left=(Math.random()*100).toFixed(2)+"%"; p.style.top=(Math.random()*70).toFixed(2)+"%";
    var d=(2.6+Math.random()*4).toFixed(2); p.style.webkitAnimationDuration=d+"s"; p.style.animationDuration=d+"s";
    var de=(-Math.random()*4).toFixed(2); p.style.webkitAnimationDelay=de+"s"; p.style.animationDelay=de+"s";
    var s=(2+Math.random()*3).toFixed(1); p.style.width=s+"px"; p.style.height=s+"px";
    c.appendChild(p);
  }
  return c;
}
function telaCheia(){
  var e=document.documentElement, fn=e.requestFullscreen||e.webkitRequestFullscreen||e.msRequestFullscreen;
  if(fn){ try{ fn.call(e); }catch(x){} }
}

/* ================= TELAS ================= */
function limpa(){ fagAtual=null; app.innerHTML=""; }

function telaCapa(){
  limpa();
  var t=el("div","tela capa");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(38));
  var c=el("div","centro");
  var med=el("div","medalhao");
  med.appendChild(el("div","mceu"));
  var mf=el("img","mfab"); mf.src="img/fabrica_estrelas.png"; med.appendChild(mf);
  med.appendChild(el("div","mglow"));
  c.appendChild(med);
  c.appendChild(el("h1","titulo","A Fábrica de Estrelas"));
  c.appendChild(el("div","sub","Multiplicação &#183; 3º ano"));
  var b=el("button","btn pulsa","Começar a aventura");
  b.onclick=function(){ telaCheia(); telaAbertura(); };
  c.appendChild(b);
  t.appendChild(c);
  var fa=el("div","fagacena"); var fai=el("img"); fai.src="img/fagulha_acena.png"; fai.alt="Fagulha"; fa.appendChild(fai);
  t.appendChild(fa);
  app.appendChild(t);
}

function telaAbertura(){
  limpa();
  var t=el("div","tela abertura");
  var palco=el("div","palco");
  palco.appendChild(el("div","ceu")); palco.appendChild(campoEstrelas(46));
  palco.appendChild(fabViva());
  palco.appendChild(fagViva());
  t.appendChild(palco);
  var leg=el("div","legenda",""); t.appendChild(leg);
  var pular=el("button","pular","pular &#9654;"); pular.onclick=function(){ try{narr.pause();}catch(e){} fimFala(); }; t.appendChild(pular);
  app.appendChild(t);
  var texto="Oi! Que bom que você chegou! Aqui é a Fábrica de Estrelas, e eu sou a Fagulha. Olha só o céu: está todo escuro e vazio. Será que você vem comigo encher esse céu de estrelas? Vem, vai ser incrível!";
  falar("abertura", function(){ telaMapa(); });
  legendaSync(leg, texto);
}
function legendaSync(leg, texto){
  var total=texto.length, i=0;
  function tick(){
    if(narr.ended){ leg.innerHTML=texto; return; }
    var dur=narr.duration||9; var frac=Math.min(1,(narr.currentTime||0)/(dur*0.96));
    var n=Math.floor(frac*total); if(n>i){ i=n; leg.innerHTML=texto.substring(0,i); }
    if(i<total){ requestAnimationFrame(tick); } else { leg.innerHTML=texto; }
  }
  requestAnimationFrame(tick);
}

/* ================= PROGRESSÃO / MAPA VIVO ================= */
var STOPS=[
  {id:"p1",tipo:"aprend",titulo:"As Caixas de Estrelas",fn:function(){telaParada1();}},
  {id:"p2",tipo:"aprend",titulo:"A Constelação",fn:function(){telaParada2();}},
  {id:"r1",tipo:"alivio",titulo:"Música das Estrelas",fn:function(){telaMusica();}},
  {id:"p3",tipo:"aprend",titulo:"Dois Jeitos, Mesmo Céu",fn:function(){telaParada3();}},
  {id:"p4",tipo:"aprend",titulo:"O Céu Grande",fn:function(){telaParada4();}},
  {id:"r2",tipo:"alivio",titulo:"Monte a Constelação",fn:function(){telaMemoria();}},
  {id:"p5",tipo:"aprend",titulo:"A Sua Constelação",fn:function(){telaParada5();}},
  {id:"d",tipo:"deleite",titulo:"Decore o Seu Céu",fn:function(){telaDecore();}}
];
var progresso=0, fagPos=0;
var POS=[[50,85],[28,75],[58,65],[31,55],[60,45],[34,35],[58,26],[44,16]];

function proxima(idx){
  if(idx+1>progresso) progresso=idx+1;
  if(progresso>=STOPS.length){ telaFinal(); } else { telaMapa(); }
}

function telaMapa(){
  limpa();
  var t=el("div","tela mapa");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(48));
  var fv=fabViva(); fv.className="fabviva destino"; t.appendChild(fv);
  t.appendChild(el("div","topo","<b>A jornada da Fagulha</b> &#183; parada "+Math.min(progresso+1,STOPS.length)+" de "+STOPS.length));
  var i, pts="";
  for(i=0;i<POS.length;i++){ pts+=POS[i][0]+","+POS[i][1]+" "; }
  var svg=el("div","trilha");
  svg.innerHTML="<svg viewBox='0 0 100 100' preserveAspectRatio='none' width='100%' height='100%'><polyline points='"+pts+"' fill='none' stroke='rgba(255,220,130,.32)' stroke-width='0.7' stroke-dasharray='2 2.4' stroke-linecap='round'/></svg>";
  t.appendChild(svg);
  for(i=0;i<STOPS.length;i++){
    var estado=(i<progresso)?"feito":(i===progresso?"atual":"futuro");
    var w=el("div","nowrap "+STOPS[i].tipo); w.style.left=POS[i][0]+"%"; w.style.top=POS[i][1]+"%";
    var no=el("div","no "+estado);
    var im=el("img"); im.src="img/estrela_grande.png"; no.appendChild(im);
    if(estado==="atual"){ (function(k){ no.onclick=function(){ STOPS[k].fn(); }; })(i);
      w.appendChild(el("div","rotulo",STOPS[i].titulo)); }
    w.appendChild(no); t.appendChild(w);
  }
  var walker=el("div","walker"); walker.style.left=POS[fagPos][0]+"%"; walker.style.top=POS[fagPos][1]+"%";
  walker.appendChild(fagViva()); t.appendChild(walker);
  var destino=Math.min(progresso,STOPS.length-1);
  setTimeout(function(){ walker.style.left=POS[destino][0]+"%"; walker.style.top=POS[destino][1]+"%"; fagPos=destino; },420);
  t.appendChild(el("div","dica","Toque na estrela que está brilhando."));
  app.appendChild(t);
}

/* ============ PARADA 1 — As Caixas de Estrelas (grupos iguais → multiplicação) ============ */
var P1;
function telaParada1(){
  limpa();
  P1={n:3,m:4,cx:[0,0,0],toques:0,concluida:false,t0:(new Date()).getTime()};
  var t=el("div","tela parada");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(26));
  t.appendChild(el("div","balao","Pra acender esta parte do céu, encha <b>3 caixas</b> com <b>4 estrelas</b> em cada! Toque na caixa pra pôr uma estrela (e na estrela pra tirar)."));
  var wrap=el("div","caixas"); var i;
  for(i=0;i<P1.n;i++){ wrap.appendChild(fazCaixa(i)); }
  t.appendChild(wrap);
  var barra=el("div","p1barra");
  barra.appendChild(el("div","p1dica",""));
  var b=el("button","btn2","Recomeçar"); b.onclick=function(){ if(P1.concluida)return; P1.cx=[0,0,0]; pintaCaixas(); }; barra.appendChild(b);
  t.appendChild(barra);
  var fw=el("div","fagfala"); fw.appendChild(fagViva()); t.appendChild(fw);
  app.appendChild(t);
  pintaCaixas();
}
function fazCaixa(i){
  var c=el("div","caixa"); c.id="cx"+i;
  c.appendChild(el("div","estrs")); c.appendChild(el("div","cnt","0"));
  c.onclick=function(){ if(P1.concluida)return; if(P1.cx[i]<9){ P1.cx[i]++; P1.toques++; pintaCaixas(); } };
  return c;
}
function fazEstrInterna(i){
  var s=el("img","estr"); s.src="img/estrela_grande.png";
  s.onclick=function(ev){ ev.stopPropagation(); if(P1.concluida)return; if(P1.cx[i]>0){ P1.cx[i]--; pintaCaixas(); } };
  return s;
}
function pintaCaixas(){
  var i,j;
  for(i=0;i<P1.n;i++){
    var c=document.getElementById("cx"+i); if(!c)continue;
    var h=c.getElementsByClassName("estrs")[0]; h.innerHTML="";
    for(j=0;j<P1.cx[i];j++){ h.appendChild(fazEstrInterna(i)); }
    c.getElementsByClassName("cnt")[0].innerHTML=P1.cx[i];
  }
  verificaP1();
}
function verificaP1(){
  if(P1.concluida)return;
  var i, ok=true;
  for(i=0;i<P1.n;i++){ if(P1.cx[i]!==P1.m){ ok=false; } }
  var dica=document.getElementsByClassName("p1dica")[0];
  if(ok){ sucessoP1(); return; }
  if(dica){
    var todas=(P1.cx[0]>0&&P1.cx[1]>0&&P1.cx[2]>0);
    var iguais=(P1.cx[0]===P1.cx[1]&&P1.cx[1]===P1.cx[2]);
    if(iguais && P1.cx[0]>0 && P1.cx[0]!==P1.m){ dica.innerHTML="Grupos iguais! Mas a fábrica pediu 4 em cada."; }
    else if(todas && !iguais){ dica.innerHTML="Quase! As 3 caixas precisam ter a MESMA quantidade."; }
    else { dica.innerHTML=""; }
  }
}
function sucessoP1(){
  P1.concluida=true;
  fagComemora();
  var tela=document.getElementsByClassName("tela parada")[0]; if(!tela)return;
  estouraEstrelas(tela,12);
  var bl=tela.getElementsByClassName("balao")[0]; if(bl)bl.style.display="none";
  var cxs=tela.getElementsByClassName("caixas")[0]; if(cxs)cxs.style.opacity="0";
  var pb=tela.getElementsByClassName("p1barra")[0]; if(pb)pb.style.display="none";

  if(P5.concluida||P5.fase!=="judge")return; P5.tent++;
  if(val===P5.real){ sucessoP5(); return; }
  var d=document.getElementsByClassName("p5dica")[0];
  var oc=document.getElementById("p5opts"); var btns=oc?oc.getElementsByTagName("button"):[];
  var k; for(k=0;k<btns.length;k++){ btns[k].disabled=true; }
  var g=document.getElementById("p5grade");
  if(d)d.innerHTML="Vamos contar as fileiras juntas…";
  var passoTxt=el("span"); if(d){ d.innerHTML="Contando: "; d.appendChild(passoTxt); }
  contaFileiras(g,passoTxt,P5.col,P5.fil,function(){
    if(d)d.innerHTML="São "+P5.fil+" fileiras de "+P5.col+" = <b>"+P5.real+"</b>. Toque no número certo!";
    var kk; for(kk=0;kk<btns.length;kk++){ btns[kk].disabled=false; }
    var g2=document.getElementById("p5grade"); if(g2){ var fs=g2.getElementsByClassName("fila"),z; for(z=0;z<fs.length;z++)fs[z].className="fila"; }
  });
}
function sucessoP5(){
  P5.concluida=true; fagComemora();
  var tela=document.getElementsByClassName("tela p5")[0]; if(!tela)return;
  estouraEstrelas(tela,16);
  var g=document.getElementById("p5grade"); if(g)g.className="grade acesa";
  var oc=document.getElementById("p5opts"); if(oc)oc.style.display="none";
  var bl=tela.getElementsByClassName("balao")[0]; if(bl)bl.style.display="none";
  var extra=P5.protegeErrou?("Você ainda me corrigiu — eu tinha dito "+P5.claim+"! "):"";
  revela(tela,P5.fil+" fileiras de "+P5.col,P5.fil+" &#215; "+P5.col+" = "+P5.real,extra+"Você <b>criou e resolveu</b> a sua própria constelação. Você é o mestre das estrelas!");
  botaoProxima(tela,6,"Última parada");
  var tempo=Math.round(((new Date()).getTime()-P5.t0)/1000);
  salvaEvid({parada:"p5",habilidade:"EF03MA07",conceito:"autoria + protégé",criou:[P5.fil,P5.col],real:P5.real,corrigiu:P5.protegeErrou,tentativas:P5.tent,acertou:true,semErro:(P5.tent===1)});
}
/* ===== DELEITE — Decore o Seu Céu (criação livre) ===== */
var DECO;
function telaDecore(){
  limpa();
  DECO={hue:0,n:0};
  var t=el("div","tela decore");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(30));
  t.appendChild(el("div","balao","<b>Este céu é seu!</b> Toque onde quiser e enfeite do seu jeito — aqui não tem certo nem errado."));
  var sky=el("div","decoceu"); sky.id="decoceu";
  sky.onclick=function(ev){ decoPoe(ev,sky); };
  t.appendChild(sky);
  var pal=el("div","paleta"); var cores=[0,140,210,300]; var i;
  for(i=0;i<cores.length;i++){ (function(h,idx){
    var c=el("button","pcor"+(idx===0?" sel":"")); c.style.webkitFilter="hue-rotate("+h+"deg)"; c.style.filter="hue-rotate("+h+"deg)";
    var im=el("img"); im.src="img/estrela_grande.png"; c.appendChild(im);
    c.onclick=function(){ DECO.hue=h; var ps=document.getElementsByClassName("pcor"),z; for(z=0;z<ps.length;z++)ps[z].className="pcor"; c.className="pcor sel"; };
    pal.appendChild(c);
  })(cores[i],i); }
  t.appendChild(pal);
  var bar=el("div","p1barra"); var ok=el("button","btn pulsa","Pronto, terminei!"); ok.onclick=function(){ proxima(7); }; bar.appendChild(ok); t.appendChild(bar);
  var ff=el("div","fagfala"); ff.appendChild(fagViva()); t.appendChild(ff);
  app.appendChild(t);
}
function decoPoe(ev,sky){
  if(DECO.n>=70)return;
  var r=sky.getBoundingClientRect();
  var x=((ev.clientX-r.left)/r.width)*100, y=((ev.clientY-r.top)/r.height)*100;
  if(x<0||x>100||y<0||y>100)return;
  var s=el("img","decostar"); s.src="img/estrela_grande.png";
  var tam=(16+Math.random()*22).toFixed(0);
  s.style.width=tam+"px"; s.style.left=x+"%"; s.style.top=y+"%";
  s.style.webkitFilter="hue-rotate("+DECO.hue+"deg) drop-shadow(0 0 7px rgba(255,220,120,.9))";
  s.style.filter="hue-rotate("+DECO.hue+"deg) drop-shadow(0 0 7px rgba(255,220,120,.9))";
  sky.appendChild(s); DECO.n++;
  tocaNota(330+DECO.hue*0.6);
}
/* ===== FINAL (cutscene) + PARECER ===== */
function telaFinal(){
  limpa();
  var t=el("div","tela fim");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(90));
  var fv=fabViva(); fv.className="fabviva destino"; fv.style.top="8%"; t.appendChild(fv);
  var fag=el("div","fimfag"); fag.appendChild(fagViva()); t.appendChild(fag);
  fagComemora();
  var tit=el("div","fimtit","Você encheu o céu de estrelas!"); t.appendChild(tit);
  var sub=el("div","fimsub","A Fábrica de Estrelas está brilhando por sua causa."); t.appendChild(sub);
  var bar=el("div","p1barra"); bar.style.bottom="8%";
  var b=el("button","btn pulsa","Ver como você foi"); b.onclick=function(){ telaParecer(); }; bar.appendChild(b); t.appendChild(bar);
  app.appendChild(t);
  var i; for(i=0;i<3;i++){ (function(d){ setTimeout(function(){ estouraEstrelas(t,16); },d); })(i*600);
  }
}
function lerEvid(){ try{ return JSON.parse(localStorage.getItem("estrelas_evid")||"[]"); }catch(e){ return []; } }
function parecerDados(){
  var ev=lerEvid(), map={}, i;
  for(i=0;i<ev.length;i++){ if(ev[i].parada) map[ev[i].parada]=ev[i]; }
  var paradas=["p1","p2","p3","p4","p5"], fez=0, fluente=0, k;
  for(k=0;k<paradas.length;k++){ var e=map[paradas[k]]; if(e&&e.acertou){ fez++; if(e.semErro) fluente++; } }
  var nivel = fluente>=5?"Avançado":(fluente>=3?"Adequado":"Em desenvolvimento");
  return {map:map,fez:fez,fluente:fluente,total:paradas.length,nivel:nivel};
}
function telaParecer(){
  limpa();
  var d=parecerDados();
  var t=el("div","tela parecer");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(30));
  var card=el("div","diploma");
  card.appendChild(el("div","selo",""));
  card.appendChild(el("h2","dtit","Mestre das Estrelas"));
  card.appendChild(el("div","dsub","Você acendeu o céu inteiro! Agora você sabe que multiplicar é juntar grupos iguais — e ainda ensinou a Fagulha."));
  card.appendChild(el("div","destrelas","&#9733; &#9733; &#9733; &#9733; &#9733;"));
  t.appendChild(card);
  var prof=el("div","profcard");
  var txt="<b>Para o professor</b> &#183; EF03MA07 (multiplicação)<br>";
  txt+="O estudante concluiu <b>"+d.fez+" de "+d.total+"</b> paradas de aprendizado. ";
  if(d.map.p1) txt+="Compreende a multiplicação como <b>grupos iguais</b>. ";
  if(d.map.p2) txt+="Reconhece a <b>disposição retangular (array)</b> como linhas × colunas, ligada à adição de parcelas iguais. ";
  if(d.map.p3) txt+="Percebeu a <b>comutatividade</b> (3×4 = 4×3). ";
  if(d.map.p4) txt+="Usou o <b>×10</b> como atalho. ";
  if(d.map.p5){ txt+="<b>Criou e resolveu</b> a própria constelação"; if(d.map.p5.corrigiu) txt+=" e <b>corrigiu</b> a mascote (efeito protégé)"; txt+="."; }
  txt+="<br>Fluência: <b>"+d.fluente+" de "+d.total+"</b> paradas sem tropeços. Nível sugerido: <b>"+d.nivel+"</b>.";
  txt+="<br><span class='pobs'>Parecer inicial, honesto e por indicadores. Registro local nesta sessão.</span>";
  prof.innerHTML=txt;
  t.appendChild(prof);
  var bar=el("div","p1barra"); bar.style.bottom="4%";
  var again=el("button","btn2","Jogar de novo"); again.onclick=function(){ progresso=0; fagPos=0; try{ localStorage.removeItem("estrelas_evid"); }catch(e){} telaCapa(); };
  bar.appendChild(again); t.appendChild(bar);
  app.appendChild(t);
}

telaCapa();
})();
