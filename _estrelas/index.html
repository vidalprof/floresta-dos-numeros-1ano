<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>A Fábrica de Estrelas — 3º ano</title>
<meta name="theme-color" content="#12163a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fábrica de Estrelas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ===== A Fábrica de Estrelas (fatia de teste, motion comic + PWA) =====
   Compat: sem grid/gap/var(--)/clamp; anima só transform/opacity; pares -webkit-. */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;overflow:hidden;
  background:#241a52;background:-webkit-linear-gradient(top,#181a44,#3a2b63);background:linear-gradient(to bottom,#181a44,#3a2b63);
  font-family:'Segoe UI',system-ui,Arial,sans-serif;color:#fff}
#app{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
.tela{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;opacity:1}
img{-webkit-user-drag:none;user-drag:none}

/* céu de fundo (parallax) */
.ceu{position:absolute;top:-5%;left:-5%;width:110%;height:110%;
  background:#12163a center/cover no-repeat;background-image:url('img/ceu_noite.jpg');
  -webkit-animation:derivaCeu 70s ease-in-out infinite alternate;animation:derivaCeu 70s ease-in-out infinite alternate}
@-webkit-keyframes derivaCeu{from{-webkit-transform:translate3d(0,0,0) scale(1.03)}to{-webkit-transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}
@keyframes derivaCeu{from{transform:translate3d(0,0,0) scale(1.03)}to{transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}

/* estrelinhas piscando */
.estrelas{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.pt{position:absolute;border-radius:50%;background:#fff;opacity:.25;box-shadow:0 0 6px 1px rgba(255,255,255,.8);
  -webkit-animation:cintila 4s ease-in-out infinite;animation:cintila 4s ease-in-out infinite}
@-webkit-keyframes cintila{0%,100%{opacity:.12;-webkit-transform:scale(.6)}50%{opacity:.95;-webkit-transform:scale(1.15)}}
@keyframes cintila{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:.95;transform:scale(1.15)}}

/* ---- FÁBRICA VIVA (glow + fumaças de estrela) ---- */
.fabviva{position:absolute}
.fabviva .fab{width:100%;height:auto;display:block;position:relative;z-index:1;
  -webkit-filter:drop-shadow(0 6px 16px rgba(0,0,0,.35));filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}
.fabviva .glow{position:absolute;left:-16%;top:-16%;width:132%;height:132%;border-radius:50%;z-index:0;
  background:radial-gradient(circle, rgba(255,205,110,.42), rgba(255,205,110,0) 62%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes pulsaGlow{0%,100%{opacity:.45;-webkit-transform:scale(1)}50%{opacity:.85;-webkit-transform:scale(1.07)}}
@keyframes pulsaGlow{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
.puff{position:absolute;width:15%;height:13%;border-radius:50%;z-index:2;opacity:0;
  background:radial-gradient(circle, rgba(255,244,205,.95), rgba(255,224,150,0) 70%);
  -webkit-animation:sobePuff 3s ease-out infinite;animation:sobePuff 3s ease-out infinite}
@-webkit-keyframes sobePuff{0%{opacity:0;-webkit-transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;-webkit-transform:translateY(-115%) scale(1.5)}}
@keyframes sobePuff{0%{opacity:0;transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;transform:translateY(-115%) scale(1.5)}}

/* ---- FAGULHA VIVA (balança + flutua + respira + reaçõezinhas) ---- */
.fag{position:absolute;width:26vh;max-width:200px}
.fagbob{-webkit-animation:bobSway 4.7s ease-in-out infinite;animation:bobSway 4.7s ease-in-out infinite}
@-webkit-keyframes bobSway{0%,100%{-webkit-transform:translateY(0) rotate(-1.6deg)}50%{-webkit-transform:translateY(-7px) rotate(1.6deg)}}
@keyframes bobSway{0%,100%{transform:translateY(0) rotate(-1.6deg)}50%{transform:translateY(-7px) rotate(1.6deg)}}
.fagwrap{-webkit-transform-origin:50% 100%;transform-origin:50% 100%;
  -webkit-animation:respira 4.2s ease-in-out infinite;animation:respira 4.2s ease-in-out infinite}
@-webkit-keyframes respira{0%,100%{-webkit-transform:translateY(0) scale(1,1)}50%{-webkit-transform:translateY(-1.4%) scale(1.018,.982)}}
@keyframes respira{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-1.4%) scale(1.018,.982)}}
.corpo-fag{position:relative;width:100%}
.corpo-fag .lay{position:absolute;top:0;left:0;width:100%;height:auto;display:block}
.corpo-fag .base{position:relative}
.corpo-fag .fala,.corpo-fag .pisca{opacity:0}
.fag.fidget .corpo-fag{-webkit-animation:fidget .6s ease;animation:fidget .6s ease}
@-webkit-keyframes fidget{0%{-webkit-transform:scale(1) rotate(0)}30%{-webkit-transform:scale(1.06) rotate(4deg)}60%{-webkit-transform:scale(1.01) rotate(-3deg)}100%{-webkit-transform:scale(1) rotate(0)}}
@keyframes fidget{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.06) rotate(4deg)}60%{transform:scale(1.01) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}

/* ---------- CAPA (medalhão) ---------- */
.capa .centro{position:absolute;top:0;left:0;right:0;bottom:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-box-pack:center;-webkit-box-align:center;
  -webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  text-align:center;padding:0 14px}
.capa .centro>*{max-width:100%}
.medalhao{width:62vw;max-width:260px;height:62vw;max-height:260px;margin:0 auto;border-radius:50%;
  overflow:hidden;border:7px solid #ffd75e;position:relative;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 22px rgba(0,0,0,.35);
  -webkit-animation:flutua 4.5s ease-in-out infinite;animation:flutua 4.5s ease-in-out infinite}
.medalhao .mceu{position:absolute;top:-10%;left:-10%;width:120%;height:120%;background:url('img/ceu_noite.jpg') center/cover}
.medalhao .mfab{position:absolute;bottom:2%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);width:66%}
.medalhao .mglow{position:absolute;left:20%;top:22%;width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle, rgba(255,205,110,.5), rgba(255,205,110,0) 60%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes flutua{0%,100%{-webkit-transform:translateY(0)}50%{-webkit-transform:translateY(-9px)}}
@keyframes flutua{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
h1.titulo{font-size:22px;line-height:1.12;margin:14px 8px 2px;color:#ffe08a;text-shadow:0 2px 0 #7a5200,0 0 18px rgba(255,200,80,.5)}
.sub{font-size:14px;color:#cdd3ff;margin-bottom:14px}
.btn{display:inline-block;border:0;cursor:pointer;font-family:inherit;font-weight:800;color:#5a3b00;max-width:94%;
  background:-webkit-linear-gradient(top,#ffe27a,#ffc23c);background:linear-gradient(to bottom,#ffe27a,#ffc23c);
  padding:14px 26px;font-size:18px;border-radius:30px;box-shadow:0 5px 0 #c8871a,0 8px 18px rgba(0,0,0,.4)}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);box-shadow:0 2px 0 #c8871a}
.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.05)}}
@keyframes pulsa{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.capa .fagacena{position:absolute;bottom:1vh;right:0;width:22vh;max-width:132px}
.capa .fagacena img{width:100%;height:auto;display:block}
@media (min-width:480px){ h1.titulo{font-size:30px} .sub{font-size:15px} .btn{font-size:20px;padding:15px 30px} }
@media (min-width:760px){ h1.titulo{font-size:36px} }

/* ---------- ABERTURA ---------- */
.palco{position:absolute;top:0;left:0;right:0;bottom:0;
  -webkit-animation:pushin 15s ease-out both;animation:pushin 15s ease-out both}
@-webkit-keyframes pushin{from{-webkit-transform:scale(1)}to{-webkit-transform:scale(1.1)}}
@keyframes pushin{from{transform:scale(1)}to{transform:scale(1.1)}}
.abertura .fabviva{left:50%;bottom:22%;width:44vh;max-width:340px;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  -webkit-animation:sobeFab 1.2s ease-out both;animation:sobeFab 1.2s ease-out both}
@-webkit-keyframes sobeFab{from{opacity:0;-webkit-transform:translate(-50%,26px) scale(.9)}to{opacity:1;-webkit-transform:translate(-50%,0) scale(1)}}
@keyframes sobeFab{from{opacity:0;transform:translate(-50%,26px) scale(.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
.abertura .fag{left:6%;bottom:7%;-webkit-animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both;animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both}
@-webkit-keyframes entraFag{0%{opacity:0;-webkit-transform:translateX(-46px)}70%{opacity:1;-webkit-transform:translateX(6px)}100%{opacity:1;-webkit-transform:translateX(0)}}
@keyframes entraFag{0%{opacity:0;transform:translateX(-46px)}70%{opacity:1;transform:translateX(6px)}100%{opacity:1;transform:translateX(0)}}
.legenda{position:absolute;left:50%;bottom:5%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  width:92%;max-width:640px;text-align:center;font-size:18px;line-height:1.4;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.95);min-height:3.2em}
.pular{position:absolute;top:12px;right:12px;font-size:13px;color:#dfe3ff;background:rgba(0,0,0,.4);border:0;border-radius:16px;padding:8px 15px;cursor:pointer}

/* ---------- MAPA ---------- */
.mapa .topo{position:absolute;top:0;left:0;right:0;padding:12px 14px;text-align:center;z-index:5;
  background:-webkit-linear-gradient(top,rgba(6,8,30,.82),rgba(6,8,30,0));background:linear-gradient(to bottom,rgba(6,8,30,.82),rgba(6,8,30,0))}
.mapa .topo b{color:#ffe08a;font-size:16px}
.no{position:absolute;width:13vh;max-width:88px}
.no img{width:100%;height:auto;display:block;-webkit-filter:drop-shadow(0 0 10px rgba(255,220,120,.7));filter:drop-shadow(0 0 10px rgba(255,220,120,.7))}
.no.futuro img{-webkit-filter:grayscale(1) brightness(.5);filter:grayscale(1) brightness(.5);opacity:.6}
.no.atual{-webkit-animation:farol 1.2s ease-in-out infinite;animation:farol 1.2s ease-in-out infinite}
@-webkit-keyframes farol{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.13)}}
@keyframes farol{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
.mapa .fag{right:5%;bottom:8%}
.dica{position:absolute;left:50%;bottom:3%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  font-size:15px;font-style:italic;color:#ffe9a8;text-shadow:0 0 10px rgba(255,200,80,.5);text-align:center;width:90%;
  -webkit-animation:respiraDica 2.6s ease-in-out infinite;animation:respiraDica 2.6s ease-in-out infinite}
@-webkit-keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}

@media (prefers-reduced-motion: reduce){
  .fagbob,.fagwrap,.pulsa,.medalhao,.puff,.pt,.ceu,.no.atual,.dica,.fabviva .glow,.medalhao .mglow{
    -webkit-animation:none!important;animation:none!important}
}
</style>
</head>
<body>
<div id="app"></div>
<audio id="narr" preload="auto"></audio>
<script>
(function(){
"use strict";
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
var app=document.getElementById("app");
var narr=document.getElementById("narr");
var reduz = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---- FALAR: toca a voz do Antônio (MP3 direto, robusto no celular) ---- */
var falandoCb=null, bocaAlvo=0, bocaSuave=0, falaTimer=0;
function falar(id, cb){
  falandoCb=cb||null;
  try{ narr.pause(); narr.currentTime=0; }catch(e){}
  narr.src="audio/"+id+".mp3";
  var p=narr.play();
  if(p && p["catch"]){ p["catch"](function(){ /* sem áudio: segue mesmo assim */ }); }
  iniciaBoca();
}
function fimFala(){ paraBoca(); var c=falandoCb; falandoCb=null; if(c){ c(); } }
narr.addEventListener("ended", fimFala);
function iniciaBoca(){
  if(reduz) return;
  if(falaTimer) clearInterval(falaTimer);
  bocaAlvo=0.6;
  falaTimer=setInterval(function(){
    if(narr.paused||narr.ended){ bocaAlvo=0; }
    else { bocaAlvo = 0.15 + Math.random()*0.8; }
  }, 95);
}
function paraBoca(){ if(falaTimer){clearInterval(falaTimer);falaTimer=0;} bocaAlvo=0; }

/* ---- LOOP único (só boca) ---- */
var fagAtual=null;
function loop(){
  if(fagAtual && fagAtual.fala){
    bocaSuave += (bocaAlvo-bocaSuave)*0.4;
    fagAtual.fala.style.opacity=bocaSuave.toFixed(3);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* piscar + fidget */
function agendaPisca(){
  if(reduz) return;
  setTimeout(function(){
    if(fagAtual && fagAtual.pisca){
      fagAtual.pisca.style.opacity="1";
      setTimeout(function(){ if(fagAtual&&fagAtual.pisca) fagAtual.pisca.style.opacity="0"; },130);
      if(Math.random()<0.16){ setTimeout(function(){ if(fagAtual&&fagAtual.pisca){fagAtual.pisca.style.opacity="1";
        setTimeout(function(){ if(fagAtual&&fagAtual.pisca) fagAtual.pisca.style.opacity="0"; },120);} },300); }
    }
    agendaPisca();
  }, 3200+Math.random()*4200);
}
agendaPisca();
function agendaFidget(){
  if(reduz) return;
  setTimeout(function(){
    if(fagAtual && fagAtual.el){ fagAtual.el.className="fag fidget"+(fagAtual.extra||"");
      setTimeout(function(){ if(fagAtual&&fagAtual.el) fagAtual.el.className="fag"+(fagAtual.extra||""); },650); }
    agendaFidget();
  }, 6000+Math.random()*6000);
}
agendaFidget();

/* ---- helpers ---- */
function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function fagViva(extraCls){
  var fag=el("div","fag"+(extraCls||""));
  var bob=el("div","fagbob"); var wrap=el("div","fagwrap"); var corpo=el("div","corpo-fag");
  var base=el("img","lay base"); base.src="img/fagulha.png"; base.alt="Fagulha";
  var fala=el("img","lay fala"); fala.src="img/fagulha_fala.png"; fala.alt="";
  var pisca=el("img","lay pisca"); pisca.src="img/fagulha_pisca.png"; pisca.alt="";
  corpo.appendChild(base); corpo.appendChild(fala); corpo.appendChild(pisca);
  wrap.appendChild(corpo); bob.appendChild(wrap); fag.appendChild(bob);
  fagAtual={el:fag,extra:(extraCls||""),fala:fala,pisca:pisca};
  return fag;
}
function fabViva(){
  var f=el("div","fabviva");
  f.appendChild(el("div","glow"));
  var img=el("img","fab"); img.src="img/fabrica_estrelas.png"; img.alt="Fábrica de Estrelas"; f.appendChild(img);
  var posp=[[36,4,0],[47,1,.6],[57,5,1.2],[41,3,1.8],[52,2,2.4]]; var i;
  for(i=0;i<posp.length;i++){
    var pf=el("div","puff"); pf.style.left=posp[i][0]+"%"; pf.style.top=posp[i][1]+"%";
    pf.style.webkitAnimationDelay=posp[i][2]+"s"; pf.style.animationDelay=posp[i][2]+"s";
    f.appendChild(pf);
  }
  return f;
}
function campoEstrelas(qtd){
  var c=el("div","estrelas"); var i;
  for(i=0;i<qtd;i++){
    var p=el("div","pt");
    p.style.left=(Math.random()*100).toFixed(2)+"%"; p.style.top=(Math.random()*70).toFixed(2)+"%";
    var d=(2.6+Math.random()*4).toFixed(2); p.style.webkitAnimationDuration=d+"s"; p.style.animationDuration=d+"s";
    var de=(-Math.random()*4).toFixed(2); p.style.webkitAnimationDelay=de+"s"; p.style.animationDelay=de+"s";
    var s=(2+Math.random()*3).toFixed(1); p.style.width=s+"px"; p.style.height=s+"px";
    c.appendChild(p);
  }
  return c;
}
function telaCheia(){
  var e=document.documentElement, fn=e.requestFullscreen||e.webkitRequestFullscreen||e.msRequestFullscreen;
  if(fn){ try{ fn.call(e); }catch(x){} }
}

/* ================= TELAS ================= */
function limpa(){ fagAtual=null; app.innerHTML=""; }

function telaCapa(){
  limpa();
  var t=el("div","tela capa");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(38));
  var c=el("div","centro");
  var med=el("div","medalhao");
  med.appendChild(el("div","mceu"));
  var mf=el("img","mfab"); mf.src="img/fabrica_estrelas.png"; med.appendChild(mf);
  med.appendChild(el("div","mglow"));
  c.appendChild(med);
  c.appendChild(el("h1","titulo","A Fábrica de Estrelas"));
  c.appendChild(el("div","sub","Multiplicação &#183; 3º ano"));
  var b=el("button","btn pulsa","Começar a aventura");
  b.onclick=function(){ telaCheia(); telaAbertura(); };
  c.appendChild(b);
  t.appendChild(c);
  var fa=el("div","fagacena"); var fai=el("img"); fai.src="img/fagulha_acena.png"; fai.alt="Fagulha"; fa.appendChild(fai);
  t.appendChild(fa);
  app.appendChild(t);
}

function telaAbertura(){
  limpa();
  var t=el("div","tela abertura");
  var palco=el("div","palco");
  palco.appendChild(el("div","ceu")); palco.appendChild(campoEstrelas(46));
  palco.appendChild(fabViva());
  palco.appendChild(fagViva());
  t.appendChild(palco);
  var leg=el("div","legenda",""); t.appendChild(leg);
  var pular=el("button","pular","pular &#9654;"); pular.onclick=function(){ try{narr.pause();}catch(e){} fimFala(); }; t.appendChild(pular);
  app.appendChild(t);
  var texto="Oi! Que bom que você chegou! Aqui é a Fábrica de Estrelas, e eu sou a Fagulha. Olha só o céu: está todo escuro e vazio. Será que você vem comigo encher esse céu de estrelas? Vem, vai ser incrível!";
  falar("abertura", function(){ telaMapa(); });
  legendaSync(leg, texto);
}
function legendaSync(leg, texto){
  var total=texto.length, i=0;
  function tick(){
    if(narr.ended){ leg.innerHTML=texto; return; }
    var dur=narr.duration||9; var frac=Math.min(1,(narr.currentTime||0)/(dur*0.96));
    var n=Math.floor(frac*total); if(n>i){ i=n; leg.innerHTML=texto.substring(0,i); }
    if(i<total){ requestAnimationFrame(tick); } else { leg.innerHTML=texto; }
  }
  requestAnimationFrame(tick);
}

function telaMapa(){
  limpa();
  var t=el("div","tela mapa");
  t.appendChild(el("div","ceu")); t.appendChild(campoEstrelas(52));
  t.appendChild(el("div","topo","<b>A jornada da Fagulha</b> &#183; encha o céu de estrelas!"));
  var fv=fabViva(); fv.style.left="50%"; fv.style.top="15%"; fv.style.width="30vh"; fv.style.maxWidth="220px";
  fv.style.webkitTransform="translateX(-50%)"; fv.style.transform="translateX(-50%)"; t.appendChild(fv);
  var pos=[[22,58,"atual"],[50,70,"futuro"],[76,56,"futuro"]]; var k;
  for(k=0;k<pos.length;k++){
    var no=el("div","no "+pos[k][2]); no.style.left=pos[k][0]+"%"; no.style.top=pos[k][1]+"%";
    var im=el("img"); im.src="img/estrela_grande.png"; no.appendChild(im); t.appendChild(no);
  }
  t.appendChild(fagViva());
  t.appendChild(el("div","dica","Toque na estrela que está brilhando para começar a primeira parada."));
  app.appendChild(t);
}

telaCapa();
})();
</script>
</body>
</html>
