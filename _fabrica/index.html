      function box (msg) {
        var d = document.getElementById('erroBox') || document.createElement('pre');
        d.id = 'erroBox';
        d.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;background:#5b1111;color:#fff;padding:10px;z-index:99999;font-size:12px;white-space:pre-wrap;border-radius:10px;font-family:monospace';

        if (!d.parentNode) document.body.appendChild(d);
      }
      window.addEventListener('error', function (e) { box((e.message || e.type || '?') + '\n' + (e.filename || '') + ' linha ' + (e.lineno || '?')); });
      window.addEventListener('unhandledrejection', function (e) { box('promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)); });
    })();
    window.__BOOT = "fabrica";
  </script>
