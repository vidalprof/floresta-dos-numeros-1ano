<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teste 2D lindo e VIVO — conte os cocos</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,Arial;
    background:radial-gradient(circle at 50% 30%,#8fd4ef,#4fb0dd)}
  #palco{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  /* a ILHA "respira" (vida sutil no mundo todo) */
  #ilha{position:relative;width:min(94vw,94vh);height:min(94vw,94vh);
    background:url(img/cena.png) center/contain no-repeat;animation:respira 6.5s ease-in-out infinite}
  @keyframes respira{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
  #ilha img{position:absolute;pointer-events:none;filter:drop-shadow(0 6px 6px rgba(0,40,60,.28))}
  /* cocos: balançam e giram de leve (vivos) */
  .coco{cursor:pointer;pointer-events:auto!important;transform-origin:50% 90%;
    transition:transform .3s cubic-bezier(.2,1.4,.5,1),opacity .3s ease;animation:bob 2.6s ease-in-out infinite}
  .coco:active{transform:scale(.92)}
  .coco.pego{transform:scale(1.8) translateY(-46px) rotate(28deg);opacity:0}
  @keyframes bob{0%,100%{margin-top:0;rotate:-3deg}50%{margin-top:-8px;rotate:3deg}}
  /* Byte: idle vivo (pula e inclina) + reação ao acertar */
  #byte{width:15%;left:43%;top:30%;transform-origin:50% 100%;animation:byteIdle 2.1s ease-in-out infinite}
  @keyframes byteIdle{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-11px) rotate(2.5deg)}}
  #byte.pulo{animation:bytePulo .5s ease}
  @keyframes bytePulo{0%{transform:translateY(0) scale(1)}35%{transform:translateY(-46px) scale(1.14) rotate(-6deg)}100%{transform:translateY(0) scale(1)}}
  #barco{width:20%;left:14%;top:72%;transform-origin:50% 90%;animation:barco 3.6s ease-in-out infinite}
  @keyframes barco{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-5px)}}
  #hud{position:fixed;left:50%;top:12px;transform:translateX(-50%);z-index:9;
    background:rgba(120,72,20,.94);color:#ffe9b0;font:800 20px system-ui;padding:8px 18px;border-radius:14px;border:2px solid #ffd27a}
  #num{position:fixed;left:50%;top:32%;transform:translate(-50%,-50%);z-index:10;pointer-events:none;
    font:900 130px system-ui;color:#ffd24a;-webkit-text-stroke:5px #a85f0f;opacity:0;text-shadow:0 8px 22px rgba(0,0,0,.4)}
  #num.go{animation:pop 1s ease-out}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-64%) scale(1)}}
  #balao{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:9;max-width:min(420px,88vw);
    background:rgba(255,255,255,.96);color:#173a52;font:600 15px system-ui;padding:11px 16px;border-radius:15px;
    border:2px solid #2f9d6b;box-shadow:0 6px 18px rgba(0,0,0,.22);text-align:center}
  #balao b{color:#1f9d6b}
  .conf{position:fixed;width:12px;height:12px;border-radius:3px;z-index:11;pointer-events:none}
  .plus{position:fixed;z-index:11;pointer-events:none;font:900 40px system-ui;color:#fff;-webkit-text-stroke:2px #d98b1e;text-shadow:0 3px 6px rgba(0,0,0,.35)}
  /* brilhos/vagalumes flutuando (vida ambiente) */
  .spark{position:fixed;width:11px;height:11px;border-radius:50%;pointer-events:none;z-index:8;
    background:radial-gradient(circle,#fff,#ffe98a 60%,rgba(255,233,138,0));opacity:.0}
</style>
</head><body>
<div id="hud">🥥 <span id="c">0</span>/6</div>
<div id="num"></div>
<div id="palco"><div id="ilha">
  <img id="barco" src="img/barco.png" alt="barco">
  <img id="byte" src="img/byte.png" alt="Byte">
</div></div>
<div id="balao"><b>Byte 🦜:</b> <span id="fala">Ôa, grumete! O coqueiro deixou cair uns cocos… toca em cada um pra contar!</span></div>
<script>
  var ilha=document.getElementById('ilha'),byte=document.getElementById('byte');
  var POS=[[36,44],[58,42],[30,57],[67,56],[43,64],[57,66]];   // dado: onde ficam os cocos (%)
  var total=POS.length,contados=0;
  var cEl=document.getElementById('c'),numEl=document.getElementById('num'),falaEl=document.getElementById('fala');
  POS.forEach(function(p,i){
    var im=document.createElement('img');im.src='img/coco.png';im.className='coco';
    im.style.width='9%';im.style.left=p[0]+'%';im.style.top=p[1]+'%';im.style.animationDelay=(i*0.32)+'s';
    im.addEventListener('click',function(){pega(im);});
    ilha.appendChild(im);
  });
  function pega(im){
    if(im.dataset.done)return;im.dataset.done='1';
    contados++;cEl.textContent=contados;
    mostraNum(contados);confete(im);maisUm(im);
    byte.classList.remove('pulo');void byte.offsetWidth;byte.classList.add('pulo');   // o Byte PULA de alegria
    im.classList.add('pego');setTimeout(function(){im.style.display='none';},320);
    falaEl.textContent=(contados>=total)?'Seis cocos! Contamos TODOS, arrá! 🎉':'Isso! Já são '+contados+'…';
  }
  function mostraNum(n){numEl.textContent=n;numEl.classList.remove('go');void numEl.offsetWidth;numEl.classList.add('go');}
  function maisUm(im){var r=im.getBoundingClientRect();var d=document.createElement('div');d.className='plus';d.textContent='+1';
    d.style.left=(r.left+r.width/2-14)+'px';d.style.top=(r.top)+'px';document.body.appendChild(d);
    d.animate([{transform:'translateY(0)',opacity:1},{transform:'translateY(-70px)',opacity:0}],{duration:900,easing:'ease-out'});
    setTimeout(function(){d.remove();},950);}
  function confete(im){
    var r=im.getBoundingClientRect();var cx=r.left+r.width/2,cy=r.top+r.height/2;
    var cores=['#ffd24a','#59c6e0','#e25a4a','#8ed36b','#f2a626'];
    for(var i=0;i<14;i++){(function(i){
      var d=document.createElement('div');d.className='conf';d.style.background=cores[i%5];
      d.style.left=cx+'px';d.style.top=cy+'px';document.body.appendChild(d);
      var ang=(i/14)*6.28,dist=60+Math.random()*80,dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist-40;
      d.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
                 {transform:'translate('+dx+'px,'+(dy+140)+'px) rotate(400deg)',opacity:0}],
                {duration:850+Math.random()*350,easing:'cubic-bezier(.2,.6,.3,1)'});
      setTimeout(function(){d.remove();},1250);
    })(i);}
  }
  // brilhos/vagalumes flutuando o tempo todo (vida ambiente, custo zero)
  function sparks(){for(var i=0;i<9;i++){(function(i){
    var s=document.createElement('div');s.className='spark';document.body.appendChild(s);
    function voa(){var x=innerWidth*(0.28+Math.random()*0.44),y=innerHeight*(0.28+Math.random()*0.4);
      s.style.left=x+'px';s.style.top=y+'px';
      s.animate([{opacity:0,transform:'translateY(0) scale(.6)'},{opacity:.85,transform:'translateY(-16px) scale(1)'},{opacity:0,transform:'translateY(-34px) scale(.6)'}],
        {duration:2600+Math.random()*1800,easing:'ease-in-out'});
      setTimeout(voa,2400+Math.random()*2200);}
    setTimeout(voa,i*380);
  })(i);}}
  sparks();
  window.__pega=function(i){var c=document.querySelectorAll('.coco')[i];if(c)pega(c);};
  window.__cont=function(){return contados;};
</script>
</body></html>
