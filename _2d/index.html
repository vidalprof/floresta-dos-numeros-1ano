<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ilha dos Cocos — ANDA e explora (2D)</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,Arial;
    background:radial-gradient(circle at 50% 30%,#8fd4ef,#4fb0dd)}
  #palco{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #ilha{position:relative;width:min(94vw,94vh);height:min(94vw,94vh);
    background:url(img/cena.png) center/contain no-repeat;animation:respira 6.5s ease-in-out infinite;cursor:pointer}
  @keyframes respira{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
  #ilha img{position:absolute;pointer-events:none;filter:drop-shadow(0 6px 6px rgba(0,40,60,.28))}
  .coco{transform-origin:50% 100%;transition:transform .3s cubic-bezier(.2,1.4,.5,1),opacity .3s ease;animation:bob 2.6s ease-in-out infinite}
  .coco.pego{transform:translate(-50%,-100%) scale(1.8) rotate(26deg)!important;opacity:0}
  @keyframes bob{0%,100%{margin-top:0}50%{margin-top:-7px}}
  #byte{z-index:5;transition:none}
  #barco{width:19%;left:12%;top:74%;transform-origin:50% 90%;animation:barco 3.6s ease-in-out infinite}
  @keyframes barco{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-5px)}}
  #alvo{position:absolute;width:5%;height:5%;border:3px solid rgba(255,255,255,.85);border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;opacity:0;z-index:4}
  #alvo.on{animation:ping .5s ease-out}
  @keyframes ping{0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.6)}}
  #hud{position:fixed;left:50%;top:12px;transform:translateX(-50%);z-index:9;
    background:rgba(120,72,20,.94);color:#ffe9b0;font:800 20px system-ui;padding:8px 18px;border-radius:14px;border:2px solid #ffd27a}
  #num{position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);z-index:10;pointer-events:none;
    font:900 128px system-ui;color:#ffd24a;-webkit-text-stroke:5px #a85f0f;opacity:0;text-shadow:0 8px 22px rgba(0,0,0,.4)}
  #num.go{animation:pop 1s ease-out}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-62%) scale(1)}}
  #balao{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9;max-width:min(440px,90vw);
    background:rgba(255,255,255,.96);color:#173a52;font:600 15px system-ui;padding:11px 16px;border-radius:15px;
    border:2px solid #2f9d6b;box-shadow:0 6px 18px rgba(0,0,0,.22);text-align:center}
  #balao b{color:#1f9d6b}
  .conf{position:fixed;width:12px;height:12px;border-radius:3px;z-index:11;pointer-events:none}
  .plus{position:fixed;z-index:11;pointer-events:none;font:900 38px system-ui;color:#fff;-webkit-text-stroke:2px #d98b1e;text-shadow:0 3px 6px rgba(0,0,0,.35)}
  .spark{position:fixed;width:11px;height:11px;border-radius:50%;pointer-events:none;z-index:2;
    background:radial-gradient(circle,#fff,#ffe98a 60%,rgba(255,233,138,0));opacity:0}
</style>
</head><body>
<div id="hud">🥥 <span id="c">0</span>/8</div>
<div id="num"></div>
<div id="palco"><div id="ilha">
  <img id="barco" src="img/barco.png" alt="barco">
  <div id="alvo"></div>
  <img id="byte" src="img/byte.png" alt="Byte">
</div></div>
<div id="balao"><b>Byte 🦜:</b> <span id="fala">Toque na ilha pra eu ANDAR — vamos achar os cocos e contar!</span></div>
<script>
  var ilha=document.getElementById('ilha'),byte=document.getElementById('byte'),alvo=document.getElementById('alvo');
  var cEl=document.getElementById('c'),numEl=document.getElementById('num'),falaEl=document.getElementById('fala');
  // área andável (elipse da grama+areia, em % da ilha)
  var EX=50,EZ=55,RX=30,RZ=25;
  function dentro(x,z){var dx=(x-EX)/RX,dz=(z-EZ)/RZ;return dx*dx+dz*dz<=1;}
  function clampElipse(x,z){var dx=(x-EX)/RX,dz=(z-EZ)/RZ,d=Math.sqrt(dx*dx+dz*dz);if(d<=1)return[x,z];return[EX+dx/d*RX,EZ+dz/d*RZ];}
  // Byte (pés no ponto x,z em %); largura ~13% da ilha
  var BW=13;byte.style.width=BW+'%';
  var bx=50,bz=52,tx=50,tz=52,indo=false,dir=1,tt=0;
  function poeByte(){byte.style.left=bx+'%';byte.style.top=bz+'%';}
  poeByte();
  // cocos espalhados (explorar pra achar)
  var COCOS=[[38,42],[63,40],[30,55],[71,52],[42,66],[59,67],[50,45],[34,67]];
  var total=COCOS.length,contados=0,itens=[];
  COCOS.forEach(function(p,i){
    var im=document.createElement('img');im.src='img/coco.png';im.className='coco';im.style.width='8.5%';
    im.style.left=p[0]+'%';im.style.top=p[1]+'%';im.style.transform='translate(-50%,-100%)';im.style.animationDelay=(i*0.3)+'s';
    ilha.appendChild(im);itens.push({el:im,x:p[0],z:p[1],done:false});
  });
  // ANDAR: toca na ilha -> o Byte caminha até lá (tap-to-move) + WASD
  ilha.addEventListener('pointerdown',function(e){
    var r=ilha.getBoundingClientRect();var x=(e.clientX-r.left)/r.width*100,z=(e.clientY-r.top)/r.height*100;
    var c=clampElipse(x,z);tx=c[0];tz=c[1];indo=true;
    alvo.style.left=tx+'%';alvo.style.top=tz+'%';alvo.classList.remove('on');void alvo.offsetWidth;alvo.classList.add('on');
  });
  var keys={};addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;});addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  function coleta(it){if(it.done)return;it.done=true;contados++;cEl.textContent=contados;
    mostraNum(contados);confete(it.el);maisUm(it.el);
    byte.classList.remove('feliz');void byte.offsetWidth;byte.dataset.feliz=Date.now();
    it.el.classList.add('pego');setTimeout(function(){it.el.style.display='none';},320);
    falaEl.textContent=(contados>=total)?'Achamos TODOS os cocos — são 8! Arrá! 🎉':'Boa! Já são '+contados+'… vamos achar mais!';
  }
  function mostraNum(n){numEl.textContent=n;numEl.classList.remove('go');void numEl.offsetWidth;numEl.classList.add('go');}
  function maisUm(el){var r=el.getBoundingClientRect();var d=document.createElement('div');d.className='plus';d.textContent='+1';
    d.style.left=(r.left+r.width/2-12)+'px';d.style.top=r.top+'px';document.body.appendChild(d);
    d.animate([{transform:'translateY(0)',opacity:1},{transform:'translateY(-64px)',opacity:0}],{duration:900,easing:'ease-out'});
    setTimeout(function(){d.remove();},950);}
  function confete(el){var r=el.getBoundingClientRect();var cx=r.left+r.width/2,cy=r.top+r.height/2;var cores=['#ffd24a','#59c6e0','#e25a4a','#8ed36b','#f2a626'];
    for(var i=0;i<14;i++){(function(i){var d=document.createElement('div');d.className='conf';d.style.background=cores[i%5];
      d.style.left=cx+'px';d.style.top=cy+'px';document.body.appendChild(d);
      var ang=(i/14)*6.28,dist=55+Math.random()*80,dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist-40;
      d.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:'translate('+dx+'px,'+(dy+130)+'px) rotate(400deg)',opacity:0}],{duration:850+Math.random()*350,easing:'cubic-bezier(.2,.6,.3,1)'});
      setTimeout(function(){d.remove();},1250);})(i);}}
  // brilhos ambiente
  (function sparks(){for(var i=0;i<8;i++){(function(i){var s=document.createElement('div');s.className='spark';document.body.appendChild(s);
    function voa(){s.style.left=(innerWidth*(0.3+Math.random()*0.4))+'px';s.style.top=(innerHeight*(0.3+Math.random()*0.36))+'px';
      s.animate([{opacity:0,transform:'translateY(0) scale(.6)'},{opacity:.85,transform:'translateY(-15px) scale(1)'},{opacity:0,transform:'translateY(-32px) scale(.6)'}],{duration:2600+Math.random()*1600,easing:'ease-in-out'});
      setTimeout(voa,2200+Math.random()*2000);}setTimeout(voa,i*360);})(i);}})();
  // LOOP: movimento suave + coleta por proximidade
  var last=performance.now();
  function loop(now){var dt=Math.min(0.05,(now-last)/1000);last=now;tt+=dt;
    var vx=0,vz=0;
    if(keys['arrowleft']||keys['a'])vx-=1;if(keys['arrowright']||keys['d'])vx+=1;
    if(keys['arrowup']||keys['w'])vz-=1;if(keys['arrowdown']||keys['s'])vz+=1;
    var usandoTecla=vx||vz;
    if(usandoTecla){indo=false;var n=Math.hypot(vx,vz);vx/=n;vz/=n;}
    else if(indo){var ddx=tx-bx,ddz=tz-bz,dd=Math.hypot(ddx,ddz);if(dd<0.6){indo=false;}else{vx=ddx/dd;vz=ddz/dd;}}
    var mexendo=vx||vz;
    if(mexendo){var sp=26*dt;var nx=bx+vx*sp,nz=bz+vz*sp;var c=clampElipse(nx,nz);bx=c[0];bz=c[1];if(vx)dir=vx<0?-1:1;}
    // bob de caminhada / idle
    var hop=mexendo?Math.abs(Math.sin(tt*11))*3.2:Math.sin(tt*2.2)*1.2;
    var lean=mexendo?(dir*4):0;
    var feliz=byte.dataset.feliz&&(Date.now()-byte.dataset.feliz<420);
    var extra=feliz?' scale(1.12)':'';
    byte.style.transform='translate(-50%,-100%) translateY('+(-hop)+'px) rotate('+lean+'deg) scaleX('+dir+')'+extra;
    poeByte();
    // coleta ao chegar perto
    for(var i=0;i<itens.length;i++){var it=itens[i];if(!it.done){var d=Math.hypot(it.x-bx,it.z-bz);if(d<7.5)coleta(it);}}
    requestAnimationFrame(loop);}
  requestAnimationFrame(loop);
  // QA
  window.__andar=function(x,z){var c=clampElipse(x,z);tx=c[0];tz=c[1];indo=true;};
  window.__pos=function(){return [Math.round(bx),Math.round(bz)];};
  window.__cont=function(){return contados;};
  window.__falta=function(){return itens.filter(function(i){return !i.done;}).map(function(i){return[i.x,i.z];});};
</script>
</body></html>
