<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>NÚMEROS ARCADE — Capa</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; }
body {
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  color: #eafcff;
  background-color: #05030f;
  background-image:
    -webkit-radial-gradient(50% 8%, circle, #241146 0%, rgba(36,17,70,0) 55%),
    -webkit-radial-gradient(50% 120%, ellipse, #0a1b3a 0%, rgba(10,27,58,0) 60%),
    -webkit-linear-gradient(top, #070417 0%, #0a0620 45%, #05030f 100%);
  background-image:
    radial-gradient(circle at 50% 8%, #241146 0%, rgba(36,17,70,0) 55%),
    radial-gradient(ellipse at 50% 120%, #0a1b3a 0%, rgba(10,27,58,0) 60%),
    linear-gradient(to bottom, #070417 0%, #0a0620 45%, #05030f 100%);
  min-height: 100vh;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  padding: 22px 12px;
  overflow-x: hidden;
}
.floorgrid {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 46%;
  z-index: 0;
  pointer-events: none;
  background-color: transparent;
  background-image:
    -webkit-repeating-linear-gradient(left, rgba(255,45,175,0.16) 0, rgba(255,45,175,0.16) 2px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 34px),
    -webkit-repeating-linear-gradient(top, rgba(0,240,255,0.14) 0, rgba(0,240,255,0.14) 2px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 34px);
  background-image:
    repeating-linear-gradient(to right, rgba(255,45,175,0.16) 0, rgba(255,45,175,0.16) 2px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 34px),
    repeating-linear-gradient(to bottom, rgba(0,240,255,0.14) 0, rgba(0,240,255,0.14) 2px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 34px);
  -webkit-transform: perspective(320px) rotateX(62deg);
  transform: perspective(320px) rotateX(62deg);
  -webkit-transform-origin: center bottom;
  transform-origin: center bottom;
  -webkit-mask-image: -webkit-linear-gradient(top, rgba(0,0,0,0) 0%, #000 65%);
  opacity: 0.9;
}
.stars { position: fixed; left:0; top:0; right:0; bottom:0; z-index:0; pointer-events:none; }
.star {
  position: absolute;
  color: #cfe9ff;
  font-size: 11px;
  opacity: 0.5;
  text-shadow: 0 0 6px #7fd3ff;
  -webkit-animation: twinkle 3.2s ease-in-out infinite;
  animation: twinkle 3.2s ease-in-out infinite;
}
.s1{ left:9%;  top:12%; }
.s2{ left:82%; top:9%;  font-size:9px;  -webkit-animation-delay:.7s; animation-delay:.7s; }
.s3{ left:26%; top:6%;  font-size:8px;  -webkit-animation-delay:1.4s; animation-delay:1.4s; }
.s4{ left:70%; top:22%; -webkit-animation-delay:.4s; animation-delay:.4s; }
.s5{ left:92%; top:34%; font-size:9px; -webkit-animation-delay:2s; animation-delay:2s; }
.s6{ left:5%;  top:38%; font-size:9px; -webkit-animation-delay:1.1s; animation-delay:1.1s; }
@-webkit-keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:.8} }
@keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:.8} }
.cabinet {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 430px;
}
.frame {
  position: relative;
  border-radius: 26px;
  padding: 10px;
  background-color: #12131c;
  background-image:
    -webkit-linear-gradient(top, #3a3d52 0%, #14151f 12%, #0c0d15 50%, #14151f 88%, #3a3d52 100%);
  background-image:
    linear-gradient(to bottom, #3a3d52 0%, #14151f 12%, #0c0d15 50%, #14151f 88%, #3a3d52 100%);
  -webkit-box-shadow:
    0 0 0 2px #4a4d63,
    0 18px 42px rgba(0,0,0,0.65),
    0 0 60px rgba(255,45,175,0.22),
    0 0 90px rgba(0,240,255,0.14);
  box-shadow:
    0 0 0 2px #4a4d63,
    0 18px 42px rgba(0,0,0,0.65),
    0 0 60px rgba(255,45,175,0.22),
    0 0 90px rgba(0,240,255,0.14);
}
.topbar {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  padding: 4px 0 10px 0;
}
.knob {
  width: 14px; height: 14px;
  border-radius: 50%;
  margin: 0 6px;
  background-color: #ff2daf;
  background-image: -webkit-radial-gradient(35% 30%, circle, #ffffff 0%, #ff2daf 45%, #7a1258 100%);
  background-image: radial-gradient(circle at 35% 30%, #ffffff 0%, #ff2daf 45%, #7a1258 100%);
  -webkit-box-shadow: 0 0 8px rgba(255,45,175,0.8);
  box-shadow: 0 0 8px rgba(255,45,175,0.8);
}
.knob.cy { background-color:#00f0ff; background-image:-webkit-radial-gradient(35% 30%, circle, #ffffff 0%, #00f0ff 45%, #06596b 100%); background-image:radial-gradient(circle at 35% 30%, #ffffff 0%, #00f0ff 45%, #06596b 100%); -webkit-box-shadow:0 0 8px rgba(0,240,255,0.8); box-shadow:0 0 8px rgba(0,240,255,0.8); }
.knob.yl { background-color:#ffd23f; background-image:-webkit-radial-gradient(35% 30%, circle, #fffbe6 0%, #ffd23f 45%, #7a5c08 100%); background-image:radial-gradient(circle at 35% 30%, #fffbe6 0%, #ffd23f 45%, #7a5c08 100%); -webkit-box-shadow:0 0 8px rgba(255,210,63,0.8); box-shadow:0 0 8px rgba(255,210,63,0.8); }
.crt {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: 20px 18px 22px 18px;
  text-align: center;
  background-color: #060a1c;
  background-image:
    -webkit-radial-gradient(50% 22%, circle, #14224d 0%, rgba(20,34,77,0) 60%),
    -webkit-linear-gradient(top, #071130 0%, #060a1c 60%, #04060f 100%);
  background-image:
    radial-gradient(circle at 50% 22%, #14224d 0%, rgba(20,34,77,0) 60%),
    linear-gradient(to bottom, #071130 0%, #060a1c 60%, #04060f 100%);
  -webkit-box-shadow: inset 0 0 60px rgba(0,0,0,0.85), inset 0 0 22px rgba(0,240,255,0.10);
  box-shadow: inset 0 0 60px rgba(0,0,0,0.85), inset 0 0 22px rgba(0,240,255,0.10);
}
.crt:before {
  content: "";
  position: absolute; left:0; top:0; right:0; bottom:0;
  z-index: 5;
  pointer-events: none;
  background-image: -webkit-repeating-linear-gradient(top, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.22) 3px, rgba(0,0,0,0) 4px);
  background-image: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.22) 3px, rgba(0,0,0,0) 4px);
}
.crt:after {
  content: "";
  position: absolute; left:0; top:0; right:0; bottom:0;
  z-index: 6;
  pointer-events: none;
  border-radius: 18px;
  -webkit-box-shadow: inset 0 0 46px 8px rgba(0,0,0,0.55);
  box-shadow: inset 0 0 46px 8px rgba(0,0,0,0.55);
}
.screen { position: relative; z-index: 7; }
.eyebrow {
  display: inline-block;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #00f0ff;
  padding: 5px 12px;
  border: 1px solid rgba(0,240,255,0.55);
  border-radius: 4px;
  text-shadow: 0 0 8px rgba(0,240,255,0.9);
  -webkit-box-shadow: 0 0 12px rgba(0,240,255,0.22), inset 0 0 12px rgba(0,240,255,0.12);
  box-shadow: 0 0 12px rgba(0,240,255,0.22), inset 0 0 12px rgba(0,240,255,0.12);
  background-color: rgba(0,240,255,0.04);
}
.title {
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 40px;
  line-height: 0.98;
  letter-spacing: 2px;
  margin: 14px 0 2px 0;
  color: #ff2daf;
  text-transform: uppercase;
  text-shadow:
    0 0 6px #ff2daf,
    0 0 14px #ff2daf,
    0 0 30px rgba(255,45,175,0.7),
    2px 2px 0 #4b0a35;
  -webkit-animation: flicker 4.5s linear infinite;
  animation: flicker 4.5s linear infinite;
}
.title .num {
  color: #ffd23f;
  text-shadow: 0 0 6px #ffd23f, 0 0 16px #ffd23f, 0 0 30px rgba(255,210,63,0.6), 2px 2px 0 #5c4406;
}
.subtitle {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #7fe9ff;
  margin-bottom: 14px;
  text-shadow: 0 0 8px rgba(0,240,255,0.7);
}
@-webkit-keyframes flicker {
  0%,19%,21%,50%,54%,100% { opacity: 1; }
  20%,53% { opacity: 0.72; }
}
@keyframes flicker {
  0%,19%,21%,50%,54%,100% { opacity: 1; }
  20%,53% { opacity: 0.72; }
}
.medal {
  position: relative;
  width: 148px; height: 148px;
  margin: 4px auto 12px auto;
  border-radius: 50%;
  background-color: #0a1330;
  background-image: -webkit-radial-gradient(50% 40%, circle, #14224d 0%, #070c20 70%);
  background-image: radial-gradient(circle at 50% 40%, #14224d 0%, #070c20 70%);
  border: 3px solid #ffd23f;
  -webkit-box-shadow:
    0 0 0 4px rgba(255,45,175,0.35),
    0 0 24px rgba(0,240,255,0.5),
    inset 0 0 22px rgba(0,240,255,0.18);
  box-shadow:
    0 0 0 4px rgba(255,45,175,0.35),
    0 0 24px rgba(0,240,255,0.5),
    inset 0 0 22px rgba(0,240,255,0.18);
  -webkit-animation: bob 3.4s ease-in-out infinite;
  animation: bob 3.4s ease-in-out infinite;
}
.medal svg { display: block; width: 100%; height: 100%; }
@-webkit-keyframes bob { 0%,100%{ -webkit-transform:translateY(0);} 50%{ -webkit-transform:translateY(-6px);} }
@keyframes bob { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
.lore {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  color: #cfe6ff;
  max-width: 320px;
  margin: 0 auto 16px auto;
  padding: 0 6px;
}
.lore b { color: #ffd23f; }
.field {
  text-align: left;
  max-width: 320px;
  margin: 0 auto 14px auto;
}
.field label {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: #ff7fd6;
  text-transform: uppercase;
  margin: 0 0 6px 4px;
  text-shadow: 0 0 8px rgba(255,45,175,0.6);
}
.field input {
  width: 100%;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  letter-spacing: 2px;
  color: #eafcff;
  text-transform: uppercase;
  padding: 12px 14px;
  border-radius: 8px;
  border: 2px solid rgba(0,240,255,0.55);
  outline: none;
  background-color: #041024;
  -webkit-box-shadow: inset 0 0 14px rgba(0,240,255,0.18), 0 0 10px rgba(0,240,255,0.15);
  box-shadow: inset 0 0 14px rgba(0,240,255,0.18), 0 0 10px rgba(0,240,255,0.15);
  -webkit-transition: border-color .2s ease, box-shadow .2s ease;
  -o-transition: border-color .2s ease, box-shadow .2s ease;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.field input:focus {
  border-color: #ffd23f;
  -webkit-box-shadow: inset 0 0 16px rgba(255,210,63,0.22), 0 0 16px rgba(255,210,63,0.4);
  box-shadow: inset 0 0 16px rgba(255,210,63,0.22), 0 0 16px rgba(255,210,63,0.4);
}
.field input::-webkit-input-placeholder { color: #4f6f8f; letter-spacing: 3px; }
.field input:-ms-input-placeholder { color: #4f6f8f; }
.field input::-moz-placeholder { color: #4f6f8f; opacity: 1; }
.start {
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 6px auto;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 19px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #2a0016;
  padding: 16px 14px;
  border: 0;
  border-radius: 12px;
  background-color: #ff2daf;
  background-image: -webkit-linear-gradient(top, #ffe27a 0%, #ff5cc4 34%, #ff2daf 66%, #c40e7f 100%);
  background-image: linear-gradient(to bottom, #ffe27a 0%, #ff5cc4 34%, #ff2daf 66%, #c40e7f 100%);
  text-shadow: 0 1px 0 rgba(255,255,255,0.45);
  -webkit-box-shadow:
    0 6px 0 #7a0850,
    0 12px 22px rgba(255,45,175,0.45),
    inset 0 2px 0 rgba(255,255,255,0.5);
  box-shadow:
    0 6px 0 #7a0850,
    0 12px 22px rgba(255,45,175,0.45),
    inset 0 2px 0 rgba(255,255,255,0.5);
  -webkit-transition: -webkit-transform .08s ease, box-shadow .08s ease;
  transition: transform .08s ease, box-shadow .08s ease;
  -webkit-animation: pulse 1.8s ease-in-out infinite;
  animation: pulse 1.8s ease-in-out infinite;
}
.start:active {
  -webkit-transform: translateY(5px);
  transform: translateY(5px);
  -webkit-box-shadow: 0 1px 0 #7a0850, 0 4px 12px rgba(255,45,175,0.4), inset 0 2px 0 rgba(255,255,255,0.4);
  box-shadow: 0 1px 0 #7a0850, 0 4px 12px rgba(255,45,175,0.4), inset 0 2px 0 rgba(255,255,255,0.4);
}
.start .arw { font-size: 15px; }
@-webkit-keyframes pulse { 0%,100%{ -webkit-box-shadow:0 6px 0 #7a0850, 0 12px 22px rgba(255,45,175,0.45), inset 0 2px 0 rgba(255,255,255,0.5);} 50%{ -webkit-box-shadow:0 6px 0 #7a0850, 0 12px 30px rgba(255,45,175,0.75), inset 0 2px 0 rgba(255,255,255,0.5);} }
@keyframes pulse { 0%,100%{ box-shadow:0 6px 0 #7a0850, 0 12px 22px rgba(255,45,175,0.45), inset 0 2px 0 rgba(255,255,255,0.5);} 50%{ box-shadow:0 6px 0 #7a0850, 0 12px 30px rgba(255,45,175,0.75), inset 0 2px 0 rgba(255,255,255,0.5);} }
.insert {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: #7fe9ff;
  text-transform: uppercase;
  margin: 8px 0 16px 0;
  text-shadow: 0 0 8px rgba(0,240,255,0.7);
  -webkit-animation: blink 1.1s steps(1) infinite;
  animation: blink 1.1s steps(1) infinite;
}
@-webkit-keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }
.track {
  position: relative;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  padding-top: 6px;
}
.track .line {
  position: absolute;
  top: 24px;
  left: 22%;
  right: 22%;
  height: 3px;
  background-color: rgba(0,240,255,0.35);
  background-image: -webkit-repeating-linear-gradient(left, #00f0ff 0, #00f0ff 6px, rgba(0,0,0,0) 6px, rgba(0,0,0,0) 12px);
  background-image: repeating-linear-gradient(to right, #00f0ff 0, #00f0ff 6px, rgba(0,0,0,0) 6px, rgba(0,0,0,0) 12px);
  opacity: 0.55;
  z-index: 0;
}
.stop {
  position: relative;
  z-index: 1;
  width: 33%;
  text-align: center;
}
.stop .dot {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  width: 42px; height: 42px;
  margin: 0 auto 6px auto;
  border-radius: 50%;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 18px;
  color: #04060f;
  background-color: #00f0ff;
  background-image: -webkit-radial-gradient(38% 32%, circle, #ffffff 0%, #00f0ff 55%, #0785a0 100%);
  background-image: radial-gradient(circle at 38% 32%, #ffffff 0%, #00f0ff 55%, #0785a0 100%);
  border: 2px solid #eafcff;
  -webkit-box-shadow: 0 0 14px rgba(0,240,255,0.75);
  box-shadow: 0 0 14px rgba(0,240,255,0.75);
}
.stop.two .dot { background-color:#ff2daf; background-image:-webkit-radial-gradient(38% 32%, circle, #ffffff 0%, #ff2daf 55%, #a30e6a 100%); background-image:radial-gradient(circle at 38% 32%, #ffffff 0%, #ff2daf 55%, #a30e6a 100%); -webkit-box-shadow:0 0 14px rgba(255,45,175,0.75); box-shadow:0 0 14px rgba(255,45,175,0.75); }
.stop.three .dot { background-color:#ffd23f; background-image:-webkit-radial-gradient(38% 32%, circle, #fffbe6 0%, #ffd23f 55%, #a37a08 100%); background-image:radial-gradient(circle at 38% 32%, #fffbe6 0%, #ffd23f 55%, #a37a08 100%); -webkit-box-shadow:0 0 14px rgba(255,210,63,0.8); box-shadow:0 0 14px rgba(255,210,63,0.8); }
.stop .lbl {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #9fd8ff;
}
.stop.three .flag { color: #ffd23f; text-shadow: 0 0 8px rgba(255,210,63,0.8); }
</style>
</head>
<body>
<div class="floorgrid"></div>
<div class="stars">
  <span class="star s1">✦</span>
  <span class="star s2">✦</span>
  <span class="star s3">✦</span>
  <span class="star s4">✦</span>
  <span class="star s5">✦</span>
  <span class="star s6">✦</span>
</div>
<div class="cabinet">
  <div class="frame">
    <div class="topbar">
      <span class="knob"></span>
      <span class="knob cy"></span>
      <span class="knob yl"></span>
    </div>
    <div class="crt">
      <div class="screen">
        <span class="eyebrow">Coleção Ilhas do Saber</span>
        <div class="title">NÚMER<span class="num">0</span>S<br>ARCADE</div>
        <div class="subtitle">Cálculo Relâmpago</div>
        <div class="medal">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Robô mascote">
            <defs>
              <radialGradient id="glow" cx="50%" cy="42%" r="55%">
                <stop offset="0%" stop-color="#1b2f66"/>
                <stop offset="100%" stop-color="#070c20"/>
              </radialGradient>
              <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7fe9ff"/>
                <stop offset="55%" stop-color="#00c8ff"/>
                <stop offset="100%" stop-color="#0785c0"/>
              </linearGradient>
              <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3a1252"/>
                <stop offset="100%" stop-color="#160726"/>
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="49" fill="url(#glow)"/>
            <line x1="50" y1="20" x2="50" y2="10" stroke="#ffd23f" stroke-width="2.4"/>
            <circle cx="50" cy="8" r="4" fill="#ff2daf"/>
            <circle cx="50" cy="8" r="4" fill="none" stroke="#ffd23f" stroke-width="1"/>
            <rect x="22" y="36" width="7" height="16" rx="3" fill="#ffd23f"/>
            <rect x="71" y="36" width="7" height="16" rx="3" fill="#ffd23f"/>
            <rect x="27" y="22" width="46" height="40" rx="12" fill="url(#body)" stroke="#eafcff" stroke-width="1.6"/>
            <rect x="32" y="30" width="36" height="22" rx="8" fill="url(#belly)" stroke="#ff2daf" stroke-width="1.4"/>
            <circle cx="43" cy="41" r="4.6" fill="#00f0ff"/>
            <circle cx="43" cy="41" r="2" fill="#ffffff"/>
            <circle cx="57" cy="41" r="4.6" fill="#00f0ff"/>
            <circle cx="57" cy="41" r="2" fill="#ffffff"/>
            <path d="M44 48 Q50 52 56 48" fill="none" stroke="#ff2daf" stroke-width="2" stroke-linecap="round"/>
            <rect x="34" y="63" width="32" height="24" rx="8" fill="url(#body)" stroke="#eafcff" stroke-width="1.6"/>
            <rect x="39" y="68" width="22" height="15" rx="4" fill="url(#belly)"/>
            <text x="50" y="80" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#ffd23f" text-anchor="middle">+×</text>
            <rect x="24" y="66" width="8" height="6" rx="3" fill="#ffd23f"/>
            <rect x="68" y="66" width="8" height="6" rx="3" fill="#ffd23f"/>
          </svg>
        </div>
        <p class="lore">Os números do fliperama fugiram! <b>Resolva os desafios</b>, acenda cada fase e conquiste o placar máximo da galáxia.</p>
