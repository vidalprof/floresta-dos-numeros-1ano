/* formulário de agendar */
let _form={turma:null,disc:null,turnoK:null,aula:null};
/* Reservas guardam a turma junta ("5º ano A"); o cartão precisa de ano + letra
   separados para preencher os chips. Separa quando a última "palavra" é uma
   letra configurada (A, B, C…). */
function _sepTurma(turmaCheia){
  let turma=turmaCheia||"", letra="";
  const letras=(S.config.turmaLetras||[]).map(x=>(""+x).toUpperCase());
  const m=turma.match(/^(.*\S)\s+([A-Za-z])$/);
  if(m && letras.indexOf(m[2].toUpperCase())>=0){ turma=m[1]; letra=m[2].toUpperCase(); }
  return {turma, letra};
}
/* Lista de "Reaproveitar": monta a partir das PRÓPRIAS reservas do professor
   (inclui as aulas antigas, já carregadas em S.reservas) + o histórico salvo em
   /recentes (cobre outro aparelho e reservas já excluídas). Dedup por tema+obj. */
/* Planejamentos que o usuário escolheu esconder do reaproveitar (por professor).
   Apagar aqui NÃO apaga a aula agendada — só tira da lista de sugestões. */
function chaveRec(t){ return ((t.tema||"")+"||"+(t.objetivo||"")).toLowerCase().replace(/\s+/g," ").trim(); }
async function carregarOcultos(profId){ const k=sanId(profId); if(!(k in S._ocultos)) S._ocultos[k]=(await fbGet("/recentesOcultos/"+k))||[]; return S._ocultos[k]; }
function ocultosDe(profId){ return S._ocultos[sanId(profId)]||[]; }
function montarRecentes(profId){
  const mine=sanId(profId||S.user.id);
  const chave=chaveRec;
  const escondidos=ocultosDe(profId||S.user.id);
  const vistos=new Set(), out=[];
  const add=(r)=>{ if(!r||!(r.tema||r.objetivo)) return; const k=chave(r); if(!k||k==="||"||vistos.has(k)||escondidos.indexOf(k)>=0) return; vistos.add(k); out.push(r); };
  const minhas=[];
  Object.keys(S.reservas||{}).forEach(data=>{ const dia=S.reservas[data]||{};
    Object.keys(dia).forEach(tk=>{ const rt=dia[tk]||{};
      Object.keys(rt).forEach(ak=>{ const r=rt[ak];
        if(r && !r.bloqueado && sanId(r.profId)===mine && (r.tema||r.objetivo)){
          const sp=_sepTurma(r.turma);
          minhas.push({tema:r.tema||"",objetivo:r.objetivo||"",disciplina:r.disciplina||"",turma:sp.turma,letra:sp.letra,ts:r.ts||0});
        }
      });
    });
  });
  minhas.sort((a,b)=>(b.ts||0)-(a.ts||0));
  minhas.forEach(add);
  // O histórico salvo em /recentes é do usuário logado; só entra quando o alvo é ele mesmo.
  if(mine===sanId(S.user.id)) (S.recentes||[]).forEach(add);
  return out.slice(0,10);
}
/* Monta o HTML da caixa "Reaproveitar" para um professor (segue quem o admin escolhe). */
function recBoxHTML(profId){
  const recs=montarRecentes(profId); S._recAtual=recs;
  if(!recs.length){
    if(S.user.admin && sanId(profId)!==sanId(S.user.id))
      return `<div class="hint" style="text-align:left;margin:2px 2px 10px">🕘 Este professor ainda não tem planejamentos para reaproveitar.</div>`;
    return "";
  }
  let h=`<div class="sectitle">🕘 Reaproveitar um planejamento</div>
    <div class="hint" style="text-align:left;margin:-2px 2px 6px">Toque num cartão para preencher tudo. É a mesma aula para <b>outra turma</b>? Toque no cartão e depois é só escolher a turma nova. Para remover um da lista, toque no <b>✕</b> do cartão (a aula já agendada continua na agenda).</div>
    <div class="recentes">`;
  recs.forEach((r,i)=>{
    h+=`<div class="rec" data-act="usar-recente" data-i="${i}"><button type="button" class="recdel" data-act="del-recente" data-i="${i}" title="Remover do reaproveitar" aria-label="Remover do reaproveitar">✕</button><div class="rt">${esc(r.tema||"(sem tema)")}</div><div class="ro">${esc((r.objetivo||"").slice(0,70))}</div><div class="rtag">${esc(r.disciplina||"")}${r.turma?" · "+esc(r.turma)+(r.letra?" "+esc(r.letra):""):""}</div></div>`;
  });
  h+=`</div>`;
  return h;
}
/* Remove um planejamento da lista de reaproveitar (não apaga a aula agendada). */
async function apagarRecente(idx){
  const r=(S._recAtual||[])[idx]; if(!r) return;
  const profId=_form.profId||S.user.id;
  // permissão: professor só apaga os dele; admin pode apagar do professor escolhido
  if(!S.user.admin && sanId(profId)!==sanId(S.user.id)) return toast("Você só pode apagar os seus.");
  if(!confirm("Remover este planejamento da lista de reaproveitar?\n\nA aula que já foi agendada continua na agenda — some apenas das sugestões.")) return;
  const k=sanId(profId), key=chaveRec(r);
  const arr = (k in S._ocultos) ? S._ocultos[k] : ((await fbGet("/recentesOcultos/"+k))||[]);
  if(arr.indexOf(key)<0) arr.push(key);
  S._ocultos[k]=arr;
  await fbSet("/recentesOcultos/"+k, arr);
  // se estiver no histórico salvo do próprio usuário, também remove de lá
  if(k===sanId(S.user.id) && (S.recentes||[]).length){
    S.recentes=S.recentes.filter(x=>chaveRec(x)!==key);
    fbSet("/recentes/"+k, S.recentes);
  }
  const box=$("recBox"); if(box) box.innerHTML=recBoxHTML(profId);
  toast("Removido do reaproveitar.");
}

/* ===== IA (Pollinations texto — GRÁTIS, sem chave, sem servidor) =====
   Chama do navegador do professor (o container do Claude é bloqueado, mas o navegador
   tem internet). Se a rede da escola bloquear o serviço, o botão só não funciona ali. */
async function _iaPollinations(prompt, ms){
  const url = "https://text.pollinations.ai/" + encodeURIComponent(prompt);
  const r = await _fetchT(url, {headers:{"Accept":"text/plain"}}, ms||22000);
  if(!r || !r.ok) throw new Error("resp");
  const t = await r.text();
  return (t||"").trim();
}
function _iaContexto(){
  let turma = (_form.turma||"") + (_form.letra ? (" "+_form.letra) : "");
  turma = turma.trim();
  if(!turma && _editAlvo && _editAlvo.base) turma = _editAlvo.base.turma || "";
  return { turma: turma, disc: _form.disc || (_editAlvo&&_editAlvo.base&&_editAlvo.base.disciplina) || "" };
}
// Descobre o ano (0=Pré .. 9). Null se não der pra saber.
function _iaAno(turma){
  if(!turma) return null;
  const t = (""+turma).toLowerCase();
  if(/pr[eé]/.test(t)) return 0;
  const m = t.match(/(\d+)/);
  return m ? parseInt(m[1],10) : null;
}
// Papel/persona que a IA assume, conforme ano + disciplina (regente x especialista de área).
function _iaPapel(turma, disc){
  const ano = _iaAno(turma);
  const d = (disc||"").toLowerCase();
  // disciplinas "de área" (têm professor especialista já nos anos iniciais)
  const ehArea = /(educa|ed\.?\s*f|f[íi]sic|arte|ingl|m[uú]sic|religios|religi[aã]|dan[çc]|teatro|espanhol)/.test(d);
  const disciplina = disc ? disc : "sua disciplina";
  const exp = "especialista em didatica e planejamento pedagogico, com dominio profundo do Curriculo da Rede Municipal de Blumenau e da BNCC, muito experiente";
  if(ano != null && ano <= 5){
    if(ehArea) return "um professor "+exp+" de "+disciplina+" dos anos iniciais (Pré ao 5º ano)";
    return "um pedagogo "+exp+" nos anos iniciais (Pré ao 5º ano), professor regente polivalente";
  }
  if(ano != null && ano >= 6) return "um professor "+exp+" de "+disciplina+" dos anos finais (6º ao 9º ano)";
  return "um professor "+exp+" de "+disciplina; // ano desconhecido
}
// ÂNCORA CURRICULAR — estrutura REAL do Currículo da Rede Municipal de Blumenau
// (extraída do PDF oficial 2021; segue as unidades temáticas / campos / eixos da BNCC).
// Serve para a IA enquadrar tema e objetivo na unidade certa, sem inventar.
var _CURRIC_BLU = {
  pre: "Campos de Experiência (Educação Infantil): O Eu, o Outro e o Nós; Corpo, Gestos e Movimentos; Traços, Sons, Cores e Formas; Escuta, Fala, Pensamento e Imaginação; Espaços, Tempos, Quantidades, Relações e Transformações",
  portugues: "Língua Portuguesa: práticas de linguagem (leitura/escuta, produção de texto oral e escrita/semiose, análise linguística/semiótica) nos campos de atuação: da vida cotidiana, das práticas de estudo e pesquisa, da vida pública, jornalístico-midiático e artístico-literário",
  matematica: "Matemática: cinco unidades temáticas — Números, Álgebra, Geometria, Grandezas e Medidas, Probabilidade e Estatística",
  ciencias: "Ciências: três unidades temáticas — Matéria e Energia, Vida e Evolução, Terra e Universo",
  historia: "História: organizada por processos históricos e objetos de conhecimento por ano (do eu/família/comunidade e noções de tempo, nos anos iniciais, até a formação do mundo contemporâneo), integrando a história local de Blumenau e de Santa Catarina",
  geografia: "Geografia: cinco unidades temáticas — O Sujeito e seu Lugar no Mundo; Conexões e Escalas; Mundo do Trabalho; Formas de Representação e Pensamento Espacial; Natureza, Ambientes e Qualidade de Vida",
  arte: "Arte: quatro linguagens — Artes Visuais, Dança, Música e Teatro (mais Artes Integradas) — trabalhadas nas dimensões criação, crítica, estesia, expressão, fruição e reflexão",
  edfisica: "Educação Física: seis unidades temáticas — Brincadeiras e Jogos, Esportes, Ginásticas, Danças, Lutas e Práticas Corporais de Aventura",
  ingles: "Língua Inglesa: cinco eixos — Oralidade, Leitura, Escrita, Conhecimentos Linguísticos e Dimensão Intercultural",
  religiao: "Ensino Religioso: três unidades temáticas — Identidades e Alteridades, Manifestações Religiosas, e Crenças Religiosas e Filosofias de Vida"
};
// Descobre a chave da disciplina a partir do texto livre digitado pelo professor.
function _iaCurricKey(disc){
  const d = (disc||"").toLowerCase();
  if(/(portug|l[íi]ngua\s*port|reda[çc]|l[íi]ngua\s*materna|alfabet)/.test(d)) return "portugues";
  if(/(matem|c[áa]lculo)/.test(d)) return "matematica";
  if(/(ci[êe]nc|biolog|natureza)/.test(d)) return "ciencias";
  if(/hist[óo]r/.test(d)) return "historia";
  if(/geograf/.test(d)) return "geografia";
  if(/(arte|m[uú]sic|teatro|dan[çc]|visuais)/.test(d)) return "arte";
  if(/(educa[çc].*f[íi]s|ed\.?\s*f|f[íi]sica)/.test(d)) return "edfisica";
  if(/(ingl|l[íi]ngua\s*estrangeira|l[íi]ngua\s*alem)/.test(d)) return "ingles";
  if(/(religi|ensino\s*relig)/.test(d)) return "religiao";
  return null;
}
// Frase-âncora com a estrutura curricular de Blumenau para injetar no prompt.
function _iaCurric(turma, disc){
  const ano = _iaAno(turma);
  let ref = null;
  if(ano === 0) ref = _CURRIC_BLU.pre;          // Pré = Educação Infantil (campos de experiência)
  else { const k = _iaCurricKey(disc); if(k) ref = _CURRIC_BLU[k]; }
  if(!ref) return "";
  return " ANCORA CURRICULAR (Curriculo de Blumenau, base da resposta) — " + ref
    + ". Enquadre o tema e o objetivo na unidade/campo/eixo adequado a esta estrutura e ao ano; nao use nomes de unidades diferentes destes.";
}
var _IA_BASE = "Voce e "; // prefixo do papel
// PRIORIDADE: primeiro o Curriculo de Blumenau, depois a BNCC.
var _IA_BNCC = " Sua referencia PRINCIPAL e o Curriculo da Rede Municipal de Ensino de Blumenau (SC); a BNCC e a referencia COMPLEMENTAR. Baseie o planejamento primeiro no curriculo de Blumenau e, em seguida, na BNCC. Escreva conteudo serio, correto, realista e coerente — nunca generico, nunca bobagem.";
// IMPORTANTE: a aula acontece na SALA DE INFORMATICA (laboratorio de tecnologia) da escola.
var _IA_LAB = " CONTEXTO OBRIGATORIO: esta aula acontece na SALA DE INFORMATICA (laboratorio de tecnologia) da escola. Portanto o tema e o objetivo devem SEMPRE integrar o uso do computador e de recursos/ferramentas digitais (softwares educativos, jogos, pesquisa, digitacao, etc.) a disciplina, de forma adequada ao ano.";
// GUARDA-CORPOS anti-alucinacao/erro (precisao pedagogica):
var _IA_REGRAS = " REGRAS DE PRECISAO (siga a risca): NAO invente codigos da BNCC (ex.: EF04MA09), numeros/nomes de documentos, paginas nem fontes; NAO afirme nenhum dado especifico do qual nao tenha CERTEZA; se nao souber um detalhe, NAO o cite (melhor omitir do que inventar). Escreva um objetivo pedagogicamente CORRETO, realista e verificavel, focado na HABILIDADE e na acao do aluno (verbo no infinitivo), coerente com o tema e a faixa etaria. Reveja mentalmente para garantir que nao ha erro conceitual nem invencao.";
async function sugerirObjetivoIA(temaId, objId){
  const tema = ($(temaId) ? $(temaId).value.trim() : "");
  if(!tema) return toast("Escreva o tema da aula primeiro. ✍️");

  const restore = btnBusy('[data-act="ia-objetivo"]', "✨ Gerando…");
  try{
    const prompt = _IA_BASE + _iaPapel(ctx.turma, ctx.disc) + "." + _IA_BNCC + _iaCurric(ctx.turma, ctx.disc) + _IA_LAB + _IA_REGRAS
      + " Escreva UM objetivo de aprendizagem claro, correto e bem redigido (no maximo 2 frases, em portugues, com linguagem de plano de aula) para uma aula na sala de informatica sobre o tema informado."
      + " O objetivo deve estar TOTALMENTE COERENTE com o tema (o tema e o objetivo tem que combinar entre si) e ser realista para a turma."

      + (ctx.disc ? (" Disciplina: "+ctx.disc+".") : "")

    let out = await _iaPollinations(prompt);
    out = out.replace(/^["'\s]+|["'\s]+$/g,"").replace(/^objetivo:?\s*/i,"").trim();
    if(!out) throw new Error("vazio");

async function salvarAgenda(){
  const ano=_form.turma, disc=_form.disc, turnoK=_form.turnoK, aula=_form.aula;
  const turma = ano ? (ano + (_form.letra ? " "+_form.letra : "")) : null;
  const tema=($("fTema")?$("fTema").value.trim():(_form.tema||"")), obj=($("fObj")?$("fObj").value.trim():(_form.obj||""));
  if(!ano) return toast("Escolha a turma.");
  if((S.config.turmaLetras||[]).length && !_form.letra) return toast("Escolha a letra da turma (A, B, C…).");
  if(!disc) return toast("Escolha a disciplina.");
  if(S.config.obrigatorios && (!tema||!obj)) return toast("Preencha tema e objetivo.");
  if(diaFeriado(S.dataSel) && !S.user.admin) return toast("Feriado — agenda fechada.");
  // rodízio: cada professor só agenda na SEMANA do grupo da sua turma. Fora dessa semana o
  // professor COMUM não agenda sozinho — precisa falar com a coordenação e com o professor de
  // informática (admin). Só o admin agenda fora da semana, e a aula fica marcada como EXCEÇÃO.
  {
    const sg=grupoDaSemana(S.dataSel), tg=grupoDaTurma(turma);
    const foraDaSemana = sg && tg && sg!==tg;
    if(foraDaSemana){
      if(!S.user.admin){ _form.tema=tema; _form.obj=obj; return sheetForaSemana(sg,tg); }
      _form.excecao = true; // admin agendando fora da semana → registra como exceção
    }
  }
  const restore=btnBusy('[data-act="salvar-agenda"]',"Salvando…");
  try{
    // checa se o slot continua livre (anti-choque simples). Distingue "vazio" de "falha":
    // se a leitura de checagem falhar, NÃO grava às cegas (evitava sobrescrever reserva alheia).
    const chk = await fbGetRaw(`/reservas/${S.dataSel}/${turnoK}/a${aula}`);
    if(!chk.ok){ toast("Sem conexão para confirmar o horário. Tente de novo."); return; }
    if(chk.val){ await recarregarReservas(); fecharSheet(); renderTab(); toast("Ops! Esse horário acabou de ser reservado."); return; }
    const reg={turma,disciplina:disc,tema,objetivo:obj,profId:_form.profId,profNome:_form.profNome,ownerUid:(S.auth&&S.auth.uid)||null,ts:Date.now()};
    if(_form.excecao) reg.excecao=true;
    const ok=await fbSet(`/reservas/${S.dataSel}/${turnoK}/a${aula}`, reg);
    if(!ok){ toast(_msgFalha("Não foi possível salvar. Tente de novo.")); return; }
    try{ localStorage.setItem("agenda_last_"+sanId(S.user.id), JSON.stringify({turma:ano,letra:_form.letra,disc})); }catch(e){}
    if(tema||obj){ try{
      const nova={tema:tema,objetivo:obj,disciplina:disc,turma:ano,letra:_form.letra,ts:Date.now()};
      const chave=(t)=>((t.tema||"")+"||"+(t.objetivo||"")).toLowerCase().replace(/\s+/g," ").trim();
      S.recentes=(S.recentes||[]).filter(x=>chave(x)!==chave(nova));
      S.recentes.unshift(nova); S.recentes=S.recentes.slice(0,10);
      fbSet("/recentes/"+sanId(S.user.id), S.recentes);
    }catch(e){} }
    await recarregarReservas(); fecharSheet(); renderTab(); toast(reg.excecao ? "Agendado como exceção. ⚠️" : "Aula agendada! ✅");
  } finally { restore(); }
}

function exportarCSV(){
  const iv=relIntervalo(), ini=iv[0], fim=iv[1];
  const linhas=[["Data","Turno","Aula","Turma","Professor","Disciplina","Tema","Objetivo"]];
  Object.keys(S.reservas).sort().forEach(data=>{ if(data<ini||data>fim) return; if(periodoDoDia(data)) return;
    TURNOS.forEach(t=>{ const rt=S.reservas[data][t.k]; if(!rt) return;
      Object.keys(rt).sort().forEach(ak=>{ const r=rt[ak]; if(!r||r.bloqueado) return;
        linhas.push([data, t.n, ak.replace("a",""), r.turma||"", r.profNome||"", r.disciplina||"", r.tema||"", r.objetivo||""]); }); }); });
  // neutraliza injeção de fórmula: célula que começa com = + - @ (ou tab/CR) ganha um ' na frente
  const cel=(c)=>{ let s=""+c; if(/^[=+\-@\t\r]/.test(s)) s="'"+s; return '"'+s.replace(/"/g,'""')+'"'; };
  const csv=linhas.map(l=>l.map(cel).join(";")).join("\r\n");
  try{
    const blob=new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download="relatorio-aulas-"+ini+"-a-"+fim+".csv"; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 600);
    toast("Relatório exportado (CSV/Excel).");
  }catch(e){ toast("Não foi possível exportar aqui."); }
}

async function bloquearEmMassa(escopo, turnoArg, aulaArg){
  const data=$("blqData")?$("blqData").value:S.dataSel;
  if(!data) return toast("Escolha o dia.");
  const motivo=(($("blqMotivo")?$("blqMotivo").value.trim():"")||"Indisponível");
  const alvos=[];
  TURNOS.forEach(t=>{
    if((escopo==="turno"||escopo==="aula") && t.k!==turnoArg) return;
    const n=aulasDoDia(data,t.c);
    for(let i=1;i<=n;i++){ if(escopo==="aula" && i!==aulaArg) continue; alvos.push({turno:t.k,aula:i}); }
  });
  await recarregarReservas();  // relê antes: evita sobrescrever uma reserva feita nos últimos segundos
  const rtDay=(S.reservas[data])||{};
  const patch={}; let feitos=0, pulados=0;
  alvos.forEach(s=>{
    const cur=rtDay[s.turno] && rtDay[s.turno]["a"+s.aula];
    if(cur && !cur.bloqueado){ pulados++; return; }
    patch[s.turno+"/a"+s.aula]={bloqueado:true, rotulo:motivo, byAdmin:S.user.nome, ts:Date.now()};
    feitos++;
  });
  if(!feitos) return toast(pulados?"Só há aulas já reservadas aqui.":"Nada para bloquear neste dia.");
  const ok=await fbUpdate("/reservas/"+data, patch);
  if(!ok){ toast("Não foi possível bloquear. Tente de novo."); return; }
  await recarregarReservas(); renderTab();
  toast(feitos+" horário(s) bloqueado(s)"+(pulados?" ("+pulados+" reservado(s), mantido(s))":"")+".");
  telaBloqueios();
}
async function liberarDia(){
  const data=$("blqData")?$("blqData").value:S.dataSel; if(!data) return;
  const rtDay=(S.reservas[data])||{}; const patch={}; let n=0;
  TURNOS.forEach(t=>{ const rt=rtDay[t.k]||{}; Object.keys(rt).forEach(ak=>{ if(rt[ak]&&rt[ak].bloqueado){ patch[t.k+"/"+ak]=null; n++; } }); });
  if(!n) return toast("Não há bloqueios neste dia.");
  const ok=await fbUpdate("/reservas/"+data, patch);
  if(!ok){ toast("Não foi possível liberar. Tente de novo."); return; }

}

/* Captura o que está digitado na grade/horários para a memória (não perde ao
   redesenhar a tela ao adicionar/remover turma, disciplina ou HAE). */
function _lerGradeMem(){
  if(!document.querySelector("[data-aula]")) return;
  const aulas=JSON.parse(JSON.stringify(S.config.aulas));
  document.querySelectorAll("[data-aula]").forEach(function(inp){ const p=inp.dataset.aula.split("."); if(aulas[p[0]]) aulas[p[0]][p[1]]=Math.max(0,parseInt(inp.value,10)||0); });
  const hor=JSON.parse(JSON.stringify(S.config.horarios||{}));
  document.querySelectorAll("[data-hor]").forEach(function(inp){ const p=inp.dataset.hor.split("."); if(!hor[p[0]])hor[p[0]]=[]; if(!hor[p[0]][p[1]])hor[p[0]][p[1]]=["",""]; hor[p[0]][+p[1]][+p[2]]=inp.value.trim(); });
  S.config.aulas=aulas; S.config.horarios=hor;
  const hl=$("haeLabel"); if(hl) S.config.haeLabel=hl.value.trim()||S.config.haeLabel;
  const tl=$("turmaLetras"); if(tl) S.config.turmaLetras=tl.value.split(",").map(function(x){return x.replace(/^\s+|\s+$/g,"");}).filter(Boolean);
}

async function addHAE(){
  const wk=$("haeDia").value, turno=$("haeTurno").value, aula=+$("haeAula").value;
  if(!S.config.hae) S.config.hae=[];
  if(S.config.hae.some(x=>x.wk===wk&&x.turno===turno&&(+x.aula)===aula)) return toast("Essa HAE já está na lista.");
  S.config.hae.push({wk,turno,aula});
  await fbSet("/config/hae",S.config.hae); telaConfig(); toast("HAE fixa adicionada. 📋");
}
async function delHAE(i){ if(!confirm("Remover esta hora-atividade (HAE)?")) return; S.config.hae.splice(i,1); await fbSet("/config/hae",S.config.hae); telaConfig(); }
async function sortearHAE(){
  const qtd=Math.max(1, parseInt(($("haeQtd")?$("haeQtd").value:"6"),10)||6);
  const pool=[];
  DIAS.forEach(wk=>{ TURNOS.forEach(t=>{ const n=(S.config.aulas[wk]||{})[t.c]||0; for(let i=1;i<=n;i++) pool.push({wk,turno:t.k,aula:i}); }); });
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=pool[i]; pool[i]=pool[j]; pool[j]=tmp; }
  S.config.hae=pool.slice(0, Math.min(qtd, pool.length));
  await fbSet("/config/hae",S.config.hae); telaConfig(); toast("HAE sorteadas! 🎲");
}

}

/* ================= EVENT DELEGATION ================= */
// Enter no teclado envia o formulário das telas de login/senha/primeiro acesso.
document.addEventListener("keydown", function(ev){
  if(ev.key!=="Enter") return;
  const t=ev.target; if(!t || t.tagName!=="INPUT" || t.type==="date") return;
  const wrap=t.closest(".authwrap"); if(!wrap) return;
  const btn=wrap.querySelector(".btn.primary"); if(btn){ ev.preventDefault(); btn.click(); }
});
document.addEventListener("click", async (ev)=>{
  const el = ev.target.closest("[data-act]");
  // fechar sheet ao tocar no fundo
  if(ev.target.classList && ev.target.classList.contains("backdrop")){ fecharSheet(); return; }
  if(!el) return;
  const a=el.dataset.act;
  const t=el.dataset.t, i=el.dataset.i?+el.dataset.i:null;
  try{
    if(a==="recarregar-app"){ location.reload(); return; }
    if(a==="bootstrap") return fazerBootstrap();
    if(a==="login") return fazerLogin();
    if(a==="login-criar") return loginCriar();
    if(a==="login-entrar") return loginEntrar();
    if(a==="login-quero-criar"){ _forcarNovo=true; return telaSenha(); }
    if(a==="login-voltar") return telaLogin();
    if(a==="toggle-senha"){ const on=el.dataset.on==="1"; document.querySelectorAll("input[data-pw]").forEach(function(inp){ inp.type=on?"password":"text"; }); el.dataset.on=on?"0":"1"; el.textContent=on?"👁 Mostrar senha":"🙈 Ocultar senha"; return; }
    if(a==="sair") return sair();

<script>
/* ===== PWA: instalar como app + service worker ===== */
(function(){
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
  var btn=null;
  function standalone(){ try{ return !!(window.navigator.standalone || (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)); }catch(e){ return false; } }
  function ensureBtn(){
    if(btn) return btn;
    btn=document.createElement("button"); btn.id="installbtn"; btn.type="button"; btn.innerHTML="📲 Instalar";
    btn.addEventListener("click", function(){
      try{ localStorage.setItem("agenda_pwa_visto","1"); }catch(e){}
      btn.classList.remove("show");
      if(typeof window.instalarApp==="function") window.instalarApp();   // prompt nativo OU passo a passo
    });
    document.body.appendChild(btn); return btn;
  }
  // Android/Chrome: guarda o convite nativo e mostra o botão flutuante.
  window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); window._pwaDeferred=e; if(!standalone()) ensureBtn().classList.add("show"); });
  window.addEventListener("appinstalled", function(){ window._pwaDeferred=null; if(btn) btn.classList.remove("show"); });
  window._pwaClearDeferred=function(){ window._pwaDeferred=null; if(btn) btn.classList.remove("show"); };
  // Celular SEM convite nativo (iPhone/Safari, ou Android que já dispensou): mostra o botão
  // do mesmo jeito depois de um tempinho; o clique abre o passo a passo. Some depois de visto.
  try{
    var isMobile=/iphone|ipad|ipod|android/i.test(navigator.userAgent||"");
    var visto=false; try{ visto=!!localStorage.getItem("agenda_pwa_visto"); }catch(e){}
    if(isMobile && !standalone() && !visto){
      window.addEventListener("load", function(){ setTimeout(function(){ if(!standalone()) ensureBtn().classList.add("show"); }, 3000); });
    }
  }catch(e){}
})();
</script>
