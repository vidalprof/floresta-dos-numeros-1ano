<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5a4bd6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180-e.png">
<link rel="icon" type="image/png" href="icon-192-e.png">
<title>Agenda Aulas</title>
<style>
  :root{
    --bg:#f2f3fa; --surface:#ffffff; --surface2:#eceef8; --surface3:#e1e4f1;
    --line:#e5e8f3; --text:#191d2e; --muted:#666d84; --faint:#9aa0b6;
    --primary:#5a4bd6; --primary2:#6f60ea; --primary-ink:#ffffff; --primary-tint:#eeecfb;
    --free:#0ea371; --free-tint:#e4f6ef;
    --amber:#b8860b; --amber-tint:#f8efd7;
    --danger:#e5484d; --danger-tint:#fbe7e7;
    --radius:18px; --radius-sm:12px;
    --shadow:0 5px 18px rgba(31,26,80,.06); --shadow2:0 12px 34px rgba(31,26,80,.12);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0f1117; --surface:#161a23; --surface2:#1e2330; --surface3:#28303f;
    --line:#272d3a; --text:#e9ecf3; --muted:#98a0b2; --faint:#697187;
    --primary:#8a7bff; --primary2:#9c8fff; --primary-ink:#12121c; --primary-tint:#221f3b;
    --free:#2fd39a; --free-tint:#102b23;
    --amber:#e0a83a; --amber-tint:#2c2411;
    --danger:#ff6b6b; --danger-tint:#2c1518;
    --shadow:0 8px 22px rgba(0,0,0,.34); --shadow2:0 14px 40px rgba(0,0,0,.5);
  }}
  :root[data-theme="light"]{
    --bg:#f2f3fa; --surface:#ffffff; --surface2:#eceef8; --surface3:#e1e4f1;
    --line:#e5e8f3; --text:#191d2e; --muted:#666d84; --faint:#9aa0b6;
    --primary:#5a4bd6; --primary2:#6f60ea; --primary-ink:#ffffff; --primary-tint:#eeecfb;
    --free:#0ea371; --free-tint:#e4f6ef; --amber:#b8860b; --amber-tint:#f8efd7;
    --danger:#e5484d; --danger-tint:#fbe7e7;
    --shadow:0 5px 18px rgba(31,26,80,.06); --shadow2:0 12px 34px rgba(31,26,80,.12);
  }
  :root[data-theme="dark"]{
    --bg:#0f1117; --surface:#161a23; --surface2:#1e2330; --surface3:#28303f;
    --line:#272d3a; --text:#e9ecf3; --muted:#98a0b2; --faint:#697187;
    --primary:#8a7bff; --primary2:#9c8fff; --primary-ink:#12121c; --primary-tint:#221f3b;
    --free:#2fd39a; --free-tint:#102b23; --amber:#e0a83a; --amber-tint:#2c2411;
    --danger:#ff6b6b; --danger-tint:#2c1518;
    --shadow:0 8px 22px rgba(0,0,0,.34); --shadow2:0 14px 40px rgba(0,0,0,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  .hidden{display:none!important}

  #app{max-width:680px;margin:0 auto;min-height:100%;position:relative;
    padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%, transparent);
    -webkit-backdrop-filter:saturate(160%) blur(14px);backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex;align-items:center;gap:10px}
  .topbar .avatar{width:40px;height:40px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
  .topbar .brand{display:flex;flex-direction:column;line-height:1.15;flex:1;min-width:0}
  .topbar .brand b{font-size:16px;font-weight:800;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .brand span{font-size:12px;color:var(--muted)}
  .icon-btn{width:40px;height:40px;border-radius:12px;background:var(--surface);
    display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--line);flex-shrink:0;box-shadow:var(--shadow)}
  .icon-btn:active{transform:scale(.94)}

  .view{padding:16px;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* week strip */
  .weekstrip{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .weekstrip::-webkit-scrollbar{display:none}
  .daychip{flex:0 0 auto;width:54px;padding:11px 0 9px;border-radius:16px;background:var(--surface);
    border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow)}
  .daychip:active{transform:scale(.95)}
  .daychip .wd{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .daychip .dn{font-size:19px;font-weight:800}
  .daychip .pip{width:6px;height:6px;border-radius:50%;background:transparent}
  .daychip .pip.has{background:var(--free)}
  .daychip.on{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 8px 18px color-mix(in srgb,var(--primary) 40%, transparent)}
  .daychip.on .wd{color:rgba(255,255,255,.82)}
  .daychip.on .pip.has{background:#fff}
  .daychip.off{opacity:.42}

  .daysum{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 16px;gap:10px}
  .daysum b{font-size:19px;font-weight:800;display:block}
  .daysum .sub{font-size:13px;color:var(--muted)}
  .livrebadge{background:var(--free-tint);color:var(--free);font-weight:800;font-size:13px;
    padding:7px 13px;border-radius:999px;white-space:nowrap;flex-shrink:0}
  .livrebadge.zero{background:var(--surface2);color:var(--muted)}

  .legend{display:flex;gap:16px;margin:0 2px 14px;font-size:12px;color:var(--muted)}
  .legend i{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-1px}
  .legend i.free{background:var(--free)} .legend i.busy{background:var(--primary)} .legend i.lock{background:var(--amber)}

  .turnohd{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);
    margin:18px 2px 9px;display:flex;align-items:center;gap:8px}
  .cards{display:flex;flex-direction:column;gap:9px}
  .slotcard{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:var(--surface);
    border:1px solid var(--line);border-left:4px solid var(--line);border-radius:15px;padding:13px 15px;box-shadow:var(--shadow)}
  .slotcard:active{transform:translateY(1px)}
  .slotcard .sc-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .slotcard .sc-m{flex:1;min-width:0}
  .slotcard .sc-t{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slotcard .sc-s{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .slotcard .sc-r{text-align:right;font-size:14px;color:var(--faint);font-weight:800;white-space:nowrap;flex-shrink:0}
  .slotcard .sc-r small{display:block;font-weight:500;font-size:11px;color:var(--faint)}
  .slotcard.free{border-left-color:var(--free)}
  .slotcard.free .sc-ic{background:var(--free-tint);color:var(--free)}
  .slotcard.free .sc-t{color:var(--free)}
  .slotcard.busy .sc-ic{background:var(--surface2);color:var(--muted)}
  .slotcard.mine{border-left-color:var(--primary);background:var(--primary-tint)}
  .slotcard.mine .sc-ic{background:var(--primary);color:#fff}
  .slotcard.lock{border-left-color:var(--amber)}
  .slotcard.lock .sc-ic{background:var(--amber-tint);color:var(--amber)}
  .slotcard.lock .sc-t{color:var(--muted)}
  .slotcard.off{border-left-color:var(--line);opacity:.72;cursor:default}
  .slotcard.off .sc-ic{background:var(--surface2);color:var(--muted)}
  .slotcard.off .sc-t{color:var(--muted)}
  .slotcard.hae{border-left-color:var(--free);background:var(--free-tint);background:color-mix(in srgb,var(--free) 16%,transparent);border:1px solid color-mix(in srgb,var(--free) 45%,transparent);border-left-width:5px}
  .slotcard.hae .sc-ic{background:var(--free);color:#fff}
  .slotcard.hae .sc-t{color:var(--free)}
  .slotcard.hae .sc-s{color:var(--free);opacity:.85}
  .periodo{margin-top:8px;border-radius:18px;padding:30px 20px;text-align:center;
    background:color-mix(in srgb, var(--pc) 13%, var(--surface));
    border:1px solid color-mix(in srgb, var(--pc) 40%, transparent)}
  .periodo .pico{font-size:44px;display:block;margin-bottom:10px}
  .periodo b{font-size:22px;color:var(--pc);display:block}
  .periodo .pd{font-size:13px;color:var(--muted);margin-top:6px}
  .chip.perc.on{outline:3px solid color-mix(in srgb,var(--text) 30%,transparent);outline-offset:1px}
  #avisobar{padding-top:12px}
  .aviso{display:flex;align-items:center;gap:10px;margin:0 16px;padding:12px 14px;border-radius:14px;
    background:var(--amber-tint);border:1px solid color-mix(in srgb,var(--amber) 35%,transparent)}
  .aviso .ai{font-size:18px;flex-shrink:0}
  .aviso .am{flex:1;font-size:14px;font-weight:700;color:var(--text);line-height:1.45}
  .aviso .ax{width:28px;height:28px;border-radius:9px;background:transparent;color:var(--muted);font-size:15px;flex-shrink:0}
  select.input{appearance:none;-webkit-appearance:none;-moz-appearance:none}
  .btnlink{background:transparent;border:0;color:var(--primary);font-weight:700;font-size:13px;padding:8px 2px;cursor:pointer;display:inline-block}
  .grecaptcha-badge{visibility:hidden!important}
  .recaptcha-terms{font-size:11.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
  .recaptcha-terms a{color:var(--muted)}
  .delx{margin-left:2px;color:#ff8b76;background:transparent;border:0;font-size:15px;padding:8px 12px;cursor:pointer;line-height:1;vertical-align:middle}

  .empty{color:var(--muted);text-align:center;padding:40px 16px;font-size:15px;line-height:1.6}
  .empty .big{font-size:40px;display:block;margin-bottom:10px}

  /* bottom nav */
  .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:color-mix(in srgb,var(--bg) 86%, transparent);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid var(--line)}
  .bottomnav .wrap{display:flex;gap:4px;max-width:680px;width:100%;justify-content:space-around}
  .tab{flex:1;max-width:130px;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 4px;border-radius:14px;color:var(--faint);font-size:11px;font-weight:700}
  .tab .ic{font-size:20px;position:relative}
  .tab.on{color:var(--primary);background:var(--primary-tint)}
  .tab{position:relative}
  .tabbadge{position:absolute;top:2px;right:14px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;
    background:#e0453a;color:#fff;font-size:11px;font-weight:800;line-height:17px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  /* ---- Pedidos ---- */
  .viewpad{padding:14px 16px 96px}
  .vtitle{font-size:19px;font-weight:800;margin-bottom:6px;color:var(--text)}
  .pedlist{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .pedcard{padding:12px 14px}
  .pedtop{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .pedturma{font-weight:800;font-size:15px;color:var(--text)}
  .peddisc{font-weight:600;color:var(--faint)}
  .pedst{font-weight:800;font-size:12px;white-space:nowrap}
  .pedwhen,.pedwho{font-size:13px;color:var(--faint);margin-top:4px}
  .pedlin{font-size:14px;color:var(--text);margin-top:6px;line-height:1.35}
  .pedacoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .pedacoes .btn{flex:1;min-width:120px;margin:0}
  .empty{text-align:center;color:var(--faint);padding:40px 10px}
  .empty .ei{font-size:40px;margin-bottom:8px}

  /* buttons / chips */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 18px;
    border-radius:14px;font-weight:800;font-size:16px;width:100%}
  .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;
    box-shadow:0 8px 20px color-mix(in srgb,var(--primary) 35%, transparent)}
  .btn.ok{background:var(--free);color:#fff}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--text);box-shadow:var(--shadow)}
  .btn.danger{background:var(--danger-tint);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 40%,transparent)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:10px 15px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);
    font-size:14px;font-weight:600;color:var(--text)}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  label.fld{display:block;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    color:var(--muted);margin:18px 2px 8px}
  .input,textarea.input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:14px;color:var(--text);outline:none;box-shadow:var(--shadow)}
  .input:focus,textarea.input:focus{border-color:var(--primary)}
  textarea.input{resize:vertical;min-height:82px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:800;color:var(--primary)}
  .stat .t{font-size:13px;color:var(--muted);margin-top:2px}
  .rel-tools{margin-bottom:14px}
  .rel-cab{margin:0 2px 14px}
  .rel-cab b{font-size:17px}
  .rel-cab div{font-size:12px;color:var(--muted)}
  .donutwrap{text-align:center}
  .donut{width:88px;height:88px;border-radius:50%;margin:0 auto 8px;position:relative;
    background:conic-gradient(var(--primary) calc(var(--p)*1%), var(--surface2) 0);
    display:flex;align-items:center;justify-content:center}
  .donut::before{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--surface)}
  .donut span{position:relative;font-weight:800;font-size:19px}
  .barrow{display:flex;align-items:center;gap:10px;padding:7px 0}
  .barrow .bl{width:40%;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barrow .bt{flex:1;height:11px;background:var(--surface2);border-radius:6px;overflow:hidden}
  .barrow .bt i{display:block;height:100%;background:var(--primary);border-radius:6px}
  .barrow .bv{width:30px;text-align:right;font-weight:800;font-size:13px}
  .recentes{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .recentes::-webkit-scrollbar{display:none}
  .lembrete{background:var(--primary-tint);border:1px solid color-mix(in srgb,var(--primary) 25%,transparent);border-radius:14px;padding:12px 14px;margin-bottom:14px}
  .lembrete .lb-h{font-weight:800;font-size:13px;color:var(--primary);margin-bottom:6px}
  .lembrete .lb-it{font-size:14px;padding:3px 0}
  .lembrete .lb-it span{color:var(--muted)}
  .grupobanner{border-radius:12px;padding:9px 14px;margin-bottom:14px;font-weight:800;font-size:13px}
  .grupobanner.ini{background:var(--free-tint);color:var(--free)}
  .grupobanner.fin{background:var(--primary-tint);color:var(--primary)}
  .slotcard.exc{border-left-color:var(--amber)}
  .slotcard.exc .sc-ic{background:var(--amber-tint);color:var(--amber)}
  .semnav{width:36px;height:36px;border-radius:11px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:var(--shadow)}
  .semnav:active{transform:scale(.92)}
  .semana-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;-webkit-overflow-scrolling:touch}
  .semana{border-collapse:collapse;width:100%;min-width:330px;font-size:12px}
  .semana th,.semana td{border:1px solid var(--line);padding:6px 3px;text-align:center}
  .semana th{background:var(--surface);color:var(--muted);font-weight:700}
  .semana th.hoje .sdn{color:var(--primary)}
  .semana th .swd{display:block;font-size:10px;text-transform:uppercase}
  .semana th .sdn{display:block;font-size:15px;font-weight:800;color:var(--text)}
  .semana td.al{background:var(--surface);font-weight:800;color:var(--muted);width:28px}
  .semana tr.tsep td{background:var(--surface2);text-align:left;font-weight:800;font-size:11px;text-transform:uppercase;color:var(--muted);padding:5px 8px}
  .semana td.sc{font-weight:700;height:36px}
  .semana td.sc.free{color:var(--free);background:var(--free-tint)}
  .semana td.sc.busy{color:var(--muted);background:var(--surface2)}
  .semana td.sc.mine{color:#fff;background:var(--primary)}
  .semana td.sc.lock{color:var(--amber);background:var(--amber-tint)}
  .semana td.sc.hae{color:var(--free);background:var(--free-tint);font-size:10px}
  .semana td.sc.per{color:var(--faint)}
  .rec{flex:0 0 auto;width:184px;text-align:left;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:12px;position:relative;cursor:pointer}
  .rec:active{transform:scale(.97)}
  .rec .rt{padding-right:24px}
  .rec.sel{border-color:var(--primary);background:var(--primary-tint);box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 35%,transparent)}
  .rec.sel::after{content:"✓";position:absolute;top:8px;right:9px;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;background:var(--primary);color:var(--primary-ink);font-size:12px;font-weight:800}
  .recdel{position:absolute;top:5px;right:5px;width:30px;height:30px;line-height:1;text-align:center;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:13px;font-weight:700;padding:0;cursor:pointer}
  .recdel:active{transform:scale(.9)}
  .rec.sel .recdel{display:none}
  .rec .rt{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec .ro{font-size:12px;color:var(--muted);margin-top:3px;height:33px;overflow:hidden;line-height:1.35}
  .rec .rtag{font-size:11px;color:var(--primary);font-weight:800;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media print{
    body{background:#fff!important;color:#000!important}
    .topbar,.bottomnav,.rel-tools,#installbtn,#avisobar,#modal,[data-act="imprimir"]{display:none!important}
    #app{padding:0!important;max-width:100%!important}
    .view{padding:0!important;animation:none!important}
    .card,.stat{box-shadow:none!important;border:1px solid #ccc!important;background:#fff!important}
    .stat .n{color:#000!important}
    .barrow .bt{background:#eee!important} .barrow .bt i{background:#555!important}
    .donut{background:conic-gradient(#444 calc(var(--p)*1%), #eee 0)!important}
    .donut::before{background:#fff!important}
    .rel-cab b,.rel-cab div,.sectitle{color:#000!important}
  }
  .rowitem{display:flex;align-items:center;gap:12px;padding:14px 4px;border-top:1px solid var(--line)}
  .rowitem:first-child{border-top:none}
  .rowitem .main{flex:1;min-width:0}
  .rowitem .main .l1{font-weight:700}
  .rowitem .main .l2{font-size:13px;color:var(--muted)}
  .rowitem .tag{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;background:var(--primary-tint);color:var(--primary)}

  .backdrop{position:fixed;inset:0;z-index:50;background:rgba(10,12,20,.5);display:flex;align-items:flex-end;

<body>
  <div id="root"><div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#8a90a3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">

    <div style="font-weight:700">Carregando…</div>
  </div></div>
  <div id="modal"></div>
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

<script>
"use strict";
/* App Check: o módulo no fim da página carrega o SDK e resolve esta promessa quando
   o "carimbo" estiver pronto. _acToken() devolve o token (ou "" se indisponível). */
window._acReady = new Promise(function(res){ window._acResolve = res; });
window._acToken = window._acToken || (async function(){ return ""; });
/* Nunca deixa o carimbo travar o app: espera no máx. 2,5s por token; se falhar/demorar
   (ex.: reCAPTCHA bloqueado por ad-blocker), desiste na sessão e segue sem ele. */
let _acFalhou=false;
async function _acHeader(){
  if(_acFalhou || !window._acToken) return {};
  try{
    const t = await Promise.race([ window._acToken(), new Promise(function(res){ setTimeout(function(){res("__TO__");}, 2500); }) ]);
    if(t==="__TO__"){ _acFalhou=true; return {}; }  // demorou demais (ex.: reCAPTCHA bloqueado) -> desiste na sessão
    if(t) return {"X-Firebase-AppCheck": t};        // token pronto
    // token vazio agora (ainda cunhando): NÃO desiste — tenta de novo na próxima chamada
  }catch(e){ _acFalhou=true; }
  return {};
}
/* ================= CONFIG / FIREBASE (REST, sem SDK) ================= */
const DB = "https://atividades-educativas-16860-default-rtdb.firebaseio.com";
const ESCOLA = "vidal-ramos";               // gaveta desta escola (multi-escola desde ja)
const P = `/agenda/${ESCOLA}`;
// Anexa o "crachá" (idToken) do Firebase Auth quando existir. Enquanto as regras
// estiverem abertas (Fase A) ele é opcional; na Fase B passa a ser exigido.
const url = (path) => `${DB}${P}${path}.json${(S.auth&&S.auth.idToken)?("?auth="+encodeURIComponent(S.auth.idToken)):""}`;

/* Distingue "leu e veio vazio" (ok:true, val:null) de "falhou" (ok:false):
   sem isso, uma queda de rede parece "banco vazio" e assusta o usuário. */
/* Faz a chamada ao banco; se o crachá venceu (401/403), renova UMA vez e repete.
   Cobre leitura e gravação — evita "agenda vazia" e "não salvou" por token expirado. */
/* fetch com LIMITE DE TEMPO: se a rede estagnar (conectada mas pendurada), aborta e
   vira falha "limpa" — evita a tela branca congelada no PWA. */
async function _fetchT(u, opts, ms){
  ms = ms||9000;
  let ctrl=null, t=null;
  try{ ctrl = new AbortController(); }catch(e){ ctrl=null; }
  const f = fetch(u, ctrl?Object.assign({}, opts||{}, {signal:ctrl.signal}):(opts||{}));
  // Corrida com um prazo: mesmo sem AbortController (navegador antigo) a promessa
  // NUNCA fica pendurada — o prazo rejeita e vira falha "limpa".
  const prazo = new Promise(function(_,rej){ t=setTimeout(function(){ try{ if(ctrl) ctrl.abort(); }catch(e){} rej(new Error("TIMEOUT")); }, ms); });
  try{ return await Promise.race([f, prazo]); }
  finally{ if(t) clearTimeout(t); }
}
/* Lê o CORPO da resposta com prazo próprio: o _fetchT só cobre conexão+cabeçalhos;
   se o servidor manda o header e depois estagna o corpo, r.json() pendura sem isto. */
function _corpoJson(r, ms){
  let t=null;
  const prazo = new Promise(function(_,rej){ t=setTimeout(function(){ rej(new Error("BODYTO")); }, ms||9000); });
  return Promise.race([ r.json(), prazo ]).finally(function(){ if(t) clearTimeout(t); });
}
async function _fbFetch(path, opts){
  opts = opts || {};
  const ac = await _acHeader();
  const withAC = (o)=> Object.assign({}, o, {headers: Object.assign({}, o.headers||{}, ac)});
  let r;
  try{ r = await _fetchT(url(path), withAC(opts)); }
  catch(e){ return {ok:false, status:0}; }   // timeout/rede -> falha limpa (não pendura)
  if((r.status===401||r.status===403) && await authRefresh()){
    try{ r = await _fetchT(url(path), withAC(opts)); }catch(e){ return {ok:false, status:0}; }
  }
  // Após gravar em /reservas, atualiza um "marcador" leve (poucos bytes). O poll lê só
  // esse marcador e só baixa a agenda inteira quando ele muda -> economiza banda/cota.
  if(r.ok && opts.method && opts.method!=="GET" && path.indexOf("/reservas")===0){
    S._lwSeen=Date.now();
    try{ _fetchT(url("/config/reservasLastWrite"), {method:"PUT", body:JSON.stringify(S._lwSeen), headers:ac}).catch(function(){}); }catch(e){}
  }
  return r;
}
async function fbGetRaw(path){
  try{ const r = await _fbFetch(path); if(!r.ok) return {ok:false, status:r.status}; return {ok:true, val: await _corpoJson(r)}; }
  catch(e){ return {ok:false, net:true}; }
}
async function fbGet(path){ const r = await fbGetRaw(path); return r.ok ? r.val : null; }
// _httpStatus guarda o status da última gravação: 403 = a regra recusou (sem permissão),
// diferente de falha de rede — permite mostrar a mensagem certa em vez de "tente de novo".
var _httpStatus=0;
async function fbSet(path,val){ const r=await _fbFetch(path,{method:'PUT',body:JSON.stringify(val)}); _httpStatus=r.status||0; return r.ok; }
async function fbUpdate(path,val){ const r=await _fbFetch(path,{method:'PATCH',body:JSON.stringify(val)}); _httpStatus=r.status||0; return r.ok; }
async function fbDel(path){ const r=await _fbFetch(path,{method:'DELETE'}); _httpStatus=r.status||0; return r.ok; }
function _msgFalha(base){ return _httpStatus===403 ? "Esta reserva não é sua — só quem reservou (ou o administrador) pode alterá-la." : (base||"Não foi possível. Tente de novo."); }

/* ===== Firebase Authentication (REST) — o "crachá" que as regras vão exigir.
   FASE A: regras ainda abertas; tudo aqui roda em best-effort e, se falhar, NÃO
   bloqueia o login (o app segue igual a hoje). Login por matrícula vira um e-mail
   interno (matrícula@dominio), sem caixa de e-mail real. ===== */
const FB_API_KEY = "AIzaSyCWX-lK7pr6yW_E5jDvDhVewe20lB3E6Ks";  // chave PÚBLICA (segura em cliente)
const AUTH_DOMINIO = "vidalramos.agenda";
/* ver>1 gera um e-mail novo (matricula-v2@...) — usado quando o admin RESETA a senha:
   a conta segura antiga é abandonada e uma nova é criada no primeiro acesso. */
function _authEmail(id, ver){ const v=(+ver>1)?("-v"+(+ver)):""; return sanId(id).toLowerCase().replace(/[^a-z0-9_.-]/g,"") + v + "@" + AUTH_DOMINIO; }
function _guardaAuth(idToken, refreshToken, expiresIn, uid){
  // uid = localId do Firebase Auth (identidade real do usuário). Guardado para, no
  // futuro, carimbar o "dono" de cada reserva e as regras isolarem professor a professor.
  S.auth = { idToken:idToken, refreshToken:refreshToken, uid: uid || (S.auth&&S.auth.uid) || null, expira: Date.now() + ((parseInt(expiresIn||"3600",10)-60)*1000) };
  try{ if(refreshToken) localStorage.setItem("agenda_rt", refreshToken); }catch(e){}
}
function authAtivo(){ return !!(S.auth && S.auth.idToken); }
async function _authIdentity(kind, id, senha, ver){
  let r; try{ r = await _fetchT("https://identitytoolkit.googleapis.com/v1/accounts:"+kind+"?key="+FB_API_KEY,
    {method:"POST", headers:Object.assign({"Content-Type":"application/json"}, await _acHeader()),
     body: JSON.stringify({email:_authEmail(id, ver), password:""+senha, returnSecureToken:true})}); }
  catch(e){ throw new Error("REDE"); }
  const j = await _corpoJson(r).catch(function(){return {};});
  if(!r.ok) throw new Error((j&&j.error&&j.error.message)||"AUTH_ERRO");
  _guardaAuth(j.idToken, j.refreshToken, j.expiresIn, j.localId); return j;
}
async function authCriar(id, senha, ver){   // cria; se já existir, apenas entra
  try{ return await _authIdentity("signUp", id, senha, ver); }
  catch(e){ if(/EMAIL_EXISTS/.test(e.message)) return await _authIdentity("signInWithPassword", id, senha, ver); throw e; }
}
// ENTRAR de forma à prova de tudo, sem precisar "adivinhar" se a conta já existe.
// Motivo: o flag fbAuth não fica gravado (regras de isolamento) e a Proteção contra
// Enumeração do Firebase esconde se a conta existe (createAuthUri e o próprio login
// devolvem erro genérico). Então: tenta ENTRAR; se o login falhar de forma ambígua,
// tenta CRIAR — e é o próprio Firebase que revela a verdade: se responder EMAIL_EXISTS,
// a conta existe e portanto a senha estava errada; senão, é 1º acesso e a conta é criada.
async function authEntrarOuCriar(id, senha, ver){
  try{ return await _authIdentity("signInWithPassword", id, senha, ver); }
  catch(e){
    const m=e.message||"";
    if(/INVALID_LOGIN_CREDENTIALS|INVALID_PASSWORD|EMAIL_NOT_FOUND|MISSING_PASSWORD/.test(m)){
      try{ return await _authIdentity("signUp", id, senha, ver); }
      catch(e2){ if(/EMAIL_EXISTS/.test(e2.message||"")) throw new Error("SENHA_ERRADA"); throw e2; }
    }
    throw e;
  }
}
// Pergunta ao Firebase Auth se a conta (da versão atual) já existe — FONTE DA VERDADE,
// sem gravar nada no banco. Necessário porque as regras de isolamento não deixam o
// professor gravar a marca "fbAuth" no próprio cadastro; assim o app deixaria de saber
// que ele já tem senha e pediria "criar senha" toda vez. Retorna true/false, ou null se
// não deu pra perguntar (rede/bloqueio) — aí cai no fallback antigo.
async function authRegistrado(id, ver){
  try{
    const r = await _fetchT("https://identitytoolkit.googleapis.com/v1/accounts:createAuthUri?key="+FB_API_KEY,
      {method:"POST", headers:Object.assign({"Content-Type":"application/json"}, await _acHeader()),
       body: JSON.stringify({identifier:_authEmail(id, ver), continueUri:(location&&location.origin)||"https://vidalprof.github.io"})}, 8000);
    const j = await _corpoJson(r).catch(function(){return {};});
    if(!r.ok) return null;
    return j.registered===true;
  }catch(e){ return null; }
}
async function authRefresh(){          // renova o crachá a partir do refresh token salvo
  let rt = (S.auth&&S.auth.refreshToken); if(!rt){ try{ rt=localStorage.getItem("agenda_rt"); }catch(e){} }
  if(!rt) return false;
  let r; try{ r = await _fetchT("https://securetoken.googleapis.com/v1/token?key="+FB_API_KEY,
    {method:"POST", headers:Object.assign({"Content-Type":"application/x-www-form-urlencoded"}, await _acHeader()),
     body: "grant_type=refresh_token&refresh_token="+encodeURIComponent(rt)}); }
  catch(e){ return false; }
  const j = await _corpoJson(r).catch(function(){return {};});
  if(!r.ok) return false;
  _guardaAuth(j.id_token, j.refresh_token, j.expires_in, j.user_id); return true;
}

/* ================= DEFAULTS (semeados no 1o acesso) ================= */
const DIAS = ["dom","seg","ter","qua","qui","sex","sab"];
const DIAS_NOME = {dom:"Dom",seg:"Seg",ter:"Ter",qua:"Qua",qui:"Qui",sex:"Sex",sab:"Sab"};
const TURNOS = [{k:"matutino",n:"Matutino",c:"m"},{k:"vespertino",n:"Vespertino",c:"v"},{k:"noturno",n:"Noturno",c:"n"}];
const ORD_TURNO = {matutino:0, vespertino:1, noturno:2};  // ordem real do dia (não alfabética)
const DEF_DISCIPLINAS = ["Língua Portuguesa","Matemática","Ciências","História","Geografia","Inglês","Ensino Religioso","Artes","Ed. Física"];
const DEF_TURMAS = ["0 - Pré","1º ano","2º ano","3º ano","4º ano","5º ano","6º ano","7º ano","8º ano","9º ano"];
const DEF_AULAS = {dom:{m:0,v:0,n:0},seg:{m:4,v:4,n:0},ter:{m:4,v:4,n:0},qua:{m:0,v:0,n:0},qui:{m:4,v:4,n:0},sex:{m:4,v:4,n:0},sab:{m:0,v:0,n:0}};
const DEF_HORARIOS = {
  matutino:[["07:25","08:21"],["08:21","09:17"],["09:33","10:29"],["10:29","11:25"]],
  vespertino:[["12:55","13:51"],["13:51","14:47"],["15:03","15:59"],["15:59","16:55"]],
  noturno:[["19:00","19:50"],["19:50","20:40"],["20:55","21:45"],["21:45","22:35"]]
};
const DEF_CONFIG = {appNome:"Agenda Aulas",escolaNome:"E.B.M. Vidal Ramos",
  obrigatorios:true, apenasProximoDia:true, limiteMeses:1,
  aviso:"", haeLabel:"HAE — Professor de Informática", hae:[],
  turmaLetras:["A","B","C","D"], liberadoAte:"", periodos:[],
  rodizio:{ativo:false, refSeg:"", refGrupo:"ini"}};

/* ================= STATE ================= */
const S = {user:null, auth:null, config:null, professores:{}, disciplinas:[], turmas:[], reservas:{}, recentes:[], _ocultos:{}, dataSel:null, tab:"hoje"};
let _pollTimer=null;

/* ================= HELPERS ================= */
const $ = (id)=>document.getElementById(id);
const esc = (s)=> (""+(s==null?"":s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
/* Só aceita cor hexadecimal válida; qualquer outra coisa (vinda do banco) vira a cor padrão.
   Evita injeção de HTML/CSS via campo de cor interpolado em style="...". */
const corSegura = (c)=> (/^#[0-9a-fA-F]{3,8}$/.test(""+c) ? (""+c) : "#0ea3a3");
const sanId = (s)=> (""+s).replace(/[.#$\[\]\/\s]/g,"_");
const pad = (n)=> (n<10?"0":"")+n;
const hojeStr = ()=>{ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dateFromStr = (s)=>{ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); };
const MES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const SEM = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
const fmtDia = (s)=>{ const d=dateFromStr(s); return `${d.getDate()} de ${MES[d.getMonth()]}`; };
const fmtSem = (s)=> SEM[dateFromStr(s).getDay()];
const cap1 = (s)=> s? s.charAt(0).toUpperCase()+s.slice(1) : s;
const addDias = (s,n)=>{ const d=dateFromStr(s); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const fimDoMes = (s)=>{ const d=dateFromStr(s); const e=new Date(d.getFullYear(), d.getMonth()+1, 0); return `${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}`; };
const fimMesOffset = (s,off)=>{ const d=dateFromStr(s); const e=new Date(d.getFullYear(), d.getMonth()+1+off, 0); return `${e.getFullYear()}-${pad(e.getMonth()+1)}-${pad(e.getDate())}`; };
const diffDias = (a,b)=> Math.round((dateFromStr(b)-dateFromStr(a))/86400000);

function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.remove("hidden");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2400);
}

/* ===== TEMA (claro/escuro) — preferência de cada usuário, salva no aparelho ===== */
function _temaPref(){ try{ return localStorage.getItem("agenda_tema")||"auto"; }catch(e){ return "auto"; } }
function aplicarTema(){ const p=_temaPref(), r=document.documentElement;
  if(p==="light"||p==="dark") r.setAttribute("data-theme",p); else r.removeAttribute("data-theme"); }
function temaEscuro(){ const p=_temaPref();
  if(p==="dark") return true; if(p==="light") return false;
  return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches); }
function alternarTema(){ try{ localStorage.setItem("agenda_tema", temaEscuro()?"light":"dark"); }catch(e){} aplicarTema(); attTemaIcon(); }
function attTemaIcon(){ const b=$("btnTema"); if(b){ b.innerHTML=temaEscuro()?"☀️":"🌙"; b.title=temaEscuro()?"Mudar para tema claro":"Mudar para tema escuro"; } }

function aulasDoDia(dataStr, turnoC){
  const wk = DIAS[dateFromStr(dataStr).getDay()];
  const a = (S.config.aulas && S.config.aulas[wk]) || {m:0,v:0,n:0};
  return a[turnoC]||0;
}
function horarioLabel(turnoK, idx){
  const h = S.config.horarios && S.config.horarios[turnoK];
  if(h && h[idx]) return h[idx][0]+" – "+h[idx][1];
  return "";
}
/* rodízio de semanas: anos iniciais (Pré–5º) x anos finais (6º–9º) */
function grupoDaTurma(turma){
  const s=(""+turma).toLowerCase();
  if(/pr[eé]/.test(s)) return "ini";
  const m=s.match(/(\d+)/); if(!m) return null;
  const n=+m[1];
  if(n>=0 && n<=5) return "ini";
  if(n>=6 && n<=9) return "fin";
  return null;
}
function segDaSemana(dataStr){ const d=dateFromStr(dataStr), dow=(d.getDay()+6)%7; return addDias(dataStr,-dow); }
function grupoDaSemana(dataStr){
  const r=S.config && S.config.rodizio;
  if(!r || !r.ativo || !r.refSeg) return null;
  const semanas=Math.round(diffDias(r.refSeg, segDaSemana(dataStr))/7);
  const par=((semanas%2)+2)%2, g=r.refGrupo||"ini";
  return par===0 ? g : (g==="ini"?"fin":"ini");
}
function nomeGrupo(g){ return g==="ini" ? "Anos Iniciais (Pré–5º)" : (g==="fin" ? "Anos Finais (6º–9º)" : ""); }
/* período (recesso/férias): dia dentro de um intervalo configurado */
function periodoDoDia(dataStr){
  const arr=(S.config && S.config.periodos) || [];
  for(let i=0;i<arr.length;i++){ const p=arr[i]; if(p.inicio && p.fim && dataStr>=p.inicio && dataStr<=p.fim) return p; }
  return null;
}
/* Feriados NACIONAIS (dias em que ninguém trabalha): agenda fechada para os
   professores — só o admin pode agendar. Calculados sozinhos todo ano.
   Fixos + Sexta-feira Santa (móvel, depende da Páscoa). O admin pode desligar
   tudo em ⚙️ → Outras configurações (config.feriadosNac === false). */
const FERIADOS_FIXOS = {
  "01-01":"Confraternização Universal (Ano Novo)",
  "04-21":"Tiradentes",
  "05-01":"Dia do Trabalho",
  "09-07":"Independência do Brasil",
  "10-12":"Nossa Senhora Aparecida",
  "11-02":"Finados",
  "11-15":"Proclamação da República",
  "11-20":"Consciência Negra",
  "12-25":"Natal"
};
/* Domingo de Páscoa (algoritmo de Meeus/Butcher) → "YYYY-MM-DD" */
function pascoa(ano){
  const a=ano%19, b=Math.floor(ano/100), c=ano%100, d=Math.floor(b/4), e=b%4,
    f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
    mes=Math.floor((h+l-7*m+114)/31), dia=((h+l-7*m+114)%31)+1;
  return ano+"-"+pad(mes)+"-"+pad(dia);
}
function feriadoNacional(dataStr){
  if(S.config && S.config.feriadosNac===false) return null;
  const nome=FERIADOS_FIXOS[dataStr.slice(5)];
  if(nome) return nome;
  const ano=+dataStr.slice(0,4);
  if(dataStr===addDias(pascoa(ano),-2)) return "Sexta-feira Santa";
  return null;
}
/* Ponto facultativo (Carnaval e Corpus Christi): nem toda escola fecha, então
   fica num botão à parte (config.facultativos). Ligado por padrão. */
function feriadoFacultativo(dataStr){
  if(S.config && S.config.facultativos===false) return null;
  const pa=pascoa(+dataStr.slice(0,4));
  if(dataStr===addDias(pa,-48) || dataStr===addDias(pa,-47)) return "Carnaval";
  if(dataStr===addDias(pa,60)) return "Corpus Christi";
  return null;
}
/* Qualquer feriado que fecha a agenda para o professor (nacional OU facultativo). */
function diaFeriado(dataStr){ return feriadoNacional(dataStr) || feriadoFacultativo(dataStr); }
/* HAE recorrente: slot (dia-da-semana + turno + aula) fixo como hora-atividade */
function ehHAE(dataStr, turnoK, aula){
  const wk = DIAS[dateFromStr(dataStr).getDay()];
  const arr = (S.config && S.config.hae) || [];
  for(let i=0;i<arr.length;i++){ const x=arr[i]; if(x.wk===wk && x.turno===turnoK && (+x.aula)===(+aula)) return true; }
  return false;
}

async function init(){
  aplicarTema();
  // espera o App Check ficar pronto (com teto de 3s) antes das chamadas ao banco
  try{ await Promise.race([ window._acReady, new Promise(function(r){ setTimeout(r,3000); }) ]); }catch(e){}
  await carregarBase();
  // Se a busca dos dados essenciais FALHOU (rede/servidor), não é "primeiro acesso":
  // mostra "sem conexão" em vez da tela de criar administrador.
  if(_baseErro){ telaSemConexao(); return; }
  if(!S.professores || Object.keys(S.professores).length===0){ telaBootstrap(); return; }
  let saved=null; try{ saved=localStorage.getItem("agenda_user"); }catch(e){}
  if(saved && S.professores[saved]){
    S.user = S.professores[saved];
    let tok=false; try{ tok=await authRefresh(); }catch(e){}
    // Sem crachá válido, as regras fechadas não deixam ler a agenda -> pede a senha de novo
    // (em vez de abrir uma agenda vazia sem explicação).
    if(!tok){
      // Sessão expirou mas a pessoa já tinha login salvo -> a conta existe -> tela de ENTRAR
      // (nunca "criar"). Não perguntamos ao createAuthUri: com a Proteção contra Enumeração
      // ele pode dizer "não existe" para uma conta que existe, e aí voltaria o bug.
      _sessaoExpirou=true; _loginPend=S.professores[saved];
      telaSenha(); return;
    }
    abrirApp();
  }
  else telaLogin();
}

var _baseErro=false;
async function carregarBase(){
  const [config,prof,disc,turmas] = await Promise.all([
    fbGetRaw("/config"), fbGetRaw("/professores"), fbGetRaw("/disciplinas"), fbGetRaw("/turmas")
  ]);
  // Falha nos dois essenciais (config/professores) => sem conexão de verdade.
  _baseErro = !config.ok || !prof.ok;
  // Só aceita /config se for um OBJETO. Se vier nulo OU primitivo corrompido
  // (string/number), trata como ausente — senão S.config.aulas=... estoura TypeError.
  S.config = (config.ok && config.val && typeof config.val==="object") ? config.val : null;
  // /config vazio/corrompido mas há professores: usa defaults em memória p/ o app NÃO
  // estourar e ficar em tela branca.
  if(!S.config && config.ok && prof.ok && prof.val) S.config = Object.assign({}, DEF_CONFIG);
  if(S.config){
    // "máscara" do nome: corrige automaticamente o nome antigo para o novo, sem precisar
    // editar o Firebase. Se o admin definir OUTRO nome no ⚙️, esse é respeitado.
    if(!S.config.appNome || S.config.appNome==="Agenda de Aulas") S.config.appNome = "Agenda Aulas";
    if(!S.config.aulas) S.config.aulas = DEF_AULAS;
    if(!S.config.horarios) S.config.horarios = DEF_HORARIOS;
    if(!S.config.hae) S.config.hae = [];
    if(!S.config.haeLabel) S.config.haeLabel = "HAE — Professor de Informática";
    if(S.config.aviso==null) S.config.aviso = "";
    if(!S.config.turmaLetras) S.config.turmaLetras = ["A","B","C","D"];
    if(!S.config.liberadoAte) S.config.liberadoAte = fimDoMes(hojeStr());
    if(!S.config.periodos) S.config.periodos = [];
    if(!S.config.rodizio) S.config.rodizio = {ativo:false, refSeg:"", refGrupo:"ini"};
  }
  S.professores = (prof.ok ? prof.val : null) || {};
  S.disciplinas = (disc.ok ? disc.val : null) || [];
  S.turmas = (turmas.ok ? turmas.val : null) || [];
}
/* Em falha de recarga, MANTÉM as reservas já carregadas (evita a agenda "piscar vazia"). */
async function recarregarReservas(){ const r = await fbGetRaw("/reservas"); if(r.ok){ S.reservas = r.val || {}; return true; } return false; }

/* ===== PEDIDOS de agendamento (fora da semana do rodízio) =====
   O professor comum não agenda fora da sua semana: manda um PEDIDO que fica pendente
   (NÃO ocupa horário na agenda). O admin (professor de informática) aprova — aí vira
   aula na grade, marcada como exceção — ou recusa. Guardado em recentesOcultos/__PEDIDOS__
   (área que as regras já liberam p/ qualquer professor logado): não precisa mexer nas
   regras, e a AGENDA continua protegida (a aula só entra pela regra normal, ao aprovar). */
var PED_PATH = "/recentesOcultos/__PEDIDOS__";
async function carregarPedidos(){ try{ S.pedidos = (await fbGet(PED_PATH)) || {}; }catch(e){ S.pedidos = S.pedidos||{}; } return S.pedidos; }
function pedidosArr(){ const o=S.pedidos||{}; return Object.keys(o).map(function(k){return o[k];}).filter(Boolean); }
function pedidosPendentes(){ return pedidosArr().filter(function(p){return p.status==="pendente";}); }
function meusPedidos(){ const me=sanId(S.user.id); return pedidosArr().filter(function(p){return sanId(p.profId)===me;}).sort(function(a,b){return (b.ts||0)-(a.ts||0);}); }
function _pedBadge(){ return S.user.admin ? pedidosPendentes().length : meusPedidos().filter(function(p){return p.status==="pendente";}).length; }
function _temPedidos(){ return S.user.admin ? pedidosArr().length>0 : meusPedidos().length>0; }
async function enviarPedido(){
  const p = {
    pid: "p"+Date.now()+"_"+Math.floor(Math.random()*1000000),
    data: S.dataSel, turnoK: _form.turnoK, aula: _form.aula,
    turmaBase: _form.turma, letra: _form.letra||"",
    turma: (_form.turma||"") + (_form.letra?(" "+_form.letra):""),
    disciplina: _form.disc||"", tema: _form.tema||"", objetivo: _form.obj||"",
    profId: _form.profId, profNome: _form.profNome,
    ownerUid: (S.auth&&S.auth.uid)||null, ts: Date.now(), status: "pendente"
  };
  const restore=btnBusy('[data-act="enviar-pedido"]',"Enviando…");
  try{
    const ok = await fbSet(PED_PATH+"/"+p.pid, p);
    if(!ok){ toast(_msgFalha("Não consegui enviar o pedido. Tente de novo.")); return; }
    S.pedidos = S.pedidos||{}; S.pedidos[p.pid]=p;
    fecharSheet(); S.tab="pedidos"; desenharShell();
    toast("Pedido enviado ao professor de informática. ✅");
  } finally { restore(); }
}
async function aprovarPedido(pid){
  const p = S.pedidos && S.pedidos[pid]; if(!p || !S.user.admin) return;
  const restore=btnBusy('[data-pid="'+pid+'"] [data-act="aprovar-pedido"]',"Aprovando…");
  try{
    const chk = await fbGetRaw("/reservas/"+p.data+"/"+p.turnoK+"/a"+p.aula);
    if(!chk.ok){ toast("Sem conexão para confirmar o horário. Tente de novo."); return; }
    if(chk.val){ toast("Esse horário já está ocupado. Recuse ou libere o horário primeiro."); return; }
    const reg={ turma:p.turma, disciplina:p.disciplina, tema:p.tema, objetivo:p.objetivo,
      profId:p.profId, profNome:p.profNome,
      // DONO = o professor que PEDIU (p.ownerUid), não o admin que aprova. Assim ele pode
      // editar/excluir a própria aula de exceção. Fallback ao admin só p/ pedidos legados.
      ownerUid: p.ownerUid || (S.auth&&S.auth.uid) || null,
      excecao:true, ts:Date.now() };
    const ok=await fbSet("/reservas/"+p.data+"/"+p.turnoK+"/a"+p.aula, reg);
    if(!ok){ toast(_msgFalha("Não consegui registrar na agenda. Tente de novo.")); return; }
    p.status="aprovado"; p.decidTs=Date.now();
    await fbSet(PED_PATH+"/"+pid, p);
    await recarregarReservas(); renderTab();
    toast("Pedido aprovado e agendado! ✅");
  } finally { restore(); }
}
async function recusarPedido(pid){
  const p=S.pedidos&&S.pedidos[pid]; if(!p||!S.user.admin) return;
  p.status="recusado"; p.decidTs=Date.now();
  const ok=await fbSet(PED_PATH+"/"+pid, p);
  if(!ok){ toast("Não consegui recusar agora. Tente de novo."); return; }
  renderTab(); toast("Pedido recusado.");
}
async function apagarPedido(pid){
  const p=S.pedidos&&S.pedidos[pid]; if(!p) return;
  // admin apaga qualquer um já decidido; professor cancela o SEU pendente
  if(!S.user.admin && !(sanId(p.profId)===sanId(S.user.id) && p.status==="pendente")) return;
  const ok=await fbSet(PED_PATH+"/"+pid, null);
  if(!ok){ toast("Não consegui remover agora. Tente de novo."); return; }
  if(S.pedidos) delete S.pedidos[pid];
  if(!_temPedidos() && S.tab==="pedidos") S.tab="hoje";
  desenharShell();
  toast(S.user.admin?"Pedido removido.":"Pedido cancelado.");
}

async function fazerLogin(){
  const id=$("lId").value.trim(); if(!id) return toast("Digite o seu ID.");
  const key=sanId(id);
  const restore=btnBusy('[data-act="login"]',"Entrando…");
  try{
    await carregarBase();
    if(_baseErro){ toast("Sem conexão. Verifique a internet e tente de novo."); return; }
    const p = S.professores[key];
    if(!p){ toast("Usuário não encontrado. Confira a matrícula ou fale com o administrador."); return; }
    _loginPend=p;
    // NÃO tentamos adivinhar "entrar x criar" aqui: mostramos ENTRAR por padrão e o
    // authEntrarOuCriar resolve (entra se existe, cria se for 1º acesso). Isso evita o bug
    // de pedir "criar senha" a quem já tem — o flag fbAuth não grava (isolamento) e o
    // createAuthUri não é confiável (Proteção contra Enumeração).
    telaSenha();
  } finally { restore(); }
}
function telaSenha(){
  const p=_loginPend;
  // Decisão "entrar" x "criar senha", em ordem de confiança:
  //  1) Firebase Auth respondeu -> ELE manda (conta já existe = entrar; não existe = criar).
  //  2) Não respondeu (rede/proteção), MAS a sessão expirou -> a pessoa JÁ tinha conta antes
  //     (tinha login salvo) -> ENTRAR. Nunca "criar" numa reentrada: era isto que fazia pedir
  //     senha nova a cada vez que o app era reaberto.
  //  3) Sem nenhuma pista -> usa o flag antigo fbAuth como reserva (1º acesso de verdade).
  // "novo" = mostrar a tela de CRIAR senha (com confirmação). Só entra em "criar" quando há
  // CERTEZA de 1º acesso/reset. No caso ambíguo mostramos ENTRAR (a conta do Firebase quase
  // sempre já existe) — e o authEntrarOuCriar cria sozinho se por acaso ainda não existir.
  // Assim ninguém mais vê "crie a sua senha" tendo senha (o bug relatado).
  const novo = _forcarNovo ? true                 // usuário pediu criar com confirmação
             : _sessaoExpirou ? false             // sessão expirou -> já tinha conta -> entrar
             : (+p.authVer>1) ? true              // admin resetou -> conta nova -> criar
             : p.senha ? true                     // migrando do hash antigo -> criar no Firebase
             : false;                             // PADRÃO: entrar (nunca "criar" no ambíguo)
  let sub;
  if(_sessaoExpirou) sub = novo ? "Confirme criando sua senha para continuar" : "Sua sessão expirou — entre novamente";
  else if(novo){
    if(+p.authVer>1) sub="Crie uma nova senha (mínimo 6)";
    else if(p.senha) sub="Atualizamos a segurança do login — crie sua senha de novo (pode ser a mesma)";
    else sub="Primeiro acesso — crie a sua senha";
  } else sub="Digite a sua senha";
  $("root").innerHTML = `
  <div class="authwrap">
    <img class="logoimg" src="icon-192-e.png" alt="Agenda Aulas">
    <h1>Olá, ${esc(p.nome.split(" ")[0])}!</h1>
    <p class="sub">${esc(sub)}</p>
    ${novo?`
      <label class="fld">Nova senha</label>
      <input id="sNova" type="password" data-pw class="input" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      <label class="fld">Confirmar senha</label>
      <input id="sConf" type="password" data-pw class="input" placeholder="repita a senha" autocomplete="new-password">
      <button class="btnlink" data-act="toggle-senha" data-on="0">👁 Mostrar senha</button>
      <div style="height:12px"></div>
      <button class="btn primary" data-act="login-criar">Criar senha e entrar</button>
    `:`
      <label class="fld">Senha</label>
      <input id="sSenha" type="password" data-pw class="input" placeholder="sua senha" autocomplete="current-password">
      <button class="btnlink" data-act="toggle-senha" data-on="0">👁 Mostrar senha</button>
      <div style="height:12px"></div>
      <button class="btn primary" data-act="login-entrar">Entrar</button>
      <div style="height:16px"></div>
      <div class="card" style="text-align:left;border-color:var(--amber);background:var(--amber-tint)">
        <div style="font-weight:800;color:var(--amber)">🔑 É o seu primeiro acesso?</div>
        <div style="font-size:13.5px;color:var(--text);margin-top:4px;margin-bottom:10px">Se você ainda <b>não tem senha</b>, crie a sua agora — você digita <b>duas vezes</b> para confirmar e não errar.</div>
        <button class="btn ghost" data-act="login-quero-criar">Criar a minha senha</button>
      </div>
      <p class="hint">Esqueceu a senha? Peça ao administrador para <b>resetar</b> a sua.</p>
    `}
    <div style="height:8px"></div>
    <button class="btn ghost" data-act="login-voltar">‹ Voltar</button>
  </div>`;
  setTimeout(()=>{ const el=$(novo?"sNova":"sSenha"); if(el) el.focus(); },100);
}
async function loginCriar(){
  const a=($("sNova")?$("sNova").value:""), b=($("sConf")?$("sConf").value:"");
  if(a.length<6) return toast("A senha precisa ter pelo menos 6 caracteres.");
  if(a!==b) return toast("As senhas não coincidem.");
  const key=sanId(_loginPend.id);
  const restore=btnBusy('[data-act="login-criar"]',"Criando…");
  try{
    // O Firebase Auth é o portão: cria a conta (ou entra, se já existir com esta senha).
    try{ await authCriar(_loginPend.id, a, _loginPend.authVer); }
    catch(e){ const m=e.message||"";
      if(/INVALID_LOGIN_CREDENTIALS|INVALID_PASSWORD/.test(m)) return toast("Esta conta já tem uma senha. Peça ao administrador para resetar a sua.");
      if(/WEAK_PASSWORD/.test(m)) return toast("A senha precisa ter pelo menos 6 caracteres.");
      if(/TOO_MANY_ATTEMPTS/.test(m)) return toast("Muitas tentativas. Aguarde um minuto e tente de novo.");
      if(/RECAPTCHA|APP.?CHECK|Forbidden/i.test(m)) return toast("Não foi possível validar a segurança. Desative bloqueadores e tente de novo.");
      return toast("Sem conexão. Tente de novo.");
    }
    try{ await fbSet("/professores/"+key+"/fbAuth", true); _loginPend.fbAuth=true; }catch(e){}
    if(_loginPend.senha){ try{ await fbUpdate("/professores/"+key, {senha:null}); delete _loginPend.senha; }catch(e){} }
    S.user=_loginPend; localStorage.setItem("agenda_user", key);
    toast("Senha criada! 🔑"); abrirApp();
  } finally { restore(); }
}
async function loginEntrar(){
  const s=($("sSenha")?$("sSenha").value:"");
  if(!s) return toast("Digite a sua senha.");
  const key=sanId(_loginPend.id);
  if(s.length<6) return toast("A senha precisa ter pelo menos 6 caracteres.");
  const restore=btnBusy('[data-act="login-entrar"]',"Entrando…");
  try{
    // O Firebase Auth é o portão real. authEntrarOuCriar entra se a conta existe e cria se
    // for o 1º acesso — sem depender de adivinhar antes (fbAuth/enumeração não são confiáveis).
    try{ await authEntrarOuCriar(_loginPend.id, s, _loginPend.authVer); }
    catch(e){ const m=e.message||"";
      if(/SENHA_ERRADA/.test(m)) return toast("Senha incorreta.");
      if(/WEAK_PASSWORD/.test(m)) return toast("A senha precisa ter pelo menos 6 caracteres.");
      if(/INVALID_LOGIN_CREDENTIALS|INVALID_PASSWORD|MISSING_PASSWORD|EMAIL_NOT_FOUND/.test(m)) return toast("Senha incorreta.");
      if(/TOO_MANY_ATTEMPTS/.test(m)) return toast("Muitas tentativas. Aguarde um minuto e tente de novo.");
      if(/RECAPTCHA|APP.?CHECK|Forbidden/i.test(m)) return toast("Não foi possível validar a segurança. Desative bloqueadores e tente de novo.");
      return toast("Sem conexão. Tente de novo.");
    }

/* Primeiro dia em que dá para agendar (pula fim de semana/feriado/período e respeita
   "só a partir de amanhã"). Evita abrir num "hoje morto" onde nada pode ser marcado. */
function primeiroDiaAgendavel(){
  const hoje=hojeStr();
  const limite=(S.config.liberadoAte && S.config.liberadoAte>=hoje)?S.config.liberadoAte:fimDoMes(hoje);
  const soProx = S.config.apenasProximoDia && !S.user.admin;  // admin pode agendar hoje
  let d=soProx?addDias(hoje,1):hoje;
  for(let k=0;k<62;k++){ if(contarDisponiveis(d).tot>0) return d; if(d>=limite) break; d=addDias(d,1); }
  return soProx?addDias(hoje,1):hoje;
}
function _sigReservas(){ try{ return JSON.stringify(S.reservas); }catch(e){ return ""+Date.now(); } }
async function abrirApp(){
  _forcarNovo=false;   // consumido: não pode vazar para uma tela de senha futura
  S.tab="hoje";
  // limpeza única: remove do banco qualquer hash de senha antigo (não é mais usado)
  if(S.user.senha){ try{ fbUpdate("/professores/"+sanId(S.user.id), {senha:null}); delete S.user.senha; }catch(e){} }
  // limpeza do ADMIN: apaga o resíduo de senha antiga de TODOS os cadastros (o professor
  // comum não consegue apagar o próprio por causa das regras de isolamento). Roda em
  // segundo plano, uma vez só (depois de limpo não há mais o que fazer), e avisa se limpou.
  if(S.user.admin && S.professores){
    (async function(){
      try{
        const alvos = Object.keys(S.professores).filter(function(k){ return S.professores[k] && S.professores[k].senha!=null; });
        let n=0;
        for(let i=0;i<alvos.length;i++){ const k=alvos[i]; const ok=await fbUpdate("/professores/"+k, {senha:null}); if(ok){ delete S.professores[k].senha; n++; } }
        if(n) toast("Limpeza: "+n+" cadastro(s) antigos ajustados. 🧹");
      }catch(e){}
    })();
  }
  await recarregarReservas();
  try{ S._lwSeen = await fbGet("/config/reservasLastWrite"); }catch(e){ S._lwSeen=null; }
  S.dataSel = primeiroDiaAgendavel();
  try{ S.recentes = (await fbGet("/recentes/"+sanId(S.user.id))) || []; }catch(e){ S.recentes=[]; }
  S._ocultos={}; try{ await carregarOcultos(S.user.id); }catch(e){}
  try{ await carregarPedidos(); }catch(e){}
  S._pedSig = JSON.stringify(pedidosArr().map(function(p){return p.pid+":"+p.status;}));
  desenharShell();
  checarNotificacao();
  if(!S._visBound){ S._visBound=true; document.addEventListener("visibilitychange", async function(){
    if(document.hidden || !S.user) return;
    if($("modal") && $("modal").innerHTML) return;                 // não redesenha com uma janela aberta
    const lw = await fbGet("/config/reservasLastWrite");           // lê só o marcador; só baixa tudo se mudou
    if(lw!=null && lw===S._lwSeen) return;
    const okR = await recarregarReservas();
    if(!okR) return;                                                // recarga falhou: NÃO consome o marcador (tenta de novo)
    S._lwSeen = lw;
    if(S.tab==="hoje"||S.tab==="proximos") renderTab();
  }); }
  if(_pollTimer) clearInterval(_pollTimer);
  // Poll econômico: pausa quando o app não está visível, não redesenha com uma janela
  // aberta, e só re-renderiza se algo mudou (não "pula" a rolagem à toa). Intervalo 30s.
  _pollTimer = setInterval(async()=>{
    if(document.hidden) return;
    if($("modal") && $("modal").innerHTML) return;
    if(authAtivo() && S.auth.expira < Date.now()+180000){ try{ await authRefresh(); }catch(e){} }
    // rede de segurança: a cada ~5 min recarrega tudo mesmo sem mudança no marcador
    // (cobre um "bump" de marcador que tenha falhado num aparelho).
    S._pollN=(S._pollN||0)+1; const forcar=(S._pollN%10===0);
    // lê só o marcador (poucos bytes); só baixa a agenda inteira se algo mudou
    const lw = await fbGet("/config/reservasLastWrite");
    if(!forcar && lw===S._lwSeen) return;
    const antes=_sigReservas(); const okR = await recarregarReservas();
    if(!okR) return;                                                // recarga falhou: mantém o marcador antigo p/ tentar de novo
    S._lwSeen = lw;
    if(_sigReservas()!==antes && (S.tab==="hoje"||S.tab==="proximos")) renderTab();
    // pedidos: recarrega e, se algo mudou (novo pedido / status), atualiza o selo e a aba
    try{
      await carregarPedidos();
      const sig = JSON.stringify(pedidosArr().map(function(p){return p.pid+":"+p.status;}));
      if(sig!==S._pedSig){ S._pedSig=sig; if(S.tab==="pedidos") renderTab(); else desenharShell(); }
    }catch(e){}
  }, 30000);
}

/* ================= VIEW: HOJE (agenda do dia) ================= */
function contarDisponiveis(dataStr){
  if(periodoDoDia(dataStr)) return {tot:0,disp:0};
  // feriado fecha o dia para o professor (o admin continua vendo/agendando)
  if(diaFeriado(dataStr) && !(S.user&&S.user.admin)) return {tot:0,disp:0};
  let tot=0,disp=0;
  TURNOS.forEach(t=>{
    const n=aulasDoDia(dataStr,t.c); tot+=n;
    const rt=(S.reservas[dataStr]&&S.reservas[dataStr][t.k])||{};
    for(let i=1;i<=n;i++){ if(!rt["a"+i] && !ehHAE(dataStr,t.k,i)) disp++; }
  });
  return {tot,disp};
}
var _hojeModo="dia";  /* dia | semana (semana é só do admin) */
function viewHoje(){
  const adm=S.user.admin;
  if(!adm) _hojeModo="dia";
  const modoTop = adm ? `<div class="rel-tools"><div class="chips">
      <button class="chip ${_hojeModo==="dia"?"on":""}" data-act="hoje-modo" data-v="dia">📅 Dia</button>
      <button class="chip ${_hojeModo==="semana"?"on":""}" data-act="hoje-modo" data-v="semana">🗓️ Semana</button>
    </div></div>` : "";
  if(adm && _hojeModo==="semana") return viewSemana(modoTop);
  const data=S.dataSel, hoje=hojeStr();
  const ate=(S.config.liberadoAte && S.config.liberadoAte>=hoje) ? S.config.liberadoAte : fimDoMes(hoje);
  const nDias=Math.min(62, Math.max(1, diffDias(hoje,ate)+1));
  let strip='<div class="weekstrip">';
  for(let k=0;k<nDias;k++){
    const ds=addDias(hoje,k), d=dateFromStr(ds), c=contarDisponiveis(ds);
    const on=ds===data, semAula=c.tot===0;
    // professor não agenda hoje (regra "só a partir de amanhã") -> pip não fica verde
    const soPodeAmanha = S.config.apenasProximoDia && !adm && ds===hoje;
    strip+=`<button class="daychip ${on?"on":""} ${semAula?"off":""}" data-act="setdia" data-d="${ds}">
      <span class="wd">${["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()]}</span>
      <span class="dn">${d.getDate()}</span>
      <span class="pip ${(!semAula&&c.disp>0&&!soPodeAmanha)?"has":""}"></span></button>`;
  }
  strip+='</div>';
  const cd=contarDisponiveis(data);
  const per=periodoDoDia(data);
  const fer=diaFeriado(data);
  // Professor não agenda no mesmo dia: mostra os horários travados, não verdes enganosos.
  const diaFechadoProf = (!adm && S.config.apenasProximoDia && data===hojeStr());
  let h=modoTop+strip;
  let badge;
  if(per) badge=`<span class="livrebadge" style="background:color-mix(in srgb,${corSegura(per.cor)} 16%,transparent);color:${corSegura(per.cor)}">${esc(per.rotulo||"Sem aula")}</span>`;
  else if(fer) badge=`<span class="livrebadge" style="background:color-mix(in srgb,#e5533c 16%,transparent);color:#e5533c">🎌 Feriado</span>`;
  else if(diaFechadoProf) badge=`<span class="livrebadge zero">Só a partir de amanhã</span>`;
  else badge=`<span class="livrebadge ${cd.disp>0?"":"zero"}">${cd.disp} ${cd.disp===1?"livre":"livres"}</span>`;
  h+=`<div class="daysum"><div><b>${esc(cap1(fmtSem(data)))}</b><div class="sub">${esc(fmtDia(data))}</div></div>${badge}</div>`;
  const gsem=grupoDaSemana(data);
  // Só mostra a plaquinha do rodízio em dia letivo (não em fim de semana,
  // feriado, recesso ou férias — aí não há agendamento mesmo).
  if(gsem && cd.tot>0 && !fer) h+=`<div class="grupobanner ${gsem}">🔁 Semana dos ${esc(nomeGrupo(gsem))}</div>`;
  // Lembrete só para o admin: o período liberado está acabando/acabou (evita "esquecer de liberar o mês").
  if(adm && S.config.liberadoAte){
    const faltam=diffDias(hoje, S.config.liberadoAte);
    if(faltam<0) h+=`<div class="grupobanner" style="background:var(--amber-tint);color:var(--amber)">📅 O período de agendamento fechou em ${esc(fmtDia(S.config.liberadoAte))}. Libere o próximo mês em ⚙️ → Outras configurações.</div>`;
    else if(faltam<=6) h+=`<div class="grupobanner" style="background:var(--amber-tint);color:var(--amber)">📅 O mês liberado termina ${faltam===0?"hoje":("em "+faltam+" dia"+(faltam>1?"s":""))} (${esc(fmtDia(S.config.liberadoAte))}). Considere liberar o próximo em ⚙️.</div>`;
  }
  // admin agendando no dia de hoje: deixa claro que é permissão só dele
  if(adm && S.config.apenasProximoDia && data===hojeStr() && !per && !fer)
    h+=`<div class="grupobanner" style="background:var(--primary-tint);color:var(--primary)">🔓 Você (admin) pode agendar hoje. Os professores só a partir de amanhã.</div>`;
  h+=lembreteHTML();
  if(per){
    const rot=per.rotulo||"";
    const ico=/feriado/i.test(rot)?"🎌":(/f[ée]rias/i.test(rot)?"🏖️":"🌴");
    h+=`<div class="periodo" style="--pc:${corSegura(per.cor)}"><span class="pico">${ico}</span><b>${esc(per.rotulo||"Sem aula")}</b>
      <div class="pd">${esc(fmtDia(per.inicio))} até ${esc(fmtDia(per.fim))}</div>
      <div class="pd">Não há aulas neste período — a agenda fica fechada.</div></div>`;
    $("view").innerHTML=h;
    const onEl2=document.querySelector(".daychip.on"); if(onEl2&&onEl2.scrollIntoView){ try{ onEl2.scrollIntoView({inline:"center",block:"nearest"}); }catch(e){} }
    return;
  }
  if(fer){
    const nota = adm
      ? "Fechado para os professores. Você (admin) pode agendar mesmo assim."
      : "Não há aulas neste dia — a agenda fica fechada.";
    h+=`<div class="periodo" style="--pc:#e5533c"><span class="pico">🎌</span><b>Feriado: ${esc(fer)}</b>
      <div class="pd">${nota}</div></div>`;
    if(!adm){
      $("view").innerHTML=h;
      const onEl3=document.querySelector(".daychip.on"); if(onEl3&&onEl3.scrollIntoView){ try{ onEl3.scrollIntoView({inline:"center",block:"nearest"}); }catch(e){} }
      return;
    }
  }
  let algum=false, body="";
  TURNOS.forEach(t=>{
    const n=aulasDoDia(data,t.c); if(n<=0) return; algum=true;
    const ic = t.k==="matutino"?"🌅":(t.k==="vespertino"?"🌤️":"🌙");
    body+=`<div class="turnohd"><span>${ic}</span>${t.n}</div><div class="cards">`;
    const rt=(S.reservas[data]&&S.reservas[data][t.k])||{};
    for(let i=1;i<=n;i++){
      const r=rt["a"+i], hora=horarioLabel(t.k,i-1);
      const meta=`<div class="sc-r">${i}ª${hora?`<small>${esc(hora)}</small>`:""}</div>`;
      if(!r){
        if(ehHAE(data,t.k,i)){
          body+=`<button class="slotcard hae" data-act="haeinfo"><div class="sc-ic">📋</div><div class="sc-m"><div class="sc-t">${esc(S.config.haeLabel||"Hora-atividade")}</div><div class="sc-s">hora-atividade</div></div>${meta}</button>`;
        }else if(diaFechadoProf){
          body+=`<div class="slotcard off"><div class="sc-ic">⏳</div><div class="sc-m"><div class="sc-t">Disponível</div><div class="sc-s">agende a partir de amanhã</div></div>${meta}</div>`;
        }else{
          body+=`<button class="slotcard free" data-act="slot" data-t="${t.k}" data-i="${i}"><div class="sc-ic">＋</div><div class="sc-m"><div class="sc-t">Disponível</div><div class="sc-s">toque para agendar</div></div>${meta}</button>`;
        }
      }else if(r.bloqueado){
        // Bloqueio com rótulo "HAE" = hora-atividade do professor de informática:
        // mostra VERDE com 📋, destacando das aulas e dos bloqueios comuns (âmbar).
        const ehHaeBloq = r.rotulo && (/\bhae\b/i.test(r.rotulo) || (S.config.haeLabel && r.rotulo===S.config.haeLabel));
        if(ehHaeBloq){
          body+=`<button class="slotcard hae" data-act="slot" data-t="${t.k}" data-i="${i}"><div class="sc-ic">📋</div><div class="sc-m"><div class="sc-t">${esc(r.rotulo)}</div><div class="sc-s">hora-atividade${S.user.admin?" · toque para liberar":""}</div></div>${meta}</button>`;
        }else{
          body+=`<button class="slotcard lock" data-act="slot" data-t="${t.k}" data-i="${i}"><div class="sc-ic">🔒</div><div class="sc-m"><div class="sc-t">${esc(r.rotulo||"Indisponível")}</div><div class="sc-s">${S.user.admin?"toque para liberar":"bloqueado"}</div></div>${meta}</button>`;
        }
      }else{
        const minha=sanId(r.profId)===sanId(S.user.id);
        body+=`<button class="slotcard ${minha?"mine":"busy"}${r.excecao?" exc":""}" data-act="slot" data-t="${t.k}" data-i="${i}"><div class="sc-ic">${r.excecao?"⚠️":(minha?"👤":"📘")}</div><div class="sc-m"><div class="sc-t">${esc(r.turma||"")}</div><div class="sc-s">${r.excecao?"⚠️ exceção · ":""}${esc(r.profNome||"")}${r.disciplina?" · "+esc(r.disciplina):""}</div></div>${meta}</button>`;
      }
    }
    body+="</div>";
  });
  if(!algum){
    const dw=dateFromStr(data).getDay();
    if(dw===0||dw===6){ h+=`<div class="empty"><span class="big">🗓️</span><b>${esc(cap1(fmtSem(data)))}</b> — sem agendas neste dia.<br>A agenda funciona nos dias letivos.</div>`; }
    else if(dw===3){ h+=`<div class="empty"><span class="big">📋</span><b>Sem agendamento</b><br>HAE externa do professor de informática.</div>`; }
    else{ h+=`<div class="empty"><span class="big">🌤️</span>Não há aulas neste dia.<br>Escolha outro dia na faixa acima.</div>`; }
  }
  else{ h+=`<div class="legend"><span><i class="lg free"></i>Livre</span><span><i class="lg busy"></i>Reservada</span><span><i class="lg lock"></i>Bloqueada</span></div>`+body; }
  $("view").innerHTML=h;
  const onEl=document.querySelector(".daychip.on"); if(onEl&&onEl.scrollIntoView){ try{ onEl.scrollIntoView({inline:"center",block:"nearest"}); }catch(e){} }
}

/* ================= VIEW: SEMANA (grade da semana inteira) ================= */
function cShort(turma){ if(!turma) return ""; let s=(""+turma).replace(/\s*ano\s*/i," ").replace(/º/g,"").replace(/\s+/g," ").replace(/^\s+|\s+$/g,""); const p=s.split(" "); if(p.length>=2) return p[0]+p[p.length-1]; return s.slice(0,4); }
function viewSemana(modoTop){
  const hoje=hojeStr();
  const base=dateFromStr(S.dataSel), dow=(base.getDay()+6)%7, monday=addDias(S.dataSel,-dow);
  const dias=[];
  for(let k=0;k<6;k++){ const ds=addDias(monday,k), wk=DIAS[dateFromStr(ds).getDay()], a=(S.config.aulas[wk]||{m:0,v:0,n:0});
    if((a.m+a.v+a.n)>0 || periodoDoDia(ds)) dias.push(ds); }
  let h=modoTop;
  h+=`<div class="daysum"><div><b>Semana</b><div class="sub">${esc(fmtDia(monday))} — ${esc(fmtDia(addDias(monday,5)))}</div></div>
      <div style="display:flex;gap:6px"><button class="semnav" data-act="setsemana" data-n="-7">‹</button><button class="semnav" data-act="setsemana" data-n="7">›</button></div></div>`;
  if(!dias.length){ h+=`<div class="empty"><span class="big">🌤️</span>Sem aulas nesta semana.</div>`; $("view").innerHTML=h; return; }
  let head=`<tr><th></th>`;
  dias.forEach(ds=>{ const d=dateFromStr(ds); head+=`<th class="${ds===hoje?"hoje":""}"><span class="swd">${["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()]}</span><span class="sdn">${d.getDate()}</span></th>`; });
  head+=`</tr>`;
  let body="";
  TURNOS.forEach(t=>{
    let maxA=0; dias.forEach(ds=>{ maxA=Math.max(maxA, aulasDoDia(ds,t.c)); });
    if(maxA<=0) return;
    body+=`<tr class="tsep"><td colspan="${dias.length+1}">${t.n}</td></tr>`;
    for(let i=1;i<=maxA;i++){
      body+=`<tr><td class="al">${i}ª</td>`;
      dias.forEach(ds=>{
        if(periodoDoDia(ds)){ body+=`<td class="sc per">·</td>`; return; }
        const n=aulasDoDia(ds,t.c); if(i>n){ body+=`<td class="sc vazio"></td>`; return; }
        const rt=(S.reservas[ds]&&S.reservas[ds][t.k])||{}, r=rt["a"+i];
        if(r&&r.bloqueado){ const hb=r.rotulo&&(/\bhae\b/i.test(r.rotulo)||(S.config.haeLabel&&r.rotulo===S.config.haeLabel)); body+=`<td class="sc ${hb?"hae":"lock"}" data-act="semana-cell" data-d="${ds}" data-t="${t.k}" data-i="${i}">${hb?"HAE":"🔒"}</td>`; return; }
        if(r){ const minha=sanId(r.profId)===sanId(S.user.id); body+=`<td class="sc ${minha?"mine":"busy"}" data-act="semana-cell" data-d="${ds}" data-t="${t.k}" data-i="${i}" title="${esc(r.turma||"")} · ${esc(r.profNome||"")}">${esc(cShort(r.turma))}</td>`; return; }
        if(ehHAE(ds,t.k,i)){ body+=`<td class="sc hae" data-act="semana-cell" data-d="${ds}" data-t="${t.k}" data-i="${i}">HAE</td>`; return; }
        body+=`<td class="sc free" data-act="semana-cell" data-d="${ds}" data-t="${t.k}" data-i="${i}">+</td>`;
      });
      body+=`</tr>`;
    }
  });
  h+=`<div class="semana-wrap"><table class="semana">${head}${body}</table></div>
     <div class="legend" style="margin-top:12px"><span><i class="lg free"></i>Livre</span><span><i class="lg busy"></i>Reservada</span><span><i class="lg lock"></i>Bloqueada</span></div>`;
  $("view").innerHTML=h;
}
/* ================= VIEW: MINHAS AULAS / PRÓXIMOS ================= */
var _minhasFiltro="prox";  /* prox | todas */
function viewProximos(){

  else{
    h+=`<div id="relprint"><div class="rel-cab"><b>${esc(admin?(S.config.escolaNome||S.config.appNome):S.user.nome)}</b><div>${esc(titulo)} · ${lista.length} aula${lista.length===1?"":"s"}</div></div><div class="card" style="padding:4px 14px">`;

        <div class="l2">${esc(fmtDia(it.data))} (${esc(fmtSem(it.data).replace("-feira",""))})${hora?" · "+esc(hora):""}${admin&&!it.minha?" · "+esc(it.r.profNome):""}</div></div>

    h+=`</div></div>
      <button class="btn primary" data-act="imprimir" style="margin-top:10px">🖨️ Imprimir ${admin?"lista":"minha agenda"}</button>

/* ================= VIEW: RELATÓRIOS (aulas por turma/professor/disciplina/período + ocupação + imprimir) ================= */
var _relPeriodo="mes";  /* mes | 30d | ano | tudo */
function relIntervalo(){
  const hoje=hojeStr(), d=dateFromStr(hoje);
  if(_relPeriodo==="30d") return [addDias(hoje,-29), hoje];
  if(_relPeriodo==="ano") return [d.getFullYear()+"-01-01", d.getFullYear()+"-12-31"];
  if(_relPeriodo==="tudo"){ const ks=Object.keys(S.reservas).sort(); return [ks[0]||hoje, ks[ks.length-1]||hoje]; }
  return [d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01", fimDoMes(hoje)];
}
function coletarRelatorio(ini, fim){
  const porTurno={matutino:0,vespertino:0,noturno:0}, porProf={}, porTurma={}, porDisc={};
  let total=0, bloqueados=0;
  Object.keys(S.reservas).forEach(data=>{
    if(data<ini||data>fim) return; if(periodoDoDia(data)) return;
    TURNOS.forEach(t=>{ const rt=S.reservas[data][t.k]; if(!rt) return;
      Object.keys(rt).forEach(ak=>{ const r=rt[ak]; if(!r) return;
        if(r.bloqueado){ bloqueados++; return; }
        total++; porTurno[t.k]=(porTurno[t.k]||0)+1;
        if(r.profNome) porProf[r.profNome]=(porProf[r.profNome]||0)+1;
        if(r.turma) porTurma[r.turma]=(porTurma[r.turma]||0)+1;
        if(r.disciplina) porDisc[r.disciplina]=(porDisc[r.disciplina]||0)+1;
      });
    });
  });
  let capacidade=0; const dd=diffDias(ini,fim);
  // teto amplo (10 anos) só como trava de sanidade — antes 420 zerava a ocupação no "Tudo".
  if(dd>=0 && dd<=3660){ for(let k=0;k<=dd;k++){ const ds=addDias(ini,k); if(periodoDoDia(ds)) continue;
    TURNOS.forEach(t=>{ const n=aulasDoDia(ds,t.c); for(let i=1;i<=n;i++){ if(!ehHAE(ds,t.k,i)) capacidade++; } }); } }
  return {total,bloqueados,porTurno,porProf,porTurma,porDisc,capacidade};
}
function secBarras(titulo, obj){
  const ents=Object.keys(obj).filter(k=>obj[k]>0).map(k=>[k,obj[k]]).sort((a,b)=>b[1]-a[1]);
  if(!ents.length) return "";
  const max=ents[0][1];
  let h=`<div class="sectitle">${esc(titulo)}</div><div class="card">`;
  ents.forEach(e=>{ const pct=Math.max(4,Math.round(e[1]/max*100));
    h+=`<div class="barrow"><div class="bl">${esc(e[0])}</div><div class="bt"><i style="width:${pct}%"></i></div><div class="bv">${e[1]}</div></div>`; });
  h+=`</div>`; return h;
}
function viewInsights(){
  const iv=relIntervalo(), ini=iv[0], fim=iv[1];
  const R=coletarRelatorio(ini,fim);
  const ocup = R.capacidade>0 ? Math.round(R.total/R.capacidade*100) : 0;
  const chips=[["mes","Este mês"],["30d","Últimos 30 dias"],["ano","Este ano"],["tudo","Tudo"]]
    .map(c=>`<button class="chip ${_relPeriodo===c[0]?"on":""}" data-act="rel-per" data-v="${c[0]}">${c[1]}</button>`).join("");
  let h=`<div class="rel-tools"><div class="chips">${chips}</div></div>
    <div id="relprint">
    <div class="rel-cab"><b>${esc(S.config.escolaNome||S.config.appNome)}</b><div>Relatório de aulas · ${esc(fmtDia(ini))} a ${esc(fmtDia(fim))}</div></div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="stat"><div class="n">${R.total}</div><div class="t">Aulas agendadas</div></div>
      <div class="stat donutwrap"><div class="donut" style="--p:${ocup}"><span>${ocup}%</span></div><div class="t">Ocupação da sala</div></div>
    </div>`;
  h+=secBarras("Por período", {"Matutino":R.porTurno.matutino,"Vespertino":R.porTurno.vespertino,"Noturno":R.porTurno.noturno});
  h+=secBarras("Por professor", R.porProf);
  h+=secBarras("Por turma", R.porTurma);
  h+=secBarras("Por disciplina", R.porDisc);
  if(R.total===0) h+=`<div class="empty"><span class="big">📭</span>Nenhuma aula agendada neste período.</div>`;
  h+=`</div>
    <button class="btn primary" data-act="imprimir" style="margin-top:8px">🖨️ Imprimir / Salvar PDF</button>
    <div style="height:10px"></div>
    <button class="btn ghost" data-act="exportar-csv">📊 Exportar Excel / CSV</button>
    <div style="height:8px"></div>`;
  $("view").innerHTML=h;
}

/* ================= AÇÃO EM UM SLOT ================= */
async function abrirSlot(turnoK, aula){
  const data=S.dataSel;
  if(periodoDoDia(data)) return;
  if(diaFeriado(data) && !S.user.admin) return toast("Feriado — agenda fechada.");
  const rt=(S.reservas[data]&&S.reservas[data][turnoK])||{};
  const r=rt["a"+aula];
  if(r && r.bloqueado){ if(S.user.admin) sheetBloqueio(turnoK,aula,true); return; }
  if(r){ sheetReserva(turnoK,aula,r); return; }
  if(ehHAE(data,turnoK,aula)){ toast("Hora-atividade — horário reservado (configure em ⚙️)."); return; }
  // livre
  const hoje=hojeStr();
  if(data<hoje) return toast("Não dá para agendar num dia que já passou.");
  // professor não agenda no mesmo dia; o admin pode (override)
  if(!S.user.admin && S.config.apenasProximoDia && data===hoje) return toast("Só é possível agendar a partir do próximo dia.");
  if(!S.user.admin && S.config.liberadoAte && data>S.config.liberadoAte) return toast("Este período ainda não foi liberado pelo administrador.");
  if(S.user.admin) sheetEscolha(turnoK,aula);
  else sheetAgendar(turnoK,aula);
}
function turnoNome(k){ const t=TURNOS.find(x=>x.k===k); return t?t.n:k; }

function ctxHtml(turnoK,aula){
  const hora=horarioLabel(turnoK,aula-1);
  return `<div class="ctx"><span class="ico">🖥️</span><div><div class="d">${esc(fmtSem(S.dataSel).replace("-feira",""))}, ${esc(fmtDia(S.dataSel))}</div><div class="s">${aula}ª aula no ${turnoNome(turnoK)}${hora?" · "+esc(hora):""}</div></div></div>`;
}
function openSheet(html){ $("modal").innerHTML=`<div class="backdrop"><div class="sheet">${html}</div></div>`; }
function fecharSheet(){ $("modal").innerHTML=""; }
/* Desabilita um botão e mostra "…" enquanto grava; devolve função para restaurar
   (se o botão ainda existir — após re-render some sozinho). Evita toque duplo e
   dá sinal de "estou salvando" em internet lenta. */
function btnBusy(sel, txt){
  const b=(typeof sel==="string")?document.querySelector(sel):sel;
  if(!b) return function(){};
  const old=b.innerHTML; b.disabled=true; b.innerHTML=txt;
  return function(){ if(b && b.isConnected){ b.disabled=false; b.innerHTML=old; } };
}

/* admin: escolher Agendar ou Bloquear */
function sheetEscolha(turnoK,aula){
  openSheet(`<div class="grab"></div>
    <div class="sh-head"><div class="t">Horário livre</div><button class="icon-btn" data-act="fecharsheet">✕</button></div>
    ${ctxHtml(turnoK,aula)}
    <div style="height:14px"></div>
