<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agenda de Aulas</title>
<style>
  :root{
    --bg:#0d0f14; --surface:#161a22; --surface2:#1e2430; --surface3:#252c3a;
    --line:#272f3d; --text:#e9ecf2; --muted:#98a2b4; --faint:#6b7486;
    --accent:#e0913f; --accent2:#f0a95a; --accent-ink:#2a1503;
    --ok:#2ecc71; --ok-ink:#06331b; --danger:#e5533c; --lock:#79839a;
    --radius:18px; --radius-sm:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  .hidden{display:none!important}

  /* ---------- App shell ---------- */
  #app{max-width:640px;margin:0 auto;min-height:100%;position:relative;
       padding-bottom:calc(76px + env(safe-area-inset-bottom))}
  .topbar{
    position:sticky;top:0;z-index:20;background:rgba(13,15,20,.86);
    -webkit-backdrop-filter:saturate(160%) blur(12px);backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex;align-items:center;gap:12px;
  }
  .topbar .brand{display:flex;flex-direction:column;line-height:1.15;flex:1;min-width:0}
  .topbar .brand b{font-size:16px;font-weight:800;letter-spacing:.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .brand span{font-size:12px;color:var(--muted)}
  .icon-btn{width:40px;height:40px;border-radius:50%;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-size:18px;
    border:1px solid var(--line);flex-shrink:0}
  .icon-btn:active{transform:scale(.94)}

  .view{padding:16px;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- Date bar ---------- */
  .datebar{
    background:linear-gradient(135deg,var(--accent),#c9762b);
    color:#fff;border-radius:var(--radius);padding:16px 14px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 10px 26px rgba(224,145,63,.28);margin-bottom:18px;
  }
  .datebar .nav{width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:20px}
  .datebar .nav:active{transform:scale(.9)}
  .datebar .dinfo{text-align:center;flex:1;min-width:0}
  .datebar .dinfo .d{font-size:21px;font-weight:800}
  .datebar .dinfo .w{font-size:13px;opacity:.92}
  .datebar .disp{display:inline-block;margin-top:7px;font-weight:800;font-size:12px;
    background:rgba(0,0,0,.16);padding:4px 12px;border-radius:999px;white-space:nowrap}

  /* ---------- Turno block ---------- */
  .turno-title{font-size:20px;font-weight:800;margin:20px 2px 10px}
  .slotlist{background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden}
  .slot{display:flex;align-items:center;gap:12px;padding:15px 16px;
    border-top:1px solid var(--line);position:relative;min-height:62px}
  .slot:first-child{border-top:none}
  .slot .num{margin-left:auto;color:var(--faint);font-size:14px;font-weight:600;white-space:nowrap;text-align:right}
  .slot .num small{display:block;font-size:11px;color:var(--faint);font-weight:500}
  .slot .main{min-width:0;flex:1}
  .slot .main .l1{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .main .l2{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .slot .dot{width:34px;height:34px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:16px}
  .slot.livre{cursor:pointer}
  .slot.livre:active{background:var(--surface2)}
  .slot.livre .dot{background:rgba(46,204,113,.14);color:var(--ok)}
  .slot.livre .l1{color:var(--ok);font-weight:700}
  .slot.reservada{cursor:pointer}
  .slot.reservada:active{background:var(--surface2)}
  .slot.reservada .dot{background:var(--surface3);color:var(--accent2)}
  .slot.minha .dot{background:rgba(224,145,63,.16);color:var(--accent)}
  .slot.minha:after{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
  .slot.bloq .dot{background:var(--surface3);color:var(--faint)}
  .slot.bloq .l1{color:var(--muted)}
  .slot.bloq.adm{cursor:pointer}

  .empty{color:var(--muted);text-align:center;padding:36px 16px;font-size:15px;line-height:1.6}
  .empty .big{font-size:38px;display:block;margin-bottom:8px}

  /* ---------- Bottom nav ---------- */
  .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:30;
    display:flex;justify-content:center;gap:6px;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:rgba(13,15,20,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid var(--line)}
  .bottomnav .wrap{display:flex;gap:4px;max-width:640px;width:100%;justify-content:space-around}
  .tab{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 4px;border-radius:14px;color:var(--faint);font-size:11px;font-weight:600}
  .tab .ic{font-size:20px}
  .tab.on{color:var(--accent);background:var(--surface2)}

  /* ---------- Buttons / chips ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 18px;border-radius:14px;font-weight:700;font-size:16px;width:100%}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#cf7d2c);color:#fff;
    box-shadow:0 8px 20px rgba(224,145,63,.3)}
  .btn.ok{background:var(--ok);color:#04331c}
  .btn.ghost{background:var(--surface2);border:1px solid var(--line);color:var(--text)}
  .btn.danger{background:rgba(229,83,60,.14);color:#ff8b76;border:1px solid rgba(229,83,60,.4)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:9px 15px;border-radius:999px;background:var(--surface2);
    border:1px solid var(--line);font-size:14px;font-weight:600;color:var(--text)}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

  label.fld{display:block;font-size:12px;font-weight:700;letter-spacing:.5px;
    text-transform:uppercase;color:var(--muted);margin:18px 2px 8px}
  .input,textarea.input{width:100%;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:14px;color:var(--text);outline:none}
  .input:focus,textarea.input:focus{border-color:var(--accent)}
  textarea.input{resize:vertical;min-height:80px}

  /* ---------- Cards / stats ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .stat .n{font-size:30px;font-weight:800}
  .stat .t{font-size:13px;color:var(--muted);margin-top:2px}

  .rowitem{display:flex;align-items:center;gap:12px;padding:14px 4px;border-top:1px solid var(--line)}
  .rowitem:first-child{border-top:none}
  .rowitem .main{flex:1;min-width:0}
  .rowitem .main .l1{font-weight:700}
  .rowitem .main .l2{font-size:13px;color:var(--muted)}
  .rowitem .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--surface3);color:var(--accent2)}

  /* ---------- Modal / sheet ---------- */
  .backdrop{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);
    display:flex;align-items:flex-end;justify-content:center;
    -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);animation:fade .2s ease}
  .sheet{background:var(--surface);width:100%;max-width:640px;
    border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;
    max-height:92vh;overflow-y:auto;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
    animation:slideup .28s cubic-bezier(.2,.9,.3,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet .grab{width:42px;height:5px;border-radius:3px;background:var(--surface3);margin:8px auto 6px}
  .sheet .sh-head{display:flex;align-items:center;gap:12px;padding:6px 0 4px}
  .sheet .sh-head .t{font-size:19px;font-weight:800;flex:1}
  .sheet .ctx{display:flex;align-items:center;gap:10px;background:var(--surface2);
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:10px 0 4px}
  .sheet .ctx .ico{font-size:22px}
  .sheet .ctx .d{font-weight:700}
  .sheet .ctx .s{font-size:13px;color:var(--muted)}

  /* ---------- Login / bootstrap ---------- */
  .authwrap{max-width:420px;margin:0 auto;padding:0 20px;min-height:100vh;
    display:flex;flex-direction:column;justify-content:center;gap:6px}
  .authwrap .logo{width:76px;height:76px;border-radius:22px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--accent),#c9762b);
    display:flex;align-items:center;justify-content:center;font-size:40px;
    box-shadow:0 12px 30px rgba(224,145,63,.35)}
  .authwrap h1{text-align:center;font-size:26px;font-weight:800}
  .authwrap .sub{text-align:center;color:var(--muted);margin-bottom:20px;font-size:14px}
  .authwrap .hint{font-size:12.5px;color:var(--faint);text-align:center;margin-top:14px;line-height:1.5}

  .toast{position:fixed;left:50%;bottom:calc(90px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--surface3);color:var(--text);border:1px solid var(--line);
    padding:12px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;
    box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:90%;text-align:center;
    animation:toastin .25s ease}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translateX(-50%)}}

  .sectitle{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    color:var(--muted);margin:22px 2px 10px}
  .minibtn{padding:8px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);
    font-size:13px;font-weight:700}
  .minibtn.acc{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

  table.grade{width:100%;border-collapse:collapse;font-size:14px}
  table.grade th,table.grade td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line)}
  table.grade th{color:var(--muted);font-weight:700;font-size:12px}
  table.grade td.d{text-align:left;font-weight:700}
  table.grade input{width:52px;text-align:center;background:var(--surface2);border:1px solid var(--line);
    border-radius:8px;padding:7px 4px;color:var(--text)}
  .horrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .horrow .lbl{width:64px;font-weight:700;font-size:14px}
  .horrow input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:8px;
    padding:9px;color:var(--text);text-align:center}
</style>
</head>
<body>
  <div id="root"></div>
  <div id="modal"></div>
  <div id="toast" class="hidden"></div>

<script>
"use strict";
/* ================= CONFIG / FIREBASE (REST, sem SDK) ================= */
const DB = "https://atividades-educativas-16860-default-rtdb.firebaseio.com";
const ESCOLA = "vidal-ramos";               // gaveta desta escola (multi-escola desde ja)
const P = `/agenda/${ESCOLA}`;
const url = (path) => `${DB}${P}${path}.json`;

async function fbGet(path){
  try{ const r = await fetch(url(path)); if(!r.ok) return null; return await r.json(); }
  catch(e){ return null; }
}
async function fbSet(path,val){ const r=await fetch(url(path),{method:'PUT',body:JSON.stringify(val)}); return r.ok; }
async function fbUpdate(path,val){ const r=await fetch(url(path),{method:'PATCH',body:JSON.stringify(val)}); return r.ok; }
async function fbDel(path){ const r=await fetch(url(path),{method:'DELETE'}); return r.ok; }

/* ================= DEFAULTS (semeados no 1o acesso) ================= */
const DIAS = ["dom","seg","ter","qua","qui","sex","sab"];
const DIAS_NOME = {dom:"Dom",seg:"Seg",ter:"Ter",qua:"Qua",qui:"Qui",sex:"Sex",sab:"Sab"};
const TURNOS = [{k:"matutino",n:"Matutino",c:"m"},{k:"vespertino",n:"Vespertino",c:"v"},{k:"noturno",n:"Noturno",c:"n"}];
const DEF_DISCIPLINAS = ["Língua Portuguesa","Matemática","Ciências","História","Geografia","Inglês","Ensino Religioso","Artes","Ed. Física"];
const DEF_TURMAS = ["0 - Pré","1º ano","2º ano","3º ano","4º ano","5º ano","6º ano","7º ano","8º ano","9º ano"];
const DEF_AULAS = {dom:{m:0,v:0,n:0},seg:{m:4,v:4,n:0},ter:{m:4,v:4,n:0},qua:{m:0,v:0,n:0},qui:{m:4,v:4,n:0},sex:{m:4,v:4,n:0},sab:{m:0,v:0,n:0}};
const DEF_HORARIOS = {
  matutino:[["07:25","08:21"],["08:21","09:17"],["09:33","10:29"],["10:29","11:25"]],
  vespertino:[["12:55","13:51"],["13:51","14:47"],["15:03","15:59"],["15:59","16:55"]],
  noturno:[["19:00","19:50"],["19:50","20:40"],["20:55","21:45"],["21:45","22:35"]]
};
const DEF_CONFIG = {appNome:"Agenda de Aulas",escolaNome:"E.B.M. Vidal Ramos",
  obrigatorios:true, apenasProximoDia:true, limiteMeses:1};

/* ================= STATE ================= */
const S = {user:null, config:null, professores:{}, disciplinas:[], turmas:[], reservas:{}, dataSel:null, tab:"hoje"};
let _pollTimer=null;

/* ================= HELPERS ================= */
const $ = (id)=>document.getElementById(id);
const esc = (s)=> (""+(s==null?"":s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sanId = (s)=> (""+s).replace(/[.#$\[\]\/\s]/g,"_");
const pad = (n)=> (n<10?"0":"")+n;
const hojeStr = ()=>{ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dateFromStr = (s)=>{ const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); };
const MES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const SEM = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
const fmtDia = (s)=>{ const d=dateFromStr(s); return `${d.getDate()} de ${MES[d.getMonth()]}`; };
const fmtSem = (s)=> SEM[dateFromStr(s).getDay()];
const cap1 = (s)=> s? s.charAt(0).toUpperCase()+s.slice(1) : s;
const addDias = (s,n)=>{ const d=dateFromStr(s); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };

function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.remove("hidden");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.add("hidden"),2400);
}

function aulasDoDia(dataStr, turnoC){
  const wk = DIAS[dateFromStr(dataStr).getDay()];
  const a = (S.config.aulas && S.config.aulas[wk]) || {m:0,v:0,n:0};
  return a[turnoC]||0;
}
function horarioLabel(turnoK, idx){
  const h = S.config.horarios && S.config.horarios[turnoK];
  if(h && h[idx]) return h[idx][0]+" – "+h[idx][1];
  return "";
}

/* ================= INIT ================= */
async function init(){
  await carregarBase();
  if(!S.professores || Object.keys(S.professores).length===0){ telaBootstrap(); return; }
  const saved = localStorage.getItem("agenda_user");
  if(saved && S.professores[saved]){ S.user = S.professores[saved]; abrirApp(); }
  else telaLogin();
}
async function carregarBase(){
  const [config,prof,disc,turmas] = await Promise.all([
    fbGet("/config"), fbGet("/professores"), fbGet("/disciplinas"), fbGet("/turmas")
  ]);
  S.config = config || null;
  if(S.config){
    if(!S.config.aulas) S.config.aulas = DEF_AULAS;
    if(!S.config.horarios) S.config.horarios = DEF_HORARIOS;
  }
  S.professores = prof || {};
  S.disciplinas = disc || [];
  S.turmas = turmas || [];
}
async function recarregarReservas(){ S.reservas = (await fbGet("/reservas")) || {}; }

/* ================= BOOTSTRAP (1o acesso: cria admin + semeia) ================= */
function telaBootstrap(){
  $("root").innerHTML = `
  <div class="authwrap">
    <div class="logo">🗓️</div>
    <h1>Bem-vindo!</h1>
    <p class="sub">Primeiro acesso — crie o <b>administrador</b> da agenda.</p>
    <label class="fld">Seu nome</label>
    <input id="bNome" class="input" placeholder="Ex.: Marcos Anderson" autocomplete="off">
    <label class="fld">Seu ID de acesso</label>
    <input id="bId" class="input" inputmode="text" placeholder="matrícula, telefone, um número só seu" autocomplete="off">
    <div style="height:20px"></div>
    <button class="btn primary" data-act="bootstrap">Criar administrador</button>
    <p class="hint">O administrador cadastra os professores e configura os horários. Guarde bem o seu ID — é com ele que você entra.</p>
  </div>`;
}
async function fazerBootstrap(){
  const nome=$("bNome").value.trim(), id=$("bId").value.trim();
  if(nome.length<2) return toast("Escreva o seu nome.");
  if(id.length<2) return toast("Escreva um ID de acesso.");
  const key=sanId(id);
  await Promise.all([
    fbSet("/config", DEF_CONFIG),
    fbSet("/config/aulas", DEF_AULAS),
    fbSet("/config/horarios", DEF_HORARIOS),
    fbSet("/disciplinas", DEF_DISCIPLINAS),
    fbSet("/turmas", DEF_TURMAS),
    fbSet("/professores/"+key, {nome, id, admin:true})
  ]);
  await carregarBase();
  S.user = S.professores[key];
  localStorage.setItem("agenda_user", key);
  toast("Administrador criado! 🎉");
  abrirApp();
}

/* ================= LOGIN ================= */
function telaLogin(){
  const nome = S.config ? S.config.appNome : "Agenda de Aulas";
  const escola = S.config ? S.config.escolaNome : "";
  $("root").innerHTML = `
  <div class="authwrap">
    <div class="logo">🗓️</div>
    <h1>${esc(nome)}</h1>
    <p class="sub">${esc(escola)}</p>
    <label class="fld">Digite o seu ID de acesso</label>
    <input id="lId" class="input" inputmode="text" placeholder="seu número de acesso" autocomplete="off">
    <div style="height:16px"></div>
    <button class="btn primary" data-act="login">Entrar</button>
    <p class="hint">É o ID que o administrador cadastrou pra você (matrícula, telefone…). Não tem ID? Fale com o administrador da sala.</p>
  </div>`;
  setTimeout(()=>{ const el=$("lId"); if(el) el.focus(); },100);
}
async function fazerLogin(){
  const id=$("lId").value.trim(); if(!id) return toast("Digite o seu ID.");
  const key=sanId(id);
  await carregarBase();
  const p = S.professores[key];
  if(!p){ return toast("ID não encontrado. Confira com o administrador."); }
  S.user=p; localStorage.setItem("agenda_user", key);
  abrirApp();
}
function sair(){ localStorage.removeItem("agenda_user"); S.user=null; if(_pollTimer)clearInterval(_pollTimer); telaLogin(); }

/* ================= APP SHELL ================= */
async function abrirApp(){
  S.dataSel = hojeStr(); S.tab="hoje";
  await recarregarReservas();
  desenharShell();
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(async()=>{ await recarregarReservas(); if(S.tab==="hoje"||S.tab==="proximos") renderTab(); }, 15000);
}
function desenharShell(){
  const c=S.config, adm=S.user.admin;
  $("root").innerHTML = `
  <div id="app">
    <div class="topbar">
      <div class="brand"><b>${esc(c.appNome)}</b><span>Olá, ${esc(S.user.nome.split(" ")[0])}${adm?" · admin":""}</span></div>
      ${adm?'<button class="icon-btn" data-act="menuadmin" title="Administração">⚙️</button>':''}
      <button class="icon-btn" data-act="sair" title="Sair">⏻</button>
    </div>
    <div id="view" class="view"></div>
    <nav class="bottomnav"><div class="wrap">
      <button class="tab" data-tab="hoje"><span class="ic">🗓️</span>Hoje</button>

    </div></nav>
  </div>`;

}
function renderTab(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===S.tab));
  if(S.tab==="hoje") viewHoje();
  else if(S.tab==="proximos") viewProximos();
  else viewInsights();
}

/* ================= VIEW: HOJE (agenda do dia) ================= */
function contarDisponiveis(dataStr){
  let tot=0,ocup=0;
  TURNOS.forEach(t=>{
    const n=aulasDoDia(dataStr,t.c); tot+=n;
    const rt=(S.reservas[dataStr]&&S.reservas[dataStr][t.k])||{};
    for(let i=1;i<=n;i++){ if(rt["a"+i]) ocup++; }
  });
  return {tot,disp:tot-ocup};
}
function viewHoje(){
  const data=S.dataSel;
  const {disp}=contarDisponiveis(data);
  let h=`<div class="datebar">
    <div class="nav" data-act="dia" data-n="-1">‹</div>
    <div class="dinfo"><div class="d">${esc(fmtDia(data))}</div><div class="w">${esc(cap1(fmtSem(data)))}</div>
      <div class="disp">${disp} ${disp===1?"aula livre":"aulas livres"}</div></div>
    <div class="nav" data-act="dia" data-n="1">›</div>
  </div>`;

  let algum=false;
  TURNOS.forEach(t=>{
    const n=aulasDoDia(data,t.c); if(n<=0) return; algum=true;
    h+=`<div class="turno-title">${t.n}</div><div class="slotlist">`;
    const rt=(S.reservas[data]&&S.reservas[data][t.k])||{};
    for(let i=1;i<=n;i++){
      const r=rt["a"+i];
      const hora=horarioLabel(t.k,i-1);
      const numHtml=`<div class="num">${i}ª aula${hora?`<small>${esc(hora)}</small>`:""}</div>`;
      if(!r){
        h+=`<div class="slot livre" data-act="slot" data-t="${t.k}" data-i="${i}">
          <div class="dot">＋</div><div class="main"><div class="l1">Disponível</div><div class="l2">toque para agendar</div></div>${numHtml}</div>`;
      }else if(r.bloqueado){
        const cls=S.user.admin?"bloq adm":"bloq";
        h+=`<div class="slot ${cls}" data-act="slot" data-t="${t.k}" data-i="${i}">
          <div class="dot">🔒</div><div class="main"><div class="l1">Indisponível</div><div class="l2">${S.user.admin?"toque para desbloquear":"bloqueado"}</div></div>${numHtml}</div>`;
      }else{
        const minha = r.profId===S.user.id || sanId(r.profId)===sanId(S.user.id);
        h+=`<div class="slot reservada ${minha?"minha":""}" data-act="slot" data-t="${t.k}" data-i="${i}">
          <div class="dot">${minha?"👤":"📘"}</div>
          <div class="main"><div class="l1">${esc(r.turma||"")}</div><div class="l2">${esc(r.profNome||"")}${r.disciplina?" · "+esc(r.disciplina):""}</div></div>${numHtml}</div>`;
      }
    }
    h+=`</div>`;
  });
  if(!algum) h+=`<div class="empty"><span class="big">🌤️</span>Não há aulas neste dia.<br>Use as setas para ver outro dia.</div>`;
  $("view").innerHTML=h;
}

/* ================= VIEW: PRÓXIMOS ================= */
function viewProximos(){
  const hoje=hojeStr();
  const lista=[];
  Object.keys(S.reservas).sort().forEach(data=>{
    if(data<hoje) return;
    TURNOS.forEach(t=>{
      const rt=S.reservas[data][t.k]; if(!rt) return;
      Object.keys(rt).forEach(ak=>{
        const r=rt[ak]; if(!r||r.bloqueado) return;
        const minha = sanId(r.profId)===sanId(S.user.id);
        if(S.user.admin || minha) lista.push({data,turno:t,aula:+ak.replace("a",""),r,minha});
      });
    });
  });
  lista.sort((a,b)=> a.data<b.data?-1:a.data>b.data?1:(a.turno.k<b.turno.k?-1:1)||a.aula-b.aula);
  let h=`<div class="sectitle">${S.user.admin?"Próximas reservas (todos)":"Minhas próximas aulas"}</div>`;
  if(!lista.length){ h+=`<div class="empty"><span class="big">📭</span>Nenhuma aula agendada por aqui.<br>Vá em <b>Hoje</b> e toque num horário livre.</div>`; }
  else{
    h+=`<div class="card" style="padding:4px 14px">`;
    lista.slice(0,60).forEach(it=>{
      const hora=horarioLabel(it.turno.k,it.aula-1);
      h+=`<div class="rowitem" data-act="verres" data-data="${it.data}" data-t="${it.turno.k}" data-i="${it.aula}">
        <div class="main"><div class="l1">${esc(it.r.turma)} · ${it.turno.n} ${it.aula}ª</div>
        <div class="l2">${esc(fmtDia(it.data))} (${esc(fmtSem(it.data).replace("-feira",""))})${hora?" · "+esc(hora):""}${S.user.admin&&!it.minha?" · "+esc(it.r.profNome):""}</div></div>
        <div class="tag">${esc(it.r.disciplina||"")}</div></div>`;
    });
    h+=`</div>`;
  }
  $("view").innerHTML=h;
}

/* ================= VIEW: INSIGHTS (resumo simples; completo no Bloco 3) ================= */
function viewInsights(){
  let total=0, mat=0, ves=0;
  Object.keys(S.reservas).forEach(data=>TURNOS.forEach(t=>{
    const rt=S.reservas[data][t.k]; if(!rt) return;
    Object.keys(rt).forEach(ak=>{ const r=rt[ak]; if(r&&!r.bloqueado){ total++; if(t.k==="matutino")mat++; else if(t.k==="vespertino")ves++; } });
  }));
  const nProf=Object.keys(S.professores).length, nTur=S.turmas.length;
  $("view").innerHTML=`
    <div class="grid2" style="margin-bottom:12px">
      <div class="stat"><div class="n">${total}</div><div class="t">Total de reservas</div></div>
      <div class="stat"><div class="n">${nProf}</div><div class="t">Professores</div></div>
      <div class="stat"><div class="n">${nTur}</div><div class="t">Turmas</div></div>
      <div class="stat"><div class="n">${mat}·${ves}</div><div class="t">Matutino · Vespertino</div></div>
    </div>
    <div class="empty" style="padding:22px 16px">📈 As estatísticas completas (taxa de ocupação, por professor, filtros) chegam no próximo bloco.</div>`;
}

/* ================= AÇÃO EM UM SLOT ================= */
async function abrirSlot(turnoK, aula){
  const data=S.dataSel;
  const rt=(S.reservas[data]&&S.reservas[data][turnoK])||{};
  const r=rt["a"+aula];
  if(r && r.bloqueado){ if(S.user.admin) sheetBloqueio(turnoK,aula,true); return; }
  if(r){ sheetReserva(turnoK,aula,r); return; }
  // livre
  const hoje=hojeStr();
  if(data<hoje) return toast("Não dá para agendar num dia que já passou.");
  if(S.config.apenasProximoDia && data===hoje) return toast("Só é possível agendar a partir do próximo dia.");
  if(S.user.admin) sheetEscolha(turnoK,aula);
  else sheetAgendar(turnoK,aula);
}
function turnoNome(k){ const t=TURNOS.find(x=>x.k===k); return t?t.n:k; }

function ctxHtml(turnoK,aula){
  const hora=horarioLabel(turnoK,aula-1);
  return `<div class="ctx"><span class="ico">🖥️</span><div><div class="d">${esc(fmtSem(S.dataSel).replace("-feira",""))}, ${esc(fmtDia(S.dataSel))}</div><div class="s">${aula}ª aula no ${turnoNome(turnoK)}${hora?" · "+esc(hora):""}</div></div></div>`;
}
function openSheet(html){ $("modal").innerHTML=`<div class="backdrop" data-act="fecharsheet"><div class="sheet" data-stop="1">${html}</div></div>`; }
function fecharSheet(){ $("modal").innerHTML=""; }

let _form={turma:null,disc:null,turnoK:null,aula:null};
function sheetAgendar(turnoK,aula){
  _form={turma:null,disc:null,turnoK,aula};
  const discAtivas = S.disciplinas.map(d=> typeof d==="string"?{nome:d,ativa:true}:d).filter(d=>d.ativa!==false);
  const adm=S.user.admin;
  let h=`<div class="grab"></div>
    <div class="sh-head"><div class="t">Agendar aula</div><button class="icon-btn" data-act="fecharsheet">✕</button></div>
    ${ctxHtml(turnoK,aula)}`;
  if(adm){
    h+=`<label class="fld">Professor</label><div class="chips" id="profChips">`;
    Object.keys(S.professores).forEach(k=>{ const p=S.professores[k];
      h+=`<button class="chip ${sanId(p.id)===sanId(S.user.id)?"on":""}" data-act="pickprof" data-id="${esc(p.id)}">${esc(p.nome)}</button>`; });

    _form.profId=S.user.id; _form.profNome=S.user.nome;
  }else{ _form.profId=S.user.id; _form.profNome=S.user.nome; }
  h+=`<label class="fld">Turma</label><div class="chips" id="turmaChips">`;

  h+=`</div><label class="fld">Disciplina</label><div class="chips" id="discChips">`;

    <div style="height:18px"></div>
    <button class="btn ok" data-act="salvar-agenda">✓ Confirmar agendamento</button>`;
  openSheet(h);
}

async function salvarAgenda(){
  const turma=_form.turma, disc=_form.disc, turnoK=_form.turnoK, aula=_form.aula;
  const tema=($("fTema")?$("fTema").value.trim():""), obj=($("fObj")?$("fObj").value.trim():"");
  if(!turma) return toast("Escolha a turma.");
  if(!disc) return toast("Escolha a disciplina.");
  if(S.config.obrigatorios && (!tema||!obj)) return toast("Preencha tema e objetivo.");
  // checa se o slot continua livre (anti-choque simples)
  const atual = await fbGet(`/reservas/${S.dataSel}/${turnoK}/a${aula}`);
  if(atual){ await recarregarReservas(); fecharSheet(); renderTab(); return toast("Ops! Esse horário acabou de ser reservado."); }
  const reg={turma,disciplina:disc,tema,objetivo:obj,profId:_form.profId,profNome:_form.profNome,ts:Date.now()};
  const ok=await fbSet(`/reservas/${S.dataSel}/${turnoK}/a${aula}`, reg);
  if(!ok) return toast("Não foi possível salvar. Tente de novo.");
  await recarregarReservas(); fecharSheet(); renderTab(); toast("Aula agendada! ✅");
}

async function salvarConfig(){
  const aulas=JSON.parse(JSON.stringify(S.config.aulas));
  document.querySelectorAll("[data-aula]").forEach(inp=>{ const [d,c]=inp.dataset.aula.split("."); aulas[d][c]=Math.max(0,parseInt(inp.value,10)||0); });
  const hor=JSON.parse(JSON.stringify(S.config.horarios||{}));
  document.querySelectorAll("[data-hor]").forEach(inp=>{ const [tk,i,j]=inp.dataset.hor.split("."); if(!hor[tk])hor[tk]=[]; if(!hor[tk][i])hor[tk][i]=["",""]; hor[tk][+i][+j]=inp.value.trim(); });
  await Promise.all([fbSet("/config/aulas",aulas), fbSet("/config/horarios",hor)]);
  S.config.aulas=aulas; S.config.horarios=hor;
  toast("Horários salvos! 💾");
}

      <input type="checkbox" id="oObr" ${c.obrigatorios?"checked":""} style="width:20px;height:20px"> Tema e objetivo obrigatórios</label>
    <label style="display:flex;align-items:center;gap:10px;margin:6px 2px 18px;font-size:15px">
      <input type="checkbox" id="oProx" ${c.apenasProximoDia?"checked":""} style="width:20px;height:20px"> Só permite agendar a partir do dia seguinte</label>
    <button class="btn primary" data-act="salvar-opcoes">💾 Salvar</button>`);
}
async function salvarOpcoes(){
  S.config.appNome=$("oApp").value.trim()||"Agenda de Aulas";
  S.config.escolaNome=$("oEsc").value.trim();
  S.config.obrigatorios=$("oObr").checked;
  S.config.apenasProximoDia=$("oProx").checked;
  await fbUpdate("/config",{appNome:S.config.appNome,escolaNome:S.config.escolaNome,obrigatorios:S.config.obrigatorios,apenasProximoDia:S.config.apenasProximoDia});
  fecharSheet(); desenharShell(); toast("Configurações salvas! 💾");
}

/* ================= EVENT DELEGATION ================= */
document.addEventListener("click", async (ev)=>{
  const el = ev.target.closest("[data-act]");
  // fechar sheet ao tocar no fundo
  if(ev.target.classList && ev.target.classList.contains("backdrop")){ fecharSheet(); return; }
  if(!el) return;
  const a=el.dataset.act;
  const t=el.dataset.t, i=el.dataset.i?+el.dataset.i:null;
  try{
    if(a==="bootstrap") return fazerBootstrap();
    if(a==="login") return fazerLogin();
    if(a==="sair") return sair();
    if(a==="dia"){ S.dataSel=addDias(S.dataSel, +el.dataset.n); return viewHoje(); }
    if(a==="slot") return abrirSlot(t,i);
    if(a==="fecharsheet") return fecharSheet();
    if(a==="ir-agendar") return sheetAgendar(t,i);
    if(a==="bloquear") return bloquearSlot(t,i);
    if(a==="desbloquear") return desbloquearSlot(t,i);
    if(a==="excluir") return excluirReserva(t,i);
    if(a==="salvar-agenda") return salvarAgenda();
    if(a==="pickprof"){ _form.profId=el.dataset.id; const p=Object.values(S.professores).find(x=>x.id===el.dataset.id); _form.profNome=p?p.nome:""; document.querySelectorAll("#profChips .chip").forEach(c=>c.classList.remove("on")); el.classList.add("on"); return; }
    if(a==="pickturma"){ _form.turma=el.dataset.v; document.querySelectorAll("#turmaChips .chip").forEach(c=>c.classList.remove("on")); el.classList.add("on"); return; }
    if(a==="pickdisc"){ _form.disc=el.dataset.v; document.querySelectorAll("#discChips .chip").forEach(c=>c.classList.remove("on")); el.classList.add("on"); return; }
    if(a==="verres"){ S.dataSel=el.dataset.data; const rt=(S.reservas[el.dataset.data]&&S.reservas[el.dataset.data][el.dataset.t])||{}; const r=rt["a"+el.dataset.i]; if(r) return sheetReserva(el.dataset.t,+el.dataset.i,r); return; }
    if(a==="menuadmin") return menuAdmin();
    if(a==="tela-prof") return telaProfessores();
    if(a==="tela-config") return telaConfig();
    if(a==="tela-opcoes") return telaOpcoes();
    if(a==="add-prof") return addProf();
    if(a==="del-prof") return delProf(el.dataset.k);
    if(a==="salvar-config") return salvarConfig();
    if(a==="add-turma") return addTurma();
    if(a==="del-turma") return delTurma(+el.dataset.i);
    if(a==="add-disc") return addDisc();
    if(a==="del-disc") return delDisc(+el.dataset.i);
    if(a==="salvar-opcoes") return salvarOpcoes();
  }catch(e){ console.error(e); toast("Algo deu errado. Tente de novo."); }
});
document.addEventListener("click",(ev)=>{ const tab=ev.target.closest("[data-tab]"); if(tab){ S.tab=tab.dataset.tab; renderTab(); } });

/* ================= GO ================= */
init();
</script>
</body>
</html>
