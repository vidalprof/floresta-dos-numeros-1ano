<script>
/* ====== IMAGENS (base64) ====== */
var IMG={};
IMG.capa="{{CAPA}}";
IMG.mFeliz="{{M_FELIZ}}";IMG.mExplica="{{M_EXPLICA}}";IMG.mComemora="{{M_COMEMORA}}";IMG.mPensa="{{M_PENSA}}";
IMG.trofeu="{{TROFEU}}";
IMG.cLeao="{{C_leao}}";IMG.cElefante="{{C_elefante}}";IMG.cFoca="{{C_foca}}";IMG.cMacaco="{{C_macaco}}";
IMG.cPalhaco="{{C_palhaco}}";IMG.cPonei="{{C_ponei}}";IMG.cCachorro="{{C_cachorro}}";IMG.cArara="{{C_arara}}";
IMG.balVermelho="{{B_vermelho}}";IMG.balAzul="{{B_azul}}";IMG.balAmarelo="{{B_amarelo}}";
IMG.balVerde="{{B_verde}}";IMG.balRoxo="{{B_roxo}}";IMG.balLaranja="{{B_laranja}}";

function $(id){return document.getElementById(id);}
/* ====== ESTADO ====== */
var ESTADO={nome:"",pontos:0,concluidas:{}};
function salvar(){try{localStorage.setItem("circoTeo",JSON.stringify(ESTADO));}catch(e){}}
function carregar(){try{var s=localStorage.getItem("circoTeo");if(s){ESTADO=JSON.parse(s);}}catch(e){}
  if(!ESTADO.concluidas){ESTADO.concluidas={};}}
/* ====== NIVEIS ====== */
var NIVEIS=[{p:0,n:"Aprendiz de Palhaço"},{p:20,n:"Ajudante do Picadeiro"},{p:50,n:"Artista de Circo"},{p:90,n:"Estrela do Show"},{p:140,n:"Mestre do Circo"}];
function nivelAtual(){var i,r=NIVEIS[0];for(i=0;i<NIVEIS.length;i++){if(ESTADO.pontos>=NIVEIS[i].p){r=NIVEIS[i];}}return r;}
function atualizarTopo(){$("tbNivel").innerHTML=nivelAtual().n;$("tbPts").innerHTML=ESTADO.pontos+" pontos";
  var prox=NIVEIS[NIVEIS.length-1].p,i;for(i=0;i<NIVEIS.length;i++){if(ESTADO.pontos<NIVEIS[i].p){prox=NIVEIS[i].p;break;}}
  var pct=Math.min(100,Math.round(100*ESTADO.pontos/prox));$("tbXp").style.width=pct+"%";}
/* ====== FUNDO ====== */
(function(){var f=$("fundo"),i,e;for(i=0;i<12;i++){e=document.createElement("div");e.className="luz";var s=4+((i*31)%6);
  e.style.width=s+"px";e.style.height=s+"px";e.style.left=((i*71)%100)+"%";e.style.top=((i*23)%80)+"%";
  e.style.webkitAnimationDelay=((i%9)*0.3)+"s";e.style.animationDelay=((i%9)*0.3)+"s";f.appendChild(e);}})();
/* ====== SOM (Web Audio) ====== */
var _ac=null;
function ac(){if(!_ac){try{_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){_ac=null;}}
  if(_ac&&_ac.state==="suspended"){try{_ac.resume();}catch(e){}}return _ac;}
function nota(freq,dur,delay,tipo,vol){var a=ac();if(!a)return;var o=a.createOscillator(),g=a.createGain();
  o.type=tipo||"sine";o.frequency.value=freq;o.connect(g);g.connect(a.destination);
  var t=a.currentTime+(delay||0);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.15,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);}
function somClique(){nota(520,0.08,0,"triangle",0.09);}
function somAcerto(){nota(660,0.12,0,"triangle",0.12);nota(880,0.16,0.1,"triangle",0.12);nota(1174,0.2,0.22,"triangle",0.1);}
function somErro(){nota(300,0.18,0,"sine",0.1);nota(230,0.22,0.12,"sine",0.09);}
function somFanfarra(){nota(523,0.14,0,"triangle",0.12);nota(659,0.14,0.14,"triangle",0.12);nota(784,0.14,0.28,"triangle",0.12);nota(1046,0.3,0.42,"triangle",0.12);}
document.addEventListener("click",function(){ac();},false);
document.addEventListener("touchstart",function(){ac();},false);
/* ====== NARRACAO ====== */
var _voz=null,_falando=false;
function escolherVoz(){if(!window.speechSynthesis)return null;var vs=window.speechSynthesis.getVoices(),i;
  for(i=0;i<vs.length;i++){if(/pt-BR|pt_BR/i.test(vs[i].lang)&&/natural|neural|google|luciana|francisca|maria/i.test(vs[i].name))return vs[i];}
  for(i=0;i<vs.length;i++){if(/pt/i.test(vs[i].lang))return vs[i];}return null;}
function limparFala(t){var s=String(t||"");s=s.replace(/<[^>]*>/g," ");
  s=s.replace(/\s*\.\s*(?:\.\s*)+/g,". ");s=s.replace(/\s*([,.!?:])\s*/g,"$1 ");s=s.replace(/\s{2,}/g," ");
  s=s.replace(/^\s+|\s+$/g,"");if(s&&"..!?:".indexOf(s.charAt(s.length-1))<0){s=s+".";}return s;}
function _gatearAvanco(){var raiz=$("app");if(!raiz)return null;var bts=raiz.getElementsByTagName("button"),alvo=[],i;
  for(i=0;i<bts.length;i++){var oc=bts[i].getAttribute("onclick")||"",cl=bts[i].className||"";
    if(oc.indexOf("proximo")>=0||cl.indexOf("gate-audio")>=0)alvo.push(bts[i]);}
  if(!alvo.length)return null;for(i=0;i<alvo.length;i++){alvo[i].disabled=true;if(alvo[i].className.indexOf("travado-audio")<0)alvo[i].className+=" travado-audio";}
  var solto=false;function liberar(){if(solto)return;solto=true;for(var k=0;k<alvo.length;k++){alvo[k].disabled=false;alvo[k].className=alvo[k].className.replace(/\s*travado-audio\b/g,"");}}
  setTimeout(liberar,20000);return liberar;}
function pararFala(){_falando=false;try{window.speechSynthesis.cancel();}catch(e){}}
function falar(texto,aoTerminar){var s=limparFala(texto);var rg=_gatearAvanco();
  var cb=function(){if(rg)rg();if(aoTerminar)aoTerminar();};
  if(!window.speechSynthesis||!window.SpeechSynthesisUtterance){setTimeout(cb,300);return;}
  pararFala();if(!_voz)_voz=escolherVoz();if(!_voz){setTimeout(cb,300);return;}
  var frases=s.match(/[^.!?:]+[.!?:]+/g);if(!frases||!frases.length)frases=[s];var idx=0;_falando=true;
  function prox(){if(!_falando)return;if(idx>=frases.length){_falando=false;cb();return;}
    var fr=frases[idx].replace(/^\s+|\s+$/g,"");idx++;if(!fr){prox();return;}
    var u=new SpeechSynthesisUtterance(fr);u.voice=_voz;u.lang=_voz.lang||"pt-BR";u.rate=0.95;u.pitch=1.1;
    var fim=false;function acabou(){if(fim)return;fim=true;setTimeout(prox,170);}u.onend=acabou;u.onerror=acabou;
    setTimeout(acabou,1500+fr.length*95);try{window.speechSynthesis.speak(u);}catch(e){acabou();}}
  prox();}
if(window.speechSynthesis&&window.speechSynthesis.onvoiceschanged!==undefined){window.speechSynthesis.onvoiceschanged=function(){_voz=escolherVoz();};}
/* ====== EFEITOS ====== */
function confete(q){var i,cores=["#ffd23f","#ff5a4d","#4db4ff","#4dff9e","#ff8a5c","#c86bd1"];
  for(i=0;i<q;i++){(function(k){var e=document.createElement("div");e.className="conf";e.style.background=cores[k%cores.length];
    e.style.left=(Math.round(((k*53)%100))) +"%";var d=1.6+((k*7)%9)/10;e.style.webkitAnimationDuration=d+"s";e.style.animationDuration=d+"s";
    document.body.appendChild(e);setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},d*1000+200);})(i);}}
var FRASES_FESTA=["ACERTOU!","MUITO BEM!","BOA!","ISSO!","PERFEITO!","MANDOU BEM!","UAU!","SHOW!"];
function comemorar(){var c=$("carimbo");$("carfrase").innerHTML=FRASES_FESTA[Math.floor((ESTADO.pontos+dIdx)%FRASES_FESTA.length)];
  c.className="carimbo on";setTimeout(function(){c.className="carimbo";},1400);}
/* ====== ELOGIOS ====== */
var ELOGIOS=["Muito bem!","Isso mesmo!","Você é demais!","Boa, artista!","Show de bola!","Perfeito!","Mandou bem!","Uau, que talento!"];
var _elix=0;function elogio(){_elix=(_elix+1)%ELOGIOS.length;return ELOGIOS[_elix];}
/* ====== PARADAS ====== */
var PARADAS=[
 {ch:"cores",n:"Balões Coloridos",c:IMG.cPalhaco,jog:true},

 {ch:"formas",n:"Formas da Festa",c:IMG.cElefante},
 {ch:"sombra",n:"Ligar à Sombra",c:IMG.cLeao},
 {ch:"luzes",n:"Caminho das Luzes",c:IMG.cMacaco},
 {ch:"vogais",n:"Vogais do Circo",c:IMG.cArara},
 {ch:"diferente",n:"Qual é o Diferente?",c:IMG.cPonei},
 {ch:"quebra1",n:"Quebra-Cabeça do Circo",c:IMG.cCachorro},
 {ch:"memoria",n:"Memória do Circo",c:IMG.cElefante},
 {ch:"erros",n:"Caça aos 7 Erros",c:IMG.cMacaco},

];
function idxParada(ch){var i;for(i=0;i<PARADAS.length;i++){if(PARADAS[i].ch===ch)return i;}return -1;}
function liberada(i){if(i===0)return true;return ESTADO.concluidas[PARADAS[i-1].ch]===true;}
/* ====== TELA INICIAL ====== */
function telaInicio(){$("topbar").className="topbar hidden";var h="";
  h+='<div class="card">';
  h+='<span class="selo">Espetáculo do Pré</span>';
  h+='<div class="capa-arte"><img class="capa-img" src="'+IMG.capa+'" alt="Circo do Teo"></div>';

  }else{
    h+='<div class="mascbox"><img src="'+IMG.mFeliz+'" alt="Teo"><div class="balao">Oi! Eu sou o <b>Teo</b>, o ursinho do circo! Uma ventania bagunçou o nosso espetáculo. Vem me ajudar a arrumar tudo? Digite seu nome!</div></div>';
    h+='<input class="campo" id="inpNome" placeholder="Digite seu nome" maxlength="16">';
    h+='<button class="btn pulsa gate-audio" onclick="comecar()">Começar a aventura! &#128640;</button>';
  }
  h+='</div>';$("app").innerHTML=h;
  if(temProgresso()){falar("Que bom te ver de novo! Vamos continuar a aventura no circo?");}
  else{falar("Oi! Eu sou o Teo, o ursinho do circo! Uma ventania bagunçou o nosso espetáculo. Vem me ajudar a arrumar tudo? Digite seu nome e vamos começar!");}}
function temProgresso(){var k;for(k in ESTADO.concluidas){if(ESTADO.concluidas[k])return true;}return ESTADO.pontos>0;}
function comecar(){somClique();var v=$("inpNome")?$("inpNome").value.replace(/^\s+|\s+$/g,""):"";ESTADO.nome=v;salvar();irMapa();}
function pedirReset(){var h='<div class="card"><h2>Começar do zero?</h2><p class="lead">Isso vai apagar todo o seu progresso. Tem certeza?</p>';
  h+='<button class="btn" onclick="fazerReset()">Sim, apagar tudo</button><button class="btn suave peq" onclick="telaInicio()">Não, voltar</button></div>';
  $("app").innerHTML=h;}
function fazerReset(){somClique();ESTADO={nome:"",pontos:0,concluidas:{}};salvar();telaInicio();}
/* ====== MAPA ====== */
function irMapa(){telaMapa();}
function telaMapa(){$("topbar").className="topbar";atualizarTopo();
  var feitas=0,i;for(i=0;i<PARADAS.length;i++){if(ESTADO.concluidas[PARADAS[i].ch])feitas++;}
  var h='<div class="card">';

  h+='<div class="progbar"><i style="width:'+Math.round(100*feitas/PARADAS.length)+'%"></i></div>';
  h+='<div class="progtxt">Coleção: '+feitas+' de '+PARADAS.length+' paradas</div>';
  h+='<div class="guia">Siga a trilha do picadeiro! Complete cada parada para abrir a próxima. &#127914;</div>';
  h+='<button class="somzin" onclick="narrarMapa()">&#128266;</button>';
  if(feitas===0){h+='<div class="mascbox"><img src="'+IMG.mExplica+'" alt="Teo"><div class="balao">Bem-vindo ao circo, '+(ESTADO.nome||"amiguinho")+'! Vamos arrumar parada por parada até o grande espetáculo. Comece pela primeira!</div></div>';}
  h+='</div>';
  var lados=["esq","centro","dir"];
  for(i=0;i<PARADAS.length;i++){var p=PARADAS[i];var lib=liberada(i);var feita=ESTADO.concluidas[p.ch]===true;
    var atual=lib&&!feita;var est=feita?"feita":(atual?"atual":"trav");
    var clic=lib?(' onclick="abrirParada(\''+p.ch+'\')"'):(' onclick="avisoTrancada()"');
    h+='<div class="linhap '+lados[i%3]+'"><div class="no '+est+'"'+clic+'>';
    if(atual){h+='<div class="aqui">você está aqui!</div>';}
    h+='<div class="nofig"><img src="'+p.c+'" alt="">';
    if(est==="trav"){h+='<div class="cadeado">&#128274;</div>';}
    if(feita){h+='<div class="check">&#9989;</div>';}
    h+='</div><div class="nonome">'+p.n+'</div></div></div>';
    if(i<PARADAS.length-1){h+='<div class="conector"></div>';}}
  var tudo=(feitas>=PARADAS.length);
  h+='<div class="conector"></div><div class="trofeubox"><img class="trofeuimg" src="'+IMG.trofeu+'" alt="Troféu"'+(tudo?' style="-webkit-filter:none;filter:none;"':'')+'>';
  if(!tudo){h+='<div class="cadeado" style="position:static;font-size:20px;">&#128274;</div>';}
  h+='<div class="trofnome"'+(tudo?' style="color:#ffd23f;"':'')+'>Grande Espetáculo Final</div></div>';
  h+='<button class="btn suave peq" onclick="telaInicio()">Voltar ao início</button>';
  $("app").innerHTML=h;window.scrollTo(0,0);narrarMapa();}
function narrarMapa(){var feitas=0,i;for(i=0;i<PARADAS.length;i++){if(ESTADO.concluidas[PARADAS[i].ch])feitas++;}
  if(feitas===0){falar("Bem-vindo ao circo, "+(ESTADO.nome||"amiguinho")+"! Toque na primeira parada, os Balões Coloridos, para começar!");}
  else if(feitas>=PARADAS.length){falar("Você arrumou o circo todo! O grande espetáculo vai começar!");}
  else{falar("Você já arrumou "+feitas+(feitas===1?" parada":" paradas")+"! Continue na parada que está brilhando.");}}
function avisoTrancada(){somClique();falar("Esta parada ainda está trancada! Termine a parada anterior para abrir esta.");}
function abrirParada(ch){somClique();var p=PARADAS[idxParada(ch)];
  if(p.jog){introFase(ch);}
  else{falar("Essa parada ainda está sendo montada pelo Teo! Em breve ela fica pronta.");
    var h='<div class="card"><h2>'+p.n+'</h2><div class="mascbox"><img src="'+IMG.mPensa+'" alt="Teo"><div class="balao">Essa parada ainda está sendo montada pelo Teo! Em breve ela fica pronta. Por enquanto, jogue os Balões Coloridos!</div></div><button class="btn pulsa" onclick="telaMapa()">Voltar ao mapa</button></div>';
    $("app").innerHTML=h;}}
/* ====== FASE: CORES (Balões) ====== */
var CORES=[
 {pede:"vermelho",img:IMG.balVermelho},{pede:"azul",img:IMG.balAzul},{pede:"amarelo",img:IMG.balAmarelo},
 {pede:"verde",img:IMG.balVerde},{pede:"roxo",img:IMG.balRoxo},{pede:"laranja",img:IMG.balLaranja}];
var d=[],dIdx=0,dAcertos=0,dErros=0,streak=0,faseAtual="";
function embaralhar(a){var i,j,t;for(i=a.length-1;i>0;i--){j=Math.floor((( (i*97+dIdx*13+ESTADO.pontos*7)%(i+1) )));t=a[i];a[i]=a[j];a[j]=t;}return a;}
function shuffleReal(a){var i,j,t;for(i=a.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));t=a[i];a[i]=a[j];a[j]=t;}return a;}
function introFase(ch){faseAtual=ch;var h='<div class="card">';
  h+='<div class="mini" style="font-size:13px;color:#e6c9ff;">Parada 1</div>';
  h+='<h2>Balões Coloridos</h2>';
  h+='<div class="mascbox"><img src="'+IMG.mExplica+'" alt="Teo"><div class="balao">O vento espalhou os balões! Eu vou pedir uma cor e você toca no balão daquela cor. Vamos lá?</div></div>';
  h+='<button class="btn pulsa gate-audio" onclick="comecarFase()">Começar! &#9654;</button>';
  h+='<button class="btn suave peq" onclick="telaMapa()">Voltar ao mapa</button></div>';
  $("app").innerHTML=h;falar("O vento espalhou os balões coloridos! Eu vou pedir uma cor, e você toca no balão daquela cor. Vamos lá?");}
function comecarFase(){somClique();
  var base=CORES.slice();shuffleReal(base);d=base.slice(0,5);
  dIdx=0;dAcertos=0;dErros=0;streak=0;renderDesafio();}
function renderDesafio(){var q=d[dIdx];
  /* monta 3 opcoes: a certa + 2 distratoras */
  var outras=[],i;for(i=0;i<CORES.length;i++){if(CORES[i].pede!==q.pede)outras.push(CORES[i]);}
  shuffleReal(outras);var ops=[q,outras[0],outras[1]];shuffleReal(ops);
  var h='<div class="card"><div class="progtxt">Desafio '+(dIdx+1)+' de '+d.length+'</div>';
  h+='<div class="enunciado">Toque no balão <b>'+q.pede+'</b>!</div>';
  h+='<div class="dica">&#128161; Olhe bem a cor que o Teo pediu.</div>';
  h+='<div class="opcoes">';
  for(i=0;i<ops.length;i++){h+='<div class="opbal" id="op'+i+'" data-cor="'+ops[i].pede+'" onclick="responder('+i+',\''+ops[i].pede+'\')"><img src="'+ops[i].img+'" alt=""></div>';}
  h+='</div><div id="zonaFeed"></div></div>';
  $("app").innerHTML=h;
  falar("Toque no balão "+q.pede+"!");}
var _resp=false;
function responder(i,cor){if(_resp)return;var q=d[dIdx];var certo=(cor===q.pede);
  _resp=true;
  if(certo){$("op"+i).className="opbal certa";somAcerto();comemorar();confete(26);dAcertos++;streak++;
    ESTADO.pontos+=2;salvar();atualizarTopo();
    var fala=elogio()+" Esse é o balão "+q.pede+".";
    $("zonaFeed").innerHTML='<div class="fbok">&#127881; '+elogio()+' Esse é o balão <b>'+q.pede+'</b>!</div><button class="btn pulsa" onclick="proximo()">'+(dIdx>=d.length-1?"Ver resultado &#127937;":"Próximo &#10145;")+'</button>';
    falar(fala);
  }else{$("op"+i).className="opbal errada tremer";somErro();streak=0;dErros++;
    _resp=false;
    (function(el){setTimeout(function(){el.className="opbal";},450);})($("op"+i));
    $("zonaFeed").innerHTML='<div class="fbno"><b>Quase!</b> Esse é o balão '+cor+'. Procure o balão <b>'+q.pede+'</b>!</div>';
    falar("Quase! Esse é o balão "+cor+". Procure o balão "+q.pede+"!");}}
function proximo(){somClique();_resp=false;dIdx++;if(dIdx>=d.length){fimFase();}else{renderDesafio();}}
function fimFase(){ESTADO.concluidas[faseAtual]=true;salvar();somFanfarra();confete(40);
  var pct=Math.round(100*dAcertos/(dAcertos+dErros||1));
  var h='<div class="card"><h2>Parada concluída!</h2>';
  h+='<div class="medalha">&#127752;</div>';

  h+='<div class="mascbox"><img src="'+IMG.mComemora+'" alt="Teo"><div class="balao">Muito bem! Você deixou os balões lindos! Agora vem aí a próxima parada: Contando no Picadeiro!</div></div>';
  h+='<p class="progtxt" style="color:#ffd23f;">&#128275; Você abriu a próxima parada!</p>';
  h+='<button class="btn pulsa gate-audio" onclick="telaMapa()">&#9654; Voltar ao mapa</button>';

  $("app").innerHTML=h;window.scrollTo(0,0);
  falar("Parada concluída! Você deixou os balões lindos e ganhou uma medalha! Você abriu a próxima parada.");}
/* ====== TELA CHEIA ====== */
function tcSup(){var e=document.documentElement;return !!(e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen);}
function emTC(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement);}
function alternarTelaCheia(){var e=document.documentElement;try{if(!emTC()){if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();else if(e.mozRequestFullScreen)e.mozRequestFullScreen();else if(e.msRequestFullscreen)e.msRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}catch(x){}}
function atualizarTC(){var b=$("btn-tela-cheia");if(b){b.innerHTML=emTC()?"✕":"⛛";}}
/* ====== BOOT ====== */
function boot(){carregar();var b=$("btn-tela-cheia");if(b&&tcSup()){b.style.display="block";if(document.body)document.body.className+=" tem-tc";
    var evs=["fullscreenchange","webkitfullscreenchange","mozfullscreenchange","MSFullscreenChange"],k;for(k=0;k<evs.length;k++)document.addEventListener(evs[k],atualizarTC);}
  telaInicio();}
boot();
</script>
