<title>O Grande Circo do Teo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;}
body{font-family:"Segoe UI",Verdana,sans-serif;background:#2a1550;
  background:-webkit-radial-gradient(50% 0%,#3a1d6b,#1e1140 60%,#120a2a);
  background:radial-gradient(120% 90% at 50% 0%,#3a1d6b,#1e1140 60%,#120a2a);
  color:#ffe9c9;overflow-x:hidden;-webkit-user-select:none;user-select:none;}
#fundo{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.luz{position:absolute;border-radius:50%;background:#ffd23f;opacity:.5;
  -webkit-box-shadow:0 0 12px 4px rgba(255,210,63,.5);box-shadow:0 0 12px 4px rgba(255,210,63,.5);
  -webkit-animation:pisca 3.2s ease-in-out infinite;animation:pisca 3.2s ease-in-out infinite;}
@-webkit-keyframes pisca{0%,100%{opacity:.2;}50%{opacity:.8;}}
@keyframes pisca{0%,100%{opacity:.2;}50%{opacity:.8;}}
/* holofotes: feixes de luz dos cantos de cima */
.beam{position:absolute;top:-70px;width:150px;height:150%;opacity:.16;pointer-events:none;
  background:-webkit-linear-gradient(top,rgba(255,240,200,.9),rgba(255,240,200,0) 72%);
  background:linear-gradient(to bottom,rgba(255,240,200,.9),rgba(255,240,200,0) 72%);
  -webkit-animation:balanca 6s ease-in-out infinite;animation:balanca 6s ease-in-out infinite;}
.beamE{left:2%;-webkit-transform:rotate(18deg);transform:rotate(18deg);-webkit-transform-origin:top center;transform-origin:top center;}
.beamD{right:2%;-webkit-transform:rotate(-18deg);transform:rotate(-18deg);-webkit-transform-origin:top center;transform-origin:top center;-webkit-animation-delay:1.4s;animation-delay:1.4s;}
@-webkit-keyframes balanca{0%,100%{-webkit-transform:rotate(15deg);}50%{-webkit-transform:rotate(24deg);}}
@keyframes balanca{0%,100%{transform:rotate(15deg);}50%{transform:rotate(24deg);}}
.circdec{position:absolute;height:52px;width:auto;opacity:.1;pointer-events:none;
  -webkit-animation:flutua 5s ease-in-out infinite;animation:flutua 5s ease-in-out infinite;}
/* pisca-pisca do medalhao (tela inicial) */
.capa-wrap{position:relative;width:260px;height:260px;margin:12px auto 4px;}
@media (min-width:700px){.capa-wrap{width:290px;height:290px;}}

  -webkit-box-shadow:0 0 7px 2px rgba(255,215,80,.95);box-shadow:0 0 7px 2px rgba(255,215,80,.95);
  -webkit-animation:bulbo 1s ease-in-out infinite;animation:bulbo 1s ease-in-out infinite;}
@-webkit-keyframes bulbo{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes bulbo{0%,100%{opacity:1;}50%{opacity:.25;}}
#wrap{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:8px 12px 40px;}
@media (min-width:700px){#wrap{max-width:680px;}}
@media (min-width:1000px){#wrap{max-width:820px;}}

.tbnivel{font-size:13px;color:#ffd23f;font-weight:bold;}

.tbpts{font-size:12px;color:#e6c9ff;margin-top:2px;}
.card{background:-webkit-linear-gradient(#2a1c52,#20153f);background:linear-gradient(#2a1c52,#20153f);

.sub{font-size:14px;color:#e6c9ff;margin-top:6px;}
.lead{font-size:15px;line-height:1.5;color:#ffe9c9;margin:12px 6px 4px;}
.capa-arte{position:relative;margin:20px auto;width:220px;height:220px;z-index:2;}

.capa-img{position:relative;z-index:1;display:block;width:100%;height:100%;border-radius:50%;-o-object-fit:cover;object-fit:cover;-o-object-position:center;object-position:center;border:6px solid #ffd23f;-webkit-box-shadow:0 10px 26px rgba(0,0,0,.5),0 0 0 4px rgba(232,67,63,.7);box-shadow:0 10px 26px rgba(0,0,0,.5),0 0 0 4px rgba(232,67,63,.7);-webkit-animation:boia 4.5s ease-in-out .5s infinite;animation:boia 4.5s ease-in-out .5s infinite;}
@-webkit-keyframes boia{0%,100%{-webkit-transform:translateY(0) rotate(-1deg);}50%{-webkit-transform:translateY(-8px) rotate(1deg);}}
@keyframes boia{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-8px) rotate(1deg);}}
@-webkit-keyframes flutua{0%,100%{-webkit-transform:translateY(0);}50%{-webkit-transform:translateY(-6px);}}
@keyframes flutua{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@-webkit-keyframes flutuaBal{0%,100%{-webkit-transform:translateY(0) rotate(-2deg);}50%{-webkit-transform:translateY(-7px) rotate(2deg);}}
@keyframes flutuaBal{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-7px) rotate(2deg);}}
.mascbox{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;margin:10px 0 2px;}

.balao{background:#fff3d6;color:#5a2a12;border-radius:16px;padding:10px 12px;font-size:14px;line-height:1.4;text-align:left;max-width:320px;-webkit-box-shadow:0 4px 0 rgba(0,0,0,.18);box-shadow:0 4px 0 rgba(0,0,0,.18);}
.campo{display:block;width:auto;max-width:320px;min-width:200px;margin:14px auto 6px;box-sizing:border-box;padding:14px 16px;border:none;border-radius:16px;font-family:inherit;font-size:17px;text-align:center;background:#fff;color:#3a1d6b;font-weight:bold;}
.btn{display:block;width:auto;max-width:320px;min-width:200px;margin:10px auto 0;border:none;cursor:pointer;font-family:inherit;font-weight:bold;font-size:17px;color:#5a2410;padding:14px 28px;border-radius:16px;background:-webkit-linear-gradient(#ffe27a,#ffc21f);background:linear-gradient(#ffe27a,#ffc21f);-webkit-box-shadow:0 6px 0 #b8801a;box-shadow:0 6px 0 #b8801a;}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);-webkit-box-shadow:0 3px 0 #b8801a;box-shadow:0 3px 0 #b8801a;}
.btn.suave{background:-webkit-linear-gradient(#5a4a86,#463ae);background:linear-gradient(#5a4a86,#40356a);color:#ffe9c9;-webkit-box-shadow:0 5px 0 #2a2050;box-shadow:0 5px 0 #2a2050;font-size:15px;max-width:260px;}
.btn.peq{font-size:14px;padding:10px 20px;max-width:240px;}
.btn.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite;}
.btn.travado-audio{opacity:.5;cursor:default;-webkit-animation:none;animation:none;-webkit-filter:grayscale(.3);filter:grayscale(.3);-webkit-box-shadow:0 3px 0 #b8801a;box-shadow:0 3px 0 #b8801a;}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1);}50%{-webkit-transform:scale(1.05);}}
@keyframes pulsa{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.somzin{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:18px;color:#5a2410;margin-top:6px;background:-webkit-linear-gradient(#ffe27a,#ffc21f);background:linear-gradient(#ffe27a,#ffc21f);-webkit-box-shadow:0 3px 0 #b8801a;box-shadow:0 3px 0 #b8801a;}
.progbar{height:12px;background:rgba(0,0,0,.35);border-radius:8px;overflow:hidden;margin:6px auto 2px;max-width:280px;border:1px solid rgba(255,210,63,.3);}
.progbar i{display:block;height:100%;width:0%;background:-webkit-linear-gradient(left,#ff5a4d,#ffd23f);background:linear-gradient(to right,#ff5a4d,#ffd23f);}
.progtxt{font-size:12px;color:#e6c9ff;margin-top:4px;}
.guia{font-size:13px;color:#ffe9c9;margin:6px 4px;line-height:1.4;}
/* trilha */
.linhap{display:-webkit-box;display:flex;}
.linhap.esq{-webkit-box-pack:start;justify-content:flex-start;}
.linhap.centro{-webkit-box-pack:center;justify-content:center;}
.linhap.dir{-webkit-box-pack:end;justify-content:flex-end;}
.no{width:156px;text-align:center;cursor:pointer;position:relative;}
.paradafig{position:relative;width:150px;height:106px;margin:0 auto;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
.holomap{position:absolute;left:50%;top:50%;width:134px;height:100px;margin-left:-67px;margin-top:-50px;border-radius:50%;background:-webkit-radial-gradient(center,rgba(255,226,146,.34),rgba(255,210,90,0) 70%);background:radial-gradient(circle,rgba(255,226,146,.34),rgba(255,210,90,0) 70%);}
.ilhamapa{position:relative;max-height:98px;max-width:132px;width:auto;display:block;-webkit-filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));-webkit-animation:flutua 3.4s ease-in-out infinite;animation:flutua 3.4s ease-in-out infinite;}
.compmapa{position:absolute;right:0;bottom:-2px;height:48px;width:auto;z-index:3;-webkit-filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));-webkit-animation:flutua 2.8s ease-in-out infinite;animation:flutua 2.8s ease-in-out infinite;}

.no.atual .holomap{background:-webkit-radial-gradient(center,rgba(255,226,146,.55),rgba(255,210,90,0) 70%);background:radial-gradient(circle,rgba(255,226,146,.55),rgba(255,210,90,0) 70%);}
.no.trav .ilhamapa,.no.trav .compmapa{-webkit-filter:grayscale(1) brightness(.6);filter:grayscale(1) brightness(.6);}

.teotrilha{position:absolute;left:-6px;top:26px;height:60px;width:auto;z-index:4;pointer-events:none;-webkit-filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));-webkit-animation:andaTeo 1.05s ease-in-out infinite;animation:andaTeo 1.05s ease-in-out infinite;}
@-webkit-keyframes andaTeo{0%,100%{-webkit-transform:translateY(0) rotate(-5deg);}50%{-webkit-transform:translateY(-5px) rotate(5deg);}}
@keyframes andaTeo{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-5px) rotate(5deg);}}
.aqui{display:inline-block;background:#ffd23f;color:#5a2410;font-size:11px;font-weight:bold;padding:2px 9px;border-radius:10px;margin-bottom:3px;-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite;}
.nofig{width:92px;height:92px;margin:0 auto;position:relative;border-radius:50%;background:rgba(255,255,255,.06);border:3px solid rgba(255,210,63,.5);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
.nofig img{max-height:76px;width:auto;display:block;}

@-webkit-keyframes glow{0%,100%{-webkit-transform:scale(1);}50%{-webkit-transform:scale(1.06);}}

.no.trav{cursor:default;}

.cadeado{position:absolute;top:-4px;right:6px;font-size:22px;}
.check{position:absolute;top:-6px;right:2px;font-size:20px;}

.conector{width:0;height:20px;border-left:3px dotted rgba(255,210,63,.45);margin:2px auto;}
.trofeubox{text-align:center;margin:6px 0 2px;}

/* fase */
.cenariofase{width:100%;max-width:230px;margin:2px auto 8px;}
.ilhabox{position:relative;width:236px;height:156px;margin:6px auto 10px;}
.holo{position:absolute;left:50%;top:54%;width:230px;height:158px;margin-left:-115px;margin-top:-79px;border-radius:50%;background:-webkit-radial-gradient(center,rgba(255,226,146,.5),rgba(255,210,90,.14) 45%,rgba(255,210,90,0) 70%);background:radial-gradient(circle,rgba(255,226,146,.5),rgba(255,210,90,.14) 45%,rgba(255,210,90,0) 70%);-webkit-animation:piscaHolo 3s ease-in-out infinite;animation:piscaHolo 3s ease-in-out infinite;}

@-webkit-keyframes boiaIlha{0%,100%{-webkit-transform:translateY(0);}50%{-webkit-transform:translateY(-7px);}}
@keyframes boiaIlha{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@-webkit-keyframes piscaHolo{0%,100%{opacity:1;}50%{opacity:.82;}}
@keyframes piscaHolo{0%,100%{opacity:1;}50%{opacity:.82;}}
.enunciado{font-size:18px;color:#fff;font-weight:bold;margin:8px 6px;line-height:1.3;}
.dica{background:transparent;border:none;padding:3px 12px;font-size:14px;color:#ffe9b0;margin:2px auto 8px;max-width:360px;font-style:italic;text-shadow:0 0 10px rgba(255,205,110,.75),0 0 3px rgba(255,205,110,.5);-webkit-animation:brilhoDica 2.4s ease-in-out infinite;animation:brilhoDica 2.4s ease-in-out infinite;}

@keyframes brilhoDica{0%,100%{opacity:.82;}50%{opacity:1;}}
.opcoes{display:-webkit-box;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-box-pack:center;justify-content:center;margin:10px 0;}
.opbal{cursor:pointer;margin:10px 12px;padding:2px;background:transparent;border:none;}

.opbal.certa img{-webkit-filter:drop-shadow(0 0 12px #4dff9e);filter:drop-shadow(0 0 12px #4dff9e);-webkit-transform:scale(1.06);transform:scale(1.06);}

/* fase SOMBRA (arrastar) */
.sombrawrap{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;max-width:340px;margin:10px auto 4px;}
.scol{display:-webkit-box;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-align:center;align-items:center;}
.animdrag{width:98px;height:98px;margin:8px 0;cursor:pointer;cursor:-webkit-grab;cursor:grab;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-animation:flutua 3s ease-in-out infinite;animation:flutua 3s ease-in-out infinite;}

.sildrop{width:98px;height:98px;margin:8px 0;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;background:transparent;border:none;-webkit-animation:flutua 3.4s ease-in-out infinite;animation:flutua 3.4s ease-in-out infinite;}

.ghost{opacity:.9;-webkit-filter:drop-shadow(0 6px 8px rgba(0,0,0,.5));filter:drop-shadow(0 6px 8px rgba(0,0,0,.5));}

.fbok{background:rgba(77,180,120,.18);border:2px solid #4dbf82;border-radius:14px;padding:10px;margin:10px auto;max-width:360px;color:#d8ffe8;font-size:15px;line-height:1.4;}

    falar("São "+numExtG(q.n,q.obj.g)+" "+plObj(q.obj.nome)+" ao todo! Agora toque no número "+numExt(q.n)+".");return;}

  falar(numExtG(k+1,q.obj.g),function(){setTimeout(function(){contarPasso(k+1,q);},240);});}
/* ---- FIM DE FASE + ADAPTIVIDADE (compartilhado) ---- */
function fimFase(){var f=FCFG[faseAtual];ESTADO.concluidas[faseAtual]=true;salvar();somFanfarra();confete(40);
  var tot=dAcertos+dErros;var pct=Math.round(100*dAcertos/(tot||1));
  var ofereceExtra=(pct===100 && !_extraDado[faseAtual]);
  var ofereceRef=(pct<50 && dEfase.length>0 && !_refDado[faseAtual]);
  var h='<div class="card"><h2>Parada concluída!</h2><div class="medalha">&#127752;</div>';
  h+='<p class="lead">Você completou a parada <b>'+f.titulo+'</b>! Acertou '+dAcertos+' de '+tot+'.</p>';
  h+='<div class="mascbox"><img src="'+IMG.mComemora+'" alt="Teo"><div class="balao">'+f.gancho+'</div></div>';
  h+='<p class="progtxt" style="color:#ffd23f;">&#128275; Você abriu a próxima parada!</p>';
  if(ofereceExtra){h+='<button class="btn pulsa gate-audio" onclick="iniciarExtra()">&#127775; Desafio Extra (opcional)</button>';}
  if(ofereceRef){h+='<button class="btn pulsa gate-audio" onclick="iniciarReforco()">&#128257; Reforçar antes de seguir</button>';}
  h+='<button class="btn'+((ofereceExtra||ofereceRef)?' suave peq':' pulsa gate-audio')+'" onclick="telaMapa()">&#9654; Voltar ao mapa</button>';
  h+='<button class="btn suave peq" onclick="comecarFase()">&#128257; Jogar de novo</button></div>';
  $("app").innerHTML=h;window.scrollTo(0,0);
  var fa="Parada concluída! Você ganhou uma medalha! ";
  if(ofereceExtra){fa+="Que tal um desafio extra? É um pouquinho mais difícil!";}
  else if(ofereceRef){fa+="Quer treinar mais um pouquinho?";}
  else{fa+=f.gancho;}
  falar(fa);}
function iniciarExtra(){somClique();_extraDado[faseAtual]=true;emExtra=true;emReforco=false;_numOpc=4;
  var f=FCFG[faseAtual];
  if(f.tipo==="cor"){var base=CORES.slice();shuffleReal(base);d=base.slice(0,3);}
  else if(f.tipo==="forma"){d=montarRodadas(3);}
  else if(f.tipo==="sombra"){d=montarRodadas(3);}
  else{d=montarRodadas(3);var i;for(i=0;i<d.length;i++){if(d[i].n<6){d[i].n=6+Math.floor(Math.random()*4);}}}
  dIdx=0;dAcertos=0;dErros=0;dEfase=[];_resp=false;
  var msg;if(f.tipo==="cor"){msg="Agora vão aparecer mais balões pra você escolher! Preste bem atenção na cor.";}else if(f.tipo==="forma"){msg="Agora vou misturar mais formas! Olhe bem o formato de cada objeto.";}else if(f.tipo==="sombra"){msg="Agora vão aparecer mais bichinhos e mais sombras! Olhe bem o formato de cada um.";}else{msg="Agora os números vão ser maiores! Conte com bastante atenção.";}
  var h='<div class="card"><div class="mini" style="font-size:13px;color:#e6c9ff;">Desafio Extra</div><h2>&#127775; Mais difícil!</h2>';
  h+='<div class="mascbox"><img src="'+IMG.mExplica+'" alt="Teo"><div class="balao">'+msg+' Bora?</div></div>';
  h+='<button class="btn pulsa gate-audio" onclick="renderDesafio()">Começar! &#9654;</button></div>';
  $("app").innerHTML=h;window.scrollTo(0,0);falar(msg+" Vamos lá?");}
function fimExtra(){somFanfarra();confete(40);emExtra=false;ESTADO.pontos+=3;salvar();atualizarTopo();
  var h='<div class="card"><h2>Desafio Extra concluído! &#127775;</h2><div class="medalha">&#127775;</div>';
  h+='<div class="mascbox"><img src="'+IMG.mComemora+'" alt="Teo"><div class="balao">Uau! Você é um artista de circo de verdade! Ganhou pontos extras!</div></div>';
  h+='<button class="btn pulsa gate-audio" onclick="telaMapa()">&#9654; Voltar ao mapa</button></div>';
  $("app").innerHTML=h;window.scrollTo(0,0);falar("Desafio extra concluído! Você é um artista de circo de verdade e ganhou pontos extras!");}
function iniciarReforco(){somClique();_refDado[faseAtual]=true;emReforco=true;emExtra=false;_numOpc=3;
  d=dEfase.slice();shuffleReal(d);dIdx=0;dAcertos=0;dErros=0;_resp=false;
  var h='<div class="card"><div class="mini" style="font-size:13px;color:#e6c9ff;">Reforço</div><h2>&#128257; Vamos treinar!</h2>';
  h+='<div class="mascbox"><img src="'+IMG.mExplica+'" alt="Teo"><div class="balao">Vamos praticar de novo o que enrolou. Você consegue!</div></div>';
  h+='<button class="btn pulsa gate-audio" onclick="renderDesafio()">Começar! &#9654;</button></div>';
  $("app").innerHTML=h;window.scrollTo(0,0);falar("Vamos treinar de novo o que enrolou. Você consegue!");}
function fimReforco(){somFanfarra();confete(30);emReforco=false;
  var h='<div class="card"><h2>Muito melhor! &#127881;</h2><div class="mascbox"><img src="'+IMG.mComemora+'" alt="Teo"><div class="balao">Você treinou e mandou muito bem! Agora pode seguir viagem.</div></div>';
  h+='<button class="btn pulsa gate-audio" onclick="telaMapa()">&#9654; Voltar ao mapa</button></div>';
  $("app").innerHTML=h;window.scrollTo(0,0);falar("Você treinou e mandou muito bem! Agora pode seguir viagem.");}

/* ====== TELA CHEIA ====== */
function tcSup(){var e=document.documentElement;return !!(e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen);}
function emTC(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement);}
function alternarTelaCheia(){var e=document.documentElement;try{if(!emTC()){if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();else if(e.mozRequestFullScreen)e.mozRequestFullScreen();else if(e.msRequestFullscreen)e.msRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}catch(x){}}
function atualizarTC(){var b=$("btn-tela-cheia");if(b){b.innerHTML=emTC()?"✕":"⛛";}}
/* ====== BOOT ====== */
function boot(){carregar();var b=$("btn-tela-cheia");if(b&&tcSup()){b.style.display="block";if(document.body)document.body.className+=" tem-tc";
    var evs=["fullscreenchange","webkitfullscreenchange","mozfullscreenchange","MSFullscreenChange"],k;for(k=0;k<evs.length;k++)document.addEventListener(evs[k],atualizarTC);}
  telaInicio();}
boot();
</script>
