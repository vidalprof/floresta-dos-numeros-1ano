<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>O Grande Circo do Teo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;}
body{
  font-family:"Segoe UI",Verdana,sans-serif;
  background:#2a1550;
  background:-webkit-radial-gradient(50% 0%, #3a1d6b, #1e1140 60%, #120a2a);
  background:radial-gradient(120% 90% at 50% 0%, #3a1d6b, #1e1140 60%, #120a2a);
  color:#ffe9c9;overflow-x:hidden;-webkit-user-select:none;user-select:none;
}
#fundo{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.luz{position:absolute;border-radius:50%;background:#ffd23f;opacity:.5;
  -webkit-box-shadow:0 0 12px 4px rgba(255,210,63,.55);box-shadow:0 0 12px 4px rgba(255,210,63,.55);
  -webkit-animation:pisca 3.2s ease-in-out infinite;animation:pisca 3.2s ease-in-out infinite;}
@-webkit-keyframes pisca{0%,100%{opacity:.25;}50%{opacity:.85;}}
@keyframes pisca{0%,100%{opacity:.25;}50%{opacity:.85;}}
.conf{position:absolute;width:9px;height:14px;border-radius:2px;opacity:.75;
  -webkit-animation:cai linear infinite;animation:cai linear infinite;}
@-webkit-keyframes cai{0%{-webkit-transform:translateY(-30px) rotate(0);}100%{-webkit-transform:translateY(110vh) rotate(360deg);}}
@keyframes cai{0%{transform:translateY(-30px) rotate(0);}100%{transform:translateY(110vh) rotate(360deg);}}
#wrap{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:16px 14px 40px;}
@media (min-width:700px){#wrap{max-width:680px;}}
.card{
  background:-webkit-linear-gradient(#2a1c52,#20153f);background:linear-gradient(#2a1c52,#20153f);
  border:2px solid rgba(255,210,63,.45);border-radius:26px;padding:20px 18px 26px;text-align:center;
  -webkit-box-shadow:0 14px 40px rgba(0,0,0,.5), inset 0 0 30px rgba(255,120,60,.08);
  box-shadow:0 14px 40px rgba(0,0,0,.5), inset 0 0 30px rgba(255,120,60,.08);
  -webkit-animation:surge .5s ease-out both;animation:surge .5s ease-out both;
}
@-webkit-keyframes surge{0%{-webkit-transform:translateY(16px);opacity:0;}100%{-webkit-transform:translateY(0);opacity:1;}}
@keyframes surge{0%{transform:translateY(16px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.selo{display:inline-block;background:-webkit-linear-gradient(#ff5a4d,#c9342f);background:linear-gradient(#ff5a4d,#c9342f);
  color:#fff;font-weight:bold;font-size:13px;letter-spacing:1px;padding:6px 16px;border-radius:20px;
  -webkit-box-shadow:0 4px 0 #7c1f1b;box-shadow:0 4px 0 #7c1f1b;text-transform:uppercase;margin-bottom:6px;}
.capa-arte{position:relative;margin:12px auto 4px;width:230px;height:230px;}
@media (min-width:700px){.capa-arte{width:264px;height:264px;}}
.capa-arte:before{content:"";position:absolute;left:50%;margin-left:-95px;width:190px;bottom:-4px;height:14px;
  background:rgba(0,0,0,.35);border-radius:50%;-webkit-filter:blur(7px);filter:blur(7px);z-index:0;}
.capa-img{position:relative;z-index:1;display:block;width:100%;height:100%;border-radius:50%;
  -o-object-fit:cover;object-fit:cover;-o-object-position:center;object-position:center;
  border:6px solid #ffd23f;
  -webkit-box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 0 4px rgba(232,67,63,.7);
  box-shadow:0 10px 26px rgba(0,0,0,.5), 0 0 0 4px rgba(232,67,63,.7);
  -webkit-animation:boia 4.5s ease-in-out .5s infinite;animation:boia 4.5s ease-in-out .5s infinite;}
@-webkit-keyframes boia{0%,100%{-webkit-transform:translateY(0) rotate(-1deg);}50%{-webkit-transform:translateY(-9px) rotate(1deg);}}
@keyframes boia{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-9px) rotate(1deg);}}
h1{font-size:30px;line-height:1.05;margin-top:12px;color:#ffd23f;text-shadow:0 2px 0 #7c1f1b, 0 0 18px rgba(255,210,63,.4);}
h1 .t2{display:block;font-size:20px;color:#ff8a5c;letter-spacing:3px;}
.sub{font-size:14px;color:#e6c9ff;margin-top:6px;}
.lead{font-size:15px;line-height:1.5;color:#ffe9c9;margin:14px 6px 6px;}
.mascbox{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;
  -webkit-box-pack:center;justify-content:center;margin:10px 0 2px;}
.mascbox img{display:block;height:78px;width:auto;margin-right:8px;}
.balao{background:#fff3d6;color:#5a2a12;border-radius:16px;padding:10px 12px;font-size:14px;line-height:1.4;
  text-align:left;max-width:300px;position:relative;-webkit-box-shadow:0 4px 0 rgba(0,0,0,.18);box-shadow:0 4px 0 rgba(0,0,0,.18);}
.campo{display:block;width:auto;max-width:320px;min-width:200px;margin:14px auto 6px;box-sizing:border-box;
  padding:14px 16px;border:none;border-radius:16px;font-family:inherit;font-size:17px;text-align:center;
  background:#fff;color:#3a1d6b;font-weight:bold;}
.btn{display:block;width:auto;max-width:320px;min-width:200px;margin:10px auto 0;border:none;cursor:pointer;
  font-family:inherit;font-weight:bold;font-size:18px;color:#5a2410;padding:15px 30px;border-radius:18px;
  background:-webkit-linear-gradient(#ffe27a,#ffc21f);background:linear-gradient(#ffe27a,#ffc21f);
  -webkit-box-shadow:0 6px 0 #b8801a;box-shadow:0 6px 0 #b8801a;}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);-webkit-box-shadow:0 3px 0 #b8801a;box-shadow:0 3px 0 #b8801a;}
.btn.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite;}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1);}50%{-webkit-transform:scale(1.05);}}
@keyframes pulsa{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.btn-tela-cheia{position:fixed;top:8px;right:8px;z-index:60;width:40px;height:40px;border-radius:10px;
  border:2px solid rgba(255,210,63,.6);background:rgba(30,17,64,.8);color:#ffe9c9;font-size:20px;line-height:1;
  cursor:pointer;padding:0;}
</style>
</head>
<body>
<button class="btn-tela-cheia" id="btn-tela-cheia" onclick="alternarTelaCheia()" title="Tela cheia" style="display:none">&#9974;</button>
<div id="fundo"></div>
<div id="wrap">
  <div class="card">
    <span class="selo">Espetáculo do Pré</span>
    <div class="capa-arte"><img class="capa-img" src="{{CAPA}}" alt="O circo do Teo"></div>
    <h1>O Grande Circo<span class="t2">DO TEO</span></h1>
    <div class="sub">Pré-escola &bull; Cores, Números, Formas e Vogais</div>
    <div class="mascbox">
      <img src="{{MASC_FELIZ}}" alt="Teo">
      <div class="balao">Oi! Eu sou o <b>Teo</b>, o ursinho do circo! Uma ventania bagunçou o nosso espetáculo. Vem me ajudar a arrumar tudo? Digite seu nome!</div>
    </div>
    <input class="campo" id="inpNome" placeholder="Digite seu nome" maxlength="16">
    <button class="btn pulsa" id="btnComecar" onclick="comecar()">Começar a aventura! &#128640;</button>
  </div>
</div>
<script>
function $(id){return document.getElementById(id);}
/* fundo: luzinhas + confete discretos */
(function(){
  var f=$("fundo"),i,e,cores=["#ffd23f","#ff5a4d","#4db4ff","#4dff9e","#ff8a5c"];
  for(i=0;i<14;i++){e=document.createElement("div");e.className="luz";
    var s=4+Math.round(6*((i*37)%10)/10);e.style.width=s+"px";e.style.height=s+"px";
    e.style.left=((i*67)%100)+"%";e.style.top=((i*29)%60)+"%";
    e.style.webkitAnimationDelay=((i%10)*0.3)+"s";e.style.animationDelay=((i%10)*0.3)+"s";f.appendChild(e);}
  for(i=0;i<10;i++){e=document.createElement("div");e.className="conf";
    e.style.background=cores[i%cores.length];e.style.left=((i*53)%100)+"%";
    var d=6+((i*3)%7);e.style.webkitAnimationDuration=d+"s";e.style.animationDuration=d+"s";
    e.style.webkitAnimationDelay=(-(i*1.3))+"s";e.style.animationDelay=(-(i*1.3))+"s";f.appendChild(e);}
})();
/* narracao */
var _voz=null;
function escolherVoz(){if(!window.speechSynthesis)return null;var vs=window.speechSynthesis.getVoices(),i;
  for(i=0;i<vs.length;i++){if(/pt-BR|pt_BR/i.test(vs[i].lang)&&/natural|google|luciana|francisca|maria/i.test(vs[i].name))return vs[i];}
  for(i=0;i<vs.length;i++){if(/pt/i.test(vs[i].lang))return vs[i];}return null;}
function falar(t,cb){if(!window.speechSynthesis||!window.SpeechSynthesisUtterance){if(cb)setTimeout(cb,300);return;}
  if(!_voz)_voz=escolherVoz();try{window.speechSynthesis.cancel();}catch(e){}
  var u=new SpeechSynthesisUtterance(t);if(_voz){u.voice=_voz;u.lang=_voz.lang;}u.rate=0.95;u.pitch=1.1;
  if(cb)u.onend=cb;try{window.speechSynthesis.speak(u);}catch(e){if(cb)setTimeout(cb,300);}}
if(window.speechSynthesis&&window.speechSynthesis.onvoiceschanged!==undefined){window.speechSynthesis.onvoiceschanged=function(){_voz=escolherVoz();};}
function comecar(){var v=$("inpNome").value;falar("Vamos começar a aventura no circo!");
  alert("(Prévia) A pró"+"xima tela seria o mapa das paradas, "+(v?v:"amiguinho")+"!");}
/* tela cheia */
function tcSup(){var e=document.documentElement;return !!(e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen);}
function emTC(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement);}
function alternarTelaCheia(){var e=document.documentElement;try{if(!emTC()){(e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen).call(e);}else{(document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen).call(document);}}catch(x){}}
function bootTC(){var b=$("btn-tela-cheia");if(b&&tcSup()){b.style.display="block";}}
function apresentar(){falar("Oi! Eu sou o Teo, o ursinho do circo! Uma ventania bagunçou o nosso espetáculo. Vem me ajudar a arrumar tudo? Digite seu nome e vamos começar!");}
bootTC();
window.addEventListener("load",function(){setTimeout(apresentar,400);});
</script>
</body>
</html>
